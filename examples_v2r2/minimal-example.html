<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bitwrench Minimal Example</title>
  <script src="dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="dist/bitwrench.css">
</head>
<body>
  <div id="app"></div>
  <script>
    // Everything is just JavaScript objects!
    const app = {
      t: "div",
      a: { class: "container mt-4" },
      c: [
        { t: "h1", c: "Hello Bitwrench!" },
        { t: "p", c: "This entire page is built with TACO objects." },
        {
          t: "button",
          a: { 
            class: "btn btn-primary",
            onclick: () => alert("Clicked!")
          },
          c: "Click Me"
        }
      ]
    };
    
    // One line to render everything
    bw.DOM('#app', app);
  </script>
</body>
</html>
