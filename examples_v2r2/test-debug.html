<!DOCTYPE html>
<html>
<head>
  <script src="dist/bitwrench.umd.js"></script>
</head>
<body>
  <h1>Debug Test</h1>
  <pre id="output"></pre>
  <script>
    const output = document.getElementById('output');
    
    // Check if bw is loaded
    output.textContent = 'bw loaded: ' + (typeof bw !== 'undefined') + '\n';
    output.textContent += 'bw.version: ' + (bw ? bw.version : 'N/A') + '\n\n';
    
    // Check make functions
    if (bw) {
      const makeFunctions = Object.keys(bw).filter(k => k.startsWith('make')).sort();
      output.textContent += 'Make functions (' + makeFunctions.length + '):\n';
      makeFunctions.forEach(fn => {
        output.textContent += '  ' + fn + '\n';
      });
      
      // Test makeListGroup specifically
      output.textContent += '\nmakeListGroup test:\n';
      output.textContent += '  typeof bw.makeListGroup: ' + typeof bw.makeListGroup + '\n';
      
      if (bw.makeListGroup) {
        try {
          const listGroup = bw.makeListGroup({
            items: [{text: 'Item 1'}, {text: 'Item 2'}]
          });
          output.textContent += '  makeListGroup works! Created: ' + JSON.stringify(listGroup, null, 2) + '\n';
        } catch (e) {
          output.textContent += '  ERROR: ' + e.message + '\n';
        }
      }
    }
  </script>
</body>
</html>
