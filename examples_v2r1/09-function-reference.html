<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Reference - Bitwrench v2</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="../dist/bitwrench-responsive-fixes.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        // Component shortcuts
        const { Card, Row, Col, Badge, Alert } = bw.components;
        
        // Function categories
        const functionCategories = [
            {
                title: "Core Functions",
                description: "Essential functions for creating and manipulating DOM elements",
                functions: [
                    {
                        name: "bw.html",
                        signature: "bw.html(taco)",
                        description: "Converts a TACO object to an HTML string",
                        params: [
                            { name: "taco", type: "Object|Array|String", desc: "TACO object or array of TACO objects" }
                        ],
                        returns: "String - HTML representation",
                        example: `const button = bw.html({
  t: 'button',
  a: { class: 'btn btn-primary' },
  c: 'Click me'
});
// Returns: '<button class="btn btn-primary">Click me</button>'`
                    },
                    {
                        name: "bw.createDOM",
                        signature: "bw.createDOM(taco)",
                        description: "Creates actual DOM elements from TACO objects",
                        params: [
                            { name: "taco", type: "Object|Array|String", desc: "TACO object or array" }
                        ],
                        returns: "Element|Array<Element> - DOM element(s)",
                        example: `const elem = bw.createDOM({
  t: 'div',
  a: { id: 'myDiv' },
  c: 'Hello World'
});
document.body.appendChild(elem);`
                    },
                    {
                        name: "bw.DOM",
                        signature: "bw.DOM(selector, taco, position)",
                        description: "Renders TACO objects into the DOM at specified selector",
                        params: [
                            { name: "selector", type: "String|Element", desc: "CSS selector or DOM element" },
                            { name: "taco", type: "Object|Array", desc: "TACO object(s) to render" },
                            { name: "position", type: "String", desc: "Optional: 'replace' (default), 'append', 'prepend'" }
                        ],
                        returns: "Element|Array<Element> - Rendered element(s)",
                        example: `bw.DOM('#app', {
  t: 'div',
  a: { class: 'container' },
  c: [
    { t: 'h1', c: 'Welcome' },
    { t: 'p', c: 'Hello from Bitwrench!' }
  ]
});`
                    },
                    {
                        name: "bw.render",
                        signature: "bw.render(element, position, taco)",
                        description: "Renders a component and returns a handle object for lifecycle management",
                        params: [
                            { name: "element", type: "String|Element", desc: "Target element or selector" },
                            { name: "position", type: "String", desc: "'replace', 'append', or 'prepend'" },
                            { name: "taco", type: "Object", desc: "Component TACO object" }
                        ],
                        returns: "Object - Component handle with methods",
                        example: `const handle = bw.render('#target', 'replace', {
  t: 'div',
  a: { id: 'myComponent' },
  c: 'Initial content'
});

// Use the handle
handle.setState({ content: 'Updated!' });
handle.addClass('highlight');
handle.on('click', () => console.log('Clicked!'));`
                    },
                    {
                        name: "bw.loadDefaultStyles",
                        signature: "bw.loadDefaultStyles()",
                        description: "Injects default Bitwrench styles into the page",
                        params: [],
                        returns: "void",
                        example: `// Add Bitwrench styles programmatically
bw.loadDefaultStyles();`
                    }
                ]
            },
            {
                title: "Helper Functions - Arrays",
                description: "Utility functions for array manipulation",
                functions: [
                    {
                        name: "bw.arrayUniq",
                        signature: "bw.arrayUniq(array)",
                        description: "Returns array with unique values only",
                        params: [
                            { name: "array", type: "Array", desc: "Input array" }
                        ],
                        returns: "Array - Array with duplicates removed",
                        example: `bw.arrayUniq([1, 2, 3, 2, 4, 1, 5])
// Returns: [1, 2, 3, 4, 5]`
                    },
                    {
                        name: "bw.arrayBinA",
                        signature: "bw.arrayBinA(arrayA, arrayB)",
                        description: "Returns elements from arrayB that exist in arrayA (intersection)",
                        params: [
                            { name: "arrayA", type: "Array", desc: "First array" },
                            { name: "arrayB", type: "Array", desc: "Second array" }
                        ],
                        returns: "Array - Common elements",
                        example: `bw.arrayBinA([1, 2, 3, 4], [3, 4, 5, 6])
// Returns: [3, 4]`
                    },
                    {
                        name: "bw.arrayBNotInA",
                        signature: "bw.arrayBNotInA(arrayA, arrayB)",
                        description: "Returns elements from arrayB that don't exist in arrayA",
                        params: [
                            { name: "arrayA", type: "Array", desc: "First array" },
                            { name: "arrayB", type: "Array", desc: "Second array" }
                        ],
                        returns: "Array - Elements unique to arrayB",
                        example: `bw.arrayBNotInA([1, 2, 3], [3, 4, 5])
// Returns: [4, 5]`
                    }
                ]
            },
            {
                title: "Helper Functions - Random Data",
                description: "Functions for generating random test data",
                functions: [
                    {
                        name: "bw.randomInt",
                        signature: "bw.randomInt(min, max)",
                        description: "Generates a random integer between min and max (inclusive)",
                        params: [
                            { name: "min", type: "Number", desc: "Minimum value" },
                            { name: "max", type: "Number", desc: "Maximum value" }
                        ],
                        returns: "Number - Random integer",
                        example: `bw.randomInt(1, 100)  // Returns: 42
bw.randomInt(0, 10)   // Returns: 7`
                    },
                    {
                        name: "bw.randomFloat",
                        signature: "bw.randomFloat(min, max, decimals)",
                        description: "Generates a random float with specified decimal places",
                        params: [
                            { name: "min", type: "Number", desc: "Minimum value" },
                            { name: "max", type: "Number", desc: "Maximum value" },
                            { name: "decimals", type: "Number", desc: "Number of decimal places (default: 2)" }
                        ],
                        returns: "Number - Random float",
                        example: `bw.randomFloat(0, 1, 3)      // Returns: 0.724
bw.randomFloat(10, 20, 2)    // Returns: 15.83`
                    },
                    {
                        name: "bw.randomArray",
                        signature: "bw.randomArray(length, generator)",
                        description: "Creates an array of random values using a generator function",
                        params: [
                            { name: "length", type: "Number", desc: "Array length" },
                            { name: "generator", type: "Function", desc: "Function that returns a value" }
                        ],
                        returns: "Array - Array of generated values",
                        example: `// Array of random numbers
bw.randomArray(5, () => bw.randomInt(1, 10))
// Returns: [3, 7, 2, 9, 5]

// Array of random names
const names = ['Alice', 'Bob', 'Charlie', 'Diana'];
bw.randomArray(3, () => bw.choice(names))
// Returns: ['Bob', 'Alice', 'Bob']`
                    },
                    {
                        name: "bw.uuid",
                        signature: "bw.uuid()",
                        description: "Generates a unique identifier",
                        params: [],
                        returns: "String - UUID",
                        example: `bw.uuid()  // Returns: "a7b2c9d4e"`
                    }
                ]
            },
            {
                title: "Helper Functions - Text & Content",
                description: "Functions for generating text content",
                functions: [
                    {
                        name: "bw.loremIpsum",
                        signature: "bw.loremIpsum(wordCount, startWord)",
                        description: "Generates Lorem Ipsum placeholder text",
                        params: [
                            { name: "wordCount", type: "Number", desc: "Number of words to generate" },
                            { name: "startWord", type: "Number", desc: "Optional starting word index" }
                        ],
                        returns: "String - Lorem Ipsum text",
                        example: `bw.loremIpsum(20)
// Returns: "Lorem ipsum dolor sit amet, consectetur adipiscing elit..."

bw.loremIpsum(10, 5)
// Returns: "consectetur adipiscing elit, sed do..."`
                    }
                ]
            },
            {
                title: "Helper Functions - Utilities",
                description: "General utility functions",
                functions: [
                    {
                        name: "bw.choice",
                        signature: "bw.choice(key, choiceDict, defaultValue)",
                        description: "Dictionary-based switch/case replacement",
                        params: [
                            { name: "key", type: "String", desc: "Key to look up" },
                            { name: "choiceDict", type: "Object", desc: "Object with choices" },
                            { name: "defaultValue", type: "Any", desc: "Default if key not found" }
                        ],
                        returns: "Any - Matched value or default",
                        example: `const actions = {
  'start': 'Starting engine...',
  'stop': 'Stopping engine...',
  'restart': () => 'Restarting...'
};

bw.choice('start', actions, 'Unknown')    // Returns: "Starting engine..."
bw.choice('restart', actions)()           // Returns: "Restarting..."
bw.choice('pause', actions, 'Unknown')    // Returns: "Unknown"`
                    },
                    {
                        name: "bw.naturalCompare",
                        signature: "bw.naturalCompare(a, b)",
                        description: "Natural sort comparison function for arrays",
                        params: [
                            { name: "a", type: "String", desc: "First string" },
                            { name: "b", type: "String", desc: "Second string" }
                        ],
                        returns: "Number - Sort order (-1, 0, 1)",
                        example: `const files = ['file10.txt', 'file2.txt', 'file1.txt'];
files.sort(bw.naturalCompare);
// Returns: ['file1.txt', 'file2.txt', 'file10.txt']`
                    },
                    {
                        name: "bw.colorInterp",
                        signature: "bw.colorInterp(value, minVal, maxVal, colors)",
                        description: "Interpolates colors based on a value within a range",
                        params: [
                            { name: "value", type: "Number", desc: "Current value" },
                            { name: "minVal", type: "Number", desc: "Minimum value" },
                            { name: "maxVal", type: "Number", desc: "Maximum value" },
                            { name: "colors", type: "Array", desc: "Array of color hex strings" }
                        ],
                        returns: "Array - [r, g, b] values",
                        example: `// Interpolate between red and green
const color = bw.colorInterp(50, 0, 100, ['#FF0000', '#00FF00']);
// Returns: [128, 128, 0] (yellowish)`
                    }
                ]
            },
            {
                title: "Helper Functions - Storage & Timers",
                description: "Browser storage and timer utilities",
                functions: [
                    {
                        name: "bw.setCookie",
                        signature: "bw.setCookie(name, value, days)",
                        description: "Sets a cookie with expiration",
                        params: [
                            { name: "name", type: "String", desc: "Cookie name" },
                            { name: "value", type: "String", desc: "Cookie value" },
                            { name: "days", type: "Number", desc: "Days until expiration" }
                        ],
                        returns: "void",
                        example: `bw.setCookie('theme', 'dark', 30);  // Expires in 30 days`
                    },
                    {
                        name: "bw.getCookie",
                        signature: "bw.getCookie(name)",
                        description: "Retrieves a cookie value",
                        params: [
                            { name: "name", type: "String", desc: "Cookie name" }
                        ],
                        returns: "String|null - Cookie value or null",
                        example: `const theme = bw.getCookie('theme');  // Returns: "dark"`
                    },
                    {
                        name: "bw.setIntervalX",
                        signature: "bw.setIntervalX(callback, delay, count)",
                        description: "Runs a function repeatedly for a specified number of times",
                        params: [
                            { name: "callback", type: "Function", desc: "Function to execute" },
                            { name: "delay", type: "Number", desc: "Delay in milliseconds" },
                            { name: "count", type: "Number", desc: "Number of times to execute" }
                        ],
                        returns: "Number - Interval ID",
                        example: `let counter = 0;
bw.setIntervalX(() => {
  console.log(\`Count: \${++counter}\`);
}, 1000, 5);  // Logs 1-5, once per second`
                    },
                    {
                        name: "bw.repeatUntil",
                        signature: "bw.repeatUntil(callback, condition, delay, maxAttempts)",
                        description: "Repeats a function until condition is met",
                        params: [
                            { name: "callback", type: "Function", desc: "Function to execute" },
                            { name: "condition", type: "Function", desc: "Function returning boolean" },
                            { name: "delay", type: "Number", desc: "Delay between attempts (ms)" },
                            { name: "maxAttempts", type: "Number", desc: "Maximum attempts (optional)" }
                        ],
                        returns: "Number - Interval ID",
                        example: `let loaded = false;
bw.repeatUntil(
  () => console.log('Checking...'),
  () => loaded === true,
  500,
  10
);`
                    }
                ]
            },
            {
                title: "Helper Functions - Tables",
                description: "Functions for creating data tables",
                functions: [
                    {
                        name: "bw.makeTable",
                        signature: "bw.makeTable(config)",
                        description: "Creates a sortable table from data",
                        params: [
                            { name: "config", type: "Object", desc: "Table configuration object" },
                            { name: "config.data", type: "Array", desc: "2D array of table data" },
                            { name: "config.columns", type: "Array", desc: "Column definitions" },
                            { name: "config.sortable", type: "Boolean", desc: "Enable sorting (default: true)" },
                            { name: "config.className", type: "String", desc: "CSS classes for table" }
                        ],
                        returns: "Object - TACO table object",
                        example: `const table = bw.makeTable({
  data: [
    ['Alice', 28, 'Engineer'],
    ['Bob', 32, 'Designer'],
    ['Charlie', 24, 'Developer']
  ],
  columns: [
    { key: 0, label: 'Name' },
    { key: 1, label: 'Age' },
    { key: 2, label: 'Role' }
  ],
  className: 'table table-striped',
  sortable: true
});

bw.DOM('#tableContainer', table);`
                    }
                ]
            }
        ];
        
        // Helper function to create syntax highlighted code
        const createCodeBlock = (code) => ({
            t: 'pre',
            a: { class: 'bg-light p-3 rounded' },
            c: {
                t: 'code',
                c: code
            }
        });
        
        // Helper function to create function documentation card
        const createFunctionDoc = (func) => ({
            t: 'div',
            a: { class: 'mb-4', id: func.name.replace('.', '-') },
            c: Card({
                children: [
                    // Function name and signature
                    {
                        t: 'div',
                        a: { class: 'd-flex align-items-start justify-content-between mb-3' },
                        c: [
                            {
                                t: 'div',
                                c: [
                                    { t: 'h4', a: { class: 'mb-1' }, c: func.name },
                                    { 
                                        t: 'code', 
                                        a: { class: 'text-primary' }, 
                                        c: func.signature 
                                    }
                                ]
                            },
                            Badge({ variant: 'secondary', children: 'Function' })
                        ]
                    },
                    
                    // Description
                    { t: 'p', c: func.description },
                    
                    // Parameters
                    func.params.length > 0 && {
                        t: 'div',
                        a: { class: 'mb-3' },
                        c: [
                            { t: 'h6', a: { class: 'text-muted' }, c: 'Parameters' },
                            {
                                t: 'ul',
                                a: { class: 'list-unstyled ps-3' },
                                c: func.params.map(param => ({
                                    t: 'li',
                                    a: { class: 'mb-1' },
                                    c: [
                                        {
                                            t: 'code',
                                            c: param.name
                                        },
                                        ' ',
                                        {
                                            t: 'span',
                                            a: { class: 'text-muted' },
                                            c: `(${param.type})`
                                        },
                                        ' - ',
                                        param.desc
                                    ]
                                }))
                            }
                        ]
                    },
                    
                    // Returns
                    {
                        t: 'div',
                        a: { class: 'mb-3' },
                        c: [
                            { t: 'h6', a: { class: 'text-muted' }, c: 'Returns' },
                            { t: 'p', a: { class: 'ps-3 mb-0' }, c: func.returns }
                        ]
                    },
                    
                    // Example
                    {
                        t: 'div',
                        c: [
                            { t: 'h6', a: { class: 'text-muted' }, c: 'Example' },
                            createCodeBlock(func.example)
                        ]
                    }
                ].filter(Boolean)
            })
        });
        
        // Create table of contents
        const createTOC = () => ({
            t: 'div',
            a: { class: 'mb-5' },
            c: Card({
                title: 'Quick Navigation',
                children: {
                    t: 'div',
                    a: { class: 'row' },
                    c: functionCategories.map(category => ({
                        t: 'div',
                        a: { class: 'col-md-6 mb-3' },
                        c: [
                            { t: 'h6', c: category.title },
                            {
                                t: 'ul',
                                a: { class: 'list-unstyled small' },
                                c: category.functions.map(func => ({
                                    t: 'li',
                                    c: {
                                        t: 'a',
                                        a: { 
                                            href: `#${func.name.replace('.', '-')}`,
                                            class: 'text-decoration-none'
                                        },
                                        c: func.name
                                    }
                                }))
                            }
                        ]
                    }))
                }
            })
        });
        
        // Create the app
        const App = () => ExamplePage({
            title: 'Function Reference',
            content: [
                {
                    t: 'h1',
                    a: { class: 'mb-4' },
                    c: 'Bitwrench v2 Function Reference'
                },
                {
                    t: 'p',
                    a: { class: 'lead mb-4' },
                    c: 'Complete API documentation for all Bitwrench functions'
                },
                
                // Alert about helper functions
                Alert({
                    variant: 'info',
                    children: [
                        { t: 'strong', c: 'Tip: ' },
                        'Helper functions are perfect for rapid prototyping! Use ',
                        { t: 'code', c: 'bw.loremIpsum()' },
                        ' to fill layouts with text, ',
                        { t: 'code', c: 'bw.randomArray()' },
                        ' to generate test data, and ',
                        { t: 'code', c: 'bw.makeTable()' },
                        ' to quickly create data tables.'
                    ]
                }),
                
                // Table of contents
                createTOC(),
                
                // Function categories
                ...functionCategories.map(category => ({
                    t: 'section',
                    a: { class: 'mb-5' },
                    c: [
                        { t: 'h2', a: { class: 'mb-2' }, c: category.title },
                        { t: 'p', a: { class: 'text-muted mb-4' }, c: category.description },
                        ...category.functions.map(createFunctionDoc)
                    ]
                }))
            ]
        });
        
        // Mount the app
        bw.DOM('#app', App());
    </script>
</body>
</html>
