<!DOCTYPE html>
<html>
<head>
    <title>Test Lorem Ipsum</title>
</head>
<body>
    <h2>Lorem Ipsum Tests</h2>
    <div id="output"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script>
        const tests = [
            { desc: "Default (100 chars)", result: bw.loremIpsum(100) },
            { desc: "With randomization (200, 50)", result: bw.loremIpsum(200, 50) },
            { desc: "No capital letter (50, 0, false)", result: bw.loremIpsum(50, 0, false) },
            { desc: "Starting position 15 (30 chars)", result: bw.loremIpsum(30, 15) },
            { desc: "Multiple calls with random (100, 50)", results: [
                bw.loremIpsum(100, 50),
                bw.loremIpsum(100, 50),
                bw.loremIpsum(100, 50)
            ]}
        ];
        
        let html = "";
        tests.forEach(test => {
            html += `<h3>${test.desc}</h3>`;
            if (test.results) {
                test.results.forEach((r, i) => {
                    html += `<p>Call ${i+1}: "${r}"</p>`;
                });
            } else {
                html += `<p>"${test.result}"</p>`;
            }
            html += "<hr>";
        });
        
        document.getElementById("output").innerHTML = html;
    </script>
</body>
</html>
