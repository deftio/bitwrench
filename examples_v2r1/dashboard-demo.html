<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwrench - Analytics Dashboard Demo</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="../dist/bitwrench-responsive-fixes.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
    <style>
        .metric-card {
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        .metric-card .card-body {
            padding: 1.5rem;
        }
        .metric-trend {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.875rem;
        }
        .trend-up { color: #28a745; }
        .trend-down { color: #dc3545; }
        .chart-container {
            height: 300px;
            position: relative;
            padding: 1rem;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .data-table {
            max-height: 400px;
            overflow-y: auto;
        }
        .bg-light {
            background-color: #f8f9fa !important;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script>
        // Component shortcuts
        const { Container, Row, Col, Card, Button, Badge, Alert, Progress, Table } = bw.components;
        
        // Dashboard state
        let dashboardData = {
            metrics: {
                users: 0,
                revenue: 0,
                orders: 0,
                conversion: 0
            },
            chartData: null,
            recentActivity: [],
            isLoading: true,
            lastUpdated: null,
            autoRefresh: true,
            prevMetrics: null
        };
        
        let refreshInterval = null;
        
        // Simulate API calls
        async function fetchMetrics() {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Generate realistic-looking metrics with trends
            const prevUsers = dashboardData.metrics.users || 1250;
            const prevRevenue = dashboardData.metrics.revenue || 45000;
            const prevOrders = dashboardData.metrics.orders || 320;
            
            return {
                users: prevUsers + Math.floor(Math.random() * 100 - 40),
                revenue: prevRevenue + Math.floor(Math.random() * 5000 - 2000),
                orders: prevOrders + Math.floor(Math.random() * 50 - 20),
                conversion: 3.2 + (Math.random() * 0.8 - 0.4)
            };
        }
        
        async function fetchChartData() {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 300));
            
            // Generate time series data
            const labels = [];
            const data = [];
            const now = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('en-US', { weekday: 'short' }));
                data.push(Math.floor(Math.random() * 200 + 300));
            }
            
            return { labels, data };
        }
        
        async function fetchRecentActivity() {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 400));
            
            const activities = [
                { type: 'order', user: 'John Doe', amount: 125.50, time: '2 min ago' },
                { type: 'signup', user: 'Jane Smith', amount: null, time: '5 min ago' },
                { type: 'order', user: 'Bob Johnson', amount: 89.99, time: '12 min ago' },
                { type: 'review', user: 'Alice Brown', amount: null, time: '15 min ago' },
                { type: 'order', user: 'Charlie Wilson', amount: 249.00, time: '18 min ago' }
            ];
            
            // Randomize the order
            return activities.sort(() => Math.random() - 0.5);
        }
        
        // Dashboard update function
        async function updateDashboard() {
            dashboardData.isLoading = true;
            render();
            
            try {
                // Fetch all data in parallel
                const [metrics, chartData, activity] = await Promise.all([
                    fetchMetrics(),
                    fetchChartData(),
                    fetchRecentActivity()
                ]);
                
                // Store previous values for trend calculation
                const prevMetrics = { ...dashboardData.metrics };
                
                dashboardData.metrics = metrics;
                dashboardData.chartData = chartData;
                dashboardData.recentActivity = activity;
                dashboardData.lastUpdated = new Date();
                dashboardData.isLoading = false;
                
                // Calculate trends
                dashboardData.prevMetrics = prevMetrics;
                
                render();
                updateChart();
            } catch (error) {
                console.error('Dashboard update failed:', error);
                dashboardData.isLoading = false;
                render();
            }
        }
        
        // Chart management
        let chartInstance = null;
        
        function updateChart() {
            if (!dashboardData.chartData) return;
            
            const ctx = document.getElementById('salesChart');
            if (!ctx) return;
            
            if (chartInstance) {
                chartInstance.data.labels = dashboardData.chartData.labels;
                chartInstance.data.datasets[0].data = dashboardData.chartData.data;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dashboardData.chartData.labels,
                        datasets: [{
                            label: 'Daily Sales',
                            data: dashboardData.chartData.data,
                            borderColor: '#0d6efd',
                            backgroundColor: 'rgba(13, 110, 253, 0.1)',
                            borderWidth: 2,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return '$' + value;
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }
        
        // Auto-refresh management
        function toggleAutoRefresh() {
            dashboardData.autoRefresh = !dashboardData.autoRefresh;
            
            if (dashboardData.autoRefresh) {
                refreshInterval = setInterval(updateDashboard, 10000);
            } else {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
            
            render();
        }
        
        // Metric card component
        function MetricCard({ title, value, previousValue, format = 'number', icon, color = 'primary' }) {
            const trend = previousValue && previousValue !== 0 ? ((value - previousValue) / previousValue * 100).toFixed(1) : null;
            const trendUp = trend && parseFloat(trend) > 0;
            
            let displayValue = value;
            if (format === 'currency') {
                displayValue = '$' + value.toLocaleString();
            } else if (format === 'percent') {
                displayValue = value.toFixed(1) + '%';
            } else {
                displayValue = value.toLocaleString();
            }
            
            return Card({
                class: 'metric-card h-100',
                children: [
                    {
                        t: 'div',
                        a: { class: 'card-body' },
                        c: [
                            {
                                t: 'div',
                                a: { class: 'd-flex align-items-center mb-2' },
                                c: [
                                    icon ? {
                                        t: 'div',
                                        a: { 
                                            class: `rounded-circle bg-${color} bg-opacity-10 p-2 me-3`,
                                            style: 'width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;'
                                        },
                                        c: {
                                            t: 'span',
                                            a: { class: `text-${color}`, style: 'font-size: 1.5rem;' },
                                            c: icon
                                        }
                                    } : null,
                                    {
                                        t: 'div',
                                        c: [
                                            { t: 'h6', a: { class: 'text-muted mb-1' }, c: title },
                                            { t: 'h3', a: { class: 'mb-0', style: 'font-weight: 600;' }, c: displayValue }
                                        ]
                                    }
                                ]
                            },
                            trend !== null && trend !== 0 ? {
                                t: 'div',
                                a: { class: `metric-trend ${trendUp ? 'trend-up' : 'trend-down'}` },
                                c: [
                                    { t: 'span', c: trendUp ? '↑' : '↓' },
                                    { t: 'span', c: Math.abs(trend) + '%' }
                                ]
                            } : null
                        ].filter(Boolean)
                    }
                ]
            });
        }
        
        // Activity item component
        function ActivityItem({ type, user, amount, time }) {
            const typeConfig = {
                order: { icon: '🛒', color: 'success', label: 'New Order' },
                signup: { icon: '👤', color: 'primary', label: 'New Signup' },
                review: { icon: '⭐', color: 'warning', label: 'New Review' }
            };
            
            const config = typeConfig[type] || { icon: '📋', color: 'secondary', label: 'Activity' };
            
            return {
                t: 'div',
                a: { class: 'list-group-item' },
                c: {
                    t: 'div',
                    a: { class: 'd-flex align-items-center' },
                    c: [
                        {
                            t: 'div',
                            a: { 
                                class: `rounded-circle bg-${config.color} bg-opacity-10 p-2 me-3`,
                                style: 'width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;'
                            },
                            c: { t: 'span', c: config.icon }
                        },
                        {
                            t: 'div',
                            a: { class: 'flex-grow-1' },
                            c: [
                                { t: 'div', a: { class: 'fw-semibold' }, c: config.label },
                                { t: 'small', a: { class: 'text-muted' }, c: [
                                    user,
                                    amount ? ` - $${amount.toFixed(2)}` : ''
                                ].filter(Boolean).join('') }
                            ]
                        },
                        { t: 'small', a: { class: 'text-muted' }, c: time }
                    ]
                }
            };
        }
        
        // Main dashboard component
        function Dashboard() {
            return ExamplePage({
                title: 'Analytics Dashboard',
                content: [
                    // Dashboard header with controls
                    {
                        t: 'div',
                        a: { class: 'mb-4 p-4 bg-light rounded' },
                        c: [
                            { t: 'h1', c: '📊 Analytics Dashboard' },
                            { t: 'p', a: { class: 'lead mb-3' }, c: 'Real-time data visualization with Chart.js' },
                            {
                                t: 'div',
                                a: { class: 'd-flex justify-content-between align-items-center' },
                                c: [
                                    dashboardData.lastUpdated ? {
                                        t: 'small',
                                        a: { class: 'text-muted' },
                                        c: `Last updated: ${dashboardData.lastUpdated.toLocaleTimeString()}`
                                    } : null,
                                    {
                                        t: 'div',
                                        a: { class: 'd-flex gap-2' },
                                        c: [
                                            Button({
                                                variant: dashboardData.autoRefresh ? 'success' : 'outline-secondary',
                                                size: 'sm',
                                                onClick: toggleAutoRefresh,
                                                children: dashboardData.autoRefresh ? '🔄 Auto-refresh ON' : '🔄 Auto-refresh OFF'
                                            }),
                                            Button({
                                                variant: 'primary',
                                                size: 'sm',
                                                onClick: updateDashboard,
                                                disabled: dashboardData.isLoading,
                                                children: dashboardData.isLoading ? 'Loading...' : 'Refresh Now'
                                            })
                                        ]
                                    }
                                ]
                            }
                        ]
                    },
                    
                    // Metrics row
                    Row({
                        children: [
                            Col({ md: 6, lg: 3, class: 'mb-4', children: 
                                MetricCard({
                                    title: 'Total Users',
                                    value: dashboardData.metrics.users,
                                    previousValue: dashboardData.prevMetrics?.users,
                                    icon: '👥',
                                    color: 'primary'
                                })
                            }),
                            Col({ md: 6, lg: 3, class: 'mb-4', children: 
                                MetricCard({
                                    title: 'Revenue',
                                    value: dashboardData.metrics.revenue,
                                    previousValue: dashboardData.prevMetrics?.revenue,
                                    format: 'currency',
                                    icon: '💰',
                                    color: 'success'
                                })
                            }),
                            Col({ md: 6, lg: 3, class: 'mb-4', children: 
                                MetricCard({
                                    title: 'Orders',
                                    value: dashboardData.metrics.orders,
                                    previousValue: dashboardData.prevMetrics?.orders,
                                    icon: '📦',
                                    color: 'warning'
                                })
                            }),
                            Col({ md: 6, lg: 3, class: 'mb-4', children: 
                                MetricCard({
                                    title: 'Conversion',
                                    value: dashboardData.metrics.conversion,
                                    previousValue: dashboardData.prevMetrics?.conversion,
                                    format: 'percent',
                                    icon: '📈',
                                    color: 'info'
                                })
                            })
                        ]
                    }),
                    
                    // Charts and activity row
                    Row({
                        children: [
                            // Chart column
                            Col({
                                lg: 8,
                                children: Card({
                                    title: 'Sales Trend',
                                    subtitle: 'Daily sales over the past week',
                                    children: {
                                        t: 'div',
                                        a: { class: 'chart-container position-relative' },
                                        c: [
                                            dashboardData.isLoading ? {
                                                t: 'div',
                                                a: { class: 'loading-overlay' },
                                                c: {
                                                    t: 'div',
                                                    a: { class: 'spinner-border text-primary' },
                                                    c: { t: 'span', a: { class: 'visually-hidden' }, c: 'Loading...' }
                                                }
                                            } : null,
                                            {
                                                t: 'canvas',
                                                a: { id: 'salesChart', style: 'max-width: 100%; height: auto;' }
                                            }
                                        ].filter(Boolean)
                                    }
                                })
                            }),
                            
                            // Activity column
                            Col({
                                lg: 4,
                                children: Card({
                                    title: 'Recent Activity',
                                    subtitle: 'Latest customer actions',
                                    children: dashboardData.recentActivity.length === 0
                                        ? { t: 'p', a: { class: 'text-muted text-center py-4' }, c: 'No recent activity' }
                                        : {
                                            t: 'div',
                                            a: { class: 'list-group list-group-flush' },
                                            c: dashboardData.recentActivity.map(activity => 
                                                ActivityItem(activity)
                                            )
                                        }
                                })
                            })
                        ]
                    }),
                    
                    // Info alert
                    Alert({
                        variant: 'info',
                        children: [
                            { t: 'strong', c: 'Demo Dashboard: ' },
                            'This dashboard demonstrates real-time data updates, external data fetching, and Chart.js integration. ',
                            'Perfect for data scientists and backend developers who need quick visualizations without complex frontend frameworks.'
                        ]
                    })
                ]
            });
        }
        
        // Render function
        function render() {
            bw.DOM('#app', Dashboard());
        }
        
        // Initialize
        render();
        updateDashboard();
        
        // Start auto-refresh
        refreshInterval = setInterval(updateDashboard, 10000);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
