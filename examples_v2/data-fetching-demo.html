<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwrench - Data Fetching Demo</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="../dist/bitwrench-responsive-fixes.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
    <style>
        .user-card {
            transition: transform 0.2s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .user-card:hover {
            transform: translateY(-4px);
        }
        .user-card .card-body {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 320px; /* Ensures consistent card height */
        }
        .user-card-content {
            flex-grow: 1;
        }
        .user-card-actions {
            margin-top: auto; /* Pushes buttons to bottom */
            padding-top: 1rem;
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-text {
            height: 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }
        .skeleton-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
        }
        .error-state {
            text-align: center;
            padding: 3rem;
        }
        .bg-light {
            background-color: #f8f9fa !important;
        }
        .data-source-header {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .posts-table {
            margin-top: 1rem;
        }
        .posts-table th {
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }
        .posts-table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        // Component shortcuts
        const { Container, Row, Col, Card, Button, Badge, Alert, Table } = bw.components;
        
        // App state
        let appState = {
            users: [],
            posts: [],
            selectedUser: null,
            loading: {
                users: false,
                posts: false
            },
            error: {
                users: null,
                posts: null
            },
            dataSource: 'jsonplaceholder' // or 'randomuser'
        };
        
        // API functions
        async function fetchUsers() {
            appState.loading.users = true;
            appState.error.users = null;
            render();
            
            try {
                let users = [];
                
                if (appState.dataSource === 'jsonplaceholder') {
                    const response = await fetch('https://jsonplaceholder.typicode.com/users');
                    if (!response.ok) throw new Error('Failed to fetch users');
                    users = await response.json();
                } else {
                    const response = await fetch('https://randomuser.me/api/?results=10');
                    if (!response.ok) throw new Error('Failed to fetch users');
                    const data = await response.json();
                    users = data.results.map((user, index) => ({
                        id: index + 1,
                        name: `${user.name.first} ${user.name.last}`,
                        email: user.email,
                        phone: user.phone,
                        username: user.login.username,
                        company: { name: user.location.city },
                        address: {
                            street: user.location.street.name,
                            city: user.location.city,
                            zipcode: user.location.postcode
                        },
                        avatar: user.picture.thumbnail
                    }));
                }
                
                appState.users = users;
                appState.loading.users = false;
                render();
            } catch (error) {
                appState.error.users = error.message;
                appState.loading.users = false;
                render();
            }
        }
        
        async function fetchUserPosts(userId) {
            appState.loading.posts = true;
            appState.error.posts = null;
            appState.selectedUser = userId;
            render();
            
            try {
                // Simulate longer load time to show loading state
                await new Promise(resolve => setTimeout(resolve, 800));
                
                const response = await fetch(`https://jsonplaceholder.typicode.com/posts?userId=${userId}`);
                if (!response.ok) throw new Error('Failed to fetch posts');
                const posts = await response.json();
                
                appState.posts = posts;
                appState.loading.posts = false;
                render();
            } catch (error) {
                appState.error.posts = error.message;
                appState.loading.posts = false;
                render();
            }
        }
        
        // Skeleton loader component
        function SkeletonCard() {
            return Card({
                class: 'h-100',
                children: {
                    t: 'div',
                    a: { class: 'card-body', style: 'min-height: 320px;' },
                    c: [
                        {
                            t: 'div',
                            a: { class: 'd-flex align-items-center mb-3' },
                            c: [
                                { t: 'div', a: { class: 'skeleton skeleton-avatar me-3' } },
                                {
                                    t: 'div',
                                    a: { class: 'flex-grow-1' },
                                    c: [
                                        { t: 'div', a: { class: 'skeleton skeleton-text', style: 'width: 60%;' } },
                                        { t: 'div', a: { class: 'skeleton skeleton-text', style: 'width: 40%;' } }
                                    ]
                                }
                            ]
                        },
                        { t: 'div', a: { class: 'skeleton skeleton-text' } },
                        { t: 'div', a: { class: 'skeleton skeleton-text', style: 'width: 80%;' } }
                    ]
                }
            });
        }
        
        // User card component with flexbox layout
        function UserCard({ user }) {
            const hasAvatar = user.avatar || appState.dataSource === 'randomuser';
            
            return Card({
                class: 'user-card',
                children: [
                    {
                        t: 'div',
                        a: { class: 'card-body' },
                        c: [
                            {
                                t: 'div',
                                a: { class: 'user-card-content' },
                                c: [
                                    {
                                        t: 'div',
                                        a: { class: 'd-flex align-items-center mb-3' },
                                        c: [
                                            hasAvatar && {
                                                t: 'img',
                                                a: { 
                                                    src: user.avatar || `https://ui-avatars.com/api/?name=${user.name}&background=random`,
                                                    class: 'rounded-circle me-3',
                                                    style: 'width: 64px; height: 64px;',
                                                    alt: user.name
                                                }
                                            },
                                            {
                                                t: 'div',
                                                c: [
                                                    { t: 'h5', a: { class: 'mb-1' }, c: user.name },
                                                    { t: 'small', a: { class: 'text-muted' }, c: `@${user.username}` }
                                                ]
                                            }
                                        ].filter(Boolean)
                                    },
                                    { t: 'p', a: { class: 'mb-2' }, c: [
                                        { t: 'strong', c: 'Email: ' },
                                        user.email
                                    ]},
                                    { t: 'p', a: { class: 'mb-2' }, c: [
                                        { t: 'strong', c: 'Phone: ' },
                                        user.phone
                                    ]},
                                    { t: 'p', a: { class: 'mb-2' }, c: [
                                        { t: 'strong', c: 'Company: ' },
                                        user.company.name
                                    ]}
                                ]
                            },
                            appState.dataSource === 'jsonplaceholder' ? {
                                t: 'div',
                                a: { class: 'user-card-actions' },
                                c: Button({
                                    variant: 'primary',
                                    size: 'sm',
                                    onClick: () => fetchUserPosts(user.id),
                                    disabled: appState.loading.posts && appState.selectedUser === user.id,
                                    children: appState.loading.posts && appState.selectedUser === user.id 
                                        ? 'Loading posts...' 
                                        : `View Posts (${user.id})`
                                })
                            } : null
                        ].filter(Boolean)
                    }
                ]
            });
        }
        
        
        // Main app component using ExamplePage wrapper
        function DataFetchingApp() {
            return ExamplePage({
                title: 'Data Fetching Demo',
                content: [
                    // Header with data source switcher
                    {
                        t: 'div',
                        a: { class: 'data-source-header' },
                        c: [
                            { t: 'h1', c: '🌐 External Data Fetching' },
                            { t: 'p', a: { class: 'lead mb-3' }, c: 'Fetch and display data from real APIs' },
                            Alert({
                                variant: 'info',
                                class: 'mb-3',
                                children: [
                                    { t: 'strong', c: 'Try both data sources! ' },
                                    'JSONPlaceholder provides users with posts, RandomUser.me provides realistic user profiles.'
                                ]
                            }),
                            {
                                t: 'div',
                                a: { class: 'd-flex gap-2 align-items-center' },
                                c: [
                                    { t: 'span', a: { class: 'me-2' }, c: 'Data Source:' },
                                    Button({
                                        variant: appState.dataSource === 'jsonplaceholder' ? 'primary' : 'outline-primary',
                                        size: 'sm',
                                        onClick: () => {
                                            appState.dataSource = 'jsonplaceholder';
                                            appState.posts = [];
                                            fetchUsers();
                                        },
                                        children: 'JSONPlaceholder'
                                    }),
                                    Button({
                                        variant: appState.dataSource === 'randomuser' ? 'primary' : 'outline-primary',
                                        size: 'sm',
                                        onClick: () => {
                                            appState.dataSource = 'randomuser';
                                            appState.posts = [];
                                            fetchUsers();
                                        },
                                        children: 'RandomUser.me'
                                    })
                                ]
                            }
                        ]
                    },
                    
                    // Users section
                    {
                        t: 'section',
                        a: { class: 'mb-5' },
                        c: [
                            {
                                t: 'div',
                                a: { class: 'd-flex justify-content-between align-items-center mb-3' },
                                c: [
                                    { t: 'h2', c: 'Users' },
                                    Button({
                                        variant: 'primary',
                                        onClick: fetchUsers,
                                        disabled: appState.loading.users,
                                        children: appState.loading.users ? 'Loading...' : 'Refresh Users'
                                    })
                                ]
                            },
                            
                            // Error state
                            appState.error.users && Alert({
                                variant: 'danger',
                                children: [
                                    { t: 'strong', c: 'Error: ' },
                                    appState.error.users
                                ]
                            }),
                            
                            // Loading state
                            appState.loading.users && Row({
                                children: [1, 2, 3, 4].map(() => 
                                    Col({ md: 6, lg: 3, class: 'mb-4', children: SkeletonCard() })
                                )
                            }),
                            
                            // Users grid
                            !appState.loading.users && appState.users.length > 0 && Row({
                                children: appState.users.map(user => 
                                    Col({
                                        md: 6,
                                        lg: 3,
                                        class: 'mb-4',
                                        children: UserCard({ user })
                                    })
                                )
                            }),
                            
                            // Empty state
                            !appState.loading.users && appState.users.length === 0 && !appState.error.users && {
                                t: 'div',
                                a: { class: 'error-state' },
                                c: [
                                    { t: 'h3', a: { class: 'text-muted' }, c: 'No users loaded' },
                                    { t: 'p', a: { class: 'text-muted' }, c: 'Click "Refresh Users" to load data' }
                                ]
                            }
                        ].filter(Boolean)
                    },
                    
                    // Posts section (only for JSONPlaceholder)
                    appState.dataSource === 'jsonplaceholder' && appState.posts.length > 0 ? {
                        t: 'section',
                        c: [
                            // Posts title with user info
                            appState.selectedUser && !appState.loading.posts ? {
                                t: 'h2', 
                                a: { class: 'mb-3' }, 
                                c: `User ${appState.selectedUser}'s Posts`
                            } : { t: 'h2', a: { class: 'mb-3' }, c: 'User Posts' },
                            
                            // Error state
                            appState.error.posts ? Alert({
                                variant: 'danger',
                                children: [
                                    { t: 'strong', c: 'Error: ' },
                                    appState.error.posts
                                ]
                            }) : null,
                            
                            // Loading state
                            appState.loading.posts ? {
                                t: 'div',
                                a: { class: 'text-center py-5' },
                                c: [
                                    {
                                        t: 'div',
                                        a: { class: 'spinner-border text-primary mb-3' },
                                        c: { t: 'span', a: { class: 'visually-hidden' }, c: 'Loading...' }
                                    },
                                    { t: 'p', a: { class: 'text-muted' }, c: 'Loading posts...' }
                                ]
                            } : null,
                            
                            // Posts table
                            !appState.loading.posts && appState.posts.length > 0 ? Table({
                                striped: true,
                                hover: true,
                                responsive: true,
                                class: 'posts-table',
                                children: [
                                    {
                                        t: 'thead',
                                        c: {
                                            t: 'tr',
                                            c: [
                                                { t: 'th', a: { style: 'width: 80px;' }, c: 'Post #' },
                                                { t: 'th', c: 'Title' },
                                                { t: 'th', a: { class: 'd-none d-md-table-cell' }, c: 'Body' }
                                            ]
                                        }
                                    },
                                    {
                                        t: 'tbody',
                                        c: appState.posts.map(post => ({
                                            t: 'tr',
                                            c: [
                                                { 
                                                    t: 'td', 
                                                    c: Badge({ variant: 'secondary', children: `${post.id}` })
                                                },
                                                { 
                                                    t: 'td', 
                                                    c: { t: 'strong', c: post.title }
                                                },
                                                { 
                                                    t: 'td', 
                                                    a: { class: 'd-none d-md-table-cell' }, 
                                                    c: post.body.length > 100 ? post.body.substring(0, 100) + '...' : post.body
                                                }
                                            ]
                                        }))
                                    }
                                ]
                            }) : null
                        ].filter(Boolean)
                    } : null,
                    
                    // Code example
                    Card({
                        class: 'mt-5',
                        title: 'Code Example',
                        subtitle: 'How to fetch data with bitwrench',
                        children: {
                            t: 'pre',
                            c: {
                                t: 'code',
                                c: `// Fetch data and update UI
async function fetchUsers() {
    appState.loading = true;
    render(); // Show loading state
    
    try {
        const response = await fetch('https://api.example.com/users');
        const users = await response.json();
        
        appState.users = users;
        appState.loading = false;
        render(); // Update with data
    } catch (error) {
        appState.error = error.message;
        appState.loading = false;
        render(); // Show error
    }
}

// Render the UI based on state
function render() {
    bw.DOM('#app', {
        t: 'div',
        c: appState.loading 
            ? LoadingSpinner()
            : appState.error 
                ? ErrorMessage(appState.error)
                : UserList(appState.users)
    });
}`
                            }
                        }
                    })
                ].filter(Boolean)
            });
        }
        
        // Render function
        function render() {
            bw.DOM('#app', DataFetchingApp());
        }
        
        // Initialize
        render();
        fetchUsers();
    </script>
</body>
</html>
