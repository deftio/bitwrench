<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwrench v2 Examples</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="../dist/bitwrench-responsive-fixes.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        
        // Component shortcuts
        const { Container, Row, Col, Card, PageHeader, Button } = bw.components;
        
        // Example data
        const examples = [
            {
                title: "Basic Components",
                description: "Buttons, cards, alerts, and basic UI elements",
                file: "01-basic-example.html",
                icon: "🎨"
            },
            {
                title: "Form Components", 
                description: "Forms, inputs, selects, and validation",
                file: "02-forms.html",
                icon: "📝"
            },
            {
                title: "Kitchen Sink",
                description: "All components in one comprehensive example",
                file: "03-kitchen-sink.html",
                icon: "🍴"
            },
            {
                title: "Helper Functions",
                description: "Utility functions for prototyping and testing",
                file: "04-helper-functions.html",
                icon: "🔧"
            },
            {
                title: "Dynamic Dashboard",
                description: "Interactive dashboard with real-time updates",
                file: "05-dashboard.html",
                icon: "📊"
            },
            {
                title: "Interactive Demo",
                description: "Dynamic state management and DOM updates",
                file: "06-interactive.html",
                icon: "🎮"
            },
            {
                title: "Render API",
                description: "Component lifecycle with bw.render() handles",
                file: "07-render-api.html",
                icon: "🔧"
            },
            {
                title: "Theme Switcher",
                description: "Light and dark theme switching demo",
                file: "08-theme-switcher.html",
                icon: "🎨"
            },
            {
                title: "Analytics Dashboard",
                description: "Real-time data visualization with Chart.js",
                file: "dashboard-demo.html",
                icon: "📈"
            },
            {
                title: "Data Fetching",
                description: "External API integration and loading states",
                file: "data-fetching-demo.html",
                icon: "🌐"
            }
        ];
        
        // Create the app using shared page layout
        const App = () => ExamplePage({
            title: 'Home',
            content: [
                // Page header
                PageHeader({
                    title: 'Welcome to Bitwrench v2',
                    subtitle: 'A lightweight, zero-dependency UI library that uses pure JavaScript objects to create beautiful interfaces.'
                }),
                
                // Features section
                {
                    t: 'div',
                    a: { class: 'mb-5' },
                    c: [
                        { t: 'h2', a: { class: 'mb-4' }, c: 'Key Features' },
                        Row({
                            children: [
                                Col({
                                    md: 4,
                                    children: Card({
                                        title: '🚀 Zero Dependencies',
                                        text: 'No build tools, no transpilation, no virtual DOM. Just pure JavaScript that works everywhere.',
                                        class: 'mb-4'
                                    })
                                }),
                                Col({
                                    md: 4,
                                    children: Card({
                                        title: '🎯 TACO Format',
                                        text: 'Simple Tag-Attributes-Content-Options format makes UI composition intuitive and powerful.',
                                        class: 'mb-4'
                                    })
                                }),
                                Col({
                                    md: 4,
                                    children: Card({
                                        title: '⚡ Lightweight',
                                        text: 'Under 50KB minified, with beautiful default styles inspired by Bootstrap.',
                                        class: 'mb-4'
                                    })
                                })
                            ]
                        })
                    ]
                },
                
                // Examples grid
                {
                    t: 'div',
                    c: [
                        { t: 'h2', a: { class: 'mb-4' }, c: 'Examples' },
                        Row({
                            children: examples.map(example => 
                                Col({
                                    md: 6,
                                    lg: 4,
                                    children: Card({
                                        class: 'mb-4 h-100 d-flex flex-column',
                                        shadow: true,
                                        children: {
                                            t: 'div',
                                            a: { class: 'card-body d-flex flex-column' },
                                            c: [
                                                {
                                                    t: 'div',
                                                    a: { class: 'text-center mb-3' },
                                                    c: {
                                                        t: 'span',
                                                        a: { style: { fontSize: '3rem' } },
                                                        c: example.icon
                                                    }
                                                },
                                                { t: 'h5', a: { class: 'card-title' }, c: example.title },
                                                { t: 'p', a: { class: 'card-text flex-grow-1' }, c: example.description },
                                                {
                                                    t: 'a',
                                                    a: { 
                                                        href: example.file,
                                                        class: 'btn btn-primary w-100 mt-3'
                                                    },
                                                    c: 'View Example →'
                                                }
                                            ]
                                        }
                                    })
                                })
                            )
                        })
                    ]
                },
                
                // Quick start section
                {
                    t: 'div',
                    a: { class: 'mt-5' },
                    c: [
                        { t: 'h2', a: { class: 'mb-4' }, c: 'Quick Start' },
                        Card({
                            children: [
                                { t: 'h5', a: { class: 'card-title' }, c: '1. Include Bitwrench' },
                                {
                                    t: 'pre',
                                    a: { class: 'bg-light p-3 rounded' },
                                    c: { 
                                        t: 'code',
                                        c: [
                                            { t: 'span', a: { class: 'text-muted' }, c: '<' },
                                            { t: 'span', a: { class: 'text-danger' }, c: 'script' },
                                            { t: 'span', a: { class: 'text-info' }, c: ' src=' },
                                            { t: 'span', a: { class: 'text-warning' }, c: '"bitwrench.umd.js"' },
                                            { t: 'span', a: { class: 'text-muted' }, c: '></' },
                                            { t: 'span', a: { class: 'text-danger' }, c: 'script' },
                                            { t: 'span', a: { class: 'text-muted' }, c: '>' }
                                        ]
                                    }
                                },
                                { t: 'h5', a: { class: 'card-title mt-4' }, c: '2. Create Your UI' },
                                {
                                    t: 'pre',
                                    a: { class: 'bg-light p-3 rounded' },
                                    c: {
                                        t: 'code',
                                        c: `// Load default styles
bw.loadDefaultStyles();

// Create a simple component
const MyButton = {
  t: 'button',
  a: { 
    class: 'btn btn-primary',
    onclick: () => alert('Hello!')
  },
  c: 'Click Me'
};

// Mount to DOM
bw.DOM('#app', MyButton);`
                                    }
                                }
                            ]
                        })
                    ]
                }
            ]
        });
        
        // Mount the app
        bw.DOM('#app', App());
    </script>
</body>
</html>
