<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwrench v2 - Form Components</title>
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script>
        // Load default styles
        bw.loadDefaultStyles();
        
        // Form components
        const FormGroup = ({ label, children }) => ({
            t: "div",
            a: { class: "form-group" },
            c: [
                label && { t: "label", a: { class: "form-label" }, c: label },
                children
            ].filter(Boolean)
        });
        
        const Input = ({ type = "text", placeholder, value, onChange, id }) => ({
            t: "input",
            a: {
                type,
                class: "form-control",
                placeholder,
                value,
                id,
                oninput: onChange
            }
        });
        
        const Select = ({ options, value, onChange, id }) => ({
            t: "select",
            a: {
                class: "form-control",
                value,
                id,
                onchange: onChange
            },
            c: options.map(opt => ({
                t: "option",
                a: { value: opt.value },
                c: opt.label
            }))
        });
        
        const Checkbox = ({ label, checked, onChange, id }) => ({
            t: "div",
            a: { class: "form-check" },
            c: [
                {
                    t: "input",
                    a: {
                        type: "checkbox",
                        class: "form-check-input",
                        checked,
                        id,
                        onchange: onChange
                    }
                },
                {
                    t: "label",
                    a: { 
                        class: "form-check-label",
                        for: id
                    },
                    c: label
                }
            ]
        });
        
        // Main app
        const App = () => {
            // Form state (in real app, use proper state management)
            let formData = {
                name: '',
                email: '',
                country: 'us',
                subscribe: false
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                alert('Form submitted!\n' + JSON.stringify(formData, null, 2));
            };
            
            return {
                t: "div",
                c: [
                    {
                        t: "nav",
                        a: { class: "navbar" },
                        c: {
                            t: "div",
                            a: { class: "container" },
                            c: [
                                {
                                    t: "a",
                                    a: { href: "index.html", class: "navbar-brand" },
                                    c: "← Back to Examples"
                                }
                            ]
                        }
                    },
                    {
                        t: "div",
                        a: { class: "container", style: { "margin-top": "2rem" } },
                        c: [
                            {
                                t: "h1",
                                c: "Form Components"
                            },
                            {
                                t: "p",
                                a: { class: "lead" },
                                c: "Beautiful form components with built-in styling"
                            },
                            {
                                t: "div",
                                a: { class: "row" },
                                c: [
                                    {
                                        t: "div",
                                        a: { class: "col col-md-6" },
                                        c: {
                                            t: "div",
                                            a: { class: "card" },
                                            c: {
                                                t: "div",
                                                a: { class: "card-body" },
                                                c: [
                                                    { t: "h5", a: { class: "card-title" }, c: "Contact Form" },
                                                    {
                                                        t: "form",
                                                        a: { onsubmit: handleSubmit },
                                                        c: [
                                                            FormGroup({
                                                                label: "Name",
                                                                children: Input({
                                                                    placeholder: "Enter your name",
                                                                    value: formData.name,
                                                                    onChange: (e) => formData.name = e.target.value
                                                                })
                                                            }),
                                                            FormGroup({
                                                                label: "Email",
                                                                children: Input({
                                                                    type: "email",
                                                                    placeholder: "Enter your email",
                                                                    value: formData.email,
                                                                    onChange: (e) => formData.email = e.target.value
                                                                })
                                                            }),
                                                            FormGroup({
                                                                label: "Country",
                                                                children: Select({
                                                                    options: [
                                                                        { value: "us", label: "United States" },
                                                                        { value: "uk", label: "United Kingdom" },
                                                                        { value: "ca", label: "Canada" },
                                                                        { value: "au", label: "Australia" }
                                                                    ],
                                                                    value: formData.country,
                                                                    onChange: (e) => formData.country = e.target.value
                                                                })
                                                            }),
                                                            Checkbox({
                                                                label: "Subscribe to newsletter",
                                                                checked: formData.subscribe,
                                                                onChange: (e) => formData.subscribe = e.target.checked,
                                                                id: "subscribe"
                                                            }),
                                                            {
                                                                t: "div",
                                                                a: { style: { "margin-top": "1rem" } },
                                                                c: [
                                                                    {
                                                                        t: "button",
                                                                        a: { 
                                                                            type: "submit",
                                                                            class: "btn btn-primary"
                                                                        },
                                                                        c: "Submit"
                                                                    },
                                                                    {
                                                                        t: "button",
                                                                        a: { 
                                                                            type: "button",
                                                                            class: "btn btn-secondary",
                                                                            style: { "margin-left": "0.5rem" },
                                                                            onclick: () => alert("Form reset!")
                                                                        },
                                                                        c: "Reset"
                                                                    }
                                                                ]
                                                            }
                                                        ]
                                                    }
                                                ]
                                            }
                                        }
                                    },
                                    {
                                        t: "div",
                                        a: { class: "col col-md-6" },
                                        c: {
                                            t: "div",
                                            a: { class: "card" },
                                            c: {
                                                t: "div",
                                                a: { class: "card-body" },
                                                c: [
                                                    { t: "h5", a: { class: "card-title" }, c: "Form Variations" },
                                                    FormGroup({
                                                        label: "Disabled Input",
                                                        children: {
                                                            t: "input",
                                                            a: {
                                                                type: "text",
                                                                class: "form-control",
                                                                disabled: true,
                                                                value: "This input is disabled"
                                                            }
                                                        }
                                                    }),
                                                    FormGroup({
                                                        label: "Textarea",
                                                        children: {
                                                            t: "textarea",
                                                            a: {
                                                                class: "form-control",
                                                                rows: "3",
                                                                placeholder: "Enter multiple lines of text..."
                                                            }
                                                        }
                                                    }),
                                                    FormGroup({
                                                        label: "Range Slider",
                                                        children: {
                                                            t: "input",
                                                            a: {
                                                                type: "range",
                                                                class: "form-control",
                                                                min: "0",
                                                                max: "100",
                                                                value: "50"
                                                            }
                                                        }
                                                    })
                                                ]
                                            }
                                        }
                                    }
                                ]
                            }
                        ]
                    }
                ]
            };
        };
        
        // Mount the app
        bw.DOM("#app", App());
    </script>
</body>
</html>
