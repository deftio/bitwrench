<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Components - Bitwrench v2</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="../dist/bitwrench-responsive-fixes.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        // Component shortcuts
        const { Card, Row, Col, Button } = bw.components;
        
        // Form components
        const FormGroup = ({ label, children }) => ({
            t: "div",
            a: { class: "form-group mb-3" },
            c: [
                label && { t: "label", a: { class: "form-label" }, c: label },
                children
            ].filter(Boolean)
        });
        
        const Input = ({ type = "text", placeholder, value, onChange, id, required }) => ({
            t: "input",
            a: { 
                type,
                class: "form-control",
                placeholder,
                value,
                onchange: onChange,
                oninput: onChange,
                id,
                required
            }
        });
        
        const Select = ({ options, value, onChange, id }) => ({
            t: "select",
            a: { 
                class: "form-select",
                value,
                onchange: onChange,
                id
            },
            c: options.map(opt => ({
                t: "option",
                a: { value: opt.value, selected: opt.value === value },
                c: opt.label
            }))
        });
        
        const Textarea = ({ placeholder, value, onChange, rows = 3, id }) => ({
            t: "textarea",
            a: {
                class: "form-control",
                placeholder,
                value,
                onchange: onChange,
                oninput: onChange,
                rows,
                id
            }
        });
        
        const Checkbox = ({ label, checked, onChange, id }) => ({
            t: "div",
            a: { class: "form-check mb-3" },
            c: [
                {
                    t: "input",
                    a: {
                        type: "checkbox",
                        class: "form-check-input",
                        checked,
                        onchange: onChange,
                        id
                    }
                },
                {
                    t: "label",
                    a: { class: "form-check-label", for: id },
                    c: label
                }
            ]
        });
        
        // Main app
        const App = () => {
            // Form state (in real app, use proper state management)
            let formData = {
                name: '',
                email: '',
                country: 'us',
                message: '',
                subscribe: false,
                experience: 'intermediate'
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                alert('Form submitted!\n' + JSON.stringify(formData, null, 2));
            };
            
            const handleReset = () => {
                formData = {
                    name: '',
                    email: '',
                    country: 'us',
                    message: '',
                    subscribe: false,
                    experience: 'intermediate'
                };
                // Re-render to update form
                bw.DOM("#app", App());
            };
            
            return ExamplePage({
                title: 'Form Components',
                content: [
                    {
                        t: "h1",
                        a: { class: "mb-4" },
                        c: "Form Components"
                    },
                    {
                        t: "p",
                        a: { class: "lead mb-4" },
                        c: "Beautiful form components with built-in styling and validation"
                    },
                    Row({
                        children: [
                            Col({
                                md: 6,
                                children: Card({
                                    title: "Contact Form",
                                    children: {
                                        t: "form",
                                        a: { onsubmit: handleSubmit },
                                        c: [
                                            FormGroup({
                                                label: "Name",
                                                children: Input({
                                                    placeholder: "Enter your name",
                                                    value: formData.name,
                                                    onChange: (e) => formData.name = e.target.value,
                                                    required: true
                                                })
                                            }),
                                            FormGroup({
                                                label: "Email",
                                                children: Input({
                                                    type: "email",
                                                    placeholder: "Enter your email",
                                                    value: formData.email,
                                                    onChange: (e) => formData.email = e.target.value,
                                                    required: true
                                                })
                                            }),
                                            FormGroup({
                                                label: "Country",
                                                children: Select({
                                                    options: [
                                                        { value: "us", label: "United States" },
                                                        { value: "uk", label: "United Kingdom" },
                                                        { value: "ca", label: "Canada" },
                                                        { value: "au", label: "Australia" },
                                                        { value: "other", label: "Other" }
                                                    ],
                                                    value: formData.country,
                                                    onChange: (e) => formData.country = e.target.value
                                                })
                                            }),
                                            FormGroup({
                                                label: "Message",
                                                children: Textarea({
                                                    placeholder: "Enter your message...",
                                                    value: formData.message,
                                                    onChange: (e) => formData.message = e.target.value,
                                                    rows: 4
                                                })
                                            }),
                                            {
                                                t: "div",
                                                a: { class: "mb-3" },
                                                c: Checkbox({
                                                    label: "Subscribe to newsletter",
                                                    checked: formData.subscribe,
                                                    onChange: (e) => formData.subscribe = e.target.checked,
                                                    id: "subscribe"
                                                })
                                            },
                                            {
                                                t: "div",
                                                a: { class: "d-flex gap-2" },
                                                c: [
                                                    Button({
                                                        type: "submit",
                                                        variant: "primary",
                                                        children: "Submit"
                                                    }),
                                                    Button({
                                                        type: "button",
                                                        variant: "secondary",
                                                        onClick: handleReset,
                                                        children: "Reset"
                                                    })
                                                ]
                                            }
                                        ]
                                    }
                                })
                            }),
                            Col({
                                md: 6,
                                children: [
                                    Card({
                                        title: "Form Controls Demo",
                                        class: "mb-4",
                                        children: [
                                            { t: "h6", c: "Input Variants" },
                                            FormGroup({
                                                label: "Text Input",
                                                children: Input({ placeholder: "Standard text input" })
                                            }),
                                            FormGroup({
                                                label: "Password Input",
                                                children: Input({ type: "password", placeholder: "Enter password" })
                                            }),
                                            FormGroup({
                                                label: "Number Input",
                                                children: Input({ type: "number", placeholder: "Enter a number" })
                                            }),
                                            FormGroup({
                                                label: "Date Input",
                                                children: Input({ type: "date" })
                                            })
                                        ]
                                    }),
                                    Card({
                                        title: "Radio Buttons",
                                        children: [
                                            { t: "p", c: "Select your experience level:" },
                                            ...["beginner", "intermediate", "advanced"].map(level => ({
                                                t: "div",
                                                a: { class: "form-check" },
                                                c: [
                                                    {
                                                        t: "input",
                                                        a: {
                                                            type: "radio",
                                                            class: "form-check-input",
                                                            name: "experience",
                                                            id: `exp-${level}`,
                                                            value: level,
                                                            checked: formData.experience === level,
                                                            onchange: (e) => {
                                                                formData.experience = e.target.value;
                                                                bw.DOM("#app", App());
                                                            }
                                                        }
                                                    },
                                                    {
                                                        t: "label",
                                                        a: { class: "form-check-label", for: `exp-${level}` },
                                                        c: level.charAt(0).toUpperCase() + level.slice(1)
                                                    }
                                                ]
                                            }))
                                        ]
                                    })
                                ]
                            })
                        ]
                    })
                ]
            });
        };
        
        // Mount the app
        bw.DOM("#app", App());
    </script>
</body>
</html>
