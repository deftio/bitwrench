<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Functions - Bitwrench v2</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        
        // Component shortcuts
        const { Container, Row, Col, Card, PageHeader } = bw.components;
        
        // Sample data for table generation
        const tableData = [
            ["Name", "Age", "City", "Score"],
            ["Alice", 30, "New York", 85],
            ["Bob", 25, "Los Angeles", 92],
            ["Charlie", 35, "Chicago", 78],
            ["David", 28, "Houston", 88],
            ["Eve", 32, "Phoenix", 95]
        ];
        
        // Color arrays for interpolation demo
        const colors = ["#FF0000", "#00FF00", "#0000FF", "#FFFF00", "#FF00FF", "#00FFFF"];
        
        // Create the app
        const App = () => ExamplePage({
            title: 'Helper Functions',
            content: [
                // Page Header
                PageHeader({
                    title: 'Helper Functions',
                    subtitle: 'Utility functions for quick prototyping and development',
                    breadcrumb: [
                        { text: 'Home', href: 'index.html' },
                        { text: 'Examples', href: 'index.html' },
                        { text: 'Helper Functions' }
                    ]
                }),
                
                // Introduction
                Card({
                    class: 'mb-4',
                    children: [
                        { t: 'h5', c: 'What are Helper Functions?' },
                        { t: 'p', c: 'These are utility functions designed to speed up development and prototyping. They help you quickly generate test data, create visual elements, and handle common tasks without external dependencies.' },
                        {
                            t: 'div',
                            a: { class: 'alert alert-info' },
                            c: '💡 Tip: These functions are perfect for creating mockups, testing layouts, and rapid prototyping. They\'re included in the core bitwrench library for convenience.'
                        }
                    ]
                }),
                
                // Array Functions Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "Array Functions" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Utility functions for array manipulation - removing duplicates, finding intersections, and differences." },
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3" },
                                    c: `const arr1 = [1, 2, 3, 4, 5, 3, 2, 1];
const arr2 = [3, 4, 5, 6, 7];

bw.arrayUniq(arr1) = ${JSON.stringify(bw.arrayUniq([1, 2, 3, 4, 5, 3, 2, 1]))}
bw.arrayBinA(arr1, arr2) = ${JSON.stringify(bw.arrayBinA([1, 2, 3, 4, 5, 3, 2, 1], [3, 4, 5, 6, 7]))}
bw.arrayBNotInA(arr1, arr2) = ${JSON.stringify(bw.arrayBNotInA([1, 2, 3, 4, 5, 3, 2, 1], [3, 4, 5, 6, 7]))}`
                                }
                            ]
                        })
                    ]
                },
                
                // Color Interpolation Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "Color Interpolation" },
                        Card({
                            children: [
                                { t: "h5", c: "bw.colorInterp - Create smooth color transitions" },
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Interpolates between multiple colors based on a value's position in a range. Perfect for heatmaps, data visualization, and dynamic theming." },
                                
                                {
                                    t: "div",
                                    a: { class: "mb-4" },
                                    c: [
                                        { t: "p", a: { class: "mb-2" }, c: "Red to Blue gradient:" },
                                        {
                                            t: "div",
                                            a: { class: "d-flex", style: { height: "60px" } },
                                            c: Array.from({ length: 20 }, (_, i) => {
                                                const color = bw.colorInterp(i, 0, 19, ["#FF0000", "#0000FF"]);
                                                return {
                                                    t: "div",
                                                    a: { 
                                                        style: {
                                                            flex: "1",
                                                            backgroundColor: `rgb(${color[0]}, ${color[1]}, ${color[2]})`,
                                                            cursor: "pointer"
                                                        },
                                                        title: `RGB(${color[0]}, ${color[1]}, ${color[2]})`
                                                    }
                                                };
                                            })
                                        }
                                    ]
                                },
                                
                                {
                                    t: "div",
                                    a: { class: "mb-4" },
                                    c: [
                                        { t: "p", a: { class: "mb-2" }, c: "Multi-color rainbow interpolation:" },
                                        {
                                            t: "div",
                                            a: { class: "d-flex", style: { height: "60px" } },
                                            c: Array.from({ length: 30 }, (_, i) => {
                                                const color = bw.colorInterp(i, 0, 29, colors);
                                                return {
                                                    t: "div",
                                                    a: { 
                                                        style: {
                                                            flex: "1",
                                                            backgroundColor: `rgb(${color[0]}, ${color[1]}, ${color[2]})`,
                                                            cursor: "pointer"
                                                        },
                                                        title: `RGB(${color[0]}, ${color[1]}, ${color[2]})`
                                                    }
                                                };
                                            })
                                        }
                                    ]
                                },
                                
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3" },
                                    c: { t: "code", c: `// Usage examples:
const color1 = bw.colorInterp(50, 0, 100, ["#FF0000", "#0000FF"]);
const color2 = bw.colorInterp(7.5, 0, 10, ["#FF0000", "#FFFF00", "#00FF00"]);` }
                                }
                            ]
                        })
                    ]
                },
                
                // HTML Table Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "HTML Table Generation" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Quickly generate sortable tables from data arrays. Click column headers to sort." },
                                {
                                    t: "div",
                                    a: { class: "table-responsive" },
                                    c: bw.makeTable({
                                        data: tableData.slice(1), // Skip header row
                                        columns: [
                                            { key: 0, label: "Name" },
                                            { key: 1, label: "Age" },
                                            { key: 2, label: "City" },
                                            { key: 3, label: "Score" }
                                        ],
                                        className: "table table-striped table-hover",
                                        sortable: true
                                    })
                                },
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3 mt-3" },
                                    c: { t: "code", c: `// Usage:
const table = bw.makeTable({
    data: myData,
    columns: [
        { key: 0, label: "Name" },
        { key: 1, label: "Age" }
    ],
    sortable: true
});` }
                                }
                            ]
                        })
                    ]
                },
                
                // Lorem Ipsum Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "Lorem Ipsum Generator" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Generate placeholder text for mockups and testing. Control length and add random variations." },
                                
                                { t: "h5", a: { class: "card-title" }, c: "bw.loremIpsum(100) - 100 characters" },
                                { t: "p", a: { class: "mb-4" }, c: bw.loremIpsum(100) },
                                
                                { t: "h5", a: { class: "card-title" }, c: "bw.loremIpsum(150, 200) - 150 chars starting at position 200" },
                                { t: "p", a: { class: "mb-4" }, c: bw.loremIpsum(150, 200) },
                                
                                { t: "h5", a: { class: "card-title" }, c: "bw.loremIpsum() - Random length (25-150 chars)" },
                                { t: "p", a: { class: "mb-4" }, c: bw.loremIpsum() },
                                
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3" },
                                    c: { t: "code", c: `// Generate placeholder text
const text1 = bw.loremIpsum(100);          // 100 chars, random start
const text2 = bw.loremIpsum(200, 50);      // 200 chars, starting at index 50
const text3 = bw.loremIpsum();             // Random length (25-150 chars)
const text4 = bw.loremIpsum(80, 0, false); // No capital letter` }
                                }
                            ]
                        })
                    ]
                },
                
                // Natural Sort Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "Natural Sort" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Sort strings with numbers in a human-friendly way. Perfect for file names, version numbers, and mixed content." },
                                {
                                    t: "div",
                                    a: { class: "row" },
                                    c: [
                                        {
                                            t: "div",
                                            a: { class: "col-md-6" },
                                            c: [
                                                { t: "h5", c: "Regular Sort" },
                                                {
                                                    t: "pre",
                                                    a: { class: "bg-light p-3" },
                                                    c: JSON.stringify(["file10.txt", "file2.txt", "file1.txt", "file20.txt"].sort(), null, 2)
                                                }
                                            ]
                                        },
                                        {
                                            t: "div",
                                            a: { class: "col-md-6" },
                                            c: [
                                                { t: "h5", c: "Natural Sort" },
                                                {
                                                    t: "pre",
                                                    a: { class: "bg-light p-3" },
                                                    c: JSON.stringify(["file10.txt", "file2.txt", "file1.txt", "file20.txt"].sort(bw.naturalCompare), null, 2)
                                                }
                                            ]
                                        }
                                    ]
                                }
                            ]
                        })
                    ]
                },
                
                // Cookie Functions Section
                {
                    t: "section",
                    a: { class: "mb-5" },
                    c: [
                        { t: "h2", c: "Cookie Management" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Simple cookie management functions for storing user preferences and session data." },
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3" },
                                    c: `// Set a cookie
bw.setCookie('username', 'john_doe', 7); // Expires in 7 days

// Get a cookie
const username = bw.getCookie('username');

// Delete a cookie
bw.setCookie('username', '', -1);`
                                },
                                {
                                    t: "div",
                                    a: { class: "alert alert-warning mt-3" },
                                    c: "Note: Cookies require a web server to work properly. They may not function when viewing files locally."
                                }
                            ]
                        })
                    ]
                },
                
                // Timing Functions Section
                {
                    t: "section",
                    c: [
                        { t: "h2", c: "Advanced Timing Functions" },
                        Card({
                            children: [
                                { t: "p", a: { class: "text-muted mb-3" }, c: "Enhanced interval and timing functions with more control than standard JavaScript timers." },
                                {
                                    t: "pre",
                                    a: { class: "bg-light p-3" },
                                    c: `// setIntervalX - Run exactly N times
const timer = bw.setIntervalX(() => {
    console.log('This runs exactly 5 times');
}, 1000, 5);

// repeatUntil - Repeat until condition is met
bw.repeatUntil(
    () => document.querySelector('#myElement'),  // Condition
    (element) => {                              // Success callback
        console.log('Element found!', element);
    },
    100,  // Check every 100ms
    5000  // Timeout after 5 seconds
);`
                                }
                            ]
                        })
                    ]
                }
            ]
        });
        
        // Mount the app
        bw.DOM('#app', App());
    </script>
</body>
</html>
