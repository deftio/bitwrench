<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example - Bitwrench v2</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <style>
        /* Table sorting indicators */
        .bw-sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 20px;
        }
        .bw-sortable:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .bw-sortable::after {
            content: '↕';
            position: absolute;
            right: 5px;
            opacity: 0.3;
        }
        .bw-sortable.bw-sort-asc::after {
            content: '↑';
            opacity: 1;
        }
        .bw-sortable.bw-sort-desc::after {
            content: '↓';
            opacity: 1;
        }
        
        .example-section {
            margin-bottom: 3rem;
        }
        
        .example-code {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="bw-v2-temporary-shims.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        // Component shortcuts
        const { Container, Card, Row, Col } = bw.components;
        
        // Sample data
        const employeeData = [
            { id: 1, name: "John Doe", department: "Engineering", salary: 95000, startDate: "2019-03-15" },
            { id: 2, name: "Jane Smith", department: "Marketing", salary: 78000, startDate: "2020-07-22" },
            { id: 3, name: "Bob Johnson", department: "Sales", salary: 82000, startDate: "2018-11-08" },
            { id: 4, name: "Alice Brown", department: "Engineering", salary: 105000, startDate: "2021-01-10" },
            { id: 5, name: "Charlie Wilson", department: "HR", salary: 65000, startDate: "2019-09-30" }
        ];
        
        // v1 style array data
        const arrayData = [
            ["Product", "Price", "Stock", "Category"],
            ["Laptop Pro", "$1,299", 15, "Electronics"],
            ["Office Chair", "$349", 42, "Furniture"],
            ["Coffee Maker", "$89", 8, "Appliances"],
            ["Desk Lamp", "$45", 23, "Furniture"],
            ["Wireless Mouse", "$29", 67, "Electronics"]
        ];
        
        // Create v2 table that returns TACO
        function makeV2Table(config) {
            const {
                data,
                columns,
                caption,
                sortable = true,
                striped = true,
                hover = true,
                className = ''
            } = config;
            
            // Build classes
            const classes = ['table'];
            if (striped) classes.push('table-striped');
            if (hover) classes.push('table-hover');
            if (className) classes.push(className);
            
            // Detect format
            const isArrayFormat = Array.isArray(data) && Array.isArray(data[0]);
            
            let headers, rows;
            
            if (isArrayFormat) {
                headers = data[0];
                rows = data.slice(1);
            } else {
                headers = columns ? columns.map(c => c.label || c.key) : Object.keys(data[0]);
                rows = data;
            }
            
            // Return TACO
            return {
                t: 'table',
                a: { 
                    class: classes.join(' '),
                    'data-sortable': sortable 
                },
                c: [
                    caption && {
                        t: 'caption',
                        c: caption
                    },
                    {
                        t: 'thead',
                        c: {
                            t: 'tr',
                            c: headers.map((header, idx) => ({
                                t: 'th',
                                a: sortable ? {
                                    class: 'bw-sortable',
                                    onclick: function(e) {
                                        const table = e.target.closest('table');
                                        const tbody = table.querySelector('tbody');
                                        const rows = Array.from(tbody.querySelectorAll('tr'));
                                        
                                        // Clear other headers
                                        table.querySelectorAll('th').forEach(th => {
                                            if (th !== e.target) {
                                                th.classList.remove('bw-sort-asc', 'bw-sort-desc');
                                            }
                                        });
                                        
                                        const isAsc = e.target.classList.contains('bw-sort-asc');
                                        e.target.classList.toggle('bw-sort-asc', !isAsc);
                                        e.target.classList.toggle('bw-sort-desc', isAsc);
                                        
                                        rows.sort((a, b) => {
                                            const aVal = a.children[idx].textContent;
                                            const bVal = b.children[idx].textContent;
                                            const result = bw.naturalCompare(aVal, bVal);
                                            return isAsc ? -result : result;
                                        });
                                        
                                        rows.forEach(row => tbody.appendChild(row));
                                    }
                                } : {},
                                c: header
                            }))
                        }
                    },
                    {
                        t: 'tbody',
                        c: rows.map(row => ({
                            t: 'tr',
                            c: isArrayFormat ? 
                                row.map(cell => ({ t: 'td', c: String(cell) })) :
                                (columns || Object.keys(row)).map(col => ({
                                    t: 'td',
                                    c: String(typeof col === 'string' ? row[col] : row[col.key])
                                }))
                        }))
                    }
                ].filter(Boolean)
            };
        }
        
        // Create the app
        const App = () => ExamplePage({
            title: 'Table Examples',
            content: [
                {
                    t: 'h1',
                    a: { class: 'mb-4' },
                    c: 'Table Examples - TACO Pattern'
                },
                {
                    t: 'p',
                    a: { class: 'lead mb-5' },
                    c: 'v2 tables return TACO objects that can be composed, not HTML strings'
                },
                
                // Example 1: Object-based data
                {
                    t: 'section',
                    a: { class: 'example-section' },
                    c: [
                        { t: 'h2', c: 'Object-Based Data Table' },
                        Card({
                            children: [
                                { t: 'p', c: 'Modern v2 style with object data and column definitions:' },
                                makeV2Table({
                                    data: employeeData,
                                    columns: [
                                        { key: 'name', label: 'Employee Name' },
                                        { key: 'department', label: 'Department' },
                                        { key: 'salary', label: 'Salary' },
                                        { key: 'startDate', label: 'Start Date' }
                                    ],
                                    caption: 'Employee Directory (Click headers to sort)',
                                    sortable: true,
                                    striped: true
                                }),
                                {
                                    t: 'pre',
                                    a: { class: 'example-code' },
                                    c: { t: 'code', c: `// v2 returns a TACO object
const tableTaco = makeV2Table({
    data: employeeData,
    columns: [
        { key: 'name', label: 'Employee Name' },
        { key: 'department', label: 'Department' },
        { key: 'salary', label: 'Salary' }
    ],
    sortable: true
});

// Use it in your TACO structure
const page = {
    t: 'div',
    c: [
        { t: 'h1', c: 'Report' },
        tableTaco  // Just include the TACO!
    ]
};` }
                                }
                            ]
                        })
                    ]
                },
                
                // Example 2: Array-based data (v1 compatibility)
                {
                    t: 'section',
                    a: { class: 'example-section' },
                    c: [
                        { t: 'h2', c: 'Array-Based Data Table (v1 Compatible)' },
                        Card({
                            children: [
                                { t: 'p', c: 'v1 compatibility mode with array data:' },
                                makeV2Table({
                                    data: arrayData,
                                    caption: 'Product Inventory',
                                    sortable: true,
                                    striped: true,
                                    hover: true
                                }),
                                {
                                    t: 'pre',
                                    a: { class: 'example-code' },
                                    c: { t: 'code', c: `// v1 style array data still works
const arrayData = [
    ["Product", "Price", "Stock"],
    ["Laptop", "$1,299", 15],
    ["Mouse", "$29", 67]
];

const table = makeV2Table({
    data: arrayData,
    sortable: true
});` }
                                }
                            ]
                        })
                    ]
                },
                
                // Example 3: Composing tables in larger structures
                {
                    t: 'section',
                    a: { class: 'example-section' },
                    c: [
                        { t: 'h2', c: 'Composing Tables with Other Components' },
                        Card({
                            children: [
                                { t: 'p', c: 'Tables as TACO objects compose naturally:' },
                                Row({
                                    children: [
                                        Col({
                                            md: 6,
                                            children: [
                                                { t: 'h4', c: 'Sales Team' },
                                                makeV2Table({
                                                    data: employeeData.filter(e => e.department === 'Sales'),
                                                    columns: [
                                                        { key: 'name', label: 'Name' },
                                                        { key: 'salary', label: 'Salary' }
                                                    ]
                                                })
                                            ]
                                        }),
                                        Col({
                                            md: 6,
                                            children: [
                                                { t: 'h4', c: 'Engineering Team' },
                                                makeV2Table({
                                                    data: employeeData.filter(e => e.department === 'Engineering'),
                                                    columns: [
                                                        { key: 'name', label: 'Name' },
                                                        { key: 'startDate', label: 'Started' }
                                                    ]
                                                })
                                            ]
                                        })
                                    ]
                                })
                            ]
                        })
                    ]
                },
                
                // Key differences section
                {
                    t: 'section',
                    a: { class: 'alert alert-info' },
                    c: [
                        { t: 'h3', c: 'Key Difference: TACO vs HTML' },
                        { t: 'p', c: 'v1 htmlTable returns an HTML string:' },
                        { t: 'pre', c: { t: 'code', c: 'const html = bw.htmlTable(data); // Returns: "<table>...</table>"' }},
                        { t: 'p', a: { class: 'mt-3' }, c: 'v2 makeTable returns a TACO object:' },
                        { t: 'pre', c: { t: 'code', c: 'const taco = bw.makeTable(data); // Returns: { t: "table", a: {...}, c: [...] }' }},
                        { t: 'p', a: { class: 'mt-3 mb-0' }, c: 'This allows tables to be composed, transformed, and rendered when needed!' }
                    ]
                }
            ]
        });
        
        // Mount the app
        bw.DOM('#app', App());
    </script>
</body>
</html>
