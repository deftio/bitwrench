<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Render API - Bitwrench v2</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../dist/bitwrench.css">
    <link rel="stylesheet" href="bitwrench_examples.css">
</head>
<body>
    <div id="app"></div>
    
    <script src="../dist/bitwrench.umd.js"></script>
    <script src="../src/bitwrench-components-inline.js"></script>
    <script src="shared-navbar.js"></script>
    <script>
        // Component shortcuts
        const { Card, Row, Col, Button, Alert, Badge } = bw.components;
        
        // Component handle storage
        let counterHandle = null;
        let formHandle = null;
        let logMessages = [];
        
        // Log function
        const log = (message, type = 'info') => {
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            logMessages.unshift(`[${timestamp}] ${icon} ${message}`);
            if (logMessages.length > 8) logMessages.pop();
            updateLog();
        };
        
        // Update log display
        const updateLog = () => {
            const logEl = document.getElementById('event-log');
            if (logEl) {
                logEl.textContent = logMessages.join('\n') || 'No events yet...';
            }
        };
        
        // Counter functions
        function createCounter() {
            // Clear existing counter if any
            if (counterHandle) {
                counterHandle.destroy();
                log('Previous counter destroyed', 'info');
            }
            
            counterHandle = bw.render('#counter-container', 'replace', {
                t: 'div',
                a: { 
                    class: 'alert alert-primary mb-0'
                },
                c: {
                    t: 'div',
                    a: { class: 'd-flex justify-content-between align-items-center' },
                    c: [
                        {
                            t: 'div',
                            c: [
                                { t: 'h4', a: { class: 'mb-1' }, c: 'Counter Value' },
                                { t: 'h2', a: { class: 'mb-0', id: 'counter-display' }, c: '0' }
                            ]
                        },
                        {
                            t: 'div',
                            a: { class: 'btn-group' },
                            c: [
                                {
                                    t: 'button',
                                    a: { 
                                        class: 'btn btn-primary',
                                        onclick: () => incrementCounter(1)
                                    },
                                    c: '+1'
                                },
                                {
                                    t: 'button',
                                    a: { 
                                        class: 'btn btn-success',
                                        onclick: () => incrementCounter(10)
                                    },
                                    c: '+10'
                                },
                                {
                                    t: 'button',
                                    a: { 
                                        class: 'btn btn-warning',
                                        onclick: () => incrementCounter(-1)
                                    },
                                    c: '-1'
                                },
                                {
                                    t: 'button',
                                    a: { 
                                        class: 'btn btn-secondary',
                                        onclick: () => resetCounter()
                                    },
                                    c: 'Reset'
                                }
                            ]
                        }
                    ]
                },
                o: {
                    state: { count: 0 },
                    mounted: (el, handle) => {
                        log('Counter created and mounted', 'success');
                        updateHandleInfo();
                    }
                }
            });
        }
        
        function incrementCounter(amount) {
            if (!counterHandle) {
                alert('Please create a counter first!');
                return;
            }
            
            const state = counterHandle.getState();
            const newCount = state.count + amount;
            counterHandle.setState({ count: newCount });
            
            // Update display
            const display = counterHandle.element.querySelector('#counter-display');
            if (display) {
                display.textContent = newCount;
                
                // Add animation
                display.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    display.style.transition = 'transform 0.2s';
                    display.style.transform = 'scale(1)';
                }, 100);
            }
            
            updateHandleInfo();
            log(`Counter ${amount > 0 ? 'incremented' : 'decremented'} by ${Math.abs(amount)} to ${newCount}`);
        }
        
        function resetCounter() {
            if (!counterHandle) return;
            
            counterHandle.setState({ count: 0 });
            const display = counterHandle.element.querySelector('#counter-display');
            if (display) display.textContent = '0';
            
            updateHandleInfo();
            log('Counter reset to 0', 'success');
        }
        
        function modifyCounterStyle() {
            if (!counterHandle) {
                alert('Please create a counter first!');
                return;
            }
            
            // Toggle between styles
            const classes = ['alert-primary', 'alert-success', 'alert-info', 'alert-warning'];
            let currentClass = classes.find(cls => counterHandle.element.classList.contains(cls));
            const currentIndex = classes.indexOf(currentClass);
            const nextIndex = (currentIndex + 1) % classes.length;
            
            counterHandle.removeClass(currentClass);
            counterHandle.addClass(classes[nextIndex]);
            
            // Update button styles to match
            const buttons = counterHandle.element.querySelectorAll('.btn');
            const btnClasses = ['btn-primary', 'btn-success', 'btn-info', 'btn-warning'];
            buttons[0].className = `btn ${btnClasses[nextIndex]}`;
            
            updateHandleInfo();
            log(`Counter style changed to ${classes[nextIndex].replace('alert-', '')}`);
        }
        
        function destroyCounter() {
            if (!counterHandle) {
                alert('No counter to destroy!');
                return;
            }
            
            counterHandle.destroy();
            counterHandle = null;
            updateHandleInfo();
            log('Counter destroyed', 'error');
        }
        
        // Form example
        function createForm() {
            if (formHandle) {
                formHandle.destroy();
            }
            
            formHandle = bw.render('#form-container', 'replace', {
                t: 'form',
                a: { 
                    onsubmit: (e) => {
                        e.preventDefault();
                        const formData = formHandle.getState();
                        log(`Form submitted: ${JSON.stringify(formData)}`, 'success');
                        alert('Form data logged to console!');
                    }
                },
                c: [
                    {
                        t: 'div',
                        a: { class: 'mb-3' },
                        c: [
                            { t: 'label', a: { class: 'form-label' }, c: 'Name' },
                            {
                                t: 'input',
                                a: {
                                    type: 'text',
                                    class: 'form-control',
                                    placeholder: 'Enter your name',
                                    oninput: (e) => {
                                        const state = formHandle.getState();
                                        formHandle.setState({ ...state, name: e.target.value });
                                    }
                                }
                            }
                        ]
                    },
                    {
                        t: 'div',
                        a: { class: 'mb-3' },
                        c: [
                            { t: 'label', a: { class: 'form-label' }, c: 'Message' },
                            {
                                t: 'textarea',
                                a: {
                                    class: 'form-control',
                                    rows: 3,
                                    placeholder: 'Enter your message',
                                    oninput: (e) => {
                                        const state = formHandle.getState();
                                        formHandle.setState({ ...state, message: e.target.value });
                                    }
                                }
                            }
                        ]
                    },
                    {
                        t: 'button',
                        a: { type: 'submit', class: 'btn btn-primary' },
                        c: 'Submit Form'
                    }
                ],
                o: {
                    state: { name: '', message: '' },
                    mounted: () => {
                        log('Form created', 'success');
                    }
                }
            });
        }
        
        function updateHandleInfo() {
            const info = document.getElementById('handle-info');
            if (!counterHandle) {
                info.textContent = JSON.stringify({
                    status: 'No active component',
                    instructions: 'Click "Create Counter" to start'
                }, null, 2);
                return;
            }
            
            const handleInfo = {
                component: {
                    id: counterHandle.object_id,
                    type: counterHandle.object_type,
                    status: counterHandle.status_code
                },
                state: counterHandle.getState(),
                dom: {
                    tagName: counterHandle.element.tagName,
                    classes: counterHandle.element.className.split(' '),
                    hasEventListeners: true
                },
                availableMethods: [
                    'setState()', 'getState()', 'addClass()', 
                    'removeClass()', 'on()', 'destroy()'
                ]
            };
            
            info.textContent = JSON.stringify(handleInfo, null, 2);
        }
        
        // Create the app
        const App = () => ExamplePage({
            title: 'Render API',
            content: [
                {
                    t: 'h1',
                    a: { class: 'mb-4' },
                    c: 'bw.render() API Demo'
                },
                {
                    t: 'p',
                    a: { class: 'lead mb-4' },
                    c: 'Learn how to create dynamic components with lifecycle management'
                },
                
                {
                    t: 'div',
                    a: { class: 'alert alert-info mb-4' },
                    c: {
                        t: 'div',
                        c: [
                            { t: 'h5', a: { class: 'alert-heading' }, c: '💡 What is bw.render()?' },
                            { 
                                t: 'p', 
                                a: { class: 'mb-0' },
                                c: 'The bw.render() function creates components and returns a handle object. This handle gives you complete control over the component after it\'s rendered - update its state, modify properties, add event listeners, and manage its lifecycle.'
                            }
                        ]
                    }
                },
                
                Row({
                    children: [
                        Col({
                            lg: 6,
                            children: [
                                Card({
                                    title: '🔢 Counter Demo',
                                    class: 'mb-4',
                                    children: [
                                        { 
                                            t: 'p', 
                                            c: 'This example shows how to create a stateful counter component:' 
                                        },
                                        {
                                            t: 'div',
                                            a: { id: 'counter-container', class: 'mb-3' },
                                            c: {
                                                t: 'div',
                                                a: { class: 'alert alert-secondary mb-0 text-center' },
                                                c: '👆 Click "Create Counter" to begin'
                                            }
                                        },
                                        {
                                            t: 'div',
                                            a: { class: 'd-grid gap-2' },
                                            c: [
                                                {
                                                    t: 'div',
                                                    a: { class: 'btn-group' },
                                                    c: [
                                                        Button({
                                                            variant: 'primary',
                                                            onClick: createCounter,
                                                            children: '🆕 Create Counter'
                                                        }),
                                                        Button({
                                                            variant: 'info',
                                                            onClick: modifyCounterStyle,
                                                            children: '🎨 Change Style'
                                                        }),
                                                        Button({
                                                            variant: 'danger',
                                                            onClick: destroyCounter,
                                                            children: '🗑️ Destroy'
                                                        })
                                                    ]
                                                }
                                            ]
                                        }
                                    ]
                                }),
                                
                                Card({
                                    title: '📝 Form Demo',
                                    class: 'mb-4',
                                    children: [
                                        { t: 'p', c: 'Example of form state management:' },
                                        {
                                            t: 'div',
                                            a: { id: 'form-container', class: 'mb-3' },
                                            c: {
                                                t: 'div',
                                                a: { class: 'text-center text-muted p-4' },
                                                c: 'Click button below to create a form'
                                            }
                                        },
                                        Button({
                                            variant: 'success',
                                            onClick: createForm,
                                            children: '📋 Create Form',
                                            class: 'w-100'
                                        })
                                    ]
                                })
                            ]
                        }),
                        Col({
                            lg: 6,
                            children: [
                                Card({
                                    title: '🔍 Component Handle Inspector',
                                    class: 'mb-4',
                                    children: [
                                        { 
                                            t: 'p', 
                                            c: 'This shows the internal state and properties of the active component:' 
                                        },
                                        {
                                            t: 'pre',
                                            a: { 
                                                id: 'handle-info',
                                                class: 'bg-light p-3 rounded',
                                                style: { 
                                                    minHeight: '250px', 
                                                    fontSize: '0.875rem',
                                                    overflow: 'auto'
                                                }
                                            },
                                            c: JSON.stringify({
                                                status: 'No active component',
                                                instructions: 'Click "Create Counter" to start'
                                            }, null, 2)
                                        }
                                    ]
                                }),
                                
                                Card({
                                    title: '📊 Event Log',
                                    children: {
                                        t: 'pre',
                                        a: { 
                                            id: 'event-log',
                                            class: 'bg-dark text-light p-3 rounded mb-0',
                                            style: { 
                                                minHeight: '200px',
                                                maxHeight: '250px',
                                                fontSize: '0.875rem',
                                                overflow: 'auto'
                                            }
                                        },
                                        c: 'No events yet...'
                                    }
                                })
                            ]
                        })
                    ]
                }),
                
                Card({
                    title: '📚 How It Works',
                    class: 'mb-4',
                    children: [
                        {
                            t: 'div',
                            a: { class: 'row' },
                            c: [
                                {
                                    t: 'div',
                                    a: { class: 'col-md-6' },
                                    c: [
                                        { t: 'h5', c: '1️⃣ Create a Component' },
                                        {
                                            t: 'pre',
                                            a: { class: 'bg-light p-2 rounded' },
                                            c: {
                                                t: 'code',
                                                c: `const handle = bw.render('#target', 'replace', {
  t: 'div',
  a: { class: 'my-component' },
  c: 'Hello World',
  o: {
    state: { count: 0 },
    mounted: (el) => console.log('Ready!')
  }
});`
                                            }
                                        }
                                    ]
                                },
                                {
                                    t: 'div',
                                    a: { class: 'col-md-6' },
                                    c: [
                                        { t: 'h5', c: '2️⃣ Use the Handle' },
                                        {
                                            t: 'pre',
                                            a: { class: 'bg-light p-2 rounded' },
                                            c: {
                                                t: 'code',
                                                c: `// Update state
handle.setState({ count: 5 });

// Modify styles
handle.addClass('highlight');

// Add events
handle.on('click', () => {
  console.log('Clicked!');
});

// Clean up
handle.destroy();`
                                            }
                                        }
                                    ]
                                }
                            ]
                        }
                    ]
                }),
                
                Card({
                    title: '🛠️ API Reference',
                    children: {
                        t: 'table',
                        a: { class: 'table table-striped' },
                        c: [
                            {
                                t: 'thead',
                                c: {
                                    t: 'tr',
                                    c: [
                                        { t: 'th', c: 'Method' },
                                        { t: 'th', c: 'Description' },
                                        { t: 'th', c: 'Example' }
                                    ]
                                }
                            },
                            {
                                t: 'tbody',
                                c: [
                                    {
                                        t: 'tr',
                                        c: [
                                            { t: 'td', c: { t: 'code', c: 'setState(state)' } },
                                            { t: 'td', c: 'Update component state' },
                                            { t: 'td', c: { t: 'code', c: 'handle.setState({count: 10})' } }
                                        ]
                                    },
                                    {
                                        t: 'tr',
                                        c: [
                                            { t: 'td', c: { t: 'code', c: 'getState()' } },
                                            { t: 'td', c: 'Get current state' },
                                            { t: 'td', c: { t: 'code', c: 'const s = handle.getState()' } }
                                        ]
                                    },
                                    {
                                        t: 'tr',
                                        c: [
                                            { t: 'td', c: { t: 'code', c: 'addClass(class)' } },
                                            { t: 'td', c: 'Add CSS class' },
                                            { t: 'td', c: { t: 'code', c: "handle.addClass('active')" } }
                                        ]
                                    },
                                    {
                                        t: 'tr',
                                        c: [
                                            { t: 'td', c: { t: 'code', c: 'on(event, handler)' } },
                                            { t: 'td', c: 'Add event listener' },
                                            { t: 'td', c: { t: 'code', c: "handle.on('click', fn)" } }
                                        ]
                                    },
                                    {
                                        t: 'tr',
                                        c: [
                                            { t: 'td', c: { t: 'code', c: 'destroy()' } },
                                            { t: 'td', c: 'Remove component' },
                                            { t: 'td', c: { t: 'code', c: 'handle.destroy()' } }
                                        ]
                                    }
                                ]
                            }
                        ]
                    }
                })
            ]
        });
        
        // Mount the app
        bw.DOM('#app', App());
    </script>
</body>
</html>
