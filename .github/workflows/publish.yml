name: Publish to npm

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check if already on npm
        id: check_npm
        run: |
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          if npm view "bitwrench@$PKG_VERSION" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub Release
        if: steps.check_npm.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p 'require("./package.json").version')"
          if ! git ls-remote --tags origin "$VERSION" | grep -q .; then
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
          if ! gh release view "$VERSION" > /dev/null 2>&1; then
            gh release create "$VERSION" \
              --title "bitwrench $VERSION" \
              --generate-notes \
              dist/*.js dist/*.js.map dist/*.css
          fi

      - name: Publish to npm
        if: steps.check_npm.outputs.published == 'false'
        run: npm publish --provenance --access public
