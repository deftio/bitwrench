version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 1
    groups:
      all-dev-deps:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
    ignore:
      # karma-firefox-launcher: Firefox not installed locally, not used in CI
      - dependency-name: "karma-firefox-launcher"
      # karma-ie-launcher: IE testing is legacy, no longer relevant
      - dependency-name: "karma-ie-launcher"
      # jsdom: v27+ is ESM-only, breaks jsdom-global/register (CJS)
      - dependency-name: "jsdom"
        versions: [">=27.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 1
    groups:
      all-ci-actions:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
