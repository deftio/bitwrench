version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 3
    groups:
      dev-tooling:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # karma-firefox-launcher: Firefox not installed locally, not used in CI
      - dependency-name: "karma-firefox-launcher"
      # karma-ie-launcher: IE testing is legacy, no longer relevant
      - dependency-name: "karma-ie-launcher"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 2
    groups:
      ci-actions:
        patterns:
          - "*"
