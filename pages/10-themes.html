<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Themes</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="shared-theme.css">
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    // Mount nav
    mountExampleNav('#example-nav', '10-themes.html');

    // Load default styles so bw-* classes work
    bw.loadDefaultStyles();

    // ---------------------------------------------------------------
    // Page CSS (injected via bw.css)
    // ---------------------------------------------------------------
    bw.injectCSS(bw.css({
      '.theme-controls': {
        'display': 'grid',
        'grid-template-columns': 'repeat(auto-fill, minmax(180px, 1fr))',
        'gap': '1rem',
        'margin-bottom': '1.5rem'
      },
      '.theme-control-group label': {
        'display': 'block',
        'font-weight': '600',
        'font-size': '0.8125rem',
        'margin-bottom': '0.375rem',
        'color': 'var(--bw_text_secondary)',
        'text-transform': 'uppercase',
        'letter-spacing': '0.03em'
      },
      '.theme-control-group input[type="color"]': {
        'width': '100%',
        'height': '42px',
        'border': '1px solid var(--bw_card_border)',
        'border-radius': '6px',
        'cursor': 'pointer',
        'padding': '2px'
      },
      '.theme-control-group select': {
        'width': '100%',
        'padding': '0.5rem 0.75rem',
        'border': '1px solid var(--bw_card_border)',
        'border-radius': '6px',
        'background': 'var(--bw_card_bg)',
        'color': 'var(--bw_text)',
        'font-size': '0.875rem'
      },
      '.preview-area': {
        'border': '2px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        'padding': '1.5rem',
        'margin-top': '1rem',
        'transition': 'background-color 0.3s ease, color 0.3s ease'
      },
      '.preview-section': {
        'margin-bottom': '1.5rem'
      },
      '.preview-section:last-child': {
        'margin-bottom': '0'
      },
      '.preview-section h4': {
        'font-size': '0.875rem',
        'text-transform': 'uppercase',
        'letter-spacing': '0.05em',
        'color': 'var(--bw_text_secondary)',
        'margin': '0 0 0.75rem 0',
        'padding-bottom': '0.375rem',
        'border-bottom': '1px solid var(--bw_card_border)'
      },
      '.preset-grid': {
        'display': 'grid',
        'grid-template-columns': 'repeat(auto-fill, minmax(200px, 1fr))',
        'gap': '1rem'
      },
      '.preset-card': {
        'border': '2px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        'overflow': 'hidden',
        'cursor': 'pointer',
        'transition': 'transform 0.2s, box-shadow 0.2s'
      },
      '.preset-card:hover': {
        'transform': 'translateY(-3px)',
        'box-shadow': '0 6px 16px rgba(0,0,0,0.12)'
      },
      '.preset-card.active': {
        'border-color': '#0077b6',
        'box-shadow': '0 0 0 2px #0077b6',
        'transform': 'translateY(-3px)'
      },
      '.preset-card-colors': {
        'display': 'flex',
        'height': '48px'
      },
      '.preset-card-colors > div': {
        'flex': '1'
      },
      '.preset-card-body': {
        'padding': '0.875rem 1rem'
      },
      '.preset-card-body h4': {
        'margin': '0 0 0.25rem 0',
        'font-size': '1rem'
      },
      '.preset-card-body p': {
        'margin': '0',
        'font-size': '0.8125rem',
        'color': 'var(--bw_text_secondary)'
      },
      '.multi-theme-row': {
        'display': 'grid',
        'grid-template-columns': '1fr 1fr',
        'gap': '1.5rem'
      },
      '.multi-theme-panel': {
        'border': '2px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        'padding': '1.25rem'
      },
      '.multi-theme-panel h4': {
        'margin': '0 0 1rem 0',
        'font-size': '0.9375rem'
      },
      '.code-export-block': {
        'background': 'var(--bw_code_bg)',
        'color': 'var(--bw_code_text)',
        'border-radius': 'var(--bw_radius)',
        'padding': '1rem 1.25rem',
        'font-family': 'var(--bw_font_mono)',
        'font-size': '0.8125rem',
        'overflow-x': 'auto',
        'white-space': 'pre',
        'line-height': '1.6'
      },
      '.css-output-area': {
        'width': '100%',
        'min-height': '200px',
        'background': 'var(--bw_code_bg)',
        'color': 'var(--bw_code_text)',
        'border': '1px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        'padding': '1rem',
        'font-family': 'var(--bw_font_mono)',
        'font-size': '0.75rem',
        'line-height': '1.5',
        'resize': 'vertical'
      },
      '.btn-row': {
        'display': 'flex',
        'flex-wrap': 'wrap',
        'gap': '0.5rem',
        'align-items': 'center'
      },
      '.color-role-grid': {
        'display': 'grid',
        'grid-template-columns': 'repeat(auto-fill, minmax(280px, 1fr))',
        'gap': '1rem',
        'margin': '1.25rem 0'
      },
      '.color-role-card': {
        'border': '1px solid var(--bw_card_border)',
        'border-radius': '8px',
        'overflow': 'hidden'
      },
      '.color-role-swatch': {
        'height': '48px',
        'display': 'flex',
        'align-items': 'center',
        'justify-content': 'center',
        'font-weight': '600',
        'font-size': '0.8125rem'
      },
      '.color-role-body': {
        'padding': '0.75rem 1rem'
      },
      '.color-role-body h4': {
        'margin': '0 0 0.25rem 0',
        'font-size': '0.9375rem',
        'border-bottom': 'none',
        'text-transform': 'none',
        'letter-spacing': '0',
        'padding-bottom': '0'
      },
      '.color-role-body p': {
        'margin': '0',
        'font-size': '0.8125rem',
        'color': 'var(--bw_text_secondary)',
        'line-height': '1.5'
      },
      '.shade-strip': {
        'display': 'flex',
        'height': '24px',
        'border-radius': '4px',
        'overflow': 'hidden',
        'margin-top': '0.5rem'
      },
      '.shade-strip > div': {
        'flex': '1'
      },
      '.color-flow-diagram': {
        'display': 'grid',
        'grid-template-columns': '1fr auto 1fr auto 1fr',
        'gap': '0.75rem',
        'align-items': 'center',
        'margin': '1.5rem 0',
        'padding': '1.25rem',
        'border': '1px solid var(--bw_card_border)',
        'border-radius': '8px',
        'background': 'var(--bw_card_bg)'
      },
      '.color-flow-step': {
        'text-align': 'center',
        'padding': '0.75rem'
      },
      '.color-flow-step h4': {
        'margin': '0 0 0.375rem 0',
        'font-size': '0.875rem',
        'border-bottom': 'none',
        'text-transform': 'none',
        'letter-spacing': '0',
        'padding-bottom': '0'
      },
      '.color-flow-step p': {
        'margin': '0',
        'font-size': '0.75rem',
        'color': 'var(--bw_text_secondary)'
      },
      '.color-flow-arrow': {
        'text-align': 'center',
        'font-size': '1.5rem',
        'color': 'var(--bw_text_secondary)'
      },
      '.shade-table': {
        'width': '100%',
        'font-size': '0.8125rem',
        'border-collapse': 'collapse',
        'margin': '1rem 0'
      },
      '.shade-table th': {
        'text-align': 'left',
        'padding': '0.5rem 0.75rem',
        'border-bottom': '2px solid var(--bw_card_border)',
        'font-weight': '600',
        'font-size': '0.75rem',
        'text-transform': 'uppercase',
        'letter-spacing': '0.03em',
        'color': 'var(--bw_text_secondary)'
      },
      '.shade-table td': {
        'padding': '0.375rem 0.75rem',
        'border-bottom': '1px solid var(--bw_card_border)',
        'vertical-align': 'middle'
      },
      '.shade-table code': {
        'font-size': '0.75rem'
      },
      '.shade-swatch-inline': {
        'display': 'inline-block',
        'width': '16px',
        'height': '16px',
        'border-radius': '3px',
        'border': '1px solid rgba(0,0,0,0.1)',
        'vertical-align': 'middle',
        'margin-right': '0.375rem'
      },
      '@media (max-width: 768px)': {
        '.multi-theme-row': {
          'grid-template-columns': '1fr'
        },
        '.theme-controls': {
          'grid-template-columns': '1fr 1fr'
        },
        '.color-flow-diagram': {
          'grid-template-columns': '1fr',
          'gap': '0.25rem'
        },
        '.color-flow-arrow': {
          'transform': 'rotate(90deg)'
        }
      }
    }));

    // ---------------------------------------------------------------
    // Page structure (TACO)
    // ---------------------------------------------------------------
    var pageHeader = {
      t: 'div', a: { class: 'page-header' }, c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' }, c: [
          { t: 'h1', c: 'Themes' },
          { t: 'p', a: { class: 'subtitle' }, c: [
            'Generate complete, scoped themes from seed colors with ',
            { t: 'code', c: 'bw.generateTheme()' },
            '.'
          ]}
        ]
      }
    };

    var descStyle = 'font-size: 0.9375rem; color: var(--bw_text_secondary); margin: 0 0 1rem;';

    var contentWrapper = {
      t: 'div', a: { class: 'content-container wide' }, c: [

        // Teaching callout
        {
          t: 'div', a: { class: 'callout callout-concept' }, c: [
            { t: 'h4', c: 'Level 0 \u2014 Theme Generation' },
            { t: 'p', c: ['Themes are data: hand bw.generateTheme() seed colors and get a complete CSS palette with dark mode. Theme generation is pure computation \u2014 no DOM required. ',
              { t: 'a', a: { href: '../docs/thinking-in-bitwrench.md' }, c: 'Thinking in Bitwrench' }] }
          ]
        },

        // Section: How Theme Colors Work
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'How Theme Colors Work' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'A bitwrench theme starts with <strong>three seed colors</strong>. Everything else is derived automatically. ' +
                    'Here is how the pieces fit together.'
                  )
                },

                // Flow diagram: seeds → derivation → palette
                {
                  t: 'div', a: { class: 'color-flow-diagram' }, c: [
                    {
                      t: 'div', a: { class: 'color-flow-step' }, c: [
                        { t: 'h4', c: '1. Seed Colors' },
                        { t: 'p', c: 'You pick primary, secondary, tertiary' }
                      ]
                    },
                    { t: 'div', a: { class: 'color-flow-arrow' }, c: '\u2192' },
                    {
                      t: 'div', a: { class: 'color-flow-step' }, c: [
                        { t: 'h4', c: '2. Derivation' },
                        { t: 'p', c: 'Semantic colors, surfaces, and 8 shades per role are computed' }
                      ]
                    },
                    { t: 'div', a: { class: 'color-flow-arrow' }, c: '\u2192' },
                    {
                      t: 'div', a: { class: 'color-flow-step' }, c: [
                        { t: 'h4', c: '3. CSS Output' },
                        { t: 'p', c: 'Scoped CSS rules for every bw-* component' }
                      ]
                    }
                  ]
                },

                // Color roles heading
                { t: 'h3', a: { style: 'margin: 1.75rem 0 0.5rem 0; font-size: 1.1rem;' }, c: 'Color Roles' },
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'The palette has <strong>11 color slots</strong>. You provide 3 seed colors; the other 8 are auto-derived with sensible defaults. ' +
                    'You can override any of them in the config.'
                  )
                },
                { t: 'div', a: { id: 'color-roles-grid' } },

                // Shade derivation heading
                { t: 'h3', a: { style: 'margin: 1.75rem 0 0.5rem 0; font-size: 1.1rem;' }, c: 'Shade Derivation' },
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'Each of the 9 color roles (primary through dark) is expanded into <strong>8 shade variants</strong> via <code>deriveShades(hex)</code>. ' +
                    'Components reference these shades instead of raw hex values.'
                  )
                },
                { t: 'div', a: { id: 'shade-derivation-table' } },

                // Where colors appear
                { t: 'h3', a: { style: 'margin: 1.75rem 0 0.5rem 0; font-size: 1.1rem;' }, c: 'Where Each Color Appears' },
                {
                  t: 'p', a: { style: descStyle }, c:
                    'This table maps color roles to the components that use them. Every component references the palette, so changing a seed color automatically updates every component in the theme.'
                },
                { t: 'div', a: { id: 'color-usage-map' } },

                // Harmonization callout
                {
                  t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1.25rem;' },
                  c: [
                    { t: 'h4', c: 'Harmonization' },
                    { t: 'p', c: bw.raw(
                      'Semantic colors (success, danger, warning, info) are automatically <em>harmonized</em> toward the primary hue. ' +
                      'This shifts their hue 20% toward primary, so a green "success" in an ocean-blue theme becomes slightly blue-green. ' +
                      'The result is a cohesive palette where nothing looks out of place. ' +
                      'Set <code>harmonize: 0</code> to disable this.'
                    )}
                  ]
                }
              ]
            }
          ]
        },

        // Section 1: Theme Generator
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Theme Generator' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: [
                    'Pick three seed colors, choose spacing and border-radius presets, then click ',
                    { t: 'strong', c: 'Generate' },
                    '. The preview below updates live with fully themed buttons, alerts, badges, cards, forms, and a table.'
                  ]
                },
                { t: 'div', a: { id: 'theme-generator' } }
              ]
            }
          ]
        },

        // Section 2: Pre-built Gallery
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Pre-built Theme Gallery' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: [
                    'Click any preset to apply it to the preview area above. Each theme is generated from just three seed colors using ',
                    { t: 'code', c: 'bw.generateTheme()' },
                    '. Toggle between light and dark to see both palettes.'
                  ]
                },
                { t: 'div', a: { id: 'gallery-toggle' } },
                { t: 'div', a: { id: 'preset-gallery' } }
              ]
            }
          ]
        },

        // Section 3: Applying Themes
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Applying Themes' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'Themes in bitwrench are <strong>CSS-scoped</strong>. Every call to <code>bw.generateTheme(name, config)</code> ' +
                    'produces CSS rules scoped under the class <code>.name</code>. To apply a theme, add that class to a container element. ' +
                    'Every <code>bw-*</code> component inside that container automatically inherits the theme.'
                  )
                },
                // Whole-page application
                { t: 'h3', a: { style: 'margin: 1.5rem 0 0.75rem 0; font-size: 1.05rem;' }, c: 'Whole-page theme' },
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'To theme an entire page, add the scope class to <code>&lt;body&gt;</code>. ' +
                    'The generated CSS includes a body background-color rule scoped to that class, ' +
                    'so the page background, text color, and every component update together.'
                  )
                },
                { t: 'div', a: { id: 'apply-theme-code' } },
                // Scoped (container) application
                { t: 'h3', a: { style: 'margin: 1.5rem 0 0.75rem 0; font-size: 1.05rem;' }, c: 'Scoped container theme' },
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'To theme only part of a page, add the scope class to a <code>&lt;div&gt;</code> wrapper. ' +
                    'Components outside that container are unaffected. This is how the multi-theme demo below works.'
                  )
                },
                { t: 'div', a: { id: 'scoped-theme-code' } },
                // Switching themes
                { t: 'h3', a: { style: 'margin: 1.5rem 0 0.75rem 0; font-size: 1.05rem;' }, c: 'Switching themes' },
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'To switch from one theme to another, call <code>bw.clearTheme()</code> first to remove the ' +
                    'previous theme\'s injected <code>&lt;style&gt;</code> elements, then generate the new theme. ' +
                    'This prevents stale CSS from accumulating in the DOM.'
                  )
                },
                { t: 'div', a: { id: 'switch-theme-code' } }
              ]
            }
          ]
        },

        // Section 4: Background & Surface Colors
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Background & Surface Colors' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'Every theme palette includes <strong>background</strong> and <strong>surface</strong> tokens. ' +
                    'These are the page-level canvas colors that all components sit on top of.'
                  )
                },
                // Explainer graphic: layered color model
                { t: 'div', a: { id: 'bg-surface-explainer' } },
                {
                  t: 'ul', a: { style: 'font-size: 0.9375rem; color: var(--bw_text_secondary); margin: 0 0 1rem; padding-left: 1.25rem; line-height: 1.8;' },
                  c: [
                    { t: 'li', c: bw.raw('<code>palette.background</code> &mdash; the page body background. Light themes default to <code>#ffffff</code>; dark themes derive from the dark base color.') },
                    { t: 'li', c: bw.raw('<code>palette.surface</code> &mdash; elevated surfaces like cards, inputs, modals, dropdowns. Light themes default to <code>#f8f9fa</code>; dark themes derive a slightly lighter shade.') },
                    { t: 'li', c: bw.raw('Components like buttons and badges use <strong>seed colors</strong> (primary, secondary, etc.) for their fills &mdash; these sit on top of the surface layer.') },
                    { t: 'li', c: bw.raw('You can override either canvas value by passing <code>background</code> or <code>surface</code> in the config.') }
                  ]
                },
                { t: 'div', a: { id: 'bg-surface-demo' } },
                {
                  t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1.25rem;' },
                  c: [
                    { t: 'h4', c: 'Design rationale' },
                    { t: 'p', c: bw.raw(
                      'Industry standard (MUI, shadcn, Tailwind): <code>background</code> is a surface token, not derived from the primary seed color. ' +
                      'A blue primary should give you a blue <em>button</em>, not a blue page. ' +
                      'Background defaults to white (light) or near-black (dark), keeping the canvas neutral so components pop.'
                    )}
                  ]
                }
              ]
            }
          ]
        },

        // Section 5: Multi-theme Demo (mixed themes)
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Mixed Themes on One Page' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: bw.raw(
                    'Multiple themes can coexist on the same page. Generate each with a unique name &mdash; ' +
                    'bitwrench scopes every CSS rule under that name\'s class. ' +
                    'Add the class to any container and the components inside pick up that theme. ' +
                    'This works because themes are pure CSS &mdash; no global state, no conflicts.'
                  )
                },
                { t: 'div', a: { id: 'multi-theme-demo' } }
              ]
            }
          ]
        },

        // Section 6: Code Export
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Code Export' },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c:
                    'The JavaScript call and generated CSS for your current theme. Copy the CSS to use in production without any runtime cost.'
                },
                { t: 'div', a: { id: 'code-export' } }
              ]
            }
          ]
        },

        // Section 7: Theme Toggle (Primary / Alternate)
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: bw.raw('Theme Toggle &mdash; Primary / Alternate') },
            {
              t: 'div', a: { class: 'demo-content' }, c: [
                {
                  t: 'p', a: { style: descStyle }, c: [
                    { t: 'code', c: 'bw.generateTheme()' },
                    ' always produces two complementary palettes: ',
                    { t: 'strong', c: 'primary' },
                    ' (your seed colors) and ',
                    { t: 'strong', c: 'alternate' },
                    bw.raw(' (luminance-inverted). Use <code>bw.applyTheme()</code> or <code>bw.toggleTheme()</code> to switch.')
                  ]
                },
                { t: 'div', a: { id: 'theme-toggle-demo' } }
              ]
            }
          ]
        }
      ]
    };

    bw.DOM('#app', [pageHeader, contentWrapper]);

    // ---------------------------------------------------------------
    // State
    // ---------------------------------------------------------------
    var state = {
      primary:    '#0077b6',
      secondary:  '#90e0ef',
      tertiary:   '#00b4d8',
      background: '',  // empty = auto-derive
      surface:    '',  // empty = auto-derive
      spacing:    'normal',
      radius:     'md',
      themeName:  'custom',
      lastResult: null,
      isAlternate: false,
      galleryDark: false,  // gallery light/dark toggle
      codeTheme:  'dark'  // 'dark' or 'light'
    };

    // Preset themes — read from bw.THEME_PRESETS (canonical source)
    var presets = bw.THEME_PRESETS;

    // ---------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------
    // Refresh all documentation sections that depend on current colors
    function refreshColorDocs() {
      if (typeof renderColorRolesGrid === 'function') renderColorRolesGrid();
      if (typeof renderShadeDerivationTable === 'function') renderShadeDerivationTable();
      if (typeof renderColorUsageMap === 'function') renderColorUsageMap();
    }

    function generateCurrentTheme() {
      bw.clearTheme();
      var config = {
        primary:   state.primary,
        secondary: state.secondary,
        tertiary:  state.tertiary,
        spacing:   state.spacing,
        radius:    state.radius,
        inject:    true
      };
      if (state.background) config.background = state.background;
      if (state.surface)    config.surface    = state.surface;
      var result = bw.generateTheme(state.themeName, config);
      state.lastResult = result;

      // Theme scope applied only to preview area (not #app), so page

    function renderPreview() {
      var scope = state.themeName;
      var result = state.lastResult;
      var bgColor, textColor;

      if (result && state.isAlternate && result.alternate) {
        // Alternate mode: light.base is the dark background, dark.base is the light text
        var altP = result.alternate.palette;
        bgColor = altP.light.base || '#1a1a2e';
        textColor = altP.dark.base || '#e8e8e8';
      } else if (result) {
        bgColor = result.palette.background || '#ffffff';
        textColor = result.palette.dark.base || '#212529';
      } else {
        bgColor = '#ffffff';
        textColor = '#212529';
      }

      var previewStyle = 'background-color: ' + bgColor + '; color: ' + textColor + ';';
      var altClass = state.isAlternate ? ' bw_theme_alt' : '';
      var modeLabel = state.isAlternate ? ' (Alternate)' : '';

      // Use bw.$ for fresh DOM lookup — bw._el cache can go stale
      // when #theme-preview is re-created by renderGenerator()
      var tpEls = bw.$('#theme-preview');
      if (tpEls.length) {
        bw.DOM(tpEls[0], {
          t: 'div', a: { class: 'preview-area ' + scope + altClass, style: previewStyle }, c: [
            { t: 'h3', a: { style: 'margin: 0 0 1rem 0;' }, c: 'Live Preview' + modeLabel },
            buildPreviewTaco()
          ]
        });
      }
    }

      );

      // Scoped container code
      var scopedCode =
        "// Generate two themes on the same page\n" +

        "bw.generateTheme('sunset', { primary: '#e76f51', secondary: '#264653' });\n\n" +

        ? bw.codeEditor({ code: scopedCode, lang: 'js', readOnly: true, height: 'auto', className: ceClass })
        : { t: 'pre', c: { t: 'code', c: scopedCode } }
      );

      // Switching themes code
      var switchCode =
        "// Remove the current theme's injected <style> elements\n" +
        "bw.clearTheme();\n" +

      var altPalette = result.alternate && result.alternate.palette;
      var altBg  = altPalette ? (altPalette.background || '#1a1a2e') : '—';

      var useCE = typeof bw.codeEditor === 'function';
      var ceClass = state.codeTheme === 'light' ? 'bw_ce_light' : '';
      var overrideCode =
        "// Override the default background and surface\n" +
        "var theme = bw.generateTheme('custom', {\n" +

    // ---------------------------------------------------------------
    // Section 6: Code Export
    // ---------------------------------------------------------------
    function renderCodeExport() {
      var result = state.lastResult;
      if (!result) {
        result = generateCurrentTheme();
      }

      var jsCall = "bw.generateTheme('" + state.themeName + "', {\n" +
        "  primary:   '" + state.primary + "',\n" +
        "  secondary: '" + state.secondary + "',\n" +
        "  tertiary:  '" + state.tertiary + "',\n" +
        (state.background ? "  background: '" + state.background + "',\n" : '') +
        (state.surface    ? "  surface:    '" + state.surface    + "',\n" : '') +
        "  spacing:   '" + state.spacing + "',\n" +
        "  radius:    '" + state.radius + "'\n" +
        "});";

      var cssText = result.css || '/* Generate a theme first */';

      var useCE = typeof bw.codeEditor === 'function';
      var ceClass = state.codeTheme === 'light' ? 'bw_ce_light' : '';
      var jsEditor = useCE
        ? bw.codeEditor({ code: jsCall, lang: 'js', readOnly: true, height: 'auto', className: ceClass })
        : { t: 'div', a: { class: 'code-export-block' }, c: jsCall };
      var cssEditor = useCE
        ? bw.codeEditor({ code: cssText, lang: 'css', readOnly: true, height: '300px', className: ceClass })
        : { t: 'textarea', a: { class: 'css-output-area', readonly: '', rows: 14 }, c: cssText };

      bw.DOM('#code-export', {
        t: 'div', c: [
          // Code theme picker
          {
            t: 'div', a: { style: 'display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem; margin-bottom: 1rem;' }, c: [
              { t: 'span', a: { style: 'font-size: 0.8125rem; color: var(--bw_text_secondary);' }, c: 'Code theme:' },
              {
                t: 'select', a: {
                  style: 'padding: 0.25rem 0.5rem; border: 1px solid var(--bw_card_border); border-radius: 4px; font-size: 0.8125rem; background: var(--bw_card_bg); color: var(--bw_text);',
                  onchange: function(e) {
                    state.codeTheme = e.target.value;
                    renderCodeExport();
                  }
                },
                c: [
                  { t: 'option', a: { value: 'dark', selected: state.codeTheme === 'dark' ? '' : undefined }, c: 'Dark' },
                  { t: 'option', a: { value: 'light', selected: state.codeTheme === 'light' ? '' : undefined }, c: 'Light' }
                ]
              }
            ]
          },
          // JS call
          { t: 'h3', a: { style: 'margin: 0 0 0.75rem 0; font-size: 1rem;' }, c: 'JavaScript Call' },
          { t: 'div', a: { style: 'margin-bottom: 1.5rem;' }, c: jsEditor },

          // CSS output
          {
            t: 'div', a: { style: 'display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;' }, c: [
              { t: 'h3', a: { style: 'margin: 0; font-size: 1rem;' }, c: 'Generated CSS' },
              bw.makeButton({
                text: 'Copy CSS',
                variant: 'secondary',
                size: 'sm',
                onclick: function() {
                  if (typeof navigator !== 'undefined' && navigator.clipboard) {
                    navigator.clipboard.writeText(cssText);
                  }
                }
              })
            ]
          },
          cssEditor,

          // Explanation
          {
            t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1.25rem;' }, c: [
              { t: 'h4', c: 'Static export' },
              {
                t: 'p', c: [
                  'Copy the CSS above into a ',
                  { t: 'code', c: '.css' },
                  ' file to use the theme without any runtime JavaScript. Or run ',
                  { t: 'code', c: "bw.generateTheme(name, { inject: false })" },
                  ' in Node.js and write ',
                  { t: 'code', c: 'result.css' },
                  ' to disk during your build step.'

              }

                  var toggleCode = '// Generate theme (always produces both palettes)\nvar theme = bw.generateTheme(\'ocean\', {\n  primary: \'#0077b6\',\n  secondary: \'#90e0ef\'\n});\n\n// Switch modes\nbw.applyTheme(\'alternate\');  // activate alternate\nbw.applyTheme(\'primary\');    // back to primary\nbw.applyTheme(\'dark\');       // whichever is darker\nbw.toggleTheme();            // flip between them';
