<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Server Side</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-nav.js"></script>
  <script src="site.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    var styles = initBitwrenchPage('12-bwserve-protocol.html');
    var p = styles.palette;

    // =========================================================================
    // Page-specific styles
    // =========================================================================
    bw.injectCSS(bw.css({
      '.msg-badge': {
        'display': 'inline-block',
        'padding': '0.15rem 0.5rem',
        'border-radius': '4px',
        'font-weight': '600',
        'font-size': '0.75rem',
        'font-family': '"SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace',
        'color': '#fff',
        'margin-right': '0.5rem',
        'vertical-align': 'middle'
      },
      '.badge-replace':  { 'background': '#2a9d8f' },
      '.badge-patch':    { 'background': '#e07b4a' },
      '.badge-append':   { 'background': '#457b9d' },
      '.badge-remove':   { 'background': '#e63946' },
      '.badge-batch':    { 'background': '#6c757d' },
      '.badge-message':  { 'background': '#8b5cf6' },
      '.badge-register': { 'background': '#7c3aed' },
      '.badge-call':     { 'background': '#0891b2' },
      '.badge-exec':     { 'background': '#dc2626' },
      '.arch-diagram': {
        'margin': '1.25rem 0',
        'background': '#1e293b',
        'border-radius': '8px',
        'padding': '0.75rem',
        'overflow-x': 'auto'
      },
      '.arch-diagram svg': {
        'width': '100%',
        'height': 'auto',
        'display': 'block'
      },
      '.arch-diagram .box-rect': {
        'fill': p.surface,
        'stroke': p.light.border,
        'stroke-width': '1.5'
      },
      '.arch-diagram .box-title': {
        'fill': p.dark.base,
        'font-family': 'system-ui, sans-serif',
        'font-size': '13px',
        'font-weight': '600'
      },
      '.arch-diagram .box-line': {
        'fill': p.dark.hover,
        'font-family': '"SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace',
        'font-size': '11px'
      },
      '.arch-diagram .box-line-bold': {
        'fill': p.primary.darkText,
        'font-family': '"SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace',
        'font-size': '11.5px',
        'font-weight': '600'
      },
      '.arch-diagram .arrow-line': {
        'stroke': p.primary.base,
        'stroke-width': '2',
        'fill': 'none'
      },
      '.arch-diagram .arrow-dash': {
        'stroke': p.primary.base,
        'stroke-width': '2',
        'stroke-dasharray': '6 3',
        'fill': 'none'
      },
      '.arch-diagram .arrow-head': {
        'fill': p.primary.base
      },
      '.arch-diagram .arrow-label': {
        'fill': '#e2e8f0',
        'font-family': '"SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace',
        'font-size': '10.5px',
        'font-weight': '600'
      },
      '.proto-table': {
        'width': '100%',
        'border-collapse': 'collapse',
        'margin': '1rem 0'
      },
      '.proto-table th, .proto-table td': {
        'padding': '0.5rem 0.75rem',
        'border': '1px solid ' + p.light.border,
        'text-align': 'left',
        'font-size': '0.875rem'
      },
      '.proto-table th': {
        'background': p.surfaceAlt,
        'font-weight': '600',
        'font-size': '0.8rem'
      },
      '.proto-table code': {
        'background': p.primary.light,
        'padding': '0.1rem 0.3rem',
        'border-radius': '3px',
        'font-size': '0.8rem',
        'color': p.primary.darkText
      }
    }), { id: 'proto-styles' });

    // =========================================================================
    // Helpers
    // =========================================================================
    function code(text) {
      return { t: 'code', c: text };
    }

    function badge(type) {
      return { t: 'span', a: { class: 'msg-badge badge-' + type }, c: type };
    }

    function protoTable(headers, rows) {
      return {
        t: 'table', a: { class: 'proto-table' }, c: [
          { t: 'thead', c: { t: 'tr', c: headers.map(function(h) { return { t: 'th', c: h }; }) } },
          { t: 'tbody', c: rows.map(function(row) {
            return { t: 'tr', c: row.map(function(cell) { return { t: 'td', c: cell }; }) };
          })}
        ]
      };
    }

    function section(id, title, content) {
      return {
        t: 'div', a: { class: 'bw_site_pages_demo', id: id },
        c: [
          { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: { t: 'a', a: { href: '#' + id }, c: title } },
          { t: 'div', a: { class: 'bw_site_pages_demo_body' }, c: content }
        ]
      };
    }

    // SVG architecture diagram helpers
    var _markerId = 0;
    function svgArrowDefs(idSuffix) {
      return { t: 'defs', c: [
        { t: 'marker', a: { id: 'aR' + idSuffix, viewBox: '0 0 10 6', refX: '10', refY: '3', markerWidth: '8', markerHeight: '6', orient: 'auto' },
          c: { t: 'path', a: { d: 'M0,0 L10,3 L0,6Z', class: 'arrow-head' } } },
        { t: 'marker', a: { id: 'aL' + idSuffix, viewBox: '0 0 10 6', refX: '0', refY: '3', markerWidth: '8', markerHeight: '6', orient: 'auto' },
          c: { t: 'path', a: { d: 'M10,0 L0,3 L10,6Z', class: 'arrow-head' } } }
      ]};
    }

    function svgBox(x, y, w, h, title, lines) {
      var els = [
        { t: 'rect', a: { class: 'box-rect', x: x, y: y, width: w, height: h, rx: '6' } },
        { t: 'text', a: { class: 'box-title', x: x + w / 2, y: y - 10, 'text-anchor': 'middle' }, c: title }
      ];
      lines.forEach(function(ln, i) {
        if (ln === '') return;
        var cls = ln.charAt(0) === '*' ? 'box-line-bold' : 'box-line';
        var text = ln.charAt(0) === '*' ? ln.slice(1) : ln;
        els.push({ t: 'text', a: { class: cls, x: x + 14, y: y + 22 + i * 17 }, c: text });
      });
      return els;
    }

    function svgArrow(x1, y1, x2, y2, label, idSuffix, opts) {
      opts = opts || {};
      var dir = x2 > x1 ? 'R' : 'L';
      var midX = (x1 + x2) / 2;
      var els = [
        { t: 'line', a: { class: opts.dash ? 'arrow-dash' : 'arrow-line', x1: x1, y1: y1, x2: x2, y2: y2, 'marker-end': 'url(#a' + dir + idSuffix + ')' } }
      ];
      if (label) {
        els.push({ t: 'text', a: { class: 'arrow-label', x: midX, y: y1 - 6, 'text-anchor': 'middle' }, c: label });
      }
      return els;
    }

    // =========================================================================
    // 1. Overview
    // =========================================================================
    var secOverview = section('overview', 'Overview', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: [
        'Bitwrench can be used on the server to send and update an entire UI, using the ',
        { t: 'strong', c: 'bwserve' },
        ' (bitwrench server) protocol. You already know how to describe UI as TACO objects \u2014 bwserve lets you compose those same objects on a server and push them to a browser in real time.'
      ]},

      { t: 'p', c: [
        'The idea is simple: your application state lives on the server, and the server sends small JSON messages (',
        code('replace'), ', ', code('patch'), ', ', code('append'), ', ', code('remove'),
        ') over ',
        { t: 'a', a: { href: 'https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events' }, c: 'Server-Sent Events (SSE)' },
        '. The browser already has bitwrench loaded, so it renders each TACO update natively. When the user clicks a button, the browser posts an action back to the server. This is the same pattern as ',
        { t: 'a', a: { href: 'https://streamlit.io' }, c: 'Streamlit' },
        ' or Phoenix LiveView \u2014 but instead of HTML strings, the wire format is the same TACO objects you already use.'
      ]},

      { t: 'div', a: { class: 'arch-diagram' }, c:
        bw.raw(bw.html({ t: 'svg', a: { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 700 280' }, c: [].concat(
          svgArrowDefs('1'),
          svgBox(15, 32, 230, 228, 'Browser', [
            '*bitwrench.js', '',
            'bwclient.js', '(opens SSE)', '',
            'bw.apply()', 'renders UI', '',
            'user clicks', 'data-bw-action', '',
            '', '{action, data}'
          ]),
          svgBox(440, 32, 245, 228, 'Server', [
            '*your server', '(Node / Python / C)',
            "app.page('/', fn)", '',
            'client.render()', 'client.patch()',
            'client.append()', 'client.remove()',
            'app.broadcast()', '',
            'client.on(action, fn)', '', '{TACO JSON}'
          ]),
          svgArrow(245, 80, 440, 80, 'GET /', '1'),
          svgArrow(440, 140, 245, 140, 'SSE', '1', { dash: true }),
          svgArrow(245, 200, 440, 200, 'POST', '1')
        )}))
      },

      site.makeCallout('concept', 'Why is this useful?', {
        t: 'div', c: [
          { t: 'p', c: [
            'The browser already has bitwrench loaded (~40KB). The server sends tiny JSON messages (50\u2013500 bytes each) instead of full HTML pages. This makes server-driven UI practical for ',
            { t: 'strong', c: 'embedded devices' },
            ' (ESP32, Raspberry Pi), ',
            { t: 'strong', c: 'dashboards and internal tools' },
            ', and ',
            { t: 'strong', c: 'AI agents' },
            ' that need to push UI updates to a browser.'
          ]},
          { t: 'p', c: 'No frontend build step, no client-side routing, no state synchronization bugs. The server is the single source of truth.' }
        ]
      }),

      { t: 'p', c: [
        'Three ways to use it:',
        { t: 'br' },
        { t: 'strong', c: '1) Node.js library' },
        ' \u2014 ', code('import bwserve from "bitwrench/bwserve"'),
        { t: 'br' },
        { t: 'strong', c: '2) bwcli serve' },
        ' \u2014 a pipe server that lets any language (Python, shell, etc.) drive the UI',
        { t: 'br' },
        { t: 'strong', c: '3) Embedded C/Python/Rust' },
        ' \u2014 header-only macros for microcontrollers.'
      ]}
    ]);

    // =========================================================================
    // 2. Protocol Messages
    // =========================================================================
    var secMessages = section('messages', 'Protocol Messages', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: 'All messages are JSON objects sent as SSE data frames. Each has a type field that determines how the client processes it. There are 5 DOM operations, 1 notification, and 3 execution operations.' },

      protoTable(
        ['Type', 'Purpose', 'Client Action'],
        [
          [badge('replace'), 'Replace element content with a TACO tree', code('bw.DOM(target, node)')],
          [badge('patch'), 'Update text content or attributes', code('bw.patch(target, content, attr)')],
          [badge('append'), 'Add a new child element', code('target.appendChild(bw.createDOM(node))')],
          [badge('remove'), 'Remove an element from the DOM', code('bw.cleanup(el); el.remove()')],
          [badge('batch'), 'Execute multiple operations atomically', code('ops.forEach(bw.apply)')],
          [badge('message'), 'Send notification/dispatch to component', code('bw.pub() or component dispatch')],
          [badge('register'), 'Register a named function for later call', code('bw._clientFunctions[name] = fn')],
          [badge('call'), 'Invoke a registered or built-in function', code('fn.apply(null, args)')],
          [badge('exec'), 'Execute arbitrary JS (requires allowExec)', code('new Function(code)()')]
        ]
      ),

      // replace
      { t: 'h3', c: [badge('replace'), ' replace'] },
      { t: 'p', c: 'Replaces the entire content of a target element with a new TACO tree. Use for initial page render or full section updates.' },
      site.makeCodeBlock([
        '{ type: "replace", target: "#app",',
        '  node: {',
        '    t: "div", a: { class: "bw-card" }, c: [',
        '      { t: "h3", c: "Hello from bwserve" },',
        '      { t: "p", c: "Rendered by the server." }',
        '    ]',
        '  }',
        '}'
      ].join('\n')),

      // patch
      { t: 'h3', c: [badge('patch'), ' patch'] },
      { t: 'p', c: 'Updates text content or attributes of an existing element without rebuilding the tree. The most lightweight update.' },
      site.makeCodeBlock([
        '// Update text content',
        '{ type: "patch", target: "counter", content: "42" }',
        '',
        '// Update an attribute',
        '{ type: "patch", target: "status", content: "active", attr: "class" }'
      ].join('\n')),

      // append
      { t: 'h3', c: [badge('append'), ' append'] },
      { t: 'p', c: 'Adds a new child element to the target. Use for lists, chat messages, and growing content.' },
      site.makeCodeBlock([
        '{ type: "append", target: "#messages",',
        '  node: { t: "div", a: { class: "bw-alert bw-alert-info" }, c: "New message!" }',
        '}'
      ].join('\n')),

      // remove
      { t: 'h3', c: [badge('remove'), ' remove'] },
      { t: 'p', c: 'Removes an element from the DOM. Calls bw.cleanup() first to tear down lifecycle hooks.' },
      site.makeCodeBlock('{ type: "remove", target: "#todo-5" }'),

      // batch
      { t: 'h3', c: [badge('batch'), ' batch'] },
      { t: 'p', c: 'Multiple operations in a single message. Applied sequentially. Use for dashboard updates.' },
      site.makeCodeBlock([
        '{ type: "batch", ops: [',
        '    { type: "patch", target: "users", content: "342" },',
        '    { type: "patch", target: "orders", content: "28" },',
        '    { type: "patch", target: "revenue", content: "$4,200" }',
        ']}'
      ].join('\n')),

      // register
      { t: 'h3', c: [badge('register'), ' register'] },
      { t: 'p', c: 'Sends a named function to the client for later invocation. Register once, call many times.' },
      site.makeCodeBlock([
        '{ type: "register", name: "autoScroll",',
        '  body: "function(sel) { var el = document.querySelector(sel);',
        '    if (el) el.scrollTop = el.scrollHeight; }"',
        '}'
      ].join('\n')),

      // call
      { t: 'h3', c: [badge('call'), ' call'] },
      { t: 'p', c: [
        'Invokes a previously registered function or a built-in: ',
        code('scrollTo'), ', ', code('focus'), ', ', code('download'), ', ',
        code('clipboard'), ', ', code('redirect'), ', ', code('log'), '.'
      ]},
      site.makeCodeBlock([
        '{ type: "call", name: "autoScroll", args: ["#chat"] }',
        '{ type: "call", name: "focus", args: ["#search-input"] }',
        '{ type: "call", name: "download", args: ["report.csv", csvData, "text/csv"] }'
      ].join('\n')),

      // exec
      { t: 'h3', c: [badge('exec'), ' exec'] },
      { t: 'p', c: [
        'Executes arbitrary JavaScript on the client. ',
        { t: 'strong', c: 'Requires opt-in:' },
        ' ', code('allowExec: true'), ' in the connection options.'
      ]},
      site.makeCodeBlock('{ type: "exec", code: "document.title = \'Updated\'" }'),

      site.makeCallout('warning', 'Security', {
        t: 'p', c: 'Prefer call() over exec(). call() passes data as arguments (safe from injection). exec() evaluates a code string. Never interpolate user input into exec() code strings.'
      })
    ]);

    // =========================================================================
    // 3. Target Resolution & Actions
    // =========================================================================
    var secTargets = section('targets', 'Target Resolution', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: 'The target field in every message is resolved to a DOM element:' },
      protoTable(
        ['Pattern', 'Resolution', 'Example'],
        [
          [code('#selector'), 'CSS selector via querySelector', code('#app')],
          [code('.selector'), 'CSS class selector via querySelector', code('.bw-card')],
          [code('bare-string'), 'getElementById, then bw._el() fallback', code('counter')]
        ]
      ),
      site.makeCallout('tip', 'Best practice', {
        t: 'p', c: [
          'Use simple ', code('id'), ' attributes for patchable elements. The server calls ',
          code('client.patch("counter", "42")'), ' and the client resolves "counter" to ',
          code('id="counter"'), '.'
        ]
      })
    ]);

    var secActions = section('actions', 'Actions (Client to Server)', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: 'When a user clicks a button or submits a form, the client sends an action to the server via HTTP POST.' },
      site.makeCodeBlock([
        'POST /bw/return/action/:clientId',
        'Content-Type: application/json',
        '',
        '{ "action": "increment", "data": { "inputValue": "hello" } }'
      ].join('\n')),

      { t: 'h3', c: 'data-bw-action shorthand' },
      { t: 'p', c: [
        'Add ', code('data-bw-action="name"'), ' to any clickable element. The shell page auto-delegates clicks:'
      ]},
      site.makeCodeBlock([
        '// Server sends this TACO:',
        '{ t: "button",',
        '  a: { class: "bw-btn bw-btn-primary", "data-bw-action": "save" },',
        '  c: "Save" }',
        '',
        '// When clicked, client posts: { action: "save", data: {} }',
        '',
        '// Server handles it:',
        'client.on("save", function(data) {',
        '  client.patch("status", "Saved!");',
        '});'
      ].join('\n')),

      { t: 'h3', c: 'Input value collection' },
      { t: 'p', c: 'If a text input is near the clicked button, its value is automatically included as inputValue and the input is cleared.' },
      site.makeCodeBlock([
        '// Button + input in same container:',
        '{ t: "div", c: [',
        '  { t: "input", a: { type: "text", placeholder: "Type here..." } },',
        '  { t: "button", a: { "data-bw-action": "send" }, c: "Send" }',
        ']}',
        '// Client sends: { action: "send", data: { inputValue: "typed text" } }'
      ].join('\n'))
    ]);

    // =========================================================================
    // 4. Transport & Relaxed JSON
    // =========================================================================
    var secTransport = section('transport', 'Transport & Relaxed JSON', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: 'bwserve uses SSE (Server-Sent Events) by default. Each message is a JSON data frame.' },

      protoTable(
        ['Transport', 'Direction', 'Use Case', 'Auto-reconnect'],
        [
          [{ t: 'strong', c: 'SSE (default)' }, 'Server \u2192 Client', 'Most apps, dashboards, chat', 'Yes (native EventSource)'],
          ['HTTP Polling', 'Client polls server', 'ESP32, constrained devices', 'N/A'],
          ['WebSocket (planned)', 'Bidirectional', 'High-frequency, gaming', 'Manual']
        ]
      ),

      { t: 'h3', c: 'SSE Endpoints' },
      protoTable(
        ['Endpoint', 'Method', 'Purpose'],
        [
          [code('GET /'), 'GET', 'Serve page shell HTML (auto-generated)'],
          [code('GET /bw/events/:clientId'), 'GET', 'SSE event stream'],
          [code('POST /bw/return/action/:clientId'), 'POST', 'User action dispatch'],
          [code('GET /bw/lib/bitwrench.umd.js'), 'GET', 'Serve bitwrench library'],
          [code('GET /bw/lib/bitwrench.css'), 'GET', 'Serve bitwrench stylesheet']
        ]
      ),

      { t: 'h3', c: 'r-prefix Relaxed JSON' },
      { t: 'p', c: [
        'For embedded C/C++ systems, composing JSON with double-quoted strings is painful. bwserve supports ',
        { t: 'strong', c: 'r-prefix relaxed JSON' },
        ': single-quoted strings with an ', code('r'), ' prefix character. The browser\'s ',
        code('bw.parseJSONFlex()'), ' normalizes this to strict JSON before processing.'
      ]},
      site.makeCodeBlock([
        '// r-prefix relaxed JSON (sent by ESP32):',
        "r{'type':'patch','target':'temp','content':'23.5 C'}",
        '',
        '// Normalized to strict JSON by bw.parseJSONFlex():',
        '{"type":"patch","target":"temp","content":"23.5 C"}'
      ].join('\n')),

      { t: 'h3', c: 'Escaping Rule' },
      { t: 'p', c: [
        'Since single quotes delimit strings in r-prefix format, apostrophes in values must be escaped with ', code("\\'"), ':'
      ]},
      site.makeCodeBlock([
        "// C code with apostrophe in content:",
        "BW_PATCH(msg, \"room\", \"Barry\\\\'s Room\");",
        '// Produces: r{\'type\':\'patch\',\'target\':\'room\',\'content\':\'Barry\\\'s Room\'}',
        '',
        '// For dynamic user text, use BW_PATCH_SAFE (auto-escapes):',
        'char user_text[] = "it\'s 23.5 C";',
        'BW_PATCH_SAFE(msg, sizeof(msg), "status", user_text);'
      ].join('\n')),

      site.makeCallout('concept', 'Huge win for C programmers', {
        t: 'p', c: [
          'Standard JSON in C requires escaping ', { t: 'strong', c: 'every quote' },
          ': ', code('\\\"type\\\":\\\"patch\\\"'), '. Relaxed JSON only requires escaping apostrophes in values ',
          '(a rare case). The ', code('BW_PATCH_SAFE'), ' macro handles even that automatically.'
        ]
      })
    ]);

    // =========================================================================
    // 5. Server API
    // =========================================================================
    var secServerApi = section('server-api', 'Server API (Node.js)', [
      { t: 'p', a: { class: 'bw_site_pages_demo_desc' }, c: 'The Node.js bwserve library provides a zero-dependency server.' },
      site.makeCodeBlock([
        'import bwserve from "bitwrench/bwserve";',
        '',
        'var app = bwserve.create({',
        '  port: 7902,          // default port',
        '  title: "My App",     // <title> tag',
        '  theme: "ocean",      // optional theme preset',
        '  static: "./public"   // optional static file directory',
        '});',
        '',
        'app.page("/", function(client) {',
        '  client.render("#app", {',
        '    t: "div", c: [',
        '      { t: "h2", c: "Counter" },',
        '      { t: "span", a: { id: "count" }, c: "0" },',
        '      { t: "button", a: { "data-bw-action": "inc" }, c: "+1" }',
        '    ]',
        '  });',
        '',
        '  var count = 0;',
        '  client.on("inc", function() {',
        '    client.patch("count", String(++count));',
        '  });',
        '});',
        '',
        'app.listen(function() {',
        '  console.log("Running on http://localhost:" + app.port);',
        '});'
      ].join('\n')),

      { t: 'h3', c: 'BwServeClient Methods' },
      protoTable(
        ['Method', 'Message Type', 'Description'],
        [
          [code('client.render(target, taco)'), badge('replace'), 'Replace target with TACO tree'],
          [code('client.patch(id, content, attr?)'), badge('patch'), 'Update text or attribute'],
          [code('client.append(target, taco)'), badge('append'), 'Add child element'],
          [code('client.remove(target)'), badge('remove'), 'Remove element'],
          [code('client.batch(ops)'), badge('batch'), 'Multiple operations at once'],
          [code('client.message(target, action, data)'), badge('message'), 'Dispatch to component'],
          [code('client.register(name, body)'), badge('register'), 'Send named function to client'],
          [code('client.call(name, ...args)'), badge('call'), 'Invoke registered or built-in function'],
          [code('client.exec(code)'), badge('exec'), 'Execute arbitrary JS (needs allowExec)'],
          [code('client.on(action, handler)'), '\u2014', 'Register handler for client actions'],
          [code('client.close()'), '\u2014', 'Disconnect this client']
        ]
      ),
