    // =========================================================================
    // Helper: wrap a demo in a section with anchor, title, description, tabs
    // =========================================================================
    function createTabbedDemo(resultContent, codeContent) {
      var codeDisplay = bw.codeEditor
        ? bw.codeEditor({ code: codeContent, lang: 'js', readOnly: true, height: 'auto' })
        : { t: 'pre', c: { t: 'code', c: codeContent } };

      return bw.makeTabs({
        tabs: [
          { label: 'Result', active: true, content: resultContent },
          {
            label: 'Code',
            content: {
              t: 'div', a: { style: 'position: relative;' },
              c: [
                {
                  t: 'button',
                  a: {
                    class: 'copy-btn',
                    onclick: function(e) {
                      navigator.clipboard.writeText(codeContent).then(function() {
                        e.target.textContent = 'Copied!';
                        e.target.classList.add('copied');
                        setTimeout(function() {
                          e.target.textContent = 'Copy';
                          e.target.classList.remove('copied');
                        }, 2000);
                      });
                    }
                  },
                  c: 'Copy'
                },
                codeDisplay
              ]
            }
          }
        ]
      });
    }

    function demoSection(id, title, description, content) {
      return {
        t: 'div', a: { class: 'demo-section', id: id },
        c: [
          { t: 'h2', c: { t: 'a', a: { href: '#' + id }, c: title } },
          { t: 'div', a: { class: 'demo-content' }, c: [
            { t: 'p', a: { class: 'demo-description' }, c: description },
            content
          ]}
        ]
      };
    }

    // =========================================================================
    // Utility: pad number to 2 digits
    // =========================================================================
    function pad2(n) {
      return n < 10 ? '0' + n : String(n);
    }

    // =========================================================================
    // Section 1: Digital Clock Component
    // Uses o.render + bw.update() — full re-render every second
    // =========================================================================
    function makeDigitalClock() {
      var clockId = bw.uuid('clock');

      var taco = {
        t: 'div', a: { id: clockId },
        o: {
          state: {
            timerId: null
          },
          render: function(el) {
            var now = new Date();
            var hours24 = now.getHours();
            var hours12 = hours24 % 12 || 12;
            var minutes = pad2(now.getMinutes());
            var seconds = pad2(now.getSeconds());
            var ampm = hours24 < 12 ? 'AM' : 'PM';

            var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            var months = ['January', 'February', 'March', 'April', 'May', 'June',
              'July', 'August', 'September', 'October', 'November', 'December'];
            var dateStr = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' +
              now.getDate() + ', ' + now.getFullYear();

            bw.DOM(el, {
              t: 'div', c: [
                {
                  t: 'div', a: { class: 'clock-display' },
                  c: [
                    pad2(hours12),
                    { t: 'span', a: { class: 'clock-separator' }, c: ':' },
                    minutes,
                    { t: 'span', a: { class: 'clock-separator' }, c: ':' },
                    seconds,
                    { t: 'span', a: { class: 'clock-ampm' }, c: ampm }
                  ]
                },
                { t: 'div', a: { class: 'clock-date' }, c: dateStr }
              ]
            });
          },
          mounted: function(el) {
            // Render immediately on mount
            el._bw_render(el);
            // Set up 1-second interval and store the timer ID
            el._bw_state.timerId = setInterval(function() {
              // Always publish the tick (alarm component subscribes to it)
              var now = new Date();
              bw.pub('clock:tick', {
                hours: now.getHours(),
                minutes: now.getMinutes(),
                seconds: now.getSeconds()
              });
              // Only re-render when visible (skip DOM work when tab pane is hidden)
              if (el.offsetParent !== null) {
                bw.update(el);
              }
            }, 1000);
          },
          unmount: function(el) {
            // Clean up interval on removal
            if (el._bw_state.timerId) {
              clearInterval(el._bw_state.timerId);
            }
          }
        }
      };

      return taco;
    }

    // =========================================================================
    // Section 2: Stopwatch Component
    // Uses bw.patch() for millisecond display (targeted updates)
    // Uses bw.update() for structural changes (lap list)
    // =========================================================================
    function makeStopwatch() {
      var swId = bw.uuid('sw');
      var displayId = bw.uuid('sw-display');
      var lapsContainerId = bw.uuid('sw-laps');

      var taco = {
        t: 'div', a: { id: swId },
        o: {
          state: {
            running: false,
            elapsed: 0,      // ms elapsed
            startTime: 0,    // timestamp when started
            laps: [],
            timerId: null
          },
          render: function(el) {
            var s = el._bw_state;

            // Format elapsed time
            var totalMs = s.elapsed;
            var mins = Math.floor(totalMs / 60000);
            var secs = Math.floor((totalMs % 60000) / 1000);
            var ms = Math.floor((totalMs % 1000) / 10);
            var timeStr = pad2(mins) + ':' + pad2(secs);
            var msStr = '.' + pad2(ms);

            // Build lap items (most recent first)
            var lapItems = s.laps.slice().reverse().map(function(lap, idx) {
              var lapNum = s.laps.length - idx;
              var lapMins = Math.floor(lap.elapsed / 60000);
              var lapSecs = Math.floor((lap.elapsed % 60000) / 1000);
              var lapMs = Math.floor((lap.elapsed % 1000) / 10);
              var lapTimeStr = pad2(lapMins) + ':' + pad2(lapSecs) + '.' + pad2(lapMs);

              var deltaStr = '';
              if (lap.delta !== undefined) {
                var dMins = Math.floor(lap.delta / 60000);
                var dSecs = Math.floor((lap.delta % 60000) / 1000);
                var dMs = Math.floor((lap.delta % 1000) / 10);
                deltaStr = '+' + pad2(dMins) + ':' + pad2(dSecs) + '.' + pad2(dMs);
              }

              return {
                t: 'div', a: { class: 'lap-item' },
                c: [
                  { t: 'span', a: { class: 'lap-number' }, c: 'Lap ' + lapNum },
                  { t: 'span', a: { class: 'lap-time' }, c: lapTimeStr },
                  { t: 'span', a: { class: 'lap-delta' }, c: deltaStr }
                ]
              };
            });

            bw.DOM(el, {
              t: 'div', c: [
                // Stopwatch display
                {
                  t: 'div', a: { id: displayId, class: 'stopwatch-display' },
                  c: [
                    timeStr,
                    { t: 'span', a: { class: 'stopwatch-ms' }, c: msStr }
                  ]
                },

                // Button controls
                {
                  t: 'div',
                  a: { style: 'display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap;' },
                  c: [
                    !s.running
                      ? bw.makeButton({
                          text: s.elapsed > 0 ? 'Resume' : 'Start',
                          variant: 'primary',
                          onclick: function() {
                            s.running = true;
                            s.startTime = Date.now() - s.elapsed;
                            s.timerId = setInterval(function() {
                              s.elapsed = Date.now() - s.startTime;
                              // Use bw.patch for targeted millisecond updates
                              var tMs = s.elapsed;
                              var tMins = Math.floor(tMs / 60000);
                              var tSecs = Math.floor((tMs % 60000) / 1000);
                              var tMsVal = Math.floor((tMs % 1000) / 10);
                              bw.patch(displayId, [
                                pad2(tMins) + ':' + pad2(tSecs),
                                { t: 'span', a: { class: 'stopwatch-ms' }, c: '.' + pad2(tMsVal) }
                              ]);
                            }, 33); // ~30fps
                            bw.update(el); // re-render to swap button state
                          }
                        })
                      : bw.makeButton({
                          text: 'Stop',
                          variant: 'danger',
                          onclick: function() {
                            s.running = false;
                            if (s.timerId) {
                              clearInterval(s.timerId);
                              s.timerId = null;
                            }
                            s.elapsed = Date.now() - s.startTime;
                            bw.update(el);
                          }
                        }),
                    bw.makeButton({
                      text: 'Lap',
                      variant: 'success',
                      disabled: !s.running,
                      onclick: function() {
                        var previousTotal = s.laps.length > 0
                          ? s.laps[s.laps.length - 1].elapsed
                          : 0;
                        s.laps.push({
                          elapsed: s.elapsed,
                          delta: s.elapsed - previousTotal
                        });
                        bw.update(el);
                      }
                    }),
                    bw.makeButton({
                      text: 'Reset',
                      variant: 'secondary',
                      onclick: function() {
                        if (s.timerId) {
                          clearInterval(s.timerId);
                          s.timerId = null;
                        }
                        s.running = false;
                        s.elapsed = 0;
                        s.startTime = 0;
                        s.laps = [];
                        bw.update(el);
                      }
                    })
                  ]
                },

                // Lap times list
                s.laps.length > 0
                  ? {
                      t: 'div', c: [
                        { t: 'div', a: { style: 'font-size: 0.8125rem; font-weight: 600; color: var(--bw_text_secondary); margin-bottom: 0.5rem;' },
                          c: 'Laps (' + s.laps.length + ')' },
                        {
                          t: 'div', a: { id: lapsContainerId, class: 'lap-list-container' },
                          c: lapItems
                        }
                      ]
                    }
                  : {
                      t: 'div',
                      a: { style: 'text-align: center; color: var(--bw_text_secondary); font-size: 0.875rem; padding: 1rem; font-style: italic;' },
                      c: 'Press Lap while running to record split times'
                    }
              ]
            });
          },
          unmount: function(el) {
            if (el._bw_state.timerId) {
              clearInterval(el._bw_state.timerId);
            }
          }
        }
      };

      return taco;
    }

    // =========================================================================
    // Section 3: Alarm Component
    // Uses bw.pub/sub to decouple alarm checking from clock display
    // =========================================================================
    function makeAlarm() {
      var alarmId = bw.uuid('alarm');
      var statusId = bw.uuid('alarm-status');
      var toastContainerId = bw.uuid('alarm-toast');
      var unsubFn = null;

      var taco = {
        t: 'div', a: { id: alarmId },
        o: {
          state: {
            alarmSet: false,
            alarmHour: 8,
            alarmMinute: 0,
            alarmPeriod: 'AM',
            ringing: false,
            ringingTimerId: null
          },
          render: function(el) {
            var s = el._bw_state;

            // Build hour options (1-12)
            var hourOptions = [];
            for (var h = 1; h <= 12; h++) {
              hourOptions.push({ value: String(h), text: pad2(h) });
            }

            // Build minute options (0-59 in steps of 1)
            var minuteOptions = [];
            for (var m = 0; m < 60; m++) {
              minuteOptions.push({ value: String(m), text: pad2(m) });
            }

            // Period options
            var periodOptions = [
              { value: 'AM', text: 'AM' },
              { value: 'PM', text: 'PM' }
            ];

            // Status display
            var statusContent;
            if (s.ringing) {
              statusContent = {
                t: 'div', a: { class: 'alarm-status alarm-active alarm-ringing' },
                c: [
                  { t: 'div', a: { style: 'font-size: 1.5rem; margin-bottom: 0.5rem;' }, c: 'ALARM!' },
                  { t: 'div', a: { style: 'font-size: 0.875rem; margin-bottom: 0.75rem;' },
                    c: 'Alarm ringing for ' + pad2(s.alarmHour) + ':' + pad2(s.alarmMinute) + ' ' + s.alarmPeriod },
                  bw.makeButton({
                    text: 'Dismiss',
                    variant: 'warning',
                    onclick: function() {
                      s.ringing = false;
                      s.alarmSet = false;
                      if (s.ringingTimerId) {
                        clearTimeout(s.ringingTimerId);
                        s.ringingTimerId = null;
                      }
                      bw.update(el);
                    }
                  })
                ]
              };
            } else if (s.alarmSet) {
              statusContent = {
                t: 'div', a: { class: 'alarm-status alarm-active' },
                c: [
                  { t: 'div', a: { style: 'font-weight: 600; margin-bottom: 0.25rem;' },
                    c: 'Alarm set for ' + pad2(s.alarmHour) + ':' + pad2(s.alarmMinute) + ' ' + s.alarmPeriod },
                  { t: 'div', a: { style: 'font-size: 0.8125rem; color: #bf360c;' },
                    c: 'Listening via bw.sub("clock:tick") for the matching time...' }
                ]
              };
            } else {
              statusContent = {
                t: 'div', a: { class: 'alarm-status alarm-inactive' },
                c: 'No alarm set. Choose a time and press Set Alarm.'
              };
            }

            bw.DOM(el, {
              t: 'div', c: [
                // Time picker row
                {
                  t: 'div', a: { class: 'alarm-time-input' },
                  c: [
                    bw.makeSelect({
                      id: alarmId + '-hour',
                      options: hourOptions,
                      value: String(s.alarmHour),
                      onchange: function(e) {
                        s.alarmHour = parseInt(e.target.value, 10);
                      }
                    }),
                    { t: 'span', a: { class: 'alarm-colon' }, c: ':' },
                    bw.makeSelect({
                      id: alarmId + '-min',
                      options: minuteOptions,
                      value: String(s.alarmMinute),
                      onchange: function(e) {
                        s.alarmMinute = parseInt(e.target.value, 10);
                      }
                    }),
                    bw.makeSelect({
                      id: alarmId + '-period',
                      options: periodOptions,
                      value: s.alarmPeriod,
                      onchange: function(e) {
                        s.alarmPeriod = e.target.value;
                      }
                    })
                  ]
                },

                // Buttons
                {
                  t: 'div',
                  a: { style: 'display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;' },
                  c: [
                    bw.makeButton({
                      text: 'Set Alarm',
                      variant: 'primary',
                      disabled: s.alarmSet || s.ringing,
                      onclick: function() {
                        s.alarmSet = true;
                        s.ringing = false;
                        bw.update(el);
                      }
                    }),
                    bw.makeButton({
                      text: 'Cancel',
                      variant: 'secondary',
                      disabled: !s.alarmSet && !s.ringing,
                      onclick: function() {
                        s.alarmSet = false;
                        s.ringing = false;
                        if (s.ringingTimerId) {
                          clearTimeout(s.ringingTimerId);
                          s.ringingTimerId = null;
                        }
                        bw.update(el);
                      }
                    })
                  ]
                },

                // Alarm status
                statusContent,

                // Toast container for alarm notifications
                { t: 'div', a: { id: toastContainerId, class: 'toast-container' } }
              ]
            });
          },
          mounted: function(el) {
            // Subscribe to clock ticks to check alarm
            unsubFn = bw.sub('clock:tick', function(detail) {
              var s = el._bw_state;
              if (!s.alarmSet || s.ringing) return;

              // Convert alarm time to 24h for comparison
              var alarmH24 = s.alarmHour;
              if (s.alarmPeriod === 'AM') {
                if (alarmH24 === 12) alarmH24 = 0;
              } else {
                if (alarmH24 !== 12) alarmH24 += 12;
              }

              if (detail.hours === alarmH24 && detail.minutes === s.alarmMinute && detail.seconds === 0) {
                // Alarm triggered! Publish notification event
                s.ringing = true;
                bw.pub('alarm:trigger', {
                  hour: s.alarmHour,
                  minute: s.alarmMinute,
                  period: s.alarmPeriod
                });
                bw.update(el);

                // Auto-dismiss after 30 seconds
                s.ringingTimerId = setTimeout(function() {
                  if (s.ringing) {
                    s.ringing = false;
                    s.alarmSet = false;
                    bw.update(el);
                  }
                }, 30000);
              }
            }, el); // tie subscription to element lifecycle
          },
          unmount: function(el) {
            if (unsubFn) unsubFn();
            if (el._bw_state.ringingTimerId) {
              clearTimeout(el._bw_state.ringingTimerId);
            }
          }
        }
      };

      return taco;
    }

    // =========================================================================
    // Alarm toast listener (via pub/sub, decoupled from alarm component)
    // =========================================================================
    var alarmToastContainerId = bw.uuid('global-alarm-toast');

    bw.sub('alarm:trigger', function(detail) {
      var timeStr = pad2(detail.hour) + ':' + pad2(detail.minute) + ' ' + detail.period;
      var container = bw.$('#' + alarmToastContainerId)[0];
      if (container) {
        bw.DOM(container, bw.makeToast({
          title: 'Alarm',
          content: 'Alarm triggered at ' + timeStr + '!',
          variant: 'warning',
          delay: 8000
        }), { append: true });
      }
    });

    // =========================================================================
    // Section 5: Combined Widget — composition pattern
    // Composes clock, stopwatch, and timer into one unified UI
    // =========================================================================
    function makeCombinedWidget() {
      var widgetId = bw.uuid('combo');
      var panelId = bw.uuid('combo-panel');

      var taco = {
        t: 'div', a: { id: widgetId },
        o: {
          state: {
            mode: 'clock',     // 'clock' | 'stopwatch' | 'timer'
            // clock
            clockTimerId: null,
            // stopwatch
            swRunning: false,
            swElapsed: 0,
            swStartTime: 0,
            swTimerId: null,
            // timer
            tmSetMinutes: 5,
            tmSetSeconds: 0,
            tmTotalMs: 0,      // total duration in ms
            tmRemaining: 0,    // remaining ms
            tmRunning: false,
            tmTimerId: null,
            tmFinished: false
          },
          render: function(el) {
            var s = el._bw_state;

            // --- Tab buttons ---
            function tabBtn(label, mode) {
              var cls = 'combo-tab';
              if (s.mode === mode) cls += ' active-' + mode;
              return {
                t: 'button', a: { class: cls, onclick: function() {
                  s.mode = mode;
                  bw.update(el);
                }},
                c: label
              };
            }

            // --- Clock panel ---
            function clockPanel() {
              var now = new Date();
              var h = now.getHours() % 12 || 12;
              var ampm = now.getHours() < 12 ? 'AM' : 'PM';
              var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
              var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              var dateStr = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

              return {
                t: 'div', a: { class: 'combo-panel' },
                c: [
                  { t: 'div', a: { class: 'combo-time combo-time-clock' }, c: [
                    pad2(h),
                    { t: 'span', a: { class: 'combo-separator' }, c: ':' },
                    pad2(now.getMinutes()),
                    { t: 'span', a: { class: 'combo-separator' }, c: ':' },
                    pad2(now.getSeconds()),
                    { t: 'span', a: { class: 'combo-ampm' }, c: ampm }
                  ]},
                  { t: 'div', a: { class: 'combo-sub' }, c: dateStr }
                ]
              };
            }

            // --- Stopwatch panel ---
            function stopwatchPanel() {
              var ms = s.swElapsed;
              var mins = Math.floor(ms / 60000);
              var secs = Math.floor((ms % 60000) / 1000);
              var centis = Math.floor((ms % 1000) / 10);

              return {
                t: 'div', a: { class: 'combo-panel' },
                c: [
                  { t: 'div', a: { id: panelId, class: 'combo-time combo-time-stopwatch' }, c: [
                    pad2(mins), ':', pad2(secs),
                    { t: 'span', a: { class: 'combo-ms' }, c: '.' + pad2(centis) }
                  ]},
                  { t: 'div', a: { class: 'combo-sub' }, c: s.swRunning ? 'Running' : (s.swElapsed > 0 ? 'Paused' : 'Ready') },
                  { t: 'div', a: { class: 'combo-btns' }, c: [
                    !s.swRunning
                      ? {
                          t: 'button',
                          a: { class: 'combo-btn combo-btn-green', onclick: function() {
                            s.swRunning = true;
                            s.swStartTime = Date.now() - s.swElapsed;
                            s.swTimerId = setInterval(function() {
                              s.swElapsed = Date.now() - s.swStartTime;
                              var tMs = s.swElapsed;
                              var tMins = Math.floor(tMs / 60000);
                              var tSecs = Math.floor((tMs % 60000) / 1000);
                              var tC = Math.floor((tMs % 1000) / 10);
                              bw.patch(panelId, [
                                pad2(tMins), ':', pad2(tSecs),
                                { t: 'span', a: { class: 'combo-ms' }, c: '.' + pad2(tC) }
                              ]);
                            }, 33);
                            bw.update(el);
                          }},
                          c: s.swElapsed > 0 ? 'Resume' : 'Start'
                        }
                      : {
                          t: 'button',
                          a: { class: 'combo-btn combo-btn-danger', onclick: function() {
                            s.swRunning = false;
                            if (s.swTimerId) { clearInterval(s.swTimerId); s.swTimerId = null; }
                            s.swElapsed = Date.now() - s.swStartTime;
                            bw.update(el);
                          }},
                          c: 'Stop'
                        },
                    {
                      t: 'button',
                      a: { class: 'combo-btn combo-btn-muted', disabled: s.swRunning || s.swElapsed === 0,
                        onclick: function() {
                          if (s.swTimerId) { clearInterval(s.swTimerId); s.swTimerId = null; }
                          s.swRunning = false;
                          s.swElapsed = 0;
                          s.swStartTime = 0;
                          bw.update(el);
                        }
                      },
                      c: 'Reset'
                    }
                  ]}
                ]
              };
            }

            // --- Timer panel ---
            function timerPanel() {
              // If timer not started, show setter
              if (!s.tmRunning && !s.tmFinished && s.tmRemaining === 0) {
                var minOpts = [];
                for (var i = 0; i <= 59; i++) minOpts.push({ t: 'option', a: { value: String(i), selected: i === s.tmSetMinutes ? '' : undefined }, c: pad2(i) });
                var secOpts = [];
                for (var j = 0; j <= 59; j++) secOpts.push({ t: 'option', a: { value: String(j), selected: j === s.tmSetSeconds ? '' : undefined }, c: pad2(j) });

                return {
                  t: 'div', a: { class: 'combo-panel' },
                  c: [
                    { t: 'div', a: { class: 'combo-time combo-time-timer' }, c: [
                      pad2(s.tmSetMinutes), ':', pad2(s.tmSetSeconds)
                    ]},
                    { t: 'div', a: { class: 'timer-set-row' }, c: [
                      { t: 'select', a: { onchange: function(e) { s.tmSetMinutes = parseInt(e.target.value, 10); bw.update(el); } }, c: minOpts },
                      { t: 'span', a: { class: 'timer-colon' }, c: ':' },
                      { t: 'select', a: { onchange: function(e) { s.tmSetSeconds = parseInt(e.target.value, 10); bw.update(el); } }, c: secOpts }
                    ]},
                    { t: 'div', a: { class: 'combo-sub' }, c: 'Set duration and press Start' },
                    { t: 'div', a: { class: 'combo-btns' }, c: [
                      {
                        t: 'button',
                        a: { class: 'combo-btn combo-btn-orange',
                          disabled: s.tmSetMinutes === 0 && s.tmSetSeconds === 0,
                          onclick: function() {
                            s.tmTotalMs = (s.tmSetMinutes * 60 + s.tmSetSeconds) * 1000;
                            s.tmRemaining = s.tmTotalMs;
                            s.tmRunning = true;
                            s.tmFinished = false;
                            var startTs = Date.now();
                            s.tmTimerId = setInterval(function() {
                              var elapsed = Date.now() - startTs;
                              s.tmRemaining = Math.max(0, s.tmTotalMs - elapsed);
                              if (s.tmRemaining <= 0) {
                                clearInterval(s.tmTimerId);
                                s.tmTimerId = null;
                                s.tmRunning = false;
                                s.tmFinished = true;
                                bw.pub('timer:finished', { minutes: s.tmSetMinutes, seconds: s.tmSetSeconds });
                              }
                              bw.update(el);
                            }, 250);
                            bw.update(el);
                          }
                        },
                        c: 'Start'
                      }
                    ]}
                  ]
                };
              }

              // Timer running or finished
              var rem = s.tmRemaining;
              var rMins = Math.floor(rem / 60000);
              var rSecs = Math.floor((rem % 60000) / 1000);
              var pct = s.tmTotalMs > 0 ? ((s.tmTotalMs - rem) / s.tmTotalMs * 100) : 0;

              return {
                t: 'div', a: { class: 'combo-panel' },
                c: [
                  { t: 'div', a: { class: 'combo-time combo-time-timer' }, c: [
                    pad2(rMins), ':', pad2(rSecs)
                  ]},
                  { t: 'div', a: { class: 'combo-sub' }, c: s.tmFinished ? 'Time\u2019s up!' : 'Counting down\u2026' },
                  { t: 'div', a: { class: 'combo-progress' }, c: [
                    { t: 'div', a: { class: 'combo-progress-bar', style: 'width:' + pct.toFixed(1) + '%;' + (s.tmFinished ? 'background:#ff5252;' : '') } }
                  ]},
                  { t: 'div', a: { class: 'combo-btns' }, c: [
                    s.tmRunning
                      ? {
                          t: 'button',
                          a: { class: 'combo-btn combo-btn-danger', onclick: function() {
                            s.tmRunning = false;
                            if (s.tmTimerId) { clearInterval(s.tmTimerId); s.tmTimerId = null; }
                            bw.update(el);
                          }},
                          c: 'Pause'
                        }
                      : (!s.tmFinished
                          ? {
                              t: 'button',
                              a: { class: 'combo-btn combo-btn-orange', onclick: function() {
                                s.tmRunning = true;
                                var startTs = Date.now();
                                var resumeFrom = s.tmRemaining;
                                s.tmTimerId = setInterval(function() {
                                  var elapsed = Date.now() - startTs;
                                  s.tmRemaining = Math.max(0, resumeFrom - elapsed);
                                  if (s.tmRemaining <= 0) {
                                    clearInterval(s.tmTimerId);
                                    s.tmTimerId = null;
                                    s.tmRunning = false;
                                    s.tmFinished = true;
                                    bw.pub('timer:finished', { minutes: s.tmSetMinutes, seconds: s.tmSetSeconds });
                                  }
                                  bw.update(el);
                                }, 250);
                                bw.update(el);
                              }},
                              c: 'Resume'
                            }
                          : ''
                        ),
                    {
                      t: 'button',
                      a: { class: 'combo-btn combo-btn-muted', onclick: function() {
                        if (s.tmTimerId) { clearInterval(s.tmTimerId); s.tmTimerId = null; }
                        s.tmRunning = false;
                        s.tmFinished = false;
                        s.tmRemaining = 0;
                        s.tmTotalMs = 0;
                        bw.update(el);
                      }},
                      c: 'Reset'
                    }
                  ]}
                ]
              };
            }

            // --- Render the active panel ---
            var panel;
            if (s.mode === 'clock') panel = clockPanel();
            else if (s.mode === 'stopwatch') panel = stopwatchPanel();
            else panel = timerPanel();

            bw.DOM(el, {
              t: 'div', a: { class: 'combo-widget' },
              c: [
                { t: 'div', a: { class: 'combo-tabs' }, c: [
                  tabBtn('\u23f0 Clock', 'clock'),
                  tabBtn('\u23f1 Stopwatch', 'stopwatch'),
                  tabBtn('\u23f3 Timer', 'timer')
                ]},
                panel
              ]
            });
          },
          mounted: function(el) {
            // Start a 1-second tick for the clock face
            el._bw_render(el);
            el._bw_state.clockTimerId = setInterval(function() {
              if (el._bw_state.mode === 'clock') {
                bw.update(el);
              }
            }, 1000);
          },
          unmount: function(el) {
            var s = el._bw_state;
            if (s.clockTimerId) clearInterval(s.clockTimerId);
            if (s.swTimerId) clearInterval(s.swTimerId);
            if (s.tmTimerId) clearInterval(s.tmTimerId);
          }
        }
      };

      return taco;
    }

    var comboCodeStr = [
      '// Combined Widget: composition pattern',
      '// One component manages clock, stopwatch, and timer',

      '',
      'function makeCombinedWidget() {',
      '  var widgetId = bw.uuid("combo");',
