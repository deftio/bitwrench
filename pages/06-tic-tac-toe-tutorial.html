      '.score-total .score-value': { 'color': 'var(--bw_text_primary, #1a1a1a)' },
      '.step-table': {

      },
      '.step-table th': {

      },

      '.congrats p': { 'color': 'var(--bw_text_secondary, #555)', 'margin': '0.5rem 0' },
      '.complete-tabs': { 'display': 'flex', 'gap': '0', 'border-bottom': '2px solid #e0e0e0', 'margin-bottom': '0' },
      '.complete-tab': { 'padding': '0.5rem 1.25rem', 'border': 'none', 'background': 'none', 'font-size': '0.9rem', 'font-weight': '600', 'cursor': 'pointer', 'color': '#666', 'border-bottom': '2px solid transparent', 'margin-bottom': '-2px', 'font-family': 'inherit' },
      '.complete-tab.active': { 'color': '#006666', 'border-bottom-color': '#006666' },
      '.complete-tab:hover:not(.active)': { 'color': '#333' },
      '.complete-tab-panel': { 'display': 'none' },
      '.complete-tab-panel.active': { 'display': 'block' },
      '.complete-run-bar': { 'display': 'flex', 'gap': '0.75rem', 'align-items': 'center', 'padding': '0.75rem 0' },
      '.complete-run-btn': { 'padding': '0.4rem 1.25rem', 'background': '#006666', 'color': 'white', 'border': 'none', 'border-radius': '6px', 'font-size': '0.85rem', 'font-weight': '600', 'cursor': 'pointer', 'font-family': 'inherit' },
      '.complete-run-btn:hover': { 'background': '#004d4d' },
      '.complete-iframe': { 'width': '100%', 'min-height': '800px', 'border': '1px solid #e0e0e0', 'border-radius': '6px', 'background': 'white' },
      '@media (max-width: 640px)': {
        '.page-header h1': { 'font-size': '1.5rem' },
        '.bw_step_body': { 'padding': '1rem' },
        '.game-board': { 'grid-template-columns': 'repeat(3, 70px)' },
        '.square': { 'width': '70px', 'height': '70px', 'font-size': '1.5rem' },
        '.game-layout': { 'flex-direction': 'column', 'align-items': 'center' },
        '.game-sidebar': { 'max-width': '100%', 'min-width': 'auto', 'width': '100%' },
        '.demo-tab-panel': { 'padding': '1rem' },
        '.scoreboard': { 'gap': '0.75rem', 'padding': '0.5rem 0.75rem' },
        '.score-value': { 'font-size': '1.25rem' }
      }
    }));

    // ---- Utility: create a tabbed Result/Code/Styles demo ----
    // tabs = array of { label, content, isCode }
    function stepTabs(containerId, resultTaco, codeStr, stylesStr) {
      var id = containerId.replace('#','');

      // Build tab definitions
      var tabs = [
        { label: 'Result', content: resultTaco, isCode: false },
        { label: 'Code', content: codeStr, isCode: true }
      ];
      if (stylesStr) {
        tabs.push({ label: 'Styles', content: stylesStr, isCode: true });
      }

      var tabIds = tabs.map(function(_, i) { return id + '-tab-' + i; });

      function makeCopyBtn(text) {
        return {
          t: 'button',
          a: {
            class: 'copy-btn',
            onclick: function(e) {
              navigator.clipboard.writeText(text).then(function() {
                e.target.textContent = 'Copied!';
                e.target.classList.add('copied');
                setTimeout(function() {
                  e.target.textContent = 'Copy';
                  e.target.classList.remove('copied');
                }, 1500);
              });
            }
          },
          c: 'Copy'
        };
      }

      return {
        t: 'div', a: { class: 'demo-tabs' },
        c: [
          {
            t: 'div', a: { class: 'demo-tab-bar' },
            c: tabs.map(function(tab, i) {
              return {
                t: 'button',
                a: {
                  class: 'demo-tab-btn' + (i === 0 ? ' active' : ''),
                  onclick: function(e) { switchTab(e, tabIds[i]); }
                },
                c: tab.label
              };
            })
          }
        ].concat(tabs.map(function(tab, i) {
          if (tab.isCode) {
            var lang = tab.label === 'Styles' ? 'css' : 'js';
            var lines = tab.content.split('\n').length;
            var h = Math.max(180, Math.min(lines * 19, 600)) + 'px';
            var editorTaco = typeof bw.codeEditor === 'function'
              ? bw.codeEditor({ code: tab.content, lang: lang, readOnly: true, height: h })
              : { t: 'pre', c: { t: 'code', c: tab.content } };
            return {
              t: 'div', a: { id: tabIds[i], class: 'demo-tab-panel code-panel' + (i === 0 ? ' active' : '') },
              c: [
                makeCopyBtn(tab.content),
                editorTaco
              ]
            };
          }
          return {
            t: 'div', a: { id: tabIds[i], class: 'demo-tab-panel' + (i === 0 ? ' active' : '') },
            c: tab.content
          };
        }))
      };
    }

    function switchTab(e, showId) {
      var container = e.target.closest('.demo-tabs');
      var btns = container.querySelectorAll('.demo-tab-btn');
      var panels = container.querySelectorAll('.demo-tab-panel');
      btns.forEach(function(b) { b.classList.remove('active'); });
      panels.forEach(function(p) { p.classList.remove('active'); });
      e.target.classList.add('active');
      var showEls = bw.$('#' + showId); if (showEls.length) showEls[0].classList.add('active');
    }

    // ---- Shared: winner detection (used by steps 3-5) ----
    function calcWinner(sq) {
      var lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      for (var i = 0; i < lines.length; i++) {
        var a = lines[i][0], b = lines[i][1], c = lines[i][2];
        if (sq[a] && sq[a] === sq[b] && sq[a] === sq[c])
          return { winner: sq[a], line: lines[i] };
      }
      return null;
    }

    // ---- Shared: render a square TACO ----
    function squareTaco(val, extraClass, disabled, onclick) {
      var cls = 'square' + (extraClass ? ' ' + extraClass : '');
      return {
        t: 'button',
        a: { class: cls, disabled: disabled, onclick: onclick },
        c: val ? { t: 'span', a: { class: val === 'X' ? 'x-mark' : 'o-mark' }, c: val } : ''
      };
    }

    // =========================================================================
    // Step 0: What You'll Learn
    // =========================================================================
    var step0 = {
      t: 'div', a: { class: 'bw_step' },
      c: [
        {
          t: 'div', a: { class: 'bw_step_header' },
          c: [
            { t: 'div', a: { class: 'bw_step_num', style: 'background: #555;' }, c: '?' },
            { t: 'h2', c: 'What You\'ll Learn' }
          ]
        },
        {
          t: 'div', a: { class: 'bw_step_body' },
          c: [
            {
              t: 'p',
              c: bw.raw(
                'In this tutorial you will build a fully working tic tac toe game from scratch using bitwrench. ' +
                'You will start with a static 3&times;3 board, add click handling and turn-based state, wire up ' +
                'win detection and draw detection, bolt on time-travel (undo any move), and finish with a ' +
                'decoupled scoreboard powered by pub/sub messaging. Each step adds exactly one concept so you ' +
                'can see how the pieces fit together.'
              )
            },
            { t: 'p', c: 'Here is what each step covers:' },
            {
              t: 'table', a: { class: 'step-table' },
              c: [
                {
                  t: 'thead',
                  c: { t: 'tr', c: [
                    { t: 'th', c: 'Step' },
                    { t: 'th', c: 'Concept' },
                    { t: 'th', c: 'API' }
                  ]}
                },
                {
                  t: 'tbody',
                  c: [
                    { t: 'tr', c: [
                      { t: 'td', c: '1' },
                      { t: 'td', c: 'UI as data' },
                      { t: 'td', c: bw.raw('<code>bw.DOM()</code>, Array.map()') }
                    ]},
                    { t: 'tr', c: [
                      { t: 'td', c: '2' },
                      { t: 'td', c: 'State management' },
                      { t: 'td', c: bw.raw('<code>o.state</code>, <code>o.render</code>, <code>bw.update()</code>') }
                    ]},
                    { t: 'tr', c: [
                      { t: 'td', c: '3' },
                      { t: 'td', c: 'Game logic' },
                      { t: 'td', c: 'Pure functions, conditional rendering' }
                    ]},
                    { t: 'tr', c: [
                      { t: 'td', c: '4' },
                      { t: 'td', c: 'Time travel' },
                      { t: 'td', c: bw.raw('Immutable state with <code>.slice()</code>') }
                    ]},
                    { t: 'tr', c: [
                      { t: 'td', c: '5' },
                      { t: 'td', c: 'Topic-based events' },
                      { t: 'td', c: bw.raw('<code>bw.pub()</code>, <code>bw.sub()</code>, <code>bw.patch()</code>') }
                    ]}
                  ]
                }
              ]
            },
            {
              t: 'div', a: { class: 'callout callout-concept', style: 'margin-top: 1.25rem;' },
              c: [
                { t: 'h4', c: 'TACO Format' },
                { t: 'p', c: bw.raw('Bitwrench describes HTML using plain JavaScript objects called <strong>TACOs</strong>:') },
                {
                  t: 'pre', a: { style: 'background: var(--bw_code_bg, #1e293b); color: var(--bw_code_text, #e2e8f0); padding: 0.75rem; border-radius: 4px; margin: 0.5rem 0 0; font-size: 0.8125rem; line-height: 1.5; overflow-x: auto;' },
                  c: { t: 'code', c: '{ t: \'div\', a: { class: \'card\' }, c: \'Hello\' }\n//  Tag       Attributes            Content' }
                }
              ]
            },
            {
              t: 'div', a: { class: 'callout callout-concept' },
              c: [
                { t: 'h4', c: 'The Render Pattern' },
                {
                  t: 'ol',
                  c: [
                    { t: 'li', c: bw.raw('<strong>o.state</strong> &mdash; declare initial state inside the TACO') },
                    { t: 'li', c: bw.raw('<strong>o.render</strong> &mdash; function that builds UI from <code>el._bw_state</code>') },
                    { t: 'li', c: bw.raw('<strong>Event handler</strong> &mdash; mutate state, then call <code>bw.update(el)</code>') },
                    { t: 'li', c: bw.raw('<strong>bw.DOM()</strong> &mdash; mount the TACO to the page') }
                  ]
                },
                { t: 'p', a: { style: 'margin-top: 0.5rem; font-size: 0.85rem; color: var(--bw_text_secondary, #555);' }, c: 'No virtual DOM, no JSX, no build step. Just JavaScript.' }
              ]
            }
          ]
        }
      ]
    };

    // =========================================================================
    // Step 1: Draw the Board
    // =========================================================================
    var step1 = (function() {
      var board = {
        t: 'div', a: { class: 'game-board' },
        c: Array(9).fill(null).map(function(_, i) {
          return squareTaco('', '', false, function() {
            alert('You clicked square ' + i);
          });
        })
      };

      var code = [
        '// Step 1: Draw the board',
        '// Each square is a TACO object. Array.map() generates all 9.',
        '',
        'var board = {',
        '  t: "div", a: { class: "game-board" },',
        '  c: Array(9).fill(null).map(function(_, i) {',
        '    return {',
        '      t: "button",',
        '      a: {',
        '        class: "square",',
        '        onclick: function() { alert("Clicked " + i); }',
        '      },',
        '      c: ""',
        '    };',
        '  })',
        '};',
        '',
        'bw.DOM("#game", board);'
      ].join('\n');

      var styles = [
        '/* Include bitwrench.css for base component styles */',
        '',
        '.game-board {',
        '  display: grid;',
        '  grid-template-columns: repeat(3, 90px);',
        '  gap: 4px;',
        '  background: #004d4d;',
        '  padding: 4px;',
        '  border-radius: 6px;',
        '  margin: 0 auto;',
        '  width: fit-content;',
        '}',
        '.square {',
        '  width: 90px;',
        '  height: 90px;',
        '  background: white;',
        '  border: none;',
        '  cursor: pointer;',
        '  font-size: 2rem;',
        '  font-weight: 700;',
        '  display: flex;',
        '  align-items: center;',
        '  justify-content: center;',
        '  border-radius: 3px;',
        '  transition: background 0.15s;',
        '}',
        '.square:hover:not(:disabled) { background: #f0f0f0; }'
      ].join('\n');

      return {
        t: 'div', a: { class: 'bw_step', id: 'step-1' },
        c: [
          {
            t: 'div', a: { class: 'bw_step_header' },
            c: [
              { t: 'div', a: { class: 'bw_step_num' }, c: '1' },
              { t: 'h2', c: 'Draw the Board' }
            ]
          },
          {
            t: 'div', a: { class: 'bw_step_body' },
            c: [
              { t: 'p', c: 'We start by creating 9 squares with Array.map(). Each square is a TACO button. Click any square to see the handler fire.' },
              {
                t: 'div', a: { class: 'callout callout-tip' },
                c: [
                  { t: 'h4', c: 'Key idea' },
                  { t: 'p', c: 'Array.map() is the workhorse of bitwrench. Map your data to TACO objects and bitwrench renders them. No templates needed.' }
                ]
              },
              stepTabs('#step1', { t: 'div', c: board }, code, styles)
            ]
          }
        ]
      };
    })();

    // =========================================================================
    // Step 2: State with o.render
    // =========================================================================
    var step2 = (function() {
      var gameTaco = {
        t: 'div',
        o: {
          state: { squares: Array(9).fill(null), xIsNext: true },
          render: function(el) {
            var s = el._bw_state;

            bw.DOM(el, {
              t: 'div',
              c: [
                { t: 'div', a: { class: 'status-bar' },
                  c: 'Next: ' + (s.xIsNext ? 'X' : 'O') },
                {
                  t: 'div', a: { class: 'game-board' },
                  c: s.squares.map(function(sq, i) {
                    return squareTaco(sq, '', sq !== null, function() {
                      if (s.squares[i]) return;
                      s.squares[i] = s.xIsNext ? 'X' : 'O';
                      s.xIsNext = !s.xIsNext;
                      bw.update(el);
                    });
                  })
                },
                {
                  t: 'button',
                  a: {
                    class: 'new-game-btn',
                    onclick: function() {
                      s.squares = Array(9).fill(null);
                      s.xIsNext = true;
                      bw.update(el);
                    }
                  },
                  c: 'Reset'
                }
              ]
            });
          }
        }
      };

      var code = [
        '// Step 2: State with o.render',
        '// State and rendering live inside the TACO.',
        '// bw.update(el) re-renders the component.',
        '',
        'bw.DOM("#game", {',
        '  t: "div",',
        '  o: {',
        '    state: { squares: Array(9).fill(null), xIsNext: true },',
        '    render: function(el) {',
        '      var s = el._bw_state;',
        '',
        '      bw.DOM(el, {',
        '        t: "div", c: [',
        '          { t: "div", a: { class: "status-bar" },',
        '            c: "Next: " + (s.xIsNext ? "X" : "O") },',
        '          { t: "div", a: { class: "game-board" },',
        '            c: s.squares.map(function(sq, i) {',
        '              return {',
        '                t: "button",',
        '                a: {',
