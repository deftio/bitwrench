<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Tables & Data</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="shared-theme.css">
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.js"></script>
  <script src="shared-tryit.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    mountExampleNav('#example-nav', '02-tables.html');

    // ---- Page CSS ----
    bw.injectCSS(bw.css({
      '.controls': {
        'margin-bottom': '0',
        display: 'flex',
        gap: '0.5rem',
        'flex-wrap': 'wrap',
        'align-items': 'center',
        padding: '0.875rem 1.25rem',
        background: 'var(--bw-card-bg)',
        'border-radius': 'var(--bw-radius) var(--bw-radius) 0 0',
        border: '1px solid var(--bw-card-border)',
        'border-bottom': 'none'
      },
      '.table-card': {
        background: 'var(--bw-card-bg)',
        border: '1px solid var(--bw-card-border)',
        'border-radius': 'var(--bw-radius)',
        'box-shadow': 'var(--bw-card-shadow)',
        overflow: 'hidden'
      },
      '.table-card .bw-table': { 'margin-bottom': '0' },
      '.table-info': {
        padding: '0.625rem 1.25rem',
        background: 'var(--bw-card-bg)',
        border: '1px solid var(--bw-card-border)',
        'border-top': 'none',
        'border-radius': '0 0 var(--bw-radius) var(--bw-radius)',
        'font-size': '0.8125rem',
        color: 'var(--bw-text-secondary)'

    }), { id: 'tables-page-styles' });

    // ---- Page structure as TACO ----
    var pageHeader = {
      t: 'div', a: { class: 'page-header' },
      c: [{
        t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
        c: [

        ]
      }]
    };

    var introSection = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Data In, Table Out' },
        {
          t: 'div', a: { class: 'demo-content' },
          c: [
            {
              t: 'p', a: { style: 'font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.5rem;' },
              c: bw.raw('Bitwrench treats tables as <em>data</em>. Hand <code>bw.makeTable()</code> a JavaScript array and it returns a complete, sortable, styled table &mdash; no <code>&lt;table&gt;&lt;tr&gt;&lt;td&gt;</code> boilerplate required. You control columns, formatting, and sorting with plain objects.')
            },

              t: 'p', a: { style: 'line-height: 1.8;' },
              c: 'The table below was generated from a single function call. Scroll down to see how it was built, step by step.'
            }
          ]
        }
      ]
    };

    var showcaseSection = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Showcase' },
        { t: 'div', a: { id: 'showcase-table', class: 'table-card' } },
        {
          t: 'p', a: { class: 'table-info', style: 'border-top: none; margin-top: 0.5rem; font-style: italic;' },
          c: 'This table was generated from a JavaScript array with one function call. Click any column header to sort.'
        }

    var styleOriginCallout = { t: 'div', a: { id: 'style-origin-callout' } };

    var buildUpSection = {
      t: 'div', a: { class: 'demo-section' },

        { t: 'h2', c: bw.raw('Building Up &mdash; From Data to Table') },
        { t: 'p', c: "Let's rebuild that showcase table from scratch, adding one feature at a time." },
        { t: 'h3', c: 'Step 1: Minimal Table' },
        { t: 'p', c: 'Pass an array of objects. Columns are auto-detected from the keys.' },
        { t: 'div', a: { id: 'step1-demo' } },
        { t: 'h3', a: { style: 'margin-top: 2rem;' }, c: 'Step 2: Custom Columns' },
        { t: 'p', c: 'Specify which fields to show, their order, and their labels.' },
        { t: 'div', a: { id: 'step2-demo' } },
        { t: 'h3', a: { style: 'margin-top: 2rem;' }, c: bw.raw('Step 3: Formatting with <code>render</code>') },
        { t: 'p', c: bw.raw('Each column can have a <code>render</code> function that transforms cell values &mdash; add badges, format numbers, or return nested TACO objects.') },
        { t: 'div', a: { id: 'step3-demo' } },
        { t: 'h3', a: { style: 'margin-top: 2rem;' }, c: 'Step 4: Controlled Sorting' },
        { t: 'p', c: bw.raw('Sorting is on by default. Use <code>onSort</code> to control state externally and re-render.') },
        { t: 'div', a: { id: 'step4-demo' } },
        { t: 'h3', a: { style: 'margin-top: 2rem;' }, c: 'Step 5: Styling' },
        { t: 'p', c: bw.raw('Add CSS classes for stripes and hover. Use <code>bw.css()</code> + <code>bw.injectCSS()</code> to customise header colours or any other rule.') },
        { t: 'div', a: { id: 'step5-demo' } }

    var pipelineSection = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'How bw.makeTable() Works' },
        { t: 'p', c: bw.raw('One function call produces a sortable, styled table. The helper returns a TACO object &mdash; you can inspect it, modify it, or compose it with other components.') },
        { t: 'div', a: { id: 'pipeline-table' } },
        {
          t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1rem;' },
          c: bw.raw('<strong>Compare:</strong> The vanilla JS equivalent would require 20+ lines of <code>createElement</code>/<code>appendChild</code> calls. Here it is one function call that returns a data object.')

      t: 'div', a: { class: 'demo-section' },

        { t: 'div', a: { id: 'from-array-tabs' } }

    var interactiveSection = {

        { t: 'h2', c: 'Interactive Sortable Table with Search' },

    bw.DOM('#app', [pageHeader, contentWrapper]);

    // ---- Dynamic content ----
    bw.DOM('#style-origin-callout', makeStyleOrigin());

    // ── Showcase data (programming languages) ──────────────────────
    const languages = [

      { name: 'Python',     year: 1991, creator: 'Guido van Rossum',  paradigm: 'Multi-paradigm', typing: 'Dynamic',  popularity: 2 },
      { name: 'Rust',       year: 2010, creator: 'Graydon Hoare',     paradigm: 'Systems',        typing: 'Static',   popularity: 6 },
      { name: 'TypeScript', year: 2012, creator: 'Anders Hejlsberg',  paradigm: 'Multi-paradigm', typing: 'Static',   popularity: 4 },
      { name: 'Go',         year: 2009, creator: 'Rob Pike et al.',   paradigm: 'Concurrent',     typing: 'Static',   popularity: 7 },
      { name: 'Java',       year: 1995, creator: 'James Gosling',     paradigm: 'OOP',            typing: 'Static',   popularity: 3 },
      { name: 'C',          year: 1972, creator: 'Dennis Ritchie',    paradigm: 'Procedural',     typing: 'Static',   popularity: 5 },
      { name: 'Swift',      year: 2014, creator: 'Chris Lattner',     paradigm: 'Multi-paradigm', typing: 'Static',   popularity: 8 }
    ];

    // ── Showcase hero table (sortable with re-render) ───────────────
    function rankBadge(v) {
      var colours = { 1: '#28a745', 2: '#218838', 3: '#17a2b8', 4: '#007bff', 5: '#6c757d', 6: '#fd7e14', 7: '#e83e8c', 8: '#6610f2' };
      return {
        t: 'span',
        a: {
          style: {
            display: 'inline-block', padding: '0.15em 0.55em', borderRadius: '0.75em',
            fontSize: '0.85em', fontWeight: '600', color: '#fff',
            background: colours[v] || '#6c757d'
          }
        },
        c: '#' + v
      };
    }

    var showcaseSortCol = null;
    var showcaseSortDir = 'asc';
    function renderShowcase() {
      bw.DOM('#showcase-table', bw.makeTable({
        data: languages,
        striped: true,
        hover: true,
        sortable: true,
        sortColumn: showcaseSortCol,
        sortDirection: showcaseSortDir,
        onSort: function(col, dir) {
          showcaseSortCol = col;
          showcaseSortDir = dir;
          renderShowcase();

        columns: [

          { key: 'year',       label: 'Year' },
          { key: 'creator',    label: 'Creator' },
          { key: 'paradigm',   label: 'Paradigm' },
          { key: 'typing',     label: 'Typing' },
          { key: 'popularity', label: 'Rank', render: rankBadge }
        ]
      }));
    }
    renderShowcase();

    // ── Step 1: Minimal table ──────────────────────────────────────
    var step1Code = `// Just pass an array — columns are auto-detected
bw.DOM(target, bw.makeTable({
  data: [
    { name: 'JavaScript', year: 1995, creator: 'Brendan Eich' },
    { name: 'Python',     year: 1991, creator: 'Guido van Rossum' },
    { name: 'Rust',       year: 2010, creator: 'Graydon Hoare' }
  ],
  striped: true,
  hover: true
}));`;
    bw.DOM('#step1-demo', bw.makeCodeDemo({
      title: 'Minimal Table',
      result: bw.makeTable({
        data: languages.slice(0, 3).map(function(r) { return { name: r.name, year: r.year, creator: r.creator }; }),
        striped: true,
        hover: true
      }),
      code: step1Code
    }));

    // ── Step 2: Custom columns ─────────────────────────────────────
    var step2Code = `// Choose which fields to show and set labels
bw.DOM(target, bw.makeTable({
  data: languages,
  striped: true,
  hover: true,
  columns: [
    { key: 'name',    label: 'Language' },
    { key: 'year',    label: 'First Released' },
    { key: 'paradigm', label: 'Paradigm' }
  ]
}));`;
    bw.DOM('#step2-demo', bw.makeCodeDemo({
      title: 'Custom Columns',
      result: bw.makeTable({
        data: languages,
        striped: true,
        hover: true,
        columns: [
          { key: 'name',     label: 'Language' },
          { key: 'year',     label: 'First Released' },
          { key: 'paradigm', label: 'Paradigm' }
        ]
      }),
      code: step2Code
    }));

    // ── Step 3: Formatting with render ─────────────────────────────
    var step3Code = `// render functions transform cell values
bw.DOM(target, bw.makeTable({
  data: languages,
  striped: true,
  hover: true,
  columns: [
    { key: 'name', label: 'Language' },
    { key: 'year', label: 'Year' },
    { key: 'typing', label: 'Typing',
      render: function(v) {
        var color = v === 'Static' ? '#007bff' : '#28a745';
        return {
          t: 'span',
          a: { style: {
            padding: '0.15em 0.5em', borderRadius: '0.5em',
            fontSize: '0.85em', color: '#fff', background: color
          }},
          c: v
        };
      }
    },
    { key: 'popularity', label: 'Rank',
      render: function(v) { return '#' + v; }
    }
  ]
}));`;
    bw.DOM('#step3-demo', bw.makeCodeDemo({
      title: 'Formatting with render',
      result: bw.makeTable({
        data: languages,
        striped: true,
        hover: true,
        columns: [
          { key: 'name', label: 'Language' },
          { key: 'year', label: 'Year' },
          { key: 'typing', label: 'Typing',
            render: function(v) {
              var color = v === 'Static' ? '#007bff' : '#28a745';
              return {
                t: 'span',
                a: { style: {
                  padding: '0.15em 0.5em', borderRadius: '0.5em',
                  fontSize: '0.85em', color: '#fff', background: color
                }},
                c: v
              };
            }
          },
          { key: 'popularity', label: 'Rank', render: function(v) { return '#' + v; } }
        ]
      }),
      code: step3Code
    }));

    // ── Step 4: Controlled sorting ─────────────────────────────────
    var step4Code = `// Sorting is on by default — click any header.
// Use onSort + sortColumn/sortDirection for
// controlled state (e.g. server-side sorting).
var sortCol = 'year';
var sortDir = 'asc';

function renderTable() {
  bw.DOM('#my-table', bw.makeTable({
    data: languages,
    sortable: true,
    sortColumn: sortCol,
    sortDirection: sortDir,
    onSort: function(col, dir) {
      sortCol = col;
      sortDir = dir;
      renderTable();
    },
    columns: [
      { key: 'name', label: 'Language' },
      { key: 'year', label: 'Year' },
      { key: 'creator', label: 'Creator' }
    ]
  }));
}
renderTable();`;

    var step4SortCol = 'year';
    var step4SortDir = 'asc';

        sortDirection: step4SortDir,
        onSort: function(col, dir) {

          { key: 'year', label: 'Year' },

      }));

    var step4Result = { t: 'div', a: { id: 'step4-live-table' }, c: '' };
    bw.DOM('#step4-demo', bw.makeCodeDemo({
      title: 'Controlled Sorting',
      result: step4Result,

    setTimeout(renderStep4, 0);

    // ── Step 5: Styling ────────────────────────────────────────────
    var step5Code = `// Use striped and hover props, plus custom header CSS.
bw.injectCSS(bw.css({
  '.custom-header thead th': {
    background: '#1a5276',
    color: '#fff',
    borderBottom: '2px solid #2980b9'
  }
}));

bw.DOM(target, bw.makeTable({
  data: languages,
  striped: true,
  hover: true,
  className: 'custom-header',
  columns: [
    { key: 'name',    label: 'Language' },
    { key: 'year',    label: 'Year' },
    { key: 'paradigm', label: 'Paradigm' },
    { key: 'typing',  label: 'Typing' }
  ]
}));`;

    bw.injectCSS(bw.css({
      '.custom-header thead th': {
        background: '#1a5276',
        color: '#fff',
        borderBottom: '2px solid #2980b9'
      }
    }));

    bw.DOM('#step5-demo', bw.makeCodeDemo({
      title: 'Styling',
      result: bw.makeTable({
        data: languages,
        striped: true,
        hover: true,
        className: 'custom-header',
        columns: [
          { key: 'name',    label: 'Language' },
          { key: 'year',    label: 'Year' },
          { key: 'paradigm', label: 'Paradigm' },
          { key: 'typing',  label: 'Typing' }

      }),
      code: step5Code

    // Pipeline demo for bw.makeTable()
    bw.DOM('#pipeline-table', showPipeline({
      label: 'Table from Data',
      helperCode: "bw.makeTable({\n  data: [\n    { name: 'Alice', role: 'Engineer' },\n    { name: 'Bob', role: 'Designer' }\n  ],\n  columns: [\n    { key: 'name', label: 'Name' },\n    { key: 'role', label: 'Role' }\n  ],\n  striped: true\n})",
      taco: bw.makeTable({
        data: [
          { name: 'Alice', role: 'Engineer' },
          { name: 'Bob', role: 'Designer' }
        ],

          { key: 'role', label: 'Role' }
        ],
        striped: true
      })
    }));

    // ── makeTableFromArray() Demo ──────────────────────────────────
    const arrayData = [
      ['City', 'Country', 'Population', 'Area (km\u00B2)', 'Founded'],
      ['Tokyo', 'Japan', '13,960,000', '2,194', '1457'],
      ['London', 'UK', '8,982,000', '1,572', '43 AD'],
      ['New York', 'USA', '8,336,000', '783', '1624'],
      ['Paris', 'France', '2,161,000', '105', '3rd c. BC'],
      ['Sydney', 'Australia', '5,312,000', '12,368', '1788'],
      ['Mumbai', 'India', '12,442,000', '603', '1507']
    ];

    const fromArrayDemo = bw.makeTableFromArray({
      data: arrayData,
      striped: true,
      hover: true,
      sortable: true
    });

    const fromArrayCode = `// Build a table directly from a 2D array
// First row is automatically used as column headers

const cityData = [
  ['City', 'Country', 'Population', 'Area (km\u00B2)', 'Founded'],
  ['Tokyo', 'Japan', '13,960,000', '2,194', '1457'],
  ['London', 'UK', '8,982,000', '1,572', '43 AD'],
  ['New York', 'USA', '8,336,000', '783', '1624'],
  ['Paris', 'France', '2,161,000', '105', '3rd c. BC'],
  ['Sydney', 'Australia', '5,312,000', '12,368', '1788'],
  ['Mumbai', 'India', '12,442,000', '603', '1507']
];

// One call - headers extracted from first row
const table = bw.makeTableFromArray({
  data: cityData,
  striped: true,
  hover: true,
  sortable: true
});

bw.DOM('#my-table', table);

// --- Without header row ---
// Set headerRow: false to auto-generate column names
const rawData = [
  [1, 'Alice', 95],
  [2, 'Bob', 87],
  [3, 'Carol', 92]
];

const table2 = bw.makeTableFromArray({
  data: rawData,
  headerRow: false,  // generates col0, col1, col2
  columns: [
    { key: 'col0', label: 'ID' },
    { key: 'col1', label: 'Name' },
    { key: 'col2', label: 'Score' }
  ]
});`;

    bw.DOM('#from-array-tabs',
      bw.makeCodeDemo({
        title: 'Table from 2D Array',
        description: 'One function call turns a 2D array into a sortable table. Perfect for CSV data, spreadsheets, or any row-based format.',
        result: fromArrayDemo,
        code: fromArrayCode
      })
    );

    // ── Interactive Table Demo ──────────────────────────────────────
    const employees = [
      { id: 1, name: 'John Smith', position: 'Software Engineer', department: 'Engineering', salary: 95000, startDate: '2021-03-15' },
      { id: 2, name: 'Sarah Johnson', position: 'Product Manager', department: 'Product', salary: 110000, startDate: '2020-07-22' },
      { id: 3, name: 'Mike Chen', position: 'UX Designer', department: 'Design', salary: 85000, startDate: '2022-01-10' },
      { id: 4, name: 'Emily Davis', position: 'Data Scientist', department: 'Engineering', salary: 105000, startDate: '2021-09-05' },
      { id: 5, name: 'Alex Rivera', position: 'Marketing Manager', department: 'Marketing', salary: 90000, startDate: '2020-11-30' },
      { id: 6, name: 'Lisa Wang', position: 'DevOps Engineer', department: 'Engineering', salary: 98000, startDate: '2021-06-18' },
      { id: 7, name: 'Tom Wilson', position: 'Sales Director', department: 'Sales', salary: 120000, startDate: '2019-03-10' },
      { id: 8, name: 'Jessica Brown', position: 'HR Manager', department: 'HR', salary: 85000, startDate: '2020-09-14' }
    ];

    function createTableComponent() {
      const state = {
        employees: [...employees],
        filteredEmployees: [...employees],
        selectedRows: new Set(),
        searchQuery: '',
        sortColumn: null,
        sortDirection: 'asc'
      };

      function isAllSelected() {
        return state.filteredEmployees.length > 0 &&
          state.filteredEmployees.every(emp => state.selectedRows.has(emp.id));
      }

      function updateView() {
        const allSelected = isAllSelected();
        const tableData = state.filteredEmployees.map(emp => ({
          _checkbox: '',
          ...emp
        }));

        const table = bw.makeTable({
          data: tableData,
          columns: [
            {
              key: '_checkbox',
              label: '☐',
              render: (value, row) => ({
                t: 'input',
                a: {
                  type: 'checkbox',
                  checked: state.selectedRows.has(row.id),
                  onclick: (e) => {
                    e.stopPropagation();
                    if (e.target.checked) {
                      state.selectedRows.add(row.id);
                    } else {
                      state.selectedRows.delete(row.id);
                    }
                    updateView();
                  }
                }
              })
            },
            { key: 'id', label: 'ID' },
            { key: 'name', label: 'Name' },
            { key: 'position', label: 'Position' },
            { key: 'department', label: 'Department' },
            {
              key: 'salary',
              label: 'Salary',
              render: (value) => `$${value.toLocaleString()}`
            },
            { key: 'startDate', label: 'Start Date' }
          ],
          striped: true,
          hover: true,
          sortable: true,
          sortColumn: state.sortColumn,
          sortDirection: state.sortDirection,
          onSort: (column, direction) => {
            state.sortColumn = column;
            state.sortDirection = direction;
            sortEmployees();
            updateView();
          }
        });

        bw.DOM('#interactive-table-container', table);
        updateTableInfo();
      }

      function filterEmployees() {
        const query = state.searchQuery.toLowerCase();
        state.filteredEmployees = query ?
          state.employees.filter(emp =>
            emp.name.toLowerCase().includes(query) ||
            emp.position.toLowerCase().includes(query) ||
            emp.department.toLowerCase().includes(query)
          ) : [...state.employees];
        if (state.sortColumn) sortEmployees();
      }

      function sortEmployees() {
        if (state.sortColumn && state.sortColumn !== 'select') {
          state.filteredEmployees.sort((a, b) => {
            const aVal = a[state.sortColumn];
            const bVal = b[state.sortColumn];
            if (typeof aVal === 'number') {
              return state.sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
            }
            const result = String(aVal).localeCompare(String(bVal));
            return state.sortDirection === 'asc' ? result : -result;
          });
        }
      }

      function updateTableInfo() {
        const avgSalary = state.filteredEmployees.length > 0 ?
          Math.round(state.filteredEmployees.reduce((sum, e) => sum + e.salary, 0) / state.filteredEmployees.length) : 0;
        const infoText = `Total: ${state.filteredEmployees.length} employees | Selected: ${state.selectedRows.size} | Average Salary: $${avgSalary.toLocaleString()}`;
        bw.DOM('#table-info', { t: 'span', c: infoText });
      }

      const tableDemo = {
        t: 'div',
        a: { class: 'table-card' },
        c: [
          {

const employees = [

function createTableComponent() {
  const state = {
    employees: [...employees],
    filteredEmployees: [...employees],
    selectedRows: new Set(),
    searchQuery: '',
    sortColumn: null,
    sortDirection: 'asc'
  };

  function updateView() {
    const tableData = state.filteredEmployees.map(emp => ({
      ...emp,
      select: state.selectedRows.has(emp.id) ? '☑' : '☐',
      salary: \`$\${emp.salary.toLocaleString()}\`
    }));

    const table = bw.makeTable({
      data: tableData,
      columns: [
        { key: 'select', label: 'Select' },
        { key: 'id', label: 'ID' },
        { key: 'name', label: 'Name' },
        { key: 'position', label: 'Position' },
        { key: 'department', label: 'Department' },
        { key: 'salary', label: 'Salary' },
        { key: 'startDate', label: 'Start Date' }
      ],
      striped: true,
      hover: true,
      sortable: true,
      sortColumn: state.sortColumn,
      sortDirection: state.sortDirection,
      onSort: (column, direction) => {
        state.sortColumn = column;
        state.sortDirection = direction;
        sortEmployees();
        updateView();
      }
    });

    bw.DOM('#interactive-table-container', table);
    updateTableInfo();
  }

  function filterEmployees() {
    const query = state.searchQuery.toLowerCase();
    state.filteredEmployees = query ?
      state.employees.filter(emp =>
        emp.name.toLowerCase().includes(query) ||
        emp.position.toLowerCase().includes(query) ||
        emp.department.toLowerCase().includes(query)
      ) : [...state.employees];
  }

  function sortEmployees() {
    if (state.sortColumn) {
      state.filteredEmployees.sort((a, b) => {
        const aVal = a[state.sortColumn];
        const bVal = b[state.sortColumn];
        if (typeof aVal === 'number') {
          return state.sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        }
        const result = String(aVal).localeCompare(String(bVal));
        return state.sortDirection === 'asc' ? result : -result;
      });
    }
  }

  function updateTableInfo() {

      Math.round(state.filteredEmployees.reduce((sum, e) => sum + e.salary, 0) / state.filteredEmployees.length) : 0;

    bw.DOM('#table-info', { t: 'span', c: infoText });
  }

    t: 'div',

            onclick: () => {

      { t: 'div', a: { id: 'table-info', class: 'table-info' } }
    ]
  };

  setTimeout(() => updateView(), 0);
  return component;
}
