      '          t: \'div\', a: { style: \'background: var(--bw_card_bg, #fff); \'\n' +

      '                bw.update(el);             // re-renders + emits event\n' +
      '              }\n' +
      '            })\n' +
      '          ]\n' +
      '        });\n' +
      '      }\n' +
      '    }\n' +
      '  };\n' +
      '\n' +
      '  // 2. Return TACO + getter/setter API\n' +
      '  return {\n' +
      '    taco: taco, id: id,\n' +
      '    getCount: function() { /* read el._bw_state */ },\n' +
      '    setCount: function(n) { /* write + bw.update(el) */ }\n' +
      '  };\n' +

    // ============================================================

    //
    //  Returns: { taco, name, id, getCount, setCount }
    // ============================================================
    function makeCounter(opts) {
      var id = bw.uuid('ctr');
      var name = opts.label;

      // Inline styles so this component is fully portable (no external CSS needed)
      var cardStyle = 'background: var(--bw_card_bg, #fff); border: 1px solid var(--bw_card_border, #dee2e6); border-radius: 8px; padding: 1rem 1.25rem; text-align: center; min-width: 160px; flex: 1 1 160px;';
      var valueStyle = 'font-size: 2rem; font-weight: 700; color: var(--bw_teal_dark, #00796b); margin: 0.5rem 0;';
      var btnsStyle = 'display: flex; gap: 0.35rem; justify-content: center; flex-wrap: wrap;';

      var taco = {
        t: 'div', a: { id: id },
        o: {
          state: { count: opts.start || 0 },
          render: function(el) {
            var s = el._bw_state;
            bw.DOM(el, {
              t: 'div', a: { style: cardStyle },
              c: [
                { t: 'h4', a: { style: 'margin: 0 0 0.5rem;' }, c: name },
                { t: 'div', a: { style: valueStyle }, c: String(s.count) },
                { t: 'div', a: { style: btnsStyle }, c: [
                  bw.makeButton({ text: '+', variant: 'primary',
                    onclick: function() { s.count++; bw.update(el); } }),
                  bw.makeButton({ text: '\u2013', variant: 'secondary',
                    onclick: function() { s.count--; bw.update(el); } }),
                  bw.makeButton({ text: 'Reset', variant: 'secondary',
                    onclick: function() { s.count = opts.start || 0; bw.update(el); } })
                ]}
              ]
            });
          }
        }
      };

      return {
        taco: taco,
        name: name,
        id: id,
        getCount: function() {
          var els = bw.$('#' + id);
          var el = els.length ? els[0] : null;
          return el && el._bw_state ? el._bw_state.count : null;
        },
        setCount: function(n) {
          var els = bw.$('#' + id);
          var el = els.length ? els[0] : null;
          if (el && el._bw_state) {
            el._bw_state.count = n;
            bw.update(el);
          }
        }
      };
    }

    var subBDestroyed = false;
    var unsubB = null;

    function renderPubsubDemo() {
      var panelA = {
        t: 'div', a: { class: 'notif-panel', id: 'notif-panel-a' },
        c: [
          { t: 'h4', c: 'Subscriber A' },
          { t: 'div', a: { class: 'notif-log', id: 'notif-log-a' },
            c: notifMsgsA.length === 0
              ? [{ t: 'div', c: '(waiting for messages)' }]
              : notifMsgsA.map(function(m) { return { t: 'div', c: m }; })
          }
        ]
      };

      var panelBContent;
      if (subBDestroyed) {
        panelBContent = [
          { t: 'h4', c: 'Subscriber B (destroyed)' },
          { t: 'div', a: { style: 'color: var(--bw_text_secondary); font-style: italic; padding: 0.5rem 0;' },
            c: 'Cleaned up via unsub() \u2014 no longer receiving messages.' }
        ];
      } else {
        panelBContent = [
          { t: 'h4', c: 'Subscriber B' },
          { t: 'div', a: { class: 'notif-log', id: 'notif-log-b' },
            c: notifMsgsB.length === 0
              ? [{ t: 'div', c: '(waiting for messages)' }]
              : notifMsgsB.map(function(m) { return { t: 'div', c: m }; })
          }
        ];
      }

      var panelB = {
        t: 'div', a: { class: 'notif-panel', id: 'notif-panel-b' },
        c: panelBContent
      };

      bw.DOM('#pubsub-demo', { t: 'div', c: [
        { t: 'div', a: { style: 'display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap;' }, c: [
          { t: 'input', a: {
            type: 'text', id: 'notif-input', placeholder: 'Type a message...',
            style: 'flex: 1; min-width: 200px; padding: 0.4rem 0.75rem; border: 1px solid var(--bw_card_border); border-radius: var(--bw_radius); font-size: 0.875rem;',
            onkeydown: function(e) {
              if (e.key === 'Enter') sendNotification();
            }
          }},
          bw.makeButton({ text: 'Send', variant: 'primary', onclick: sendNotification }),
          bw.makeButton({ text: 'Destroy B', variant: 'secondary', onclick: destroySubB })
        ]},
        { t: 'div', a: { class: 'notif-panels' }, c: [panelA, panelB] }
      ]});
    }

    function sendNotification() {
      var inputs = bw.$('#notif-input');
      var input = inputs.length ? inputs[0] : null;
      if (!input || !input.value.trim()) return;
      bw.pub('notification', { text: input.value.trim() });
      input.value = '';
      input.focus();
    }

    function destroySubB() {
      if (!subBDestroyed && unsubB) {
        unsubB();
        subBDestroyed = true;
        renderPubsubDemo();
      }
    }

    function wirePubsubSubs() {
      bw.sub('notification', function(detail) {
        notifMsgsA.push(detail.text);
        renderPubsubDemo();
      });

      unsubB = bw.sub('notification', function(detail) {
        notifMsgsB.push(detail.text);
        renderPubsubDemo();
      });
    }

    // ============================================================
    //  Stateful Todo List — o.render + bw.update()
    // ============================================================
    function makeTodoList(opts) {
      var id = bw.uuid('todo');

      var todoItem = function(item, el) {
        var s = el._bw_state;
        return {
          t: 'div', a: { class: 'todo-item' + (item.done ? ' done' : '') },
          c: [
            { t: 'input', a: {
              type: 'checkbox',
              checked: item.done ? 'checked' : undefined,
              onchange: function() { item.done = !item.done; bw.update(el); }
            }},
            { t: 'span', c: item.text },
            bw.makeButton({ text: '\u00D7', variant: 'secondary', size: 'sm',
              onclick: function() {
                s.todos = s.todos.filter(function(t) { return t.id !== item.id; });
                bw.update(el);
              }
            })
          ]
        };
      };

      function addTodo(el) {
        var s = el._bw_state;
        var input = bw.$('#' + id + ' input[type="text"]')[0];
        if (!input || !input.value.trim()) return;
        s.todos.push({ id: s.nextId++, text: input.value.trim(), done: false });
        bw.update(el);
      }

      var initial = (opts.initial || []).map(function(text, i) {
        return { id: i + 1, text: text, done: false };
      });

      return {
        t: 'div', a: { id: id },
        o: {
          state: { todos: initial, nextId: initial.length + 1 },
          render: function(el) {
            var s = el._bw_state;
            var remaining = s.todos.filter(function(t) { return !t.done; }).length;
            bw.DOM(el, { t: 'div', c: [
              { t: 'div', a: { class: 'todo-input-row' }, c: [
                { t: 'input', a: {
                  type: 'text', placeholder: opts.placeholder || 'Add item...',
                  onkeydown: function(e) { if (e.key === 'Enter') addTodo(el); }
                }},
                bw.makeButton({ text: 'Add', variant: 'primary',
                  onclick: function() { addTodo(el); } })
              ]},
              { t: 'div', c: s.todos.map(function(item) { return todoItem(item, el); }) },
              { t: 'div', a: { style: 'margin-top:0.5rem; font-size:0.8125rem; color:var(--bw_text_secondary);' },
                c: remaining + ' of ' + s.todos.length + ' remaining' }
            ]});
          }
        }
      };
    }

    bw.DOM('#todo-demo', makeTodoList({
      initial: ['Read the docs', 'Build a prototype', 'Ship it'],
      placeholder: 'What needs doing?'
    }));

    // ============================================================
    //  Dynamic Theming with bw.css() — kept as o.mounted (self-contained)
    // ============================================================
    function makeThemeSwitcher() {
      var themes = {
        ocean:  { bg: '#e0f7fa', fg: '#004d40', accent: '#00796b' },
        sunset: { bg: '#fff3e0', fg: '#bf360c', accent: '#e65100' },
        forest: { bg: '#e8f5e9', fg: '#1b5e20', accent: '#2e7d32' }
      };
      var id = bw.uuid('theme');

      function render(el) {
        var s = el._bw_state;
        var t = themes[s.current];

        bw.injectCSS(bw.css({
          ['#' + id + ' .themed']: {
            background: t.bg, color: t.fg,
            'border-color': t.accent,
            padding: '1.25rem', 'border-radius': '8px',
            border: '2px solid', transition: 'all 0.3s'
          },
          ['#' + id + ' .themed h4']: { color: t.accent, margin: '0 0 0.35rem' }
        }), { id: id + '-css' });

        bw.DOM(el, { t: 'div', c: [
          { t: 'div', a: { style: 'display:flex; gap:0.5rem; margin-bottom:0.75rem;' },
            c: Object.keys(themes).map(function(key) {
              return bw.makeButton({
                text: key.charAt(0).toUpperCase() + key.slice(1),
                variant: key === s.current ? 'primary' : 'secondary',
                onclick: function() { s.current = key; render(el); }
              });
            })
          },
          { t: 'div', a: { class: 'themed' }, c: [
            { t: 'h4', c: s.current.charAt(0).toUpperCase() + s.current.slice(1) + ' Theme' },
            { t: 'p', a: { style: 'margin:0; font-size:0.875rem;' },
              c: 'Colors generated from a JS object via bw.css().' }
          ]}
        ]});
      }

      return {
        t: 'div', a: { id: id },
        o: {
          state: { current: 'ocean' },
          mounted: function(el) { render(el); }
        }
      };
    }

    bw.DOM('#css-demo', makeThemeSwitcher());

    // ============================================================
    //  Performance Test
    // ============================================================
    (function() {
      var id = bw.uuid('perf');

      function run(el) {
        var start = performance.now();
        var items = [];
        for (var i = 0; i < 1000; i++) {
          items.push({
            t: 'span',
            a: { class: 'bw_badge bw_badge_primary', style: 'margin:2px;' },
            c: 'Item ' + (i + 1)
          });
        }
        bw.DOM('#' + id + '-items', { t: 'div', c: items });
        var ms = (performance.now() - start).toFixed(2);
        bw.DOM('#' + id + '-time', {
          t: 'div', a: { class: 'bw_alert bw_alert_success' },
          c: 'Rendered 1,000 items in ' + ms + ' ms'
        });
      }

      bw.DOM('#performance-demo', {
        t: 'div', a: { id: id },
        o: {
          mounted: function(el) {
            bw.DOM(el, {
              t: 'div', c: [
                bw.makeButton({ text: 'Render 1,000 Items', variant: 'primary',
                  onclick: function() { run(el); } }),
                { t: 'div', a: { id: id + '-time', style: 'margin-top:0.75rem;' }, c: '' },
                { t: 'div', a: { id: id + '-items', style: 'margin-top:0.75rem; max-height:200px; overflow-y:auto;' }, c: '' }
              ]
            });
          }
        }
      });
    })();

    // ============================================================
    //  Upgrade source <pre> blocks to syntax-highlighted editors
    // ============================================================
    (function() {
      if (typeof bw.codeEditor !== 'function') return;
      var pres = bw.$('.demo-section-body .bw_grid_2col pre');
      pres.forEach(function(pre) {
        var code = pre.querySelector('code');
        if (!code) return;
        var text = code.textContent;
        var lines = text.split('\n').length;
        var h = Math.max(180, Math.min(lines * 19, 700)) + 'px';
        var div = bw.createDOM({ t: 'div' });
        pre.parentNode.replaceChild(div, pre);
        bw.DOM(div, bw.codeEditor({
          code: text,
          lang: 'js',
          readOnly: true,
          height: h
        }));
      });
    })();

    // ============================================================
    //  Initialize panels that need DOM to be ready
    // ============================================================
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        renderGlobal();
        renderList();
        renderPubsubDemo();
        requestAnimationFrame(function() {
          wirePubsubSubs();
        });
      });
    });
  </script>
</body>
</html>
