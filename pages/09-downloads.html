    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      var kb = bytes / 1024;
      if (kb < 1024) return kb.toFixed(1) + ' KB';
      return (kb / 1024).toFixed(2) + ' MB';
    }

    function copyBtn(text) {
      return {
        t: 'button', a: { class: 'copy-btn-sm' }, c: 'Copy',
        o: { mounted: function(el) {
          el.addEventListener('click', function() {
            navigator.clipboard.writeText(text).then(function() {
              el.textContent = 'Copied!';
              el.classList.add('copied');
              setTimeout(function() { el.textContent = 'Copy'; el.classList.remove('copied'); }, 1500);
            });
          });
        }}
      };
    }

        c: [

          {
            t: 'div', a: { class: 'snippet-wrap' },

                      el.textContent = 'Copied!';
                      el.classList.add('copied');
                      setTimeout(function() { el.textContent = 'Copy'; el.classList.remove('copied'); }, 1500);
                    });
                  });
                }}
              },
              codeDisplay
            ]
          }
        ].filter(Boolean)
      };
    }

    function sortableTable(targetId, headers, data) {
      var state = { col: null, dir: 'asc' };

      function render() {
        var sorted = data.slice();
        if (state.col !== null) {
          sorted.sort(function(a, b) {
            var av = a.sortValues[state.col];
            var bv = b.sortValues[state.col];
            if (typeof av === 'number' && typeof bv === 'number') {
              return state.dir === 'asc' ? av - bv : bv - av;
            }
            var as = String(av || ''), bs = String(bv || '');
            return state.dir === 'asc' ? as.localeCompare(bs) : bs.localeCompare(as);
          });
        }

        bw.DOM(targetId, {
          t: 'div', a: { class: 'table-card' },
          c: {
            t: 'table', a: { class: 'bw_table' },
            c: [
              { t: 'thead', c: { t: 'tr', c: headers.map(function(h, i) {
                var arrow = state.col === i ? (state.dir === 'asc' ? ' \u25B2' : ' \u25BC') : '';
                return {
                  t: 'th',
                  a: Object.assign({ style: 'cursor:pointer;user-select:none' }, h.sz ? { class: 'sz' } : {}),
                  c: h.label + arrow,
                  o: { mounted: function(el) {
                    el.addEventListener('click', function() {
                      if (state.col === i) { state.dir = state.dir === 'asc' ? 'desc' : 'asc'; }
                      else { state.col = i; state.dir = 'asc'; }
                      render();
                    });
                  }}
                };
              })}},
              { t: 'tbody', c: sorted.map(function(row) {

                  return { t: 'td', a: headers[i].sz ? { class: 'sz' } : {}, c: cell };
                })};
              })}
            ]
          }
        });
      }

      render();
    }

            // ================================================================

            {

                { t: 'div', a: { class: 'demo-content' }, c: [

                    c: [
                      { t: 'span', a: { style: 'font-size:0.8rem;color:var(--bw_text_secondary)' }, c: 'Packages:' },
                      pkgBadge('core', 'pkg-core'),
                      pkgBadge('lean', 'pkg-lean'),
                      pkgBadge('addon', 'pkg-addon'),
                      pkgBadge('server', 'pkg-server'),
                      pkgBadge('css', 'pkg-css')
                    ]
                  },
                  { t: 'div', a: { id: 'builds-all' }, c: 'Loading...' }
                ]}
              ]
            },

            // ================================================================
            // Section: Embedded / IoT
            // ================================================================
            {
              t: 'div', a: { class: 'demo-section', id: 'section-embedded' },
              c: [
                { t: 'h2', c: { t: 'a', a: { href: '#section-embedded' }, c: 'Embedded / IoT' } },
                { t: 'div', a: { class: 'demo-content' }, c: [
                  { t: 'p', c: 'Bitwrench runs on any device that can serve HTTP. The full library is ~40KB gzipped -- fits easily on ESP32 SPIFFS (3% of 1.5MB), Pico W flash (~2% of 2MB), or any microcontroller with a few hundred KB of storage.' },

                  // How .gz serving works
                  {
                    t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1rem' },
                    c: [
                      { t: 'h4', c: 'How .gz serving works' },
                      { t: 'p', c: [
                        'Your HTML references the normal filename: ',
                        { t: 'code', c: '<script src="/bitwrench.umd.min.js"><\/script>' },
                        '. Your server stores the .gz file (40KB on flash) and sends it with a ',
                        { t: 'code', c: 'Content-Encoding: gzip' },
                        ' header. The browser decompresses transparently -- the 150KB uncompressed size is only in browser memory.'
                      ]},
                      { t: 'p', a: { style: 'margin-top:0.5rem;font-size:0.85rem' }, c: [
                        { t: 'strong', c: 'Troubleshooting: ' },
                        'Getting a SyntaxError in console? Your server is sending .gz bytes without the Content-Encoding header.'
                      ]}
                    ]
                  },

                  // Embedded downloads table
                  { t: 'h3', c: 'Embedded Downloads' },
                  { t: 'div', a: { id: 'builds-embedded' }, c: 'Loading...' },

                  // Platform compatibility
                  { t: 'h3', c: 'Platform Compatibility' },
                  { t: 'p', a: { style: 'font-size:0.875rem;color:var(--bw_text_secondary)' }, c:
                    'All platforms use the same bwserve wire protocol (JSON over SSE + POST). The browser does not care which language the server is written in.'
                  },
                  {
                    t: 'div', a: { class: 'table-card' },
                    c: { t: 'table', a: { class: 'bw_table' }, c: [
                      { t: 'thead', c: { t: 'tr', c: [
                        { t: 'th', c: 'Platform' },
                        { t: 'th', c: 'Language' },
                        { t: 'th', c: 'Server Library' },
                        { t: 'th', c: '.gz Serving' }
                      ]}},
                      { t: 'tbody', c: [
                        ['ESP32 (Arduino)', 'C/C++', 'ESPAsyncWebServer + bwserve.h', 'Automatic'],
                        ['ESP32 (MicroPython)', 'Python', 'bwserve.py', 'Built-in'],
                        ['ESP32 (CircuitPython)', 'Python', 'bwserve.py + socketpool', 'Built-in'],
                        ['Raspberry Pi Pico W', 'MicroPython', 'bwserve.py', 'Built-in'],
                        ['Adafruit boards', 'CircuitPython', 'bwserve.py (auto-detects runtime)', 'Built-in'],
                        ['Arduino + Ethernet', 'C/C++', 'EthernetServer + bwserve.h', 'Manual header'],
                        ['Raspberry Pi (Linux)', 'Python / Node.js', 'bwserve.py or bwserve npm', 'nginx / built-in'],
                        ['Desktop (no hardware)', 'C (POSIX)', 'cmake-demo (POSIX sockets)', 'N/A']
                      ].map(function(row) {
                        return { t: 'tr', c: [
                          { t: 'td', c: { t: 'strong', c: row[0] } },
                          { t: 'td', c: row[1] },
                          { t: 'td', c: row[2] },

                        ]};
                      })}
                    ]}
                  },

                  // Quick start: ESP32
                  { t: 'h3', c: 'Quick Start: ESP32 (Arduino)' },
                  {
                    t: 'div', a: { class: 'embedded-steps' },
                    c: [
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Copy the .gz file to your data/ folder' },
                          codeSnippet(null, 'cp node_modules/bitwrench/dist/bitwrench.umd.min.js.gz data/', 'bash')
                        ]
                      },
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Reference the uncompressed name in HTML' },
                          codeSnippet(null, '<script src="/bitwrench.umd.min.js"><\/script>', 'html'),
                          { t: 'p', c: 'The server maps .js requests to .gz files automatically.' }
                        ]
                      },
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Serve static files from SPIFFS' },
                          codeSnippet(null, '// Arduino sketch (ESPAsyncWebServer)\nserver.serveStatic("/", SPIFFS, "/").setDefaultFile("index.html");', 'js')
                        ]
                      },
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Upload to flash' },
                          { t: 'p', c: [
                            { t: 'strong', c: 'Arduino IDE: ' }, 'Tools > ESP32 Sketch Data Upload', { t: 'br' },
                            { t: 'strong', c: 'PlatformIO: ' }, { t: 'code', c: 'pio run -t uploadfs' }
                          ]}
                        ]
                      }
                    ]
                  },

                  // Quick start: MicroPython / CircuitPython
                  { t: 'h3', c: 'Quick Start: MicroPython / CircuitPython' },
                  { t: 'p', a: { style: 'font-size:0.875rem;color:var(--bw_text_secondary)' }, c: [
                    { t: 'code', c: 'bwserve.py' }, ' auto-detects your runtime (CPython, MicroPython, or CircuitPython) and uses the right transport.'
                  ]},
                  {
                    t: 'div', a: { class: 'embedded-steps' },
                    c: [
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Copy files to your board' },
                          codeSnippet('MicroPython (mpremote)', 'mpremote cp embedded_python/bwserve.py :\nmpremote cp dist/bitwrench.umd.min.js.gz :static/', 'bash'),
                          codeSnippet('CircuitPython (drag & drop)', '# Copy to CIRCUITPY drive:\n#   bwserve.py      -> /lib/bwserve.py\n#   *.umd.min.js.gz -> /static/bitwrench.umd.min.js.gz\n#   index.html      -> /static/index.html', 'bash')
                        ]
                      },
                      {
                        t: 'div', a: { class: 'embedded-step' },
                        c: [
                          { t: 'h4', c: 'Write your app' },
                          codeSnippet(null, 'from bwserve import App\n\napp = App(port=80)\n\n@app.page("/")\ndef home(client):\n    client.render("#app", {"t": "h1", "c": "Hello from " + app.runtime})\n\napp.listen()  # Blocks, serves HTTP + SSE', 'python')
                        ]
                      }
                    ]
                  },

                  // Quick start: RPi
                  { t: 'h3', c: 'Quick Start: Raspberry Pi (Linux)' },
                  codeSnippet('Python (CPython 3.6+)', 'python3 bwserve.py  # Serves on port 7902', 'bash'),
                  codeSnippet('Node.js', "import { create } from 'bitwrench/bwserve';\nconst app = create({ port: 7902 });\napp.page('/', (client) => {\n  client.render('#app', { t: 'h1', c: 'Hello from RPi!' });\n});\napp.listen();", 'js'),

                  // Example dashboards link
                  { t: 'p', a: { style: 'margin-top:1.5rem' }, c: [
                    'See ', { t: 'a', a: { href: '../examples/embedded/' }, c: 'embedded example dashboards' },
                    ' (ESP32, Pico W, RPi, GPIO, Home Automation, C demo) -- all run in the browser with simulated data, no hardware required.'
                  ]}
                ]}
              ]
            }
          ]
        }
      ]
    };

    bw.DOM('#app', page);

    // =========================================================================
    // Load manifest and populate dynamic sections
    // =========================================================================
    bw.loadClientFile('../dist/builds.json', function(raw, err) {
      if (err) {
        bw.DOM('#builds-all', { t: 'p', a: { style: 'color:#b91c1c' }, c: 'Failed to load build manifest. Run: npm run build:builds' });
        return;
      }
      var manifest = JSON.parse(raw);

      // ---- Hero metadata ----
      var umdEntry = manifest.files.filter(function(f) { return /^bitwrench\./.test(f.file) && f.format === 'UMD' && f.minified; })[0];
      var gzKB = umdEntry ? fmtSize(umdEntry.gzipped) : '~40 KB';
      bw.DOM('#hero-subtitle', {
        t: 'span',
        c: 'v' + manifest.version + ' \u00B7 ' + gzKB + ' gzipped \u00B7 zero dependencies \u00B7 ' + manifest.files.length + ' dist files'
      });
      bw.DOM('#hero-intro', {
        t: 'span',
        c: ['Drop this CDN tag into any HTML file (' + gzKB + ' gzipped, zero dependencies):']
      });

      // ---- Format explainer accordion ----
      bw.DOM('#format-explainer', bw.makeAccordion({
        items: [{
          title: 'Not sure which format to use?',
          content: {
            t: 'div', a: { style: 'font-size:0.875rem;line-height:1.6' },
            c: [
              { t: 'p', c: [{ t: 'strong', c: 'UMD' }, ' -- Universal. Works in browsers (', { t: 'code', c: '<script>' }, '), Node.js (require), and AMD loaders. Adds ', { t: 'code', c: 'bw' }, ' to global scope. Use this if unsure.'] },
              { t: 'p', c: [{ t: 'strong', c: 'ESM' }, ' -- ES Modules. Use with ', { t: 'code', c: 'import' }, ' in modern browsers or bundlers (Vite, Rollup, webpack). Supports tree-shaking.'] },
              { t: 'p', c: [{ t: 'strong', c: 'CJS' }, ' -- CommonJS. Use with ', { t: 'code', c: 'require()' }, ' in Node.js scripts and older bundlers.'] },
              { t: 'p', c: [{ t: 'strong', c: 'ES5' }, ' -- Transpiled to ES5 syntax. For legacy browsers (IE10+) and older webviews (Android 4.x, older Electron).'] },
              { t: 'p', c: [{ t: 'strong', c: '.gz' }, ' -- Pre-gzipped. Same JS, smaller on disk. Server must send ', { t: 'code', c: 'Content-Encoding: gzip' }, ' header. See the Embedded section below.'] },
              { t: 'p', c: [{ t: 'strong', c: 'CSS' }, ' -- Static stylesheet. Most apps use ', { t: 'code', c: 'bw.loadStyles()' }, ' instead (generates CSS at runtime). Use the file for SSR or static HTML pages without JS.'] }
            ]
          }
        }]
      }));

      // ---- Direct Downloads table (data-driven from builds.json) ----
      (function() {
        // Core files: filename starts with 'bitwrench.' (no dash = not lean/bccl/addon)
        var coreFiles = manifest.files.filter(function(f) {
          return f.ver !== '1.x' && /^bitwrench\./.test(f.file);
        });

        function findCore(format, minified) {
          return coreFiles.filter(function(f) {
            return f.format === format && f.minified === minified;
          })[0];
        }

        // Usage notes by format
        var usageNotes = {
          'UMD':      { min: 'Browser <script> tag', dev: 'Unminified, for debugging' },
          'ESM':      { min: "import bw from '...'", dev: 'Unminified ESM, for debugging' },
          'CJS':      { min: "const bw = require('...')", dev: 'Unminified CJS' },
          'ES5 (UMD)': { min: 'IE10+, older webviews', dev: 'Unminified ES5' },
          'CSS':      { min: 'For static HTML / SSR', dev: 'Unminified CSS' }
        };

        // Display order: format, minified, gz flag
        var specs = [
          { format: 'UMD', min: true },
          { format: 'UMD', min: false },
          { format: 'UMD', min: true, gz: true },
          { format: 'ESM', min: true },
          { format: 'ESM', min: false },
          { format: 'CJS', min: true },
          { format: 'ES5 (UMD)', min: true },
          { format: 'CSS', min: true }
        ];

        var headers = [
          { label: 'Format', sz: false },
          { label: 'File', sz: false },
          { label: 'Size', sz: true },
          { label: 'Usage', sz: false }
        ];

        var data = [];
        specs.forEach(function(spec) {
          var found = findCore(spec.format, spec.min);
          if (!found) return;
          var dlFile = spec.gz ? found.file + '.gz' : found.file;
          var fileSize = spec.gz ? found.gzipped : found.raw;
          var fmt = spec.format === 'ES5 (UMD)' ? 'ES5' : spec.format;
          var label = spec.gz ? fmt + ' .gz' : spec.min ? fmt : fmt + ' (dev)';
          var notes = usageNotes[spec.format] || {};
          var usage = spec.gz ? 'Pre-gzipped for embedded' : (spec.min ? notes.min : notes.dev) || '';

          data.push({
            cells: [
              { t: 'strong', c: label },
              { t: 'a', a: { href: '../dist/' + dlFile, style: 'font-size:0.85rem' }, c: dlFile },
              fmtSize(fileSize),
              { t: 'span', a: { style: 'font-size:0.8rem;color:var(--bw_text_secondary)' }, c: usage }
            ],
            sortValues: [label, dlFile, fileSize, usage]
          });
        });
        sortableTable('#downloads-table', headers, data);
      })();

      // ---- Lean builds table ----
      (function() {
        var leanFiles = manifest.files.filter(function(f) {
          return f.component === 'lean' && f.minified && f.ver !== '1.x';
        });
        if (leanFiles.length === 0) return;
        var headers = [
          { label: 'File', sz: false },
          { label: 'Format', sz: false },
          { label: 'Size', sz: true },
          { label: 'Gzipped', sz: true }
        ];
        var data = leanFiles.map(function(f) {
          return {
            cells: [
              { t: 'a', a: { href: '../dist/' + f.file, style: 'font-size:0.85rem' }, c: f.file },
              f.format,
              fmtSize(f.raw),
              fmtSize(f.gzipped)
            ],
            sortValues: [f.file, f.format, f.raw, f.gzipped]
          };
        });
        sortableTable('#lean-table', headers, data);
      })();

      // ---- BCCL standalone table ----
      (function() {
        var bcclFiles = manifest.files.filter(function(f) {
          return f.component === 'bccl' && f.minified && f.ver !== '1.x';
        });
        if (bcclFiles.length === 0) return;
        var headers = [
          { label: 'File', sz: false },
          { label: 'Format', sz: false },
          { label: 'Size', sz: true },
          { label: 'Gzipped', sz: true }
        ];
        var data = bcclFiles.map(function(f) {
          return {
            cells: [
              { t: 'a', a: { href: '../dist/' + f.file, style: 'font-size:0.85rem' }, c: f.file },
              f.format,
              fmtSize(f.raw),
              fmtSize(f.gzipped)
            ],
            sortValues: [f.file, f.format, f.raw, f.gzipped]
          };
        });
        sortableTable('#bccl-table', headers, data);
      })();

      // ---- Embedded .gz table (data-driven) ----
      (function() {
        // Find UMD min files for core and lean, plus ES5 min for core
        var embSpecs = [
          { label: 'Full library (recommended)', match: function(f) { return /^bitwrench\./.test(f.file) && f.format === 'UMD' && f.minified; } },
          { label: 'Lean (no components)', match: function(f) { return f.file.indexOf('-lean') >= 0 && f.format === 'UMD' && f.minified; } },
          { label: 'ES5 (legacy webview)', match: function(f) { return /^bitwrench\./.test(f.file) && f.format === 'ES5 (UMD)' && f.minified; } }
        ];
        var embHeaders = [
          { label: 'Build', sz: false },
          { label: 'Download (.gz)', sz: false },
          { label: 'On-disk', sz: true },
          { label: 'Uncompressed', sz: true }
        ];
        var current = manifest.files.filter(function(f) { return f.ver !== '1.x'; });
        var embData = [];
        embSpecs.forEach(function(spec) {
          var found = current.filter(spec.match)[0];
          if (!found) return;
          embData.push({
            cells: [
              spec.label,
              { t: 'a', a: { href: '../dist/' + found.file + '.gz' }, c: { t: 'code', a: { style: 'font-size:0.8rem' }, c: found.file + '.gz' } },
              fmtSize(found.gzipped),
              fmtSize(found.raw)
            ],
            sortValues: [spec.label, found.file, found.gzipped, found.raw]
          });
        });
        sortableTable('#builds-embedded', embHeaders, embData);
      })();

      // ---- All Builds table ----
      (function() {
        var allFiles = [];
        manifest.files.forEach(function(f) {
          if (f.ver === '1.x') return;
          if (!f.minified) return;

          var pkg, pkgClass;
          var fname = f.file;
          if (f.component === 'code-edit' || fname.indexOf('code-edit') >= 0) { pkg = 'addon'; pkgClass = 'pkg-addon'; }
          else if (f.component === 'util-css' || fname.indexOf('util-css') >= 0) { pkg = 'addon'; pkgClass = 'pkg-addon'; }
          else if (f.component === 'debug' || fname.indexOf('debug') >= 0) { pkg = 'addon'; pkgClass = 'pkg-addon'; }
          else if (f.component === 'lean' || fname.indexOf('-lean') >= 0) { pkg = 'lean'; pkgClass = 'pkg-lean'; }
          else if (f.component === 'bccl' || fname.indexOf('-bccl') >= 0) { pkg = 'addon'; pkgClass = 'pkg-addon'; }
          else if (f.component === 'bwserve' || fname.indexOf('bwserve') >= 0) { pkg = 'server'; pkgClass = 'pkg-server'; }
          else if (f.format === 'CSS') { pkg = 'css'; pkgClass = 'pkg-css'; }
          else { pkg = 'core'; pkgClass = 'pkg-core'; }

          allFiles.push({ file: f.file, pkg: pkg, pkgClass: pkgClass, format: f.format, raw: f.raw, gzipped: f.gzipped });
        });

        // Add non-minified server files (bwserve has no min variants)
        manifest.files.forEach(function(f) {
          if (f.ver === '1.x') return;
          if (f.component === 'bwserve' && !f.minified) {
            var alreadyAdded = allFiles.some(function(a) { return a.file === f.file; });
            if (!alreadyAdded) {
              allFiles.push({ file: f.file, pkg: 'server', pkgClass: 'pkg-server', format: f.format, raw: f.raw, gzipped: f.gzipped });
            }
          }
        });

        // Add CSS (non-minified variant too)
        manifest.files.forEach(function(f) {
          if (f.format === 'CSS' && !f.minified) {
            var alreadyAdded = allFiles.some(function(a) { return a.file === f.file; });
            if (!alreadyAdded) {
              allFiles.push({ file: f.file, pkg: 'css', pkgClass: 'pkg-css', format: 'CSS', raw: f.raw, gzipped: f.gzipped });
            }
          }
        });

        var buildHeaders = [
          { label: 'Package', sz: false },
          { label: 'File', sz: false },
          { label: 'Format', sz: false },
          { label: 'Size', sz: true },
          { label: 'Gzipped', sz: true }
        ];
        var buildData = allFiles.map(function(f) {
          return {
            cells: [
              pkgBadge(f.pkg, f.pkgClass),
              { t: 'a', a: { href: '../dist/' + f.file, style: 'font-size:0.85rem' }, c: f.file },
              f.format,
              fmtSize(f.raw),
              fmtSize(f.gzipped)
            ],
            sortValues: [f.pkg, f.file, f.format, f.raw, f.gzipped]
          };
        });
        sortableTable('#builds-all', buildHeaders, buildData);
      })();

      // ---- CDN snippets with SRI (data-driven) ----
      (function() {
        var umdFile = manifest.files.filter(function(f) { return /^bitwrench\./.test(f.file) && f.format === 'UMD' && f.minified; })[0];
        if (umdFile && umdFile.integrity) {
          var fname = umdFile.file;
          var unpkgTag = '<script src="https://unpkg.com/bitwrench@2/dist/' + fname + '"\n        integrity="' + umdFile.integrity + '"\n        crossorigin="anonymous"><\/script>';
          var jsdelivrTag = '<script src="https://cdn.jsdelivr.net/npm/bitwrench@2/dist/' + fname + '"\n        integrity="' + umdFile.integrity + '"\n        crossorigin="anonymous"><\/script>';

          bw.DOM('#cdn-sri-snippets', {
            t: 'div', c: [
              { t: 'h3', c: 'With SRI (recommended for production)' },
              codeSnippet('unpkg + SRI', unpkgTag, 'html'),
              codeSnippet('jsdelivr + SRI', jsdelivrTag, 'html')
            ]
          });
        }
      })();
    });
  </script>
