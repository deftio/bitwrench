<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Dashboard</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="shared-theme.css">
  <script src="shared-nav.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    // Mount the shared navigation
    mountExampleNav('#example-nav', '04-dashboard.html');

    // ── Dashboard CSS (injected via bw.css / bw.injectCSS) ──────────
    bw.injectCSS(bw.css({
      '.dashboard': {
        'display': 'flex',
        'min-height': '600px',
        'border': '1px solid var(--bw-card-border)',
        'border-radius': 'var(--bw-radius)',
        'box-shadow': 'var(--bw-card-shadow)',
        'overflow': 'hidden',
        'background': 'var(--bw-card-bg)'
      },
      '.sidebar': {
        'width': '200px',
        'color': 'white',
        'padding': '0.75rem',
        'flex-shrink': '0',
        'transition': 'background 0.3s'
      },
      '.sidebar h3': {
        'font-size': '1.1rem',
        'margin': '0 0 0.75rem 0',
        'font-weight': '600'
      },
      '.main-content': {
        'flex': '1',
        'padding': '1.25rem',
        'overflow-y': 'auto'
      },
      '.main-content h1': {
        'font-size': '1.5rem',
        'margin': '0 0 1rem 0',
        'transition': 'color 0.3s'
      },
      '.stats-grid': {
        'display': 'grid',
        'grid-template-columns': 'repeat(auto-fit, minmax(200px, 1fr))',
        'gap': 'var(--bw-space-md)',
        'margin-bottom': 'var(--bw-space-md)'
      },
      '.stat-card': {
        'background': 'var(--bw-card-bg, #fff)',
        'padding': '1rem',
        'border-radius': 'var(--bw-radius, 8px)',
        'border': '1px solid var(--bw-card-border, #e5e5e5)',
        'box-shadow': '0 1px 3px rgba(0,0,0,.06)',
        'cursor': 'pointer',
        'transition': 'transform 0.2s, box-shadow 0.2s, border-left-color 0.3s',
        'border-left': '4px solid transparent'
      },
      '.stat-card:hover': {
        'transform': 'translateY(-2px)',
        'box-shadow': '0 4px 8px rgba(0,0,0,0.15)'
      },
      '.stat-value': {
        'font-size': '1.5rem',
        'font-weight': '700',
        'transition': 'color 0.3s'
      },
      '.stat-label': {
        'color': 'var(--bw-text-secondary, #555)',
        'margin-top': '0.25rem',
        'font-size': '0.875rem'
      },
      '.chart-container': {
        'background': 'var(--bw-card-bg, #fff)',
        'padding': '1rem',
        'border-radius': 'var(--bw-radius, 8px)',
        'border': '1px solid var(--bw-card-border, #e5e5e5)',
        'box-shadow': '0 1px 3px rgba(0,0,0,.06)',
        'margin-bottom': '1rem'
      },
      '.chart-container h3': {
        'font-size': '1.1rem',
        'margin': '0 0 0.75rem 0'
      },
      '.sidebar .bw-nav-link': {
        'color': 'rgba(255,255,255,0.85) !important',
        'margin-bottom': '0.25rem',
        'padding': '0.5rem 0.75rem',
        'font-size': '0.875rem',
        'border-radius': '4px',
        'transition': 'all 0.15s'
      },
      '.sidebar .bw-nav-link:hover': {
        'color': 'white !important',
        'background': 'rgba(255,255,255,0.1)'
      },
      '.sidebar .bw-nav-link.active': {
        'background': 'rgba(255,255,255,0.2)',
        'color': 'white !important',
        'font-weight': '600'
      },
      '.bw-bar-chart-container': {
        'background': 'var(--bw-card-bg, #fff)',
        'border-color': 'var(--bw-card-border, #e5e5e5)',
        'box-shadow': '0 1px 3px rgba(0,0,0,.06)',
        'margin-bottom': '1rem'
      },
      '.bw-bar-value': {
        'color': 'var(--bw-text-secondary, #555)'
      },
      '.bw-bar-label': {
        'color': 'var(--bw-text-secondary, #555)'
      },
      '.theme-picker': {
        'display': 'flex',
        'align-items': 'center',
        'gap': '0.75rem',
        'flex-wrap': 'wrap'
      },
      '.theme-dot': {
        'width': '28px',
        'height': '28px',
        'border-radius': '50%',
        'border': '3px solid transparent',
        'cursor': 'pointer',
        'transition': 'all 0.2s',
        'outline': 'none'
      },
      '.theme-dot:hover': {
        'transform': 'scale(1.15)'
      },
      '.theme-dot.active': {
        'border-color': '#333',
        'box-shadow': '0 0 0 2px white, 0 0 0 4px #333'
      },
      '.page-tab-bar': {
        'display': 'flex',
        'gap': '0',
        'border-bottom': '2px solid var(--bw-card-border, #e0e0e0)',
        'margin-bottom': '1.25rem'
      },
      '.page-tab-btn': {
        'padding': '0.625rem 1.25rem',
        'font-size': '0.9rem',
        'font-weight': '500',
        'background': 'transparent',
        'border': 'none',
        'border-bottom': '2px solid transparent',
        'margin-bottom': '-2px',
        'cursor': 'pointer',
        'color': 'var(--bw-text-secondary, #666)',
        'transition': 'all 0.15s'
      },
      '.page-tab-btn:hover': {
        'color': 'var(--bw-teal-dark, #004d4d)'
      },
      '.page-tab-btn.active': {
        'color': 'var(--bw-teal-dark, #004d4d)',
        'border-bottom-color': 'var(--bw-teal, #006666)',
        'font-weight': '600'
      },
      '@media (max-width: 768px)': {
        '.dashboard': { 'flex-direction': 'column', 'min-height': 'auto' },
        '.sidebar': { 'width': '100%' }
      }
    }));

    // ── Theme Presets ──────────────────────────────────────────────
    var themePresets = [
      { name: 'Teal',   primary: '#00695c', secondary: '#004d4d', accent: '#26a69a' },
      { name: 'Ocean',  primary: '#1565c0', secondary: '#0d47a1', accent: '#42a5f5' },
      { name: 'Sunset', primary: '#e65100', secondary: '#bf360c', accent: '#ff7043' },
      { name: 'Forest', primary: '#2e7d32', secondary: '#1b5e20', accent: '#66bb6a' },
      { name: 'Plum',   primary: '#6a1b9a', secondary: '#4a148c', accent: '#ab47bc' },
      { name: 'Slate',  primary: '#455a64', secondary: '#263238', accent: '#78909c' }
    ];
    var currentTheme = themePresets[0];
    var activeTab = 'dashboard'; // 'dashboard' or 'code'

    // ── Dashboard State ──────────────────────────────────────────
    var dashboardState = {
      currentView: 'overview',
      stats: [
        { id: 'revenue', label: 'Total Revenue', value: 45231, format: 'currency', change: 12.5 },
        { id: 'users', label: 'Active Users', value: 2345, format: 'number', change: 5.3 },
        { id: 'orders', label: 'Orders Today', value: 123, format: 'number', change: -2.1 },
        { id: 'conversion', label: 'Conversion Rate', value: 3.2, format: 'percent', change: 0.8 }
      ],
      activities: [
        { id: 1, user: 'John Doe', action: 'Placed order #1234', time: Date.now() - 5 * 60000, status: 'success' },
        { id: 2, user: 'Jane Smith', action: 'Updated profile', time: Date.now() - 10 * 60000, status: 'info' },
        { id: 3, user: 'Bob Johnson', action: 'Cancelled order #1233', time: Date.now() - 15 * 60000, status: 'danger' },
        { id: 4, user: 'Alice Brown', action: 'Added product review', time: Date.now() - 20 * 60000, status: 'success' },
        { id: 5, user: 'Charlie Wilson', action: 'Changed password', time: Date.now() - 25 * 60000, status: 'warning' }
      ],
      monthlyRevenue: [
        { month: 'Jan', value: 4200 }, { month: 'Feb', value: 5100 },
        { month: 'Mar', value: 4800 }, { month: 'Apr', value: 6300 },
        { month: 'May', value: 5900 }, { month: 'Jun', value: 7200 },
        { month: 'Jul', value: 6800 }, { month: 'Aug', value: 8100 },
        { month: 'Sep', value: 7500 }, { month: 'Oct', value: 9200 },
        { month: 'Nov', value: 8700 }, { month: 'Dec', value: 10500 }
      ]
    };

    // ── Utility Functions ─────────────────────────────────────────
    function formatValue(value, format) {
      switch (format) {
        case 'currency': return '$' + value.toLocaleString();
        case 'percent':  return value + '%';
        default:         return value.toLocaleString();
      }
    }

    function formatTime(ts) {
      var minutes = Math.floor((Date.now() - ts) / 60000);
      if (minutes < 60) return minutes + ' minutes ago';
      var hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
      return Math.floor(hours / 24) + ' days ago';
    }

    // ── Apply Theme ──────────────────────────────────────────────
    function applyTheme() {
      bw.generateTheme('dashboard-theme', {
        primary: currentTheme.primary,
        secondary: currentTheme.secondary,
        inject: true
      });
    }
    applyTheme(); // Apply initial theme

    // ── Render: Theme Picker ─────────────────────────────────────
    function renderThemePicker() {
      return {
        t: 'div', a: { class: 'theme-picker' },
        c: [
          { t: 'span', a: { style: 'font-size:0.875rem;color:var(--bw-text-secondary);font-weight:500;' }, c: 'Theme:' }
        ].concat(themePresets.map(function(preset) {
          var isActive = preset.name === currentTheme.name;
          return {
            t: 'button',
            a: {
              class: 'theme-dot' + (isActive ? ' active' : ''),
              style: 'background:' + preset.primary + ';',
              title: preset.name,
              onclick: function() {
                currentTheme = preset;
                applyTheme();
                renderAll();
              }
            }
          };
        }))
      };
    }

    // ── Render: Tab Bar ──────────────────────────────────────────
    function renderTabBar() {
      return {
        t: 'div', a: { class: 'page-tab-bar' },
        c: [
          {
            t: 'button',
            a: {
              class: 'page-tab-btn' + (activeTab === 'dashboard' ? ' active' : ''),
              onclick: function() { activeTab = 'dashboard'; renderAll(); }
            },
            c: 'Dashboard'
          },
          {
            t: 'button',
            a: {
              class: 'page-tab-btn' + (activeTab === 'code' ? ' active' : ''),
              onclick: function() { activeTab = 'code'; renderAll(); }
            },
            c: 'Source Code'
          }
        ]
      };
    }

    // ── Render: Stat Card ────────────────────────────────────────
    function renderStatCard(stat) {
      return {
        t: 'div',
        a: {
          class: 'stat-card',
          style: 'border-left-color:' + currentTheme.accent + ';',
          onclick: function() {
            var c = (Math.random() - 0.5) * 10;
            stat.change = Math.round(c * 10) / 10;
            stat.value = Math.round(stat.value * (1 + c / 100));
            renderAll();
          }
        },
        c: [
          { t: 'div', a: { class: 'stat-value', style: 'color:' + currentTheme.primary + ';' }, c: formatValue(stat.value, stat.format) },
          { t: 'div', a: { class: 'stat-label' }, c: stat.label },
          {
            t: 'div',
            a: {
              style: 'margin-top:0.25rem;font-size:0.875rem;color:' +
                (stat.change >= 0 ? '#2e7d32' : '#c62828')
            },
            c: (stat.change >= 0 ? '+' : '') + stat.change + '%'
          }
        ]
      };
    }

    function renderStatsGrid() {
      return {
        t: 'div', a: { class: 'stats-grid' },
        c: dashboardState.stats.map(renderStatCard)
      };
    }

    // ── Render: Bar Chart ────────────────────────────────────────
    function renderBarChart() {
      return bw.makeBarChart({
        data: dashboardState.monthlyRevenue,
        labelKey: 'month',
        valueKey: 'value',
        title: 'Monthly Revenue',
        color: currentTheme.accent,
        height: '180px',
        formatValue: function(v) { return '$' + (v / 1000).toFixed(1) + 'k'; }
      });
    }

    // ── Render: Activity Table ────────────────────────────────────
    function renderActivityTable() {
      return {
        t: 'div', a: { class: 'chart-container' }, c: [
          {
            t: 'div',
            a: { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;' },
            c: [
              { t: 'h3', c: 'Recent Activity' },
              bw.makeButton({
                text: 'Add Activity',
                variant: 'primary',
                size: 'sm',
                onclick: function() {
                  var actions = ['Placed order', 'Updated profile', 'Added review', 'Changed settings'];
                  var users = ['New User', 'Test User', 'Demo User'];
                  var statuses = ['success', 'info', 'warning'];
                  dashboardState.activities.unshift({
                    id: dashboardState.activities.length + 1,
                    user: users[Math.floor(Math.random() * users.length)],
                    action: actions[Math.floor(Math.random() * actions.length)] + ' #' + Math.floor(Math.random() * 9999),
                    time: Date.now(),
                    status: statuses[Math.floor(Math.random() * statuses.length)]
                  });
                  renderAll();
                }
              })
            ]
          },
          bw.makeTable({
            data: dashboardState.activities.map(function(a) {
              return { user: a.user, action: a.action, time: formatTime(a.time), status: a.status };
            }),
            columns: [
              { key: 'user', label: 'User' },
              { key: 'action', label: 'Action' },
              { key: 'time', label: 'Time' },
              { key: 'status', label: 'Status', render: function(v) { return bw.makeBadge({ text: v, variant: v }); } }
            ],
            striped: true,
            hover: true
          })
        ]
      };
    }

    // ── Render: Analytics View ────────────────────────────────────
    function renderAnalyticsView() {
      return {
        t: 'div', a: { class: 'chart-container' }, c: [
          { t: 'h3', c: 'Analytics Overview' },
          { t: 'p', a: { style: 'margin-bottom:1rem;' }, c: 'Select a time range:' },
          {
            t: 'div',
            a: { style: 'display:flex;gap:0.5rem;margin-bottom:1rem;' },
            c: ['Today', 'This Week', 'This Month', 'This Year'].map(function(range) {
              return bw.makeButton({
                text: range,
                variant: range === 'This Week' ? 'primary' : 'secondary',
                onclick: function() { console.log('Selected range: ' + range); }
              });
            })
          },
          renderBarChart()
        ]
      };
    }

    // ── Render: Customers View ───────────────────────────────────
    function renderCustomersView() {
      var customers = [
        { id: 1, name: 'Acme Corp', contact: 'john@acme.com', value: 125000, status: 'active' },
        { id: 2, name: 'Beta Inc', contact: 'jane@beta.com', value: 87000, status: 'active' },
        { id: 3, name: 'Gamma LLC', contact: 'bob@gamma.com', value: 45000, status: 'inactive' },
        { id: 4, name: 'Delta Co', contact: 'alice@delta.com', value: 92000, status: 'active' }
      ];

      return {
        t: 'div', a: { class: 'chart-container' }, c: [
          { t: 'h3', c: 'Customer List' },
          bw.makeTable({
            data: customers,
            columns: [
              { key: 'name', label: 'Company' },
              { key: 'contact', label: 'Contact' },
              { key: 'value', label: 'Total Value', render: function(v) { return '$' + v.toLocaleString(); } },
              { key: 'status', label: 'Status', render: function(v) {
                return bw.makeBadge({ text: v, variant: v === 'active' ? 'success' : 'secondary' });
              }}
            ],
            striped: true,
            hover: true
          })
        ]
      };
    }

    // ── Render: Main Content ─────────────────────────────────────
    function renderMainContent() {
      var view = dashboardState.currentView;
      var title = view.charAt(0).toUpperCase() + view.slice(1) + ' Dashboard';
      var body;

      if (view === 'analytics') {
        body = [renderAnalyticsView()];
      } else if (view === 'customers') {
        body = [renderCustomersView()];
      } else {
        body = [renderStatsGrid(), renderBarChart(), renderActivityTable()];
      }

      return {
        t: 'div', a: { class: 'main-content' },
        c: [{ t: 'h1', a: { style: 'color:' + currentTheme.primary + ';' }, c: title }].concat(body)
      };
    }

    // ── Render: Sidebar ──────────────────────────────────────────
    function renderSidebar() {
      var sidebarItems = [
        { text: 'Overview', view: 'overview' },
        { text: 'Analytics', view: 'analytics' },
        { text: 'Customers', view: 'customers' },
        { text: 'Products', view: 'products' },
        { text: 'Orders', view: 'orders' },
        { text: 'Settings', view: 'settings' }
      ];

      return {
        t: 'div',
        a: { class: 'sidebar', style: 'background:' + currentTheme.secondary + ';' },
        c: [
          { t: 'h3', c: 'Dashboard' },
          {
            t: 'nav', c: sidebarItems.map(function(item) {
              var isActive = item.view === dashboardState.currentView;
              return {
                t: 'a',
                a: {
                  href: '#' + item.view,
                  class: 'bw-nav-link' + (isActive ? ' active' : ''),
                  style: 'display:block;',
                  onclick: function(e) {
                    e.preventDefault();
                    dashboardState.currentView = item.view;
                    renderAll();
                  }
                },
                c: item.text
              };
            })
          }
        ]
      };
    }

    // ── Render: Code Tab ─────────────────────────────────────────
    var DASHBOARD_CODE = [
      '// Dashboard Example - Key Code',
      '// Full source: pages/04-dashboard.html',
      '',
      '// ---- Theme Presets ----',
      'var themePresets = [',
      '  { name: "Teal",   primary: "#00695c", secondary: "#004d4d", accent: "#26a69a" },',
      '  { name: "Ocean",  primary: "#1565c0", secondary: "#0d47a1", accent: "#42a5f5" },',
      '  { name: "Sunset", primary: "#e65100", secondary: "#bf360c", accent: "#ff7043" },',
      '  { name: "Forest", primary: "#2e7d32", secondary: "#1b5e20", accent: "#66bb6a" },',
      '  { name: "Plum",   primary: "#6a1b9a", secondary: "#4a148c", accent: "#ab47bc" },',
      '  { name: "Slate",  primary: "#455a64", secondary: "#263238", accent: "#78909c" }',
      '];',
      'var currentTheme = themePresets[0];',
      '',
      '// ---- Apply Theme ----',
      '// bw.generateTheme() creates scoped CSS for all bw-* components.',
      '// Custom elements use currentTheme colors via inline styles.',
      'function applyTheme() {',
      '  bw.generateTheme("dashboard-theme", {',
      '    primary: currentTheme.primary,',
      '    secondary: currentTheme.secondary,',
      '    inject: true',
      '  });',
      '}',
      '',
      '// ---- Dashboard State ----',
      'var dashboardState = {',
      '  currentView: "overview",',
      '  stats: [',
      '    { id: "revenue", label: "Total Revenue", value: 45231, format: "currency", change: 12.5 },',
      '    { id: "users",   label: "Active Users",  value: 2345,  format: "number",   change: 5.3 },',
      '    // ...',
      '  ],',
      '  monthlyRevenue: [',
      '    { month: "Jan", value: 4200 },',
      '    { month: "Feb", value: 5100 },',
      '    // ...',
      '  ]',
      '};',
      '',
      '// ---- Stat Card (TACO pattern) ----',
      'function renderStatCard(stat) {',
      '  return {',
      '    t: "div",',
      '    a: {',
      '      class: "stat-card",',
      '      style: "border-left-color:" + currentTheme.accent + ";",',
      '      onclick: function() {',
      '        stat.value = Math.round(stat.value * 1.02);',
      '        renderAll();',
      '      }',
      '    },',
      '    c: [',
      '      { t: "div", a: { class: "stat-value", style: "color:" + currentTheme.primary }, c: formatValue(stat.value, stat.format) },',
      '      { t: "div", a: { class: "stat-label" }, c: stat.label },',
      '      { t: "div", c: (stat.change >= 0 ? "+" : "") + stat.change + "%" }',
      '    ]',
      '  };',
      '}',
      '',
      '// ---- Bar Chart (uses bw.makeBarChart) ----',
      'function renderBarChart() {',
      '  return bw.makeBarChart({',
      '    data: dashboardState.monthlyRevenue,',
      '    labelKey: "month",',
      '    valueKey: "value",',
      '    title: "Monthly Revenue",',
      '    color: currentTheme.accent,',
      '    height: "180px",',
      '    formatValue: function(v) { return "$" + (v / 1000).toFixed(1) + "k"; }',
      '  });',
      '}',
      '',
      '// ---- Activity Table with Badges ----',
      'bw.makeTable({',
      '  data: activities.map(function(a) {',
      '    return { user: a.user, action: a.action, time: formatTime(a.time), status: a.status };',
      '  }),',
      '  columns: [',
      '    { key: "user", label: "User" },',
      '    { key: "action", label: "Action" },',
      '    { key: "time", label: "Time" },',
      '    { key: "status", label: "Status",',
      '      render: function(v) { return bw.makeBadge({ text: v, variant: v }); }',
      '    }',
      '  ],',
      '  striped: true,',
      '  hover: true',
      '});',
      '',
      '// ---- Sidebar with View Switching ----',
      'function renderSidebar() {',
      '  var items = [',
      '    { text: "Overview", view: "overview" },',
      '    { text: "Analytics", view: "analytics" },',
      '    { text: "Customers", view: "customers" }',
      '  ];',
      '  return {',
      '    t: "div",',
      '    a: { class: "sidebar", style: "background:" + currentTheme.secondary },',
      '    c: [{',
      '      t: "nav", c: items.map(function(item) {',
      '        return {',
      '          t: "a",',
      '          a: {',
      '            class: "bw-nav-link" + (item.view === currentView ? " active" : ""),',
      '            onclick: function(e) {',
      '              e.preventDefault();',
      '              currentView = item.view;',
      '              renderAll();',
      '            }',
      '          },',
      '          c: item.text',
      '        };',
      '      })',
      '    }]',
      '  };',
      '}',
      '',
      '// ---- Mount Everything ----',
      'function renderAll() {',
      '  bw.DOM("#dashboard-app", {',
      '    t: "div", a: { class: "dashboard dashboard-theme" },',
      '    c: [renderSidebar(), renderMainContent()]',
      '  });',
      '}'
    ].join('\n');

    function renderCodeTab() {
      return bw.codeEditor
        ? bw.codeEditor({ code: DASHBOARD_CODE, lang: 'js', readOnly: true, height: '600px' })
        : { t: 'pre', a: { style: 'background:#1a1a1a;color:#e0e0e0;padding:1rem;border-radius:4px;font-size:0.8125rem;max-height:600px;overflow:auto;' }, c: { t: 'code', c: DASHBOARD_CODE } };
    }

    // ── Page Header (TACO) ────────────────────────────────────────
    var pageHeader = {
      t: 'div', a: { class: 'page-header' },
      c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
        c: [
          { t: 'h1', c: 'Dashboard' },
          { t: 'p', a: { class: 'subtitle' }, c: 'Full application layout with sidebar navigation, stat cards, charts, tables, and live theme switching.' }
        ]
      }
    };

    // ── Master Render ────────────────────────────────────────────
    function renderAll() {
      var content;
      if (activeTab === 'code') {
        content = renderCodeTab();
      } else {
        content = {
          t: 'div', a: { class: 'dashboard dashboard-theme' },
          c: [renderSidebar(), renderMainContent()]
        };
      }

      var dashboardContainer = {
        t: 'div', a: { id: 'dashboard-app', class: 'content-container wide' },
        c: [
          renderThemePicker(),
          { t: 'div', a: { style: 'height:1rem;' } },
          renderTabBar(),
          content
        ]
      };

      bw.DOM('#app', [pageHeader, dashboardContainer]);
    }

    // Initialize
    renderAll();

    // Auto-refresh stats every 5 seconds
    setInterval(function() {
      dashboardState.stats.forEach(function(stat) {
        var change = (Math.random() - 0.5) * 2;
        stat.value = Math.round(stat.value * (1 + change / 100));
        stat.change = Math.round((stat.change + change) * 10) / 10;
      });
      // Randomize chart data slightly
      dashboardState.monthlyRevenue.forEach(function(d) {
        d.value = Math.round(d.value * (1 + (Math.random() - 0.5) * 0.04));
      });
      if (dashboardState.currentView === 'overview' && activeTab === 'dashboard') {
        renderAll();
      }
    }, 5000);
  </script>
</body>
</html>
