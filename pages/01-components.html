<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Built-in Components</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="shared-theme.css">
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.js"></script>
  <script src="shared-tryit.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    // Mount the shared navigation
    mountExampleNav('#example-nav', '01-components.html');

    // =========================================================================
    // Helper: wrap a demo in a section with anchor, title, description, tabs
    // =========================================================================
    function createTabbedDemo(resultContent, codeContent) {
      var codeDisplay = bw.codeEditor
        ? bw.codeEditor({ code: codeContent, lang: 'js', readOnly: true, height: 'auto' })
        : { t: 'pre', c: { t: 'code', c: codeContent } };

      return bw.makeTabs({
        tabs: [
          { label: 'Result', active: true, content: resultContent },
          {
            label: 'Code',
            content: {
              t: 'div', a: { style: 'position: relative;' },
              c: [
                {
                  t: 'button',
                  a: {
                    class: 'copy-btn',
                    onclick: function(e) {
                      navigator.clipboard.writeText(codeContent).then(function() {
                        e.target.textContent = 'Copied!';
                        e.target.classList.add('copied');
                        setTimeout(function() {
                          e.target.textContent = 'Copy';
                          e.target.classList.remove('copied');
                        }, 2000);
                      });
                    }
                  },
                  c: 'Copy'
                },
                codeDisplay
              ]
            }
          }
        ]
      });
    }

    function demoSection(id, title, description, content) {
      return {
        t: 'div', a: { class: 'demo-section', id: id },
        c: [
          { t: 'h2', c: { t: 'a', a: { href: '#' + id }, c: title } },
          { t: 'div', a: { class: 'demo-content' }, c: [
            { t: 'p', a: { class: 'demo-description' }, c: description },
            content
          ]}
        ]
      };
    }

    // =========================================================================
    // Grid cell helper
    // =========================================================================
    function gridCell(label, bg, opts) {
      var needsWhite = (bg || '').match(/^#[0-4]/);
      return {
        t: 'div',
        a: { style: 'background:' + bg + '; color:' + (needsWhite ? '#fff' : '#1a1a1a') + '; padding:' + (opts && opts.pad || '0.75rem') + '; text-align:center; border-radius:6px; font-size:' + (opts && opts.fs || '0.8rem') + ';' + (opts && opts.mb ? ' margin-bottom:0.5rem;' : '') },
        c: label
      };
    }

    // =========================================================================
    // Sub-heading helper
    // =========================================================================
    function subheading(text) {
      return { t: 'h4', a: { style: 'font-size: 0.9rem; font-weight: 600; margin: 0 0 0.5rem;' }, c: text };
    }

    // =========================================================================
    // Modal (needs to be defined up-front so we can reference it)
    // =========================================================================
    var modalTaco = bw.makeModal({
      title: 'Confirm Action',
      content: 'Are you sure you want to proceed? This action cannot be undone.',
      footer: {
        t: 'div', a: { style: 'display: flex; gap: 0.5rem; justify-content: flex-end;' }, c: [
          bw.makeButton({ text: 'Cancel', variant: 'secondary', onclick: function() {
            document.querySelector('.bw-modal').classList.remove('bw-modal-show');
            document.body.style.overflow = '';
          }}),
          bw.makeButton({ text: 'Confirm', variant: 'primary', onclick: function() {
            document.querySelector('.bw-modal').classList.remove('bw-modal-show');
            document.body.style.overflow = '';
          }})
        ]
      }
    });

    // =========================================================================
    // Build the entire page as a TACO tree
    // =========================================================================
    var page = {
      t: 'div', c: [
        // Page header
        {
          t: 'div', a: { class: 'page-header' },
          c: {
            t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
            c: [
              { t: 'h1', c: 'Bitwrench Built-in Components' },
              { t: 'p', a: { class: 'subtitle' }, c: 'Ready-made UI components for quick scaffolding and prototyping' }
            ]
          }
        },

        // Main content container
        {
          t: 'div', a: { class: 'content-container wide' },
          c: [

            // =================================================================
            // Introduction
            // =================================================================
            {
              t: 'div', a: { class: 'demo-section' },
              c: [
                { t: 'h2', c: 'Bitwrench Core Components Library (BCCL)' },
                { t: 'div', a: { class: 'demo-content' }, c: [
                  {
                    t: 'p', a: { style: 'font-size: 1.05rem; line-height: 1.7; margin-bottom: 1rem;' },
                    c: [
                      'Bitwrench includes a comprehensive set of built-in UI components similar to Bootstrap, ',
                      'available for quick scaffolding and use. These components provide a fast way to build ',
                      'common interface patterns \u2014 cards, buttons, forms, modals, navigation, and more \u2014 ',
                      'without writing boilerplate HTML or CSS.'
                    ]
                  },
                  {
                    t: 'p', a: { style: 'line-height: 1.7; margin-bottom: 1rem;' },
                    c: [
                      'Use of these components is entirely optional. You can author custom components using bitwrench\u2019s ',
                      { t: 'a', a: { href: '00-quick-start.html' }, c: 'TACO format' },
                      ' and reactivity functions, or mix and match with plain HTML, direct DOM manipulation, ',
                      'or other frameworks on the same page.'
                    ]
                  },
                  {
                    t: 'p', a: { style: 'line-height: 1.7; margin-bottom: 1rem;' },
                    c: [
                      'All BCCL components are available as ', { t: 'code', c: 'bw.makeXxx()' },
                      ' functions that return TACO objects. Use ', { t: 'code', c: "bw.DOM('#target', taco)" },
                      ' to mount, ', { t: 'code', c: 'bw.html(taco)' },
                      ' to get HTML strings, or compose them inside other TACO structures.'
                    ]
                  },
                  makeStyleOrigin()
                ]}
              ]
            },

            // =================================================================
            // Pipeline demos
            // =================================================================
            {
              t: 'div', a: { class: 'demo-section' },
              c: [
                { t: 'h2', c: 'How bw.make*() Works' },
                {
                  t: 'p',
                  c: [
                    'Every ', { t: 'code', c: 'bw.make*()' },
                    ' function is just a helper that returns a JavaScript object (TACO). ',
                    { t: 'code', c: 'bw.DOM()' },
                    ' renders it. There is no magic \u2014 you can inspect, modify, or compose these objects however you like.'
                  ]
                },
                showPipeline({
                  label: 'Card',
                  helperCode: "bw.makeCard({\n  title: 'Hello',\n  content: 'Card body',\n  footer: 'Footer text'\n})",
                  taco: bw.makeCard({ title: 'Hello', content: 'Card body', footer: 'Footer text' })
                }),
                { t: 'div', a: { style: 'margin-top: 1.5rem;' }, c:
                  showPipeline({
                    label: 'Button',
                    helperCode: "bw.makeButton({\n  text: 'Click Me',\n  variant: 'primary'\n})",
                    taco: bw.makeButton({ text: 'Click Me', variant: 'primary' })
                  })
                }
              ]
            },

            // =================================================================
            // 1. Cards
            // =================================================================
            demoSection('section-cards', 'Cards',
              'Flexible content containers with header, body, footer, and image support. Cards support variants, shadows, and hover effects.',
              createTabbedDemo(
                {
                  t: 'div', a: { class: 'bw-grid-auto' },
                  c: [
                    bw.makeCard({ title: 'Basic Card', content: 'Simple card with title and content. Cards are flexible content containers.', footer: 'Card footer' }),
                    bw.makeCard({ header: 'Featured', title: 'Card with Header', content: 'This card has a header section for categories or status.', footer: bw.makeButton({ text: 'Action', variant: 'primary' }) }),
                    bw.makeCard({
                      title: 'Interactive Card', content: 'Cards can contain any content including buttons and forms.',
                      footer: { t: 'div', c: [ bw.makeButton({ text: 'Primary', variant: 'primary' }), ' ', bw.makeButton({ text: 'Secondary', variant: 'secondary' }) ] }
                    })
                  ]
                },
                "bw.makeCard({\n  title: 'Basic Card',\n  content: 'Simple card with content.',\n  footer: 'Card footer'\n})\n\nbw.makeCard({\n  header: 'Featured',\n  title: 'Card with Header',\n  content: 'Has a header section.',\n  footer: bw.makeButton({ text: 'Action', variant: 'primary' })\n})"
              )
            ),

            // =================================================================
            // 2. Buttons
            // =================================================================
            demoSection('section-buttons', 'Buttons',
              'Interactive elements with variants, sizes, and states. Includes outline variants and disabled state.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Variants'),
                      bw.makeButton({ text: 'Primary', variant: 'primary' }), ' ',
                      bw.makeButton({ text: 'Secondary', variant: 'secondary' }), ' ',
                      bw.makeButton({ text: 'Success', variant: 'success' }), ' ',
                      bw.makeButton({ text: 'Danger', variant: 'danger' }), ' ',
                      bw.makeButton({ text: 'Warning', variant: 'warning' }), ' ',
                      bw.makeButton({ text: 'Info', variant: 'info' })
                    ]},
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Outline Variants'),
                      bw.makeButton({ text: 'Primary', variant: 'outline-primary' }), ' ',
                      bw.makeButton({ text: 'Secondary', variant: 'outline-secondary' }), ' ',
                      bw.makeButton({ text: 'Success', variant: 'outline-success' })
                    ]},
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Sizes'),
                      bw.makeButton({ text: 'Small', size: 'sm' }), ' ',
                      bw.makeButton({ text: 'Normal' }), ' ',
                      bw.makeButton({ text: 'Large', size: 'lg' })
                    ]},
                    { t: 'div', c: [
                      subheading('States'),
                      bw.makeButton({ text: 'Disabled', disabled: true }), ' ',
                      bw.makeButton({ text: 'Click Me!', onclick: function() { alert('Clicked!'); } })
                    ]}
                  ]
                },
                "bw.makeButton({ text: 'Primary', variant: 'primary' })\nbw.makeButton({ text: 'Outline', variant: 'outline-primary' })\nbw.makeButton({ text: 'Small', size: 'sm' })\nbw.makeButton({ text: 'Disabled', disabled: true })"
              )
            ),

            // =================================================================
            // 3. Button Groups
            // =================================================================
            demoSection('section-button-groups', 'Button Groups',
              'Group related buttons together in a horizontal or vertical arrangement with shared border-radius.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Horizontal'),
                      bw.makeButtonGroup({
                        children: [
                          bw.makeButton({ text: 'Left', variant: 'primary' }),
                          bw.makeButton({ text: 'Middle', variant: 'primary' }),
                          bw.makeButton({ text: 'Right', variant: 'primary' })
                        ]
                      })
                    ]},
                    { t: 'div', c: [
                      subheading('Vertical'),
                      bw.makeButtonGroup({
                        vertical: true,
                        children: [
                          bw.makeButton({ text: 'Top', variant: 'secondary' }),
                          bw.makeButton({ text: 'Middle', variant: 'secondary' }),
                          bw.makeButton({ text: 'Bottom', variant: 'secondary' })
                        ]
                      })
                    ]}
                  ]
                },
                "bw.makeButtonGroup({\n  children: [\n    bw.makeButton({ text: 'Left', variant: 'primary' }),\n    bw.makeButton({ text: 'Middle', variant: 'primary' }),\n    bw.makeButton({ text: 'Right', variant: 'primary' })\n  ]\n})\n\nbw.makeButtonGroup({\n  vertical: true,\n  children: [\n    bw.makeButton({ text: 'Top', variant: 'secondary' }),\n    bw.makeButton({ text: 'Bottom', variant: 'secondary' })\n  ]\n})"
              )
            ),

            // =================================================================
            // 4. Grid System
            // =================================================================
            demoSection('section-grid', 'Grid System',
              '12-column responsive layout system using makeContainer, makeRow, and makeCol. Columns support responsive breakpoints.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    bw.makeContainer({ children: [
                      subheading('Equal Columns'),
                      bw.makeRow({
                        children: ['#e0f2f1', '#b2dfdb', '#80cbc4'].map(function(bg, i) {
                          return bw.makeCol({ size: 4, content: gridCell('Col ' + (i+1) + ' (4/12)', bg) });
                        })
                      }),
                      { t: 'div', a: { style: 'height: 0.75rem;' } },
                      subheading('Responsive (resize to see)'),
                      bw.makeRow({
                        children: ['#e0f2f1','#b2dfdb','#80cbc4','#fff3e0'].map(function(bg, i) {
                          return bw.makeCol({ size: { xs: 12, md: 6, lg: 3 }, content: gridCell('Resp ' + (i+1), bg, { mb: true }) });
                        })
                      })
                    ]})
                  ]
                },
                "bw.makeRow({\n  children: ['#e0f2f1', '#b2dfdb', '#80cbc4'].map((bg, i) =>\n    bw.makeCol({ size: 4, content: gridCell('Col ' + (i+1), bg) })\n  )\n})\n\n// Responsive: 12 on mobile, 6 on tablet, 3 on desktop\nbw.makeCol({ size: { xs: 12, md: 6, lg: 3 }, content: '...' })"
              )
            ),

            // =================================================================
            // 5. Stacks
            // =================================================================
            demoSection('section-stacks', 'Stacks',
              'Vertical and horizontal flex stacks with configurable gap. A quick way to lay out groups of elements without writing CSS.',
              createTabbedDemo(
                {
                  t: 'div', a: { style: 'display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;' }, c: [
                    { t: 'div', c: [
                      subheading('Vertical Stack'),
                      bw.makeStack({ children: [
                        bw.makeButton({ text: 'First', variant: 'primary' }),
                        bw.makeButton({ text: 'Second', variant: 'secondary' }),
                        bw.makeButton({ text: 'Third', variant: 'success' })
                      ], gap: 2 })
                    ]},
                    { t: 'div', c: [
                      subheading('Horizontal Stack'),
                      bw.makeStack({ direction: 'horizontal', children: [
                        bw.makeBadge({ text: 'HTML', variant: 'primary' }),
                        bw.makeBadge({ text: 'CSS', variant: 'info' }),
                        bw.makeBadge({ text: 'JS', variant: 'warning' })
                      ], gap: 2 })
                    ]}
                  ]
                },
                "bw.makeStack({\n  children: [\n    bw.makeButton({ text: 'First', variant: 'primary' }),\n    bw.makeButton({ text: 'Second', variant: 'secondary' })\n  ],\n  gap: 2\n})\n\nbw.makeStack({\n  direction: 'horizontal',\n  children: [...],\n  gap: 2\n})"
              )
            ),

            // =================================================================
            // 6. Navigation
            // =================================================================
            demoSection('section-navigation', 'Navigation',
              'Navigation components including horizontal/vertical navs, navbars, breadcrumbs, and tabbed interfaces.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    { t: 'div', a: { style: 'margin-bottom: 1.25rem;' }, c: [
                      subheading('Horizontal Nav'),
                      bw.makeNav({ items: [
                        { text: 'Home', href: '#', active: true },
                        { text: 'Products', href: '#' },
                        { text: 'About', href: '#' },
                        { text: 'Contact', href: '#' }
                      ]})
                    ]},
                    { t: 'div', a: { style: 'margin-bottom: 1.25rem;' }, c: [
                      subheading('Navbar'),
                      bw.makeNavbar({ brand: 'My Brand', brandHref: '#', items: [
                        { text: 'Dashboard', href: '#', active: true },
                        { text: 'Projects', href: '#' },
                        { text: 'Team', href: '#' }
                      ]})
                    ]},
                    { t: 'div', c: [
                      subheading('Breadcrumb'),
                      bw.makeBreadcrumb({ items: [
                        { text: 'Home', href: '#' },
                        { text: 'Products', href: '#' },
                        { text: 'Laptops', active: true }
                      ]})
                    ]}
                  ]
                },
                "bw.makeNav({\n  items: [\n    { text: 'Home', href: '#', active: true },\n    { text: 'About', href: '#' }\n  ]\n})\n\nbw.makeNavbar({ brand: 'My Brand', items: [...] })\nbw.makeBreadcrumb({ items: [...] })"
              )
            ),

            // =================================================================
            // 7. Tabs
            // =================================================================
            demoSection('section-tabs', 'Tabs',
              'Tabbed interfaces for organizing content into switchable panels. Click tabs to toggle content visibility.',
              createTabbedDemo(
                bw.makeTabs({
                  tabs: [
                    { label: 'Overview', active: true, content: { t: 'p', c: 'This is the overview tab content. Click other tabs to switch.' } },
                    { label: 'Details', content: { t: 'p', c: 'Here are the details. Each tab can contain any TACO content.' } },
                    { label: 'Settings', content: { t: 'p', c: 'Settings panel with form controls or any other components.' } }
                  ]
                }),
                "bw.makeTabs({\n  tabs: [\n    { label: 'Overview', active: true, content: 'Overview content' },\n    { label: 'Details', content: 'Details content' },\n    { label: 'Settings', content: 'Settings panel' }\n  ]\n})"
              )
            ),

            // =================================================================
            // 8. Alerts
            // =================================================================
            demoSection('section-alerts', 'Alerts',
              'Contextual feedback messages. Available in all variant colors with optional dismiss button.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    bw.makeAlert({ content: 'This is a primary alert!', variant: 'primary' }),
                    bw.makeAlert({ content: 'Success! Your action was completed.', variant: 'success' }),
                    bw.makeAlert({ content: 'Warning! Please be careful.', variant: 'warning' }),
                    bw.makeAlert({ content: 'Error! Something went wrong.', variant: 'danger' }),
                    bw.makeAlert({ content: 'This alert can be dismissed.', variant: 'info', dismissible: true })
                  ]
                },
                "bw.makeAlert({ content: 'Success!', variant: 'success' })\nbw.makeAlert({\n  content: 'Dismissible alert.',\n  variant: 'info',\n  dismissible: true\n})"
              )
            ),

            // =================================================================
            // 9. Badges
            // =================================================================
            demoSection('section-badges', 'Badges',
              'Small count and labeling components for notifications, status indicators, or highlighting items.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Variants'),
                      bw.makeBadge({ text: 'Primary', variant: 'primary' }), ' ',
                      bw.makeBadge({ text: 'Secondary', variant: 'secondary' }), ' ',
                      bw.makeBadge({ text: 'Success', variant: 'success' }), ' ',
                      bw.makeBadge({ text: 'Danger', variant: 'danger' }), ' ',
                      bw.makeBadge({ text: 'Warning', variant: 'warning' }), ' ',
                      bw.makeBadge({ text: 'Info', variant: 'info' }), ' ',
                      bw.makeBadge({ text: 'Dark', variant: 'dark' })
                    ]},
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Sizes'),
                      bw.makeBadge({ text: 'Small', variant: 'primary', size: 'sm' }), ' ',
                      bw.makeBadge({ text: 'Default', variant: 'primary' }), ' ',
                      bw.makeBadge({ text: 'Large', variant: 'primary', size: 'lg' })
                    ]},
                    { t: 'div', a: { style: 'margin-bottom: 1rem;' }, c: [
                      subheading('Pills'),
                      bw.makeBadge({ text: 'Pill SM', variant: 'success', size: 'sm', pill: true }), ' ',
                      bw.makeBadge({ text: 'Pill', variant: 'success', pill: true }), ' ',
                      bw.makeBadge({ text: 'Pill LG', variant: 'success', size: 'lg', pill: true })
                    ]},
                    { t: 'h3', a: { style: 'font-size: 1.1rem; margin: 0;' }, c: [
                      'Notifications ', bw.makeBadge({ text: '99+', variant: 'danger' })
                    ]}
                  ]
                },
                "bw.makeBadge({ text: 'Primary', variant: 'primary' })\nbw.makeBadge({ text: 'Small', variant: 'info', size: 'sm' })\nbw.makeBadge({ text: 'Large', variant: 'danger', size: 'lg' })\nbw.makeBadge({ text: 'Pill', variant: 'success', pill: true })\n\n// In context\n{ t: 'h3', c: ['Notifications ', bw.makeBadge({ text: '99+', variant: 'danger' })] }"
              )
            ),

            // =================================================================
            // 10. Progress Bars
            // =================================================================
            demoSection('section-progress', 'Progress Bars',
              'Show task completion with colored, striped, or animated progress bars.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    bw.makeProgress({ value: 25 }),
                    { t: 'div', a: { style: 'height: 0.5rem;' } },
                    bw.makeProgress({ value: 50, variant: 'success' }),
                    { t: 'div', a: { style: 'height: 0.5rem;' } },
                    bw.makeProgress({ value: 75, variant: 'warning' }),
                    { t: 'div', a: { style: 'height: 0.5rem;' } },
                    bw.makeProgress({ value: 60, variant: 'info', striped: true }),
                    { t: 'div', a: { style: 'height: 0.5rem;' } },
                    bw.makeProgress({ value: 80, variant: 'danger', striped: true, animated: true })
                  ]
                },
                "bw.makeProgress({ value: 50, variant: 'success' })\nbw.makeProgress({ value: 60, variant: 'info', striped: true })\nbw.makeProgress({ value: 80, variant: 'danger', striped: true, animated: true })"
              )
            ),

            // =================================================================
            // 11. List Groups
            // =================================================================
            demoSection('section-lists', 'List Groups',
              'Flexible list components for displaying series of content. Supports interactive items, active/disabled states, and flush variant.',
              createTabbedDemo(
                {
                  t: 'div', a: { class: 'bw-grid-auto' }, c: [
                    { t: 'div', c: [
                      subheading('Basic List'),
                      bw.makeListGroup({ items: ['First item', 'Second item', 'Third item', 'Fourth item'] })
                    ]},
                    { t: 'div', c: [
                      subheading('Interactive'),
                      bw.makeListGroup({
                        interactive: true,
                        items: [
                          { text: 'Active item', active: true },
                          { text: 'Regular item' },
                          { text: 'Disabled item', disabled: true }
                        ]
                      })
                    ]}
                  ]
                },
                "bw.makeListGroup({\n  items: ['First', 'Second', 'Third']\n})\n\nbw.makeListGroup({\n  interactive: true,\n  items: [\n    { text: 'Active', active: true },\n    { text: 'Disabled', disabled: true }\n  ]\n})"
              )
            ),

            // =================================================================
            // 12. Spinners
            // =================================================================
            demoSection('section-spinners', 'Spinners',
              'Loading indicators in border or grow styles with size and color variants.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    {
                      t: 'div', a: { style: 'display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem;' },
                      c: [
                        bw.makeSpinner({ variant: 'primary' }),
                        bw.makeSpinner({ variant: 'success' }),
                        bw.makeSpinner({ variant: 'danger' }),
                        bw.makeSpinner({ type: 'grow', variant: 'info' }),
                        bw.makeSpinner({ type: 'grow', variant: 'warning' })
                      ]
                    },
                    {
                      t: 'div', a: { style: 'display: flex; gap: 1rem; align-items: center;' },
                      c: [
                        bw.makeSpinner({ size: 'sm', variant: 'primary' }),
                        bw.makeSpinner({ variant: 'primary' }),
                        bw.makeSpinner({ type: 'grow', size: 'sm', variant: 'primary' })
                      ]
                    }
                  ]
                },
                "bw.makeSpinner({ variant: 'primary' })\nbw.makeSpinner({ type: 'grow', variant: 'info' })\nbw.makeSpinner({ size: 'sm', variant: 'primary' })"
              )
            ),

            // =================================================================
            // 13. Form Controls
            // =================================================================
            demoSection('section-forms', 'Form Controls',
              'Complete form components: text inputs, textareas, selects, checkboxes, radio buttons, and toggle switches.',
              createTabbedDemo(
                {
                  t: 'div', c: [
                    { t: 'div', a: { style: 'display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;' }, c: [
                      { t: 'div', c: [
                        subheading('Text Inputs'),
                        bw.makeFormGroup({ label: 'Name', id: 'demo-name', input: bw.makeInput({ id: 'demo-name', placeholder: 'Enter your name' }) }),
                        bw.makeFormGroup({ label: 'Email', id: 'demo-email', input: bw.makeInput({ type: 'email', id: 'demo-email', placeholder: 'you@example.com' }) }),
                        bw.makeFormGroup({ label: 'Password', id: 'demo-pass', input: bw.makeInput({ type: 'password', id: 'demo-pass', placeholder: 'Enter password' }) }),
                        bw.makeFormGroup({ label: 'Message', id: 'demo-msg', input: bw.makeTextarea({ id: 'demo-msg', placeholder: 'Your message', rows: 2 }) }),
