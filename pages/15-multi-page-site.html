<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Pages & Routing</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-theme.js"></script>
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.min.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    initBitwrenchPage('15-multi-page-site.html');

    // =========================================================================
    // Helper: read-only code block
    // =========================================================================
    function codeBlock(code, lang) {
      return bw.codeEditor
        ? bw.codeEditor({ code: code, lang: lang || 'js', readOnly: true, height: 'auto' })
        : { t: 'pre', c: { t: 'code', c: code } };
    }

    // =========================================================================
    // Page-specific CSS
    // =========================================================================
    bw.injectCSS(bw.css({
      '.site-preview': {
        border: '1px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        'max-height': '420px',
        'overflow-y': 'auto',
        background: 'var(--bw_card_bg)',
        'margin-bottom': 'var(--bw_space_md)'
      },
      '.site-preview-toolbar': {
        display: 'flex',
        'flex-wrap': 'wrap',
        gap: '0.5rem',
        'margin-bottom': '0.75rem'
      },
      '.dual-preview': {
        display: 'grid',
        'grid-template-columns': '1fr 1fr',
        gap: 'var(--bw_space_md)',
        'margin-bottom': 'var(--bw_space_md)'
      },
      '@media (max-width: 768px)': {
        '.dual-preview': {
          'grid-template-columns': '1fr'
        }
      },
      '.demo-section': {
        'margin-bottom': '2.5rem'
      },
      '.demo-section h2': {
        'font-size': '1.4rem',
        'font-weight': '600',
        'margin-bottom': '0.75rem',
        color: 'var(--bw_teal_dark)',
        'padding-bottom': '0.5rem',
        'border-bottom': '2px solid var(--bw_teal)'
      },
      '.demo-section h3': {
        'font-size': '1.1rem',
        'font-weight': '600',
        'margin-top': '1.25rem',
        'margin-bottom': '0.5rem'
      },
      '.demo-section p': {
        'margin-bottom': '0.75rem',
        'line-height': '1.6'
      },
      '.preview-header': {
        background: 'var(--bw_teal_dark, #1a3a5c)',
        color: '#fff',
        padding: '0.75rem 1rem',
        'font-weight': '600',
        'font-size': '0.95rem'
      },
      '.preview-nav': {
        background: 'var(--bw_teal, #336699)',
        padding: '0.5rem 1rem',
        display: 'flex',
        gap: '1rem'
      },
      '.preview-nav a, .preview-nav span': {
        color: 'rgba(255,255,255,0.8)',
        'text-decoration': 'none',
        'font-size': '0.85rem',
        cursor: 'pointer'
      },
      '.preview-nav .active': {
        color: '#fff',
        'font-weight': '600',
        'border-bottom': '2px solid #fff'
      },
      '.preview-body': {
        padding: '1.25rem'
      },
      '.preview-footer': {
        background: 'var(--bw_bg_muted, #f5f5f5)',
        padding: '0.75rem 1rem',
        'font-size': '0.8rem',
        color: 'var(--bw_text_secondary)',
        'border-top': '1px solid var(--bw_card_border)',
        'text-align': 'center'
      },
      '.preview-sidebar': { background: 'var(--bw_bg_muted, #f8f9fa)', padding: '1rem', 'border-right': '1px solid var(--bw_card_border)', 'min-width': '140px' },
      '.preview-sidebar ul': { 'list-style': 'none', padding: '0', margin: '0' },
      '.preview-sidebar li': { padding: '0.35rem 0', 'font-size': '0.85rem', color: 'var(--bw_text_secondary)' },
      '.callout': { padding: '1rem 1.25rem', 'border-radius': 'var(--bw_radius)', 'margin-bottom': '1rem', border: '1px solid var(--bw_card_border)', background: 'var(--bw_teal_bg, rgba(51,102,153,0.05))' },
      '.callout h4': { margin: '0 0 0.5rem 0', 'font-weight': '600' },
      '.kit-label': { 'font-weight': '600', 'margin-bottom': '0.5rem', 'font-size': '0.9rem' },
      '.patterns-table': {
        width: '100%',
        'border-collapse': 'collapse',
        'margin-bottom': '1.5rem',
        'font-size': '0.9rem'
      },
      '.patterns-table th': {
        background: 'var(--bw_teal_dark)',
        color: '#fff',
        padding: '0.6rem 0.75rem',
        'text-align': 'left',
        'font-weight': '600',
        'font-size': '0.8125rem'
      },
      '.patterns-table td': { padding: '0.5rem 0.75rem', 'border-bottom': '1px solid var(--bw_card_border)' },
      '.patterns-table tr:nth-child(even) td': { background: 'rgba(0,0,0,0.02)' },
      '.flow-diagram': {
        background: 'var(--bw_card_bg)',
        border: '1px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        padding: '1.25rem',
        margin: '1rem 0',
        'font-family': 'var(--bw_font_mono)',
        'font-size': '0.8rem',
        'line-height': '1.5',
        'overflow-x': 'auto',
        'white-space': 'pre'
      },
      '.router-demo': { border: '2px dashed var(--bw_card_border)', 'border-radius': 'var(--bw_radius)', 'min-height': '180px', 'margin-bottom': 'var(--bw_space_md)' },
      '.router-demo-nav': { display: 'flex', gap: '0.5rem', 'flex-wrap': 'wrap', 'margin-bottom': '0.75rem' },
      '.guard-status': { display: 'inline-flex', 'align-items': 'center', gap: '0.5rem', padding: '0.4rem 0.75rem', 'border-radius': 'var(--bw_radius)', 'font-size': '0.85rem', 'font-weight': '600', 'margin-bottom': '0.75rem' },
      '.guard-logged-in': { background: 'rgba(40,167,69,0.1)', color: '#28a745', border: '1px solid rgba(40,167,69,0.3)' },
      '.guard-logged-out': { background: 'rgba(220,53,69,0.1)', color: '#dc3545', border: '1px solid rgba(220,53,69,0.3)' },
      '.part-divider': { 'margin-top': '3rem', 'margin-bottom': '1.5rem', 'padding-bottom': '0.5rem', 'border-bottom': '3px solid var(--bw_teal)', color: 'var(--bw_teal_dark)', 'font-size': '1.1rem', 'font-weight': '700', 'text-transform': 'uppercase', 'letter-spacing': '0.05em' }
    }), { id: 'multi-page-styles' });

    // =========================================================================
    // Part 1, Section 1: The Dictionary Pattern
    // =========================================================================
    var dictPreviewItem = 'header';

    function makeDictHeader(opts) {
      opts = opts || {};
      return {
        t: 'div', a: { class: 'preview-header' },
        c: opts.title || 'My Site'
      };
    }

    function makeDictNav(opts) {
      opts = opts || {};
      var items = opts.items || ['Home', 'About', 'Blog', 'Contact'];
      return {
        t: 'div', a: { class: 'preview-nav' },
        c: items.map(function(item) {
          return {
            t: 'span',
            a: { class: opts.active === item ? 'active' : '' },
            c: item
          };
        })
      };
    }

    function makeDictFooter(opts) {
      opts = opts || {};
      return {
        t: 'div', a: { class: 'preview-footer' },
        c: opts.text || '\u00A9 2026 My Site \u00B7 All rights reserved'
      };
    }

    function makeDictSidebar(opts) {
      opts = opts || {};
      var links = opts.links || ['Dashboard', 'Settings', 'Profile', 'Help'];
      return {
        t: 'div', a: { class: 'preview-sidebar' },
        c: [
          { t: 'strong', a: { style: 'font-size:0.85rem' }, c: opts.title || 'Menu' },
          { t: 'ul', c: links.map(function(l) { return { t: 'li', c: l }; }) }
        ]
      };
    }

    function renderDictPreview() {
      var items = {
        header:  makeDictHeader({ title: 'My Site' }),
        nav:     makeDictNav({ items: ['Home', 'About', 'Blog', 'Contact'], active: 'Home' }),
        footer:  makeDictFooter(),
        sidebar: makeDictSidebar()
      };
      bw.DOM('#dict-preview', {
        t: 'div', a: { class: 'site-preview' },
        c: items[dictPreviewItem] || items.header
      });
    }

    function renderSection1Buttons() {
      var toolbar = bw.$('.site-preview-toolbar');
      if (toolbar.length) {
        bw.DOM(toolbar[0], {
          t: 'div', a: { class: 'site-preview-toolbar', style: 'display:flex;flex-wrap:wrap;gap:0.5rem' },
          c: ['header', 'nav', 'footer', 'sidebar'].map(function(key) {
            return bw.makeButton({
              text: key.charAt(0).toUpperCase() + key.slice(1),
              variant: dictPreviewItem === key ? 'primary' : 'outline-secondary',
              size: 'sm',
              onclick: function() {
                dictPreviewItem = key;
                renderSection1Buttons();
                renderDictPreview();
              }
            });
          })
        });
      }
    }

    var section1 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', a: { id: 'dictionary-pattern' }, c: '1. The Dictionary Pattern' },
        {
          t: 'p',
          c: 'Store reusable UI pieces in a plain JS object. Each entry is a function that returns a TACO. Because they\'re functions, they accept options -- the same header renders with different titles, the same nav with different active states.'
        },
        codeBlock(
          'var site = {\n' +
          '  header: function(opts) {\n' +
          '    return { t: \'div\', a: { class: \'site-header\' },\n' +
          '             c: opts.title || \'My Site\' };\n' +
          '  },\n' +
          '  nav: function(opts) {\n' +
          '    return { t: \'nav\', c: opts.items.map(function(item) {\n' +
          '      return { t: \'a\', a: { href: item.href,\n' +
          '        class: opts.active === item.text ? \'active\' : \'\' },\n' +
          '        c: item.text };\n' +
          '    })};\n' +
          '  },\n' +
          '  footer: function(opts) {\n' +
          '    return { t: \'footer\', c: opts.text || \'\u00A9 2026\' };\n' +
          '  }\n' +
          '};'
        ),
        { t: 'h3', c: 'Try it -- click each dictionary entry:' },
        {
          t: 'div', a: { class: 'site-preview-toolbar' },
          c: ['header', 'nav', 'footer', 'sidebar'].map(function(key) {
            return bw.makeButton({
              text: key.charAt(0).toUpperCase() + key.slice(1),
              variant: dictPreviewItem === key ? 'primary' : 'outline-secondary',
              size: 'sm',
              onclick: function() {
                dictPreviewItem = key;
                renderSection1Buttons();
                renderDictPreview();
              }
            });
          })
        },
        { t: 'div', a: { id: 'dict-preview' } },
        {
          t: 'div', a: { class: 'callout' },
          c: [
            { t: 'h4', c: 'Key insight' },
            { t: 'p', a: { style: 'margin:0' }, c: 'Each entry is just a function that returns a TACO object. No special registry, no class hierarchy, no framework API. A plain object of functions is all you need.' }
          ]
        }
      ]
    };

    // =========================================================================
    // Part 1, Section 2: Composing Pages
    // =========================================================================
    var currentPage = 'home';

    var site = {
      header: makeDictHeader,
      nav:    makeDictNav,
      footer: makeDictFooter,
      sidebar: makeDictSidebar
    };

    var pageContents = {
      home: {
        title: 'Welcome Home',
        body: [
          { t: 'p', c: 'This is the home page. Every page shares the same header, navigation, and footer -- pulled from the site dictionary.' },
          bw.makeCard({ title: 'Featured', content: 'A highlight card on the home page.', variant: 'primary' })
        ]
      },
      about: {
        title: 'About Us',
        body: [
          { t: 'p', c: 'The about page. Same chrome, different content.' },
          { t: 'p', c: 'We build tools that treat UI as data, not templates.' }
        ]
      },
      blog: {
        title: 'Blog',
        body: [
          { t: 'p', c: 'Recent posts:' },
          { t: 'ul', c: [
            { t: 'li', c: 'TACO vs JSX: A Comparison' },
            { t: 'li', c: 'Building Server-Driven UIs' },
            { t: 'li', c: 'Design Systems from Two Colors' }
          ]}
        ]
      },
      contact: {
        title: 'Contact',
        body: [
          { t: 'p', c: 'Get in touch:' },
          bw.makeInput({ placeholder: 'Your email', type: 'email' }),
          { t: 'div', a: { style: 'margin-top:0.5rem' } },
          bw.makeButton({ text: 'Send Message', variant: 'primary', size: 'sm' })
        ]
      }
    };

    function buildPage(pageName) {
      var pg = pageContents[pageName] || pageContents.home;
      return {
        t: 'div', a: { class: 'site-preview' },
        c: [
          site.nav({ items: ['Home', 'About', 'Blog', 'Contact'], active: pageName.charAt(0).toUpperCase() + pageName.slice(1) }),
          site.header({ title: pg.title }),
          { t: 'div', a: { class: 'preview-body' }, c: pg.body },
          site.footer()
        ]
      };
    }

    function renderSitePreview() {
      bw.DOM('#site-preview', buildPage(currentPage));
    }

    function renderSection2Buttons() {
      var toolbar = bw.$('#site-toolbar');
      if (toolbar.length) {
        bw.DOM(toolbar[0], {
          t: 'div',
          c: ['home', 'about', 'blog', 'contact'].map(function(pg) {
            return bw.makeButton({
              text: pg.charAt(0).toUpperCase() + pg.slice(1),
              variant: currentPage === pg ? 'primary' : 'outline-secondary',
              size: 'sm',
              onclick: function() {
                currentPage = pg;
                renderSection2Buttons();
                renderSitePreview();
              }
            });
          })
        });
      }
    }

    var section2 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', a: { id: 'composing-pages' }, c: '2. Composing Pages' },
        {
          t: 'p',
          c: 'Each "page" is a function that pulls shared pieces from the dictionary and adds its own content. The page function decides the order and layout.'
        },
        codeBlock(
          'function buildPage(site, pageName) {\n' +
          '  var pg = pageContents[pageName];\n' +
          '  return { t: \'div\', c: [\n' +
          '    site.nav({ active: pageName }),\n' +
          '    site.header({ title: pg.title }),\n' +
          '    { t: \'div\', c: pg.body },\n' +
          '    site.footer()\n' +
          '  ]};\n' +
          '}\n' +
          '\n' +
          '// Switch pages = call buildPage() with a different name\n' +
          'bw.DOM(\'#app\', buildPage(site, \'about\'));'
        ),
        { t: 'h3', c: 'Try it -- switch between pages:' },
        {
          t: 'div', a: { id: 'site-toolbar', class: 'site-preview-toolbar' },
          c: ['home', 'about', 'blog', 'contact'].map(function(pg) {
            return bw.makeButton({
              text: pg.charAt(0).toUpperCase() + pg.slice(1),
              variant: currentPage === pg ? 'primary' : 'outline-secondary',
              size: 'sm',
              onclick: function() {
                currentPage = pg;
                renderSection2Buttons();
                renderSitePreview();
              }
            });
          })
        },
        { t: 'div', a: { id: 'site-preview' } },
        {
          t: 'div', a: { class: 'callout' },
          c: [
            { t: 'h4', c: 'The aha moment' },
            { t: 'p', a: { style: 'margin:0' }, c: 'Every page shares the same nav, header, and footer from the dictionary. Changing the footer function once changes it everywhere. This is multi-page composition by reference, not copy-paste.' }
          ]
        }
      ]
    };

    // =========================================================================
    // Part 1, Section 3: Site Kit Factory
    // =========================================================================
    function createSiteKit(config) {
      var theme = bw.makeStyles({
        primary: config.primary,
        secondary: config.secondary
      });
      var palette = theme.palette;

      return {
        name: config.name,
        css: theme.css,
        header: function(opts) {
          return {
            t: 'div',
            a: { style: 'background:' + palette.primary.base + ';color:' + palette.primary.textOn + ';padding:0.75rem 1rem;font-weight:600' },
            c: (opts && opts.title) || config.siteName
          };
        },
        nav: function(opts) {
          var items = (opts && opts.items) || config.navItems || ['Home', 'About'];
          return {
            t: 'div',
            a: { style: 'background:' + palette.primary.hover + ';padding:0.5rem 1rem;display:flex;gap:1rem' },
            c: items.map(function(item) {
              return {
                t: 'span',
                a: { style: 'color:' + palette.primary.textOn + ';font-size:0.85rem;opacity:' + ((opts && opts.active === item) ? '1' : '0.7') },
                c: item
              };
            })
          };
        },
        footer: function() {
          return {
            t: 'div',
            a: { style: 'background:' + palette.surface + ';padding:0.5rem 1rem;font-size:0.8rem;text-align:center' },
            c: '\u00A9 2026 ' + config.siteName
          };
        },
        card: function(opts) {
          return {
            t: 'div',
            a: { style: 'border:1px solid ' + palette.primary.border + ';border-radius:var(--bw_radius);padding:1rem;margin:0.5rem 0;border-left:3px solid ' + palette.secondary.base },
            c: [
              { t: 'strong', c: (opts && opts.title) || '' },
              { t: 'p', a: { style: 'margin:0.5rem 0 0;font-size:0.9rem' }, c: (opts && opts.content) || '' }
            ]
          };
        }
      };
    }

    var corporateKit = createSiteKit({
      name: 'corporate',
      siteName: 'Acme Corp',
      primary: '#1a5276',
      secondary: '#d4ac0d',
      navItems: ['Home', 'Products', 'About']
    });

    var creativeKit = createSiteKit({
      name: 'creative',
      siteName: 'Studio Nine',
      primary: '#c0392b',
      secondary: '#e67e22',
      navItems: ['Work', 'Process', 'Contact']
    });

    function kitPreview(kit) {
      return {
        t: 'div', a: { class: 'site-preview' },
        c: [
          kit.nav({ items: undefined, active: undefined }),
          kit.header(),
          { t: 'div', a: { style: 'padding:1rem' },
            c: [
              kit.card({ title: 'Feature One', content: 'Each kit generates its own colors from seed values.' }),
              kit.card({ title: 'Feature Two', content: 'The same factory, different configuration.' })
            ]
          },
          kit.footer()
        ]
      };
    }

    var section3 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', a: { id: 'site-kit-factory' }, c: '3. Site Kit Factory' },
        {
          t: 'p',
          c: [
            'Formalize the dictionary into a factory function. A "site kit" is a pre-configured set of components -- header, nav, footer, card -- all sharing theme colors derived from ',
            { t: 'code', c: 'bw.makeStyles()' },
            '.'
          ]
        },
        codeBlock(
          'function createSiteKit(config) {\n' +
          '  var theme = bw.makeStyles({\n' +
          '    primary: config.primary,\n' +
          '    secondary: config.secondary\n' +
          '  });\n' +
          '  var palette = theme.palette;\n' +
          '\n' +
          '  return {\n' +
          '    header: function(opts) {\n' +
          '      return { t: \'div\',\n' +
          '        a: { style: \'background:\' + palette.primary.base +\n' +
          '             \';color:\' + palette.primary.textOn },\n' +
          '        c: opts.title || config.siteName };\n' +
          '    },\n' +
          '    nav:    function(opts) { /* themed nav */ },\n' +
          '    footer: function()     { /* themed footer */ },\n' +
          '    card:   function(opts) { /* themed card */ }\n' +
          '  };\n' +
          '}\n' +
          '\n' +
          'var corporate = createSiteKit({\n' +
          '  primary: \'#1a5276\', secondary: \'#d4ac0d\'\n' +
          '});\n' +
          'var creative = createSiteKit({\n' +
          '  primary: \'#c0392b\', secondary: \'#e67e22\'\n' +
          '});'
        ),
        { t: 'h3', c: 'Two kits, side by side:' },
        {
          t: 'div', a: { class: 'dual-preview' },
          c: [
            { t: 'div', c: [
              { t: 'div', a: { class: 'kit-label' }, c: 'Corporate Kit' },
              kitPreview(corporateKit)
            ]},
            { t: 'div', c: [
              { t: 'div', a: { class: 'kit-label' }, c: 'Creative Kit' },
              kitPreview(creativeKit)
            ]}
          ]
        },
        {
          t: 'div', a: { class: 'callout' },
          c: [
            { t: 'h4', c: 'Why this matters' },
            {
              t: 'p', a: { style: 'margin:0' },
              c: 'Change the two seed colors, and every component in the kit updates. This is bitwrench\'s design-system-from-code approach -- no Figma tokens to export, no CSS variables to hand-tune.'
            }
          ]
        }
      ]
    };

    // =========================================================================
    // Part 2, Section 4: What Is Client-Side Routing?
    // =========================================================================
    var section4 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', a: { id: 'what-is-routing' }, c: '4. What Is Client-Side Routing?' },
        {
          t: 'p',
          c: 'Traditional websites reload the entire page on every link click. An SPA (Single-Page Application) loads one HTML page, then JavaScript swaps content in the DOM when the user navigates. The URL still changes (bookmarks and back/forward work), but the page never fully reloads.'
        },
        { t: 'h3', c: 'Two browser mechanisms' },
        {
          t: 'p',
          c: [
            { t: 'strong', c: 'Hash fragment' },
            ' (',
            { t: 'code', c: 'example.com/#/users/123' },
            ') -- Changing the ',
            { t: 'code', c: '#' },
            ' does not trigger a page reload. The browser fires ',
            { t: 'code', c: 'hashchange' },
            ' which JavaScript can listen to.'
          ]
        },
        {
          t: 'p',
          c: [
            { t: 'strong', c: 'History API' },
            ' (',
            { t: 'code', c: 'example.com/users/123' },
            ') -- ',
            { t: 'code', c: 'history.pushState()' },
            ' changes the URL without a reload. Requires server configuration (SPA fallback).'
          ]
        },
        {
          t: 'p',
          c: [
            'Bitwrench supports both. ',
            { t: 'strong', c: 'Hash mode is the default' },
            ' -- works everywhere with zero server configuration, even from ',
            { t: 'code', c: 'file://' },
            ' URLs.'
          ]
        },
        { t: 'h3', c: 'The key insight' },
        {
          t: 'p',
          c: [
            '"Switching pages" in bitwrench is just calling ',
            { t: 'code', c: 'bw.DOM(target, taco)' },
            ' with different TACO content. Sections 1-2 above already do this with button clicks. A router simply maps URL changes to those same ',
            { t: 'code', c: 'bw.DOM()' },
            ' calls.'
          ]
        },
        { t: 'h3', c: 'Navigation flow' },
        {
          t: 'div', a: { class: 'flow-diagram' },
          c: 'bw.navigate(path) or link click\n' +
             '  |-> 1. URL changes (hash or pushState)\n' +
             '  |-> 2. before() guard -- redirect or block?\n' +
             '  |-> 3. Match URL against route patterns\n' +

        ]
      };
    }

    // Build section 5 nav links
    bw.DOM('#router5-nav', {
      t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap' },
      c: routerPages5.map(function(pg) {
        var label = pg.charAt(0).toUpperCase() + pg.slice(1);
        return bw.link(routerBasePath + (pg === 'home' ? '' : '/' + pg), label, {
          class: 'bw_btn bw_btn_sm bw_btn_outline_secondary'
        });
      })
    });

    // Build section 6 nav links
    bw.DOM('#router6-nav', {
      t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap' },
      c: [
        bw.link('/demo/users', 'User List', { class: 'bw_btn bw_btn_sm bw_btn_outline_secondary' })
      ]
    });

    // Build section 8 nav links
    bw.DOM('#router8-nav', {
      t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap' },
      c: [
        bw.link('/demo/guard', 'Home', { class: 'bw_btn bw_btn_sm bw_btn_outline_secondary' }),
        bw.link('/demo/guard/dashboard', 'Dashboard', { class: 'bw_btn bw_btn_sm bw_btn_outline_secondary' }),
        bw.link('/demo/guard/settings', 'Settings', { class: 'bw_btn bw_btn_sm bw_btn_outline_secondary' })
      ]
    });

    // Initial guard status
    renderGuardStatus();

    // =========================================================================
    // Single shared router for all demos
    // =========================================================================
    routerInstance = bw.router({
      target: null, // we route to multiple targets, so we handle rendering ourselves
      routes: {
        // Section 5: basic routing
        '/demo':         function() {
          bw.DOM('#router5-view', makeRouterPageContent('Home', '', 'Welcome to the home page. Try clicking About or Contact.'));
          return null;
        },
        '/demo/about':   function() {
          bw.DOM('#router5-view', makeRouterPageContent('About', '', 'This is the about page. Use your browser\'s back button to return to Home.'));
          return null;
        },
        '/demo/contact': function() {
          bw.DOM('#router5-view', makeRouterPageContent('Contact', '', 'The contact page. Notice the URL in your address bar changed.'));
          return null;
        },

        // Section 6: route parameters
        '/demo/users':     function() {
          bw.DOM('#router6-view', userListView());
          return null;
        },
        '/demo/users/:id': function(params) {
          bw.DOM('#router6-view', userDetailView(params));
          return null;
        },

        // Section 8: guards
        '/demo/guard':           function() {
          bw.DOM('#router8-view', guardHomePage());
          return null;
        },
        '/demo/guard/dashboard': function() {
          bw.DOM('#router8-view', guardDashboard());
          return null;
        },
        '/demo/guard/login':     function() {
          bw.DOM('#router8-view', guardLoginMessage());
          return null;
        },
        '/demo/guard/settings':  function() {
          bw.DOM('#router8-view', guardSettingsPage());
          return null;
        },

        // 404 fallback
        '*': function() {
          bw.DOM('#router5-view', makeRouterPageContent('404', '', 'Page not found. This is the * wildcard catch-all route.'));
          return null;
        }
      },
      before: function(to, from) {
        // Guard for section 8: protect /demo/guard/dashboard
        if (to === '/demo/guard/dashboard' && !guardLoggedIn) {
          return '/demo/guard/login';
        }
      },
      after: function(to) {
        // Highlight active nav links for section 5
        var links5 = bw.$('#router5-nav a');
        links5.forEach(function(a) {
          var href = (a.getAttribute('href') || '').replace(/^#/, '');
          if (href === to || (to === '/demo' && href === '/demo')) {
            a.className = 'bw_btn bw_btn_sm bw_btn_primary';
          } else {
            a.className = 'bw_btn bw_btn_sm bw_btn_outline_secondary';
          }
        });

        // Highlight active nav links for section 8
        var links8 = bw.$('#router8-nav a');
        links8.forEach(function(a) {
          var href = (a.getAttribute('href') || '').replace(/^#/, '');
          if (href === to) {
            a.className = 'bw_btn bw_btn_sm bw_btn_primary';
          } else {
            a.className = 'bw_btn bw_btn_sm bw_btn_outline_secondary';
          }
        });
      }
    });

    // Navigate to initial route so demo views are populated
    if (!window.location.hash || window.location.hash.indexOf('/demo') === -1) {
      bw.navigate('/demo');
    }
  </script>
</body>
</html>
