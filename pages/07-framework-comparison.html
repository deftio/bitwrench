<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Framework Comparison</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.min.js"></script>
  <script src="shared-nav.js"></script>
  <script src="site.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    var styles = initBitwrenchPage('07-framework-comparison.html');
    var p = styles.palette;

    // =========================================================================
    // Page-specific CSS via bw.css() + bw.injectCSS()
    // =========================================================================
    bw.injectCSS(bw.css({
      '.preview-box': {
        'background': p.surface,
        'border': '2px solid ' + p.primary.base,
        'border-radius': '8px',
        'padding': '1.5rem',
        'margin-bottom': '1.25rem'
      },
      '.preview-label': {
        'font-size': '0.6875rem',
        'text-transform': 'uppercase',
        'letter-spacing': '0.06em',
        'color': p.primary.base,
        'font-weight': '700',
        'margin-bottom': '0.75rem'
      },
      '.cmp-table': {
        'width': '100%',
        'border-collapse': 'collapse',
        'margin': '1rem 0',
        'font-size': '0.875rem'
      },
      '.cmp-table th, .cmp-table td': {
        'padding': '0.65rem 1rem',
        'text-align': 'left',
        'border-bottom': '1px solid ' + p.light.border
      },
      '.cmp-table th': {
        'background': p.surfaceAlt,
        'font-weight': '600',
        'color': p.dark.hover,
        'font-size': '0.75rem',
        'text-transform': 'uppercase',
        'letter-spacing': '0.04em'
      },
      '.cmp-table tr:hover': {
        'background': p.surfaceAlt
      },
      '.theme-card': {
        'padding': '1.25rem',
        'border-radius': '8px',
        'border': '1px solid ' + p.light.border,
        'transition': 'all 0.3s'
      },
      '.theme-card h4': {
        'margin': '0 0 0.35rem'
      },
      '.theme-card p': {
        'margin': '0',
        'font-size': '0.875rem',
        'opacity': '0.85'
      },
      '.theme-btns': {
        'display': 'flex',
        'gap': '0.5rem',
        'margin-bottom': '1rem'
      },
      '.bw_site_pages_demo_body .bw_nav_tabs': {
        'flex-wrap': 'nowrap',
        'overflow-x': 'auto',
        '-webkit-overflow-scrolling': 'touch',
        'scrollbar-width': 'none'
      },
      '.bw_site_pages_demo_body .bw_nav_tabs::-webkit-scrollbar': {
        'display': 'none'
      },
      '.bw_site_pages_demo_body .bw_nav_tabs .bw_nav_link': {
        'white-space': 'nowrap'
      },
      '#honest-summary .callout': {
        'min-width': '0',
        'overflow': 'hidden'
      },
      '#honest-summary .callout pre': {
        'overflow-x': 'auto'
      },
      '#translation-table': {
        'overflow-x': 'auto',
        '-webkit-overflow-scrolling': 'touch'
      },
      '#translation-table .cmp-table td': {
        'white-space': 'nowrap',
        'max-width': '220px',
        'overflow': 'hidden',
        'text-overflow': 'ellipsis'
      },
      '@media (max-width: 768px)': {
        '#honest-summary > div': {
          'grid-template-columns': '1fr !important'
        }
      }
    }));

    // =========================================================================
    // Build page structure as TACO objects
    // =========================================================================

    var pageHeader = {
      t: 'div', a: { class: 'bw_site_pages_header' },
      c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
        c: [
          { t: 'h1', c: 'Framework Comparison' },
          { t: 'p', a: { class: 'subtitle' }, c: 'Map your domain knowledge from React, Vue, Svelte, Bootstrap, SolidJS, and other frameworks to bitwrench patterns.' }
        ]
      }
    };

    // -- Intro section --
    var introSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'About This Page' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('If you already know React, Vue, Svelte, Bootstrap, SolidJS, or vanilla JavaScript, this page shows how the same tasks are expressed in bitwrench. Use it as a translation guide to map familiar patterns to bitwrench\'s TACO-based approach.') }
        }
      ]
    };

    // -- Comparison 1: Table from data --
    var tableSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 1: Table from Data' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: [
                'Given an array of objects, render a styled table. In bitwrench, ',
                { t: 'code', c: 'bw.makeTable()' },
                ' takes a data array and column definitions and returns a TACO object with built-in sorting, striping, and hover.'
              ] },
            { t: 'div', a: { id: 'table-preview' } },
            { t: 'div', a: { id: 'table-comparison' } }
          ]
        }
      ]
    };

    // -- Comparison 2: Dynamic theming --
    var themeSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 2: Dynamic Theming' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: [
                'Generate and apply a complete color theme at runtime. Using bitwrench\'s ',
                { t: 'code', c: 'bw.css()' },
                ' and ',
                { t: 'code', c: 'bw.injectCSS()' },
                ' allows themes to be modified at runtime without a build step. For more on themes see ',
                { t: 'a', a: { href: '10-themes.html' }, c: 'Themes' },
                ' and on styles see ',
                { t: 'a', a: { href: '03-styling.html' }, c: 'Styling' },
                '.'
              ] },
            { t: 'div', a: { id: 'theme-preview' } },
            { t: 'div', a: { id: 'theme-comparison' } }
          ]
        }
      ]
    };

    // -- Comparison 3: Data-driven list --
    var listSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 3: Rendering a List from Data' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'Given this data: three users with names and roles. Render a styled list where each item shows the name and a badge for the role. All code below produces this output:' },
            { t: 'div', a: { id: 'list-preview' } },
            { t: 'div', a: { id: 'list-comparison' } }
          ]
        }
      ]
    };

    // -- Comparison 4: Counter --
    var counterSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 4: Counter with Controls' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: bw.raw('A counter with increment, decrement, and reset buttons. The simplest interactive component &mdash; a good baseline for comparing each framework\'s approach to state and event handling.') },
            { t: 'div', a: { id: 'counter-preview' } },
            { t: 'div', a: { id: 'counter-comparison' } }
          ]
        }
      ]
    };

    // -- Comparison 5: Cross-Component Coordination --
    var crossSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 5: Cross-Component Coordination' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: bw.raw('Three independent counters share a global summary panel that auto-updates when any counter changes. This shows how each framework handles cross-component communication &mdash; the core challenge of any real application.') },
            { t: 'div', a: { id: 'cross-preview' } },
            { t: 'div', a: { id: 'cross-comparison' } }
          ]
        }
      ]
    };

    // -- Comparison 6: Todo --
    var todoSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Comparison 6: State Management (Todo List)' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'A realistic component: a todo list where you can add items and mark them done. Bitwrench uses manual re-rendering rather than automatic reactivity, trading convenience for transparency and control.' },
            { t: 'div', a: { id: 'todo-preview' } },
            { t: 'div', a: { id: 'todo-comparison' } }
          ]
        }
      ]
    };

    // -- Bonus: Dynamic styling --
    var styleSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Bonus: Dynamic Styling' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'A box that toggles between two color states when a button is clicked. Each framework changes background and text color on the same element. Try the preview:' },
            { t: 'div', a: { id: 'style-preview' } },
            { t: 'div', a: { id: 'style-comparison' } }
          ]
        }
      ]
    };

    // -- Summary table --
    var summarySection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Feature Comparison' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: { t: 'div', a: { id: 'summary-table' } }
        }
      ]
    };

    // -- Operation-by-operation translation table --
    var translationSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Operation-by-Operation Translation' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'How common UI operations map across frameworks. Each cell shows the idiomatic one-liner.' },
            { t: 'div', a: { id: 'translation-table' } }
          ]
        }
      ]
    };

    // -- Common concerns --
    var concernsSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Common Concerns, Demonstrated' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'Developers coming from other frameworks often ask how bitwrench handles these topics. Rather than make claims, here are code examples showing the bitwrench approach.' },
            { t: 'div', a: { id: 'honest-summary' } }
          ]
        }
      ]
    };

    // -- Example use cases --
    var useCasesSection = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Example Use Cases' },
        { t: 'div', a: { class: 'bw_site_pages_demo_body' },
          c: [
            { t: 'p', a: { class: 'intro-text' },
              c: 'Bitwrench is used in a range of contexts. Here are some examples.' },
            { t: 'div', a: { id: 'use-cases' } }
          ]
        }
      ]
    };

    // -- Content wrapper --
    var contentWrapper = {
      t: 'div', a: { class: 'content-container wide' },
      c: [
        introSection,
        tableSection,
        themeSection,
        listSection,
        counterSection,
        crossSection,
        todoSection,
        styleSection,
        summarySection,
        translationSection,
        concernsSection,
        useCasesSection
      ]
    };

    // =========================================================================
    // Mount page structure
    // =========================================================================
    bw.DOM('#app', [pageHeader, contentWrapper]);

    // =========================================================================
    // Reusable helpers
    // =========================================================================

    // Preview label
    var previewLabel = { t: 'div', a: { class: 'preview-label' }, c: 'What we\'re building (live)' };

    // Build a tabbed code comparison from an array of { label, code } objects
    var useCE = typeof bw.codeEditor === 'function';
    var codeComparison = function(examples) {
      return bw.makeTabs({
        tabs: examples.map(function(ex) {
          var codeBlock = useCE
            ? bw.codeEditor({ code: ex.code, lang: 'js', readOnly: true, height: 'auto' })
            : { t: 'pre', c: { t: 'code', c: ex.code } };
          return {
            label: ex.label,
            content: {
              t: 'div',
              a: { style: 'position: relative;' },
              c: codeBlock
            }
          };
        })
      });
    };

    // ---- Comparison 1: Counter ----
    // Live preview — counter with increment, decrement, reset
    (function() {
      var count = 0;

      function renderPreview() {
        bw.DOM('#counter-preview', {
          t: 'div',
          a: { class: 'preview-box' },
          c: [
            previewLabel,
            {
              t: 'div',
              c: [
                { t: 'h4', a: { style: 'margin: 0 0 0.75rem;' }, c: 'Count: ' + count },
                {
                  t: 'div',
                  a: { style: 'display: flex; gap: 0.35rem; flex-wrap: wrap;' },
                  c: [
                    bw.makeButton({ text: '+', variant: 'primary',
                      onclick: function() { count++; renderPreview(); } }),
                    bw.makeButton({ text: '\u2013', variant: 'secondary',
                      onclick: function() { count--; renderPreview(); } }),
                    bw.makeButton({ text: 'Reset', variant: 'secondary',
                      onclick: function() { count = 0; renderPreview(); } })
                  ]
                }
              ]
            }
          ]
        });
      }
      renderPreview();

      var examples = [
        {
          label: 'HTML / JS',
          code: [
            '<div id="counter">',
            '  <h4>Count: <span id="value">0</span></h4>',
            '  <button id="inc">+</button>',
            '  <button id="dec">\u2013</button>',
            '  <button id="reset">Reset</button>',
            '</div>',
            '',
            '<script>',
            '  var count = 0;',
            '  var span = document.getElementById("value");',
            '  document.getElementById("inc")',
            '    .addEventListener("click", function() {',
            '      span.textContent = ++count;',
            '    });',
            '  document.getElementById("dec")',
            '    .addEventListener("click", function() {',
            '      span.textContent = --count;',
            '    });',
            '  document.getElementById("reset")',
            '    .addEventListener("click", function() {',
            '      count = 0;',
            '      span.textContent = count;',
            '    });',
            '<\/script>'
          ].join('\n')
        },
        {
          label: 'React',
          code: [
            'import { useState } from "react";',
            '',
            'function Counter() {',
            '  const [count, setCount] = useState(0);',
            '  return (',
            '    <div>',
            '      <h4>Count: {count}</h4>',
            '      <button onClick={() => setCount(c => c + 1)}>+</button>',
            '      <button onClick={() => setCount(c => c - 1)}>\u2013</button>',
            '      <button onClick={() => setCount(0)}>Reset</button>',
            '    </div>',
            '  );',
            '}'
          ].join('\n')
        },
        {
          label: 'Vue',
          code: [
            '<script setup>',
            'import { ref } from "vue";',
            'const count = ref(0);',
            '<\/script>',
            '',
            '<template>',
            '  <div>',
            '    <h4>Count: {{ count }}</h4>',
            '    <button @click="count++">+</button>',
            '    <button @click="count--">\u2013</button>',
            '    <button @click="count = 0">Reset</button>',
            '  </div>',
            '</template>'
          ].join('\n')
        },
        {
          label: 'Svelte',
          code: [
            '<script>',
            '  let count = 0;',
            '<\/script>',
            '',
            '<div>',
            '  <h4>Count: {count}</h4>',
            '  <button on:click={() => count++}>+</button>',
            '  <button on:click={() => count--}>\u2013</button>',
            '  <button on:click={() => count = 0}>Reset</button>',
            '</div>'
          ].join('\n')
        },
        {
          label: 'Bootstrap',
          code: [
            '<div class="p-3">',
            '  <h4>Count: <span id="value">0</span></h4>',
            '  <div class="btn-group">',
            '    <button class="btn btn-primary" id="inc">+</button>',
            '    <button class="btn btn-secondary" id="dec">\u2013</button>',
            '    <button class="btn btn-secondary" id="reset">Reset</button>',
            '  </div>',
            '</div>',
            '',
            '<script>',
            '  var count = 0;',
            '  var span = document.getElementById("value");',
            '  document.getElementById("inc").onclick = function() {',
            '    span.textContent = ++count;',
            '  };',
            '  document.getElementById("dec").onclick = function() {',
            '    span.textContent = --count;',
            '  };',
            '  document.getElementById("reset").onclick = function() {',
            '    count = 0; span.textContent = count;',
            '  };',
            '<\/script>'
          ].join('\n')
        },
        {
          label: 'SolidJS',
          code: [
            'import { createSignal } from "solid-js";',
            '',
            'function Counter() {',
            '  const [count, setCount] = createSignal(0);',
            '  return (',
            '    <div>',
            '      <h4>Count: {count()}</h4>',
            '      <button onClick={() => setCount(c => c + 1)}>+</button>',
            '      <button onClick={() => setCount(c => c - 1)}>\u2013</button>',
            '      <button onClick={() => setCount(0)}>Reset</button>',
            '    </div>',
            '  );',
            '}'
          ].join('\n')
        },
        {
          label: 'Bitwrench',
          code: [
            'bw.DOM("#counter", {',
            '  t: "div",',
            '  o: {',
            '    state: { count: 0 },',
            '    render: function(el) {',
            '      var s = el._bw_state;',
            '      bw.DOM(el, {',
            '        t: "div", c: [',
            '          { t: "h4", c: "Count: " + s.count },',
            '          { t: "div", a: { style: "display:flex;gap:0.35rem" }, c: [',
            '            { t: "button", c: "+", a: {',
            '              onclick: function() { s.count++; bw.update(el); }',
            '            }},',
            '            { t: "button", c: "Reset", a: {',
            '              onclick: function() { s.count = 0; bw.update(el); }',
            '            }}',
            '          ]}',
            '        ]',
            '      });',
            '    }',
            '  }',
            '});'
          ].join('\n')
        }
      ];

      bw.DOM('#counter-comparison', codeComparison(examples));
    })();

    // ---- Cross-Component Coordination ----
    (function() {
      // Three counters with a global summary that auto-updates
      var counters = [
        { label: 'A', count: 0 },
        { label: 'B', count: 0 },
        { label: 'C', count: 0 }
      ];

      function renderCross() {
        var sum = counters.reduce(function(a, c) { return a + c.count; }, 0);
        bw.DOM('#cross-preview', {
          t: 'div', a: { class: 'preview-box' },
          c: [
            previewLabel,
            {
              t: 'div', a: { style: 'display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;' },
              c: counters.map(function(ctr) {
                return {
                  t: 'div', a: { style: 'border: 1px solid #d8d8d8; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; min-width: 100px; flex: 1;' },
                  c: [
                    { t: 'div', a: { style: 'font-weight: 600; margin-bottom: 0.25rem;' }, c: ctr.label },
                    { t: 'div', a: { style: 'font-size: 1.5rem; font-weight: 700; color: #004d4d; margin-bottom: 0.5rem;' }, c: String(ctr.count) },
                    { t: 'div', a: { style: 'display: flex; gap: 0.25rem; justify-content: center;' }, c: [
                      bw.makeButton({ text: '+', variant: 'primary', onclick: function() { ctr.count++; renderCross(); } }),
                      bw.makeButton({ text: '\u2013', variant: 'secondary', onclick: function() { ctr.count--; renderCross(); } })
                    ]}
                  ]
                };
              })
            },
            {
              t: 'div', a: { style: 'background: #f0faf9; border: 1px solid #d8d8d8; border-radius: 8px; padding: 0.75rem 1rem; text-align: center;' },
              c: [
                { t: 'div', a: { style: 'font-weight: 600; margin-bottom: 0.25rem;' }, c: 'Global Total' },
                { t: 'div', a: { style: 'font-size: 1.25rem; font-weight: 700;' },
                  c: counters.map(function(c) { return c.label + '(' + c.count + ')'; }).join(' + ') + ' = ' + sum }
              ]
            }
          ]
        });
      }
      renderCross();

      var examples = [
        {
          label: 'HTML / JS',
          code: [
            '// Vanilla JS: manual event wiring between components',
            'var counters = [',
            '  { label: "A", count: 0, el: null },',
            '  { label: "B", count: 0, el: null },',
            '  { label: "C", count: 0, el: null }',
            '];',
            '',
            'function updateGlobal() {',
            '  var sum = counters.reduce((a, c) => a + c.count, 0);',
            '  document.getElementById("global").textContent =',
            '    counters.map(c => c.label + "(" + c.count + ")").join(" + ") + " = " + sum;',
            '}',
            '',
            'counters.forEach(function(ctr) {',
            '  ctr.el = document.getElementById("counter-" + ctr.label);',
            '  ctr.el.querySelector(".inc").onclick = function() {',
            '    ctr.count++;',
            '    ctr.el.querySelector(".val").textContent = ctr.count;',
            '    updateGlobal();',
            '  };',
            '});'
          ].join('\n')
        },
        {
          label: 'React',
          code: [
            '// React: lift state to parent, pass callbacks as props',
            'function App() {',
            '  const [counts, setCounts] = useState([0, 0, 0]);',
            '  const labels = ["A", "B", "C"];',
            '  const sum = counts.reduce((a, b) => a + b, 0);',
            '',
            '  const inc = (i) => setCounts(c => {',
            '    const next = [...c]; next[i]++; return next;',
            '  });',
            '',
            '  return (',
            '    <div>',
            '      {labels.map((l, i) => (',
            '        <Counter key={l} label={l} count={counts[i]}',
            '          onInc={() => inc(i)} />',
            '      ))}',
