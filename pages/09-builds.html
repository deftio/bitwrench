<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Builds &amp; Downloads</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-theme.js"></script>
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.min.js"></script>

<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    mountExampleNav('#example-nav', '09-builds.html');

    bw.loadDefaultStyles();

    bw.injectCSS(bw.css({
      '.builds-header': { 'margin-bottom': '0.5rem' },
      '.builds-header .build-meta': { 'font-size': '0.85rem', color: 'var(--bw_text_muted)', margin: '0.25rem 0 0' },

      '.builds-section h2': { 'border-bottom': '2px solid var(--bw_teal)', 'padding-bottom': '0.5rem', 'margin-bottom': '1rem' },
      '.builds-section h3': { margin: '1.5rem 0 0.75rem' },
      '.sz': { 'text-align': 'right', 'font-variant-numeric': 'tabular-nums' },
      '.table-card': { background: 'var(--bw_card_bg)', border: '1px solid var(--bw_card_border)', 'border-radius': 'var(--bw_radius)', 'box-shadow': 'var(--bw_card_shadow)', overflow: 'hidden' },
      '.table-card .bw_table': { 'margin-bottom': '0' },
      '.table-card .bw_table > thead > tr > *': { background: 'var(--bw_teal_dark)', color: '#fff', 'border-bottom-color': 'var(--bw_teal)' },

      '.sri-hash': { 'font-family': 'var(--bw_font_mono)', 'font-size': '0.7rem', 'word-break': 'break-all', color: 'var(--bw_text_secondary)', 'max-width': '320px' },
      '.builds-copy-btn': { display: 'inline-block', padding: '0.2rem 0.5rem', 'font-size': '0.75rem', cursor: 'pointer', background: 'var(--bw_teal)', color: '#fff', border: 'none', 'border-radius': '3px', transition: 'background 0.15s' },
      '.builds-copy-btn:hover': { background: 'var(--bw_teal_dark)' },
      '.builds-copy-btn.copied': { background: '#28a745' },
      '.sri-tag-block': { background: 'var(--bw_code_bg)', color: 'var(--bw_code_text)', padding: '0.5rem 0.75rem', 'border-radius': '4px', 'font-size': '0.75rem', 'line-height': '1.4', 'overflow-x': 'auto', 'margin-top': '0.25rem', 'font-family': 'var(--bw_font_mono)', 'white-space': 'pre-wrap', 'word-break': 'break-all' },
      '.builds-toc': { display: 'flex', 'flex-wrap': 'wrap', gap: '0.5rem', margin: '1rem 0 0' },
      '.builds-toc a': { display: 'inline-block', padding: '0.35rem 0.85rem', 'font-size': '0.8125rem', 'font-weight': '500', background: 'var(--bw_teal_light)', color: 'var(--bw_teal_dark)', 'border-radius': '4px', 'text-decoration': 'none', transition: 'background 0.12s' },
      '.builds-toc a:hover': { background: 'var(--bw_teal)', color: '#fff' },
      '.install-snippet': { 'margin-bottom': '1.5rem' },
      '.install-snippet h4': { margin: '0 0 0.5rem', 'font-size': '0.95rem' },
      '.install-snippet .snippet-wrap': { position: 'relative' },
      '.install-snippet .snippet-copy': { position: 'absolute', top: '0.375rem', right: '0.5rem', 'z-index': '2', display: 'inline-block', padding: '0.2rem 0.5rem', 'font-size': '0.75rem', cursor: 'pointer', background: 'var(--bw_teal)', color: '#fff', border: 'none', 'border-radius': '3px', transition: 'background 0.15s' },
      '.install-snippet .snippet-copy:hover': { background: 'var(--bw_teal_dark)' },
      '.install-snippet .snippet-copy.copied': { background: '#28a745' }
    }), { id: 'builds-page-styles' });

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      var kb = bytes / 1024;
      if (kb < 1024) return kb.toFixed(1) + ' KB';
      return (kb / 1024).toFixed(2) + ' MB';
    }

    // Code snippet with copy button (uses bw.codeEditor when available)
    function codeSnippet(title, code, lang) {
      var codeDisplay = bw.codeEditor
        ? bw.codeEditor({ code: code, lang: lang || 'bash', readOnly: true, height: 'auto' })
        : { t: 'pre', a: { style: 'background:#1a1a1a;color:#e0e0e0;padding:0.75rem 1rem;border-radius:4px;font-size:0.8125rem;line-height:1.5;overflow-x:auto;margin:0;font-family:"SF Mono",Monaco,Consolas,monospace' }, c: { t: 'code', c: code } };

      return {
        t: 'div', a: { class: 'install-snippet' },
        c: [
          title ? { t: 'h4', c: title } : null,
          {
            t: 'div', a: { class: 'snippet-wrap' },
            c: [
              {
                t: 'button', a: { class: 'snippet-copy' }, c: 'Copy',
                o: { mounted: function(el) {
                  el.addEventListener('click', function() {
                    navigator.clipboard.writeText(code).then(function() {
                      el.textContent = 'Copied!';
                      el.classList.add('copied');
                      setTimeout(function() { el.textContent = 'Copy'; el.classList.remove('copied'); }, 1500);
                    });
                  });
                }}
              },
              codeDisplay
            ]
          }
        ].filter(Boolean)
      };
    }

    // Sortable table: click headers to sort, re-renders via bw.DOM
    function sortableTable(targetId, headers, data) {
      var state = { col: null, dir: 'asc' };

      function render() {
        var sorted = data.slice();
        if (state.col !== null) {
          sorted.sort(function(a, b) {
            var av = a.sortValues[state.col];
            var bv = b.sortValues[state.col];
            if (typeof av === 'number' && typeof bv === 'number') {
              return state.dir === 'asc' ? av - bv : bv - av;
            }
            var as = String(av || ''), bs = String(bv || '');
            return state.dir === 'asc' ? as.localeCompare(bs) : bs.localeCompare(as);
          });
        }

        bw.DOM(targetId, {
          t: 'div', a: { class: 'table-card' },
          c: {
            t: 'table', a: { class: 'bw_table' },
            c: [
              { t: 'thead', c: { t: 'tr', c: headers.map(function(h, i) {
                var arrow = state.col === i ? (state.dir === 'asc' ? ' \u25B2' : ' \u25BC') : '';
                return {
                  t: 'th',
                  a: Object.assign({ style: 'cursor:pointer;user-select:none' }, h.sz ? { class: 'sz' } : {}),
                  c: h.label + arrow,
                  o: { mounted: function(el) {
                    el.addEventListener('click', function() {
                      if (state.col === i) { state.dir = state.dir === 'asc' ? 'desc' : 'asc'; }
                      else { state.col = i; state.dir = 'asc'; }
                      render();
                    });
                  }}
                };
              })}},
              { t: 'tbody', c: sorted.map(function(row) {
                return { t: 'tr', c: row.cells.map(function(cell, i) {
                  return { t: 'td', a: headers[i].sz ? { class: 'sz' } : {}, c: cell };
                })};
              })}
            ]
          }
        });
      }

      render();
    }

    // Group files by format, pairing minified with non-minified
    function groupByFormat(files) {
      var byFormat = {};
      files.forEach(function(f) {
        if (!byFormat[f.format]) byFormat[f.format] = {};
        byFormat[f.format][f.minified ? 'min' : 'full'] = f;
      });
      return Object.keys(byFormat).map(function(fmt) {
        return { format: fmt, full: byFormat[fmt].full, min: byFormat[fmt].min };
      });
    }

    // File descriptions
    var descriptions = {
      'bitwrench.umd.js':      'UMD build for browsers and Node.js',
      'bitwrench.umd.min.js':  'UMD build, minified',
      'bitwrench.esm.js':      'ES module for modern bundlers',
      'bitwrench.esm.min.js':  'ES module, minified',
      'bitwrench.cjs.js':      'CommonJS build for Node.js require()',
      'bitwrench.cjs.min.js':  'CommonJS build, minified',
      'bitwrench.es5.js':      'ES5 build for legacy browsers (IE11+)',
      'bitwrench.es5.min.js':  'ES5 build, minified',
      'bitwrench.css':         'Default styles (Bootstrap-inspired)',
      'bitwrench.min.css':     'Default styles, minified',
      'bitwrench-code-edit.umd.js':     'Code editor addon (UMD)',
      'bitwrench-code-edit.umd.min.js': 'Code editor addon (UMD, minified)',
      'bitwrench-code-edit.esm.js':     'Code editor addon (ESM)',
      'bitwrench-code-edit.esm.min.js': 'Code editor addon (ESM, minified)',
      'bitwrench-code-edit.cjs.js':     'Code editor addon (CJS)',
      'bitwrench-code-edit.cjs.min.js': 'Code editor addon (CJS, minified)',
      'bitwrench-code-edit.es5.js':     'Code editor addon (ES5)',
      'bitwrench-code-edit.es5.min.js': 'Code editor addon (ES5, minified)',
      'bitwrench-lean.umd.js':      'Lean build, no components (UMD)',
      'bitwrench-lean.umd.min.js':  'Lean build, no components (UMD, minified)',
      'bitwrench-lean.esm.js':      'Lean build, no components (ESM)',
      'bitwrench-lean.esm.min.js':  'Lean build, no components (ESM, minified)',
      'bitwrench-lean.cjs.js':      'Lean build, no components (CJS)',
      'bitwrench-lean.cjs.min.js':  'Lean build, no components (CJS, minified)',
      'bitwrench-lean.es5.js':      'Lean build, no components (ES5)',
      'bitwrench-lean.es5.min.js':  'Lean build, no components (ES5, minified)',
      'bitwrench-bccl.umd.js':     'BCCL components addon (UMD)',
      'bitwrench-bccl.umd.min.js': 'BCCL components addon (UMD, minified)',
      'bitwrench-bccl.esm.js':     'BCCL components addon (ESM)',
      'bitwrench-bccl.esm.min.js': 'BCCL components addon (ESM, minified)',
      'bitwrench-bccl.cjs.js':     'BCCL components addon (CJS)',
      'bitwrench-bccl.cjs.min.js': 'BCCL components addon (CJS, minified)',
      'bwserve.cjs.js':            'bwserve server lib runtime (CJS)',
      'bwserve.esm.js':            'bwserve server lib runtime (ESM)'
    };

    // Grouped-format table (Format | Raw | Minified | Min+Gzip)
    function renderGroupedTable(targetId, files) {
      if (files.length === 0) {
        bw.DOM(targetId, { t: 'p', c: 'No builds found.' });
        return;
      }
      var headers = [
        { label: 'Format', sz: false },
        { label: 'Raw', sz: true },
        { label: 'Minified', sz: true },
        { label: 'Gzipped', sz: true }
      ];
      var data = groupByFormat(files).map(function(g) {
        var gz = g.min ? g.min.gzipped : (g.full ? g.full.gzipped : 0);
        return {
          cells: [
            g.format,
            g.full ? fmtSize(g.full.raw) : '\u2014',
            g.min  ? fmtSize(g.min.raw)  : '\u2014',
            gz     ? fmtSize(gz)          : '\u2014'
          ],
          sortValues: [
            g.format,
            g.full ? g.full.raw : 0,
            g.min  ? g.min.raw  : 0,
            gz
          ]
        };
      });
      sortableTable(targetId, headers, data);
    }

    // =========================================================================
    // Build the page structure as TACO
    // =========================================================================
    var page = {
      t: 'div', c: [
        // Hero
        {
          t: 'div', a: { class: 'page-header' },
          c: {
            t: 'div', a: { class: 'content-container wide', style: 'padding-top:0;padding-bottom:0' },
            c: [
              { t: 'h1', c: 'Builds & Downloads' },
              { t: 'p', a: { class: 'subtitle' }, c: 'Distribution files, sizes, and installation instructions' }
            ]
          }
        },
        // Content
        {
          t: 'div', a: { class: 'content-container wide' },
          c: [
            // Intro
            {
              t: 'div', a: { class: 'demo-section builds-header' },
              c: [
                { t: 'p', c: 'Bitwrench ships in multiple formats to support both browser and server-side environments. All builds are generated by Rollup. Bitwrench has no runtime dependencies.' },
                { t: 'p', a: { class: 'build-meta', id: 'build-meta' }, c: '' },
                {
                  t: 'div', a: { class: 'builds-toc' },
                  c: [
                    { t: 'a', a: { href: '#section-core' }, c: 'Core Library' },
                    { t: 'a', a: { href: '#section-lean' }, c: 'Lean Build' },
                    { t: 'a', a: { href: '#section-addons' }, c: 'Addon Bundles' },
                    { t: 'a', a: { href: '#section-bwserve' }, c: 'Server' },
                    { t: 'a', a: { href: '#section-cli' }, c: 'CLI' },
                    { t: 'a', a: { href: '#section-css' }, c: 'CSS' },
                    { t: 'a', a: { href: '#section-all' }, c: 'All Files' },
                    { t: 'a', a: { href: '#section-sri' }, c: 'SRI Hashes' },
                    { t: 'a', a: { href: '#section-install' }, c: 'Installation' },
                    { t: 'a', a: { href: '#section-cdn' }, c: 'CDN' },
                    { t: 'a', a: { href: '#section-llm' }, c: 'LLM Guide' }
                  ]
                }

            // Core Library
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-core' },
              c: [
                { t: 'h2', c: 'Core Library' },
                { t: 'p', c: 'The main bitwrench library in all supported module formats.' },

            },
            // Lean Build
            {

                { t: 'h2', c: 'Lean Build' },
                { t: 'p', c: [
                  'Core library without built-in BCCL components (',

                  { t: 'code', c: 'makeAlert' },

                  { t: 'code', c: 'makeTable' }, '/',
                  { t: 'code', c: 'makeDataTable' }, '.'
                ]},
                { t: 'div', a: { id: 'builds-lean', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // Addon Bundles
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-addons' },
              c: [
                { t: 'h2', c: 'Addon Bundles' },
                { t: 'p', c: [
                  'Optional addons that extend the core library. ',
                  { t: 'strong', c: 'BCCL' }, ' (bitwrench-bccl) provides 40+ component factories (makeButton, makeCard, makeHero, etc.) as a standalone bundle for use with the lean build. ',
                  { t: 'strong', c: 'Code Editor' }, ' (bitwrench-code-edit) adds syntax-highlighted code editing with line numbers, read-only mode, and copy support.'
                ]},
                { t: 'div', a: { id: 'builds-addons', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // bwserve (server runtime)
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-bwserve' },
              c: [
                { t: 'h2', c: 'Server Runtime (bwserve)' },
                { t: 'p', c: [
                  'Server-driven UI library for building Streamlit-style apps. Uses SSE to push TACO objects from a Node.js server to the browser. ',
                  'Available as CJS and ESM (server-side only \u2014 no browser/UMD build).'
                ]},
                { t: 'div', a: { id: 'builds-bwserve', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // CLI (bwcli)
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-cli' },
              c: [
                { t: 'h2', c: 'CLI (bwcli)' },
                { t: 'p', c: 'Command-line tool for converting Markdown/HTML files, running a dev server with live reload, and serving bwserve apps. Included in the npm package \u2014 no separate install needed.' },
                { t: 'div', a: { id: 'builds-cli', style: 'overflow-x:auto' }, c: '' }
              ]
            },
            // CSS
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-css' },
              c: [
                { t: 'h2', c: 'CSS' },
                { t: 'p', c: 'Default Bootstrap-inspired styles. CSS is served unminified; the Gzipped column shows the compressed transfer size.' },
                { t: 'div', a: { id: 'builds-css', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // All Files
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-all' },
              c: [
                { t: 'h2', c: 'All Distribution Files' },
                { t: 'div', a: { id: 'builds-all', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // SRI
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-sri' },
              c: [
                { t: 'h2', c: 'Subresource Integrity (SRI)' },
                { t: 'p', c: 'SRI hashes allow browsers to verify that fetched resources have not been tampered with. Include them when loading bitwrench from a CDN.' },
                { t: 'div', a: { id: 'builds-sri', style: 'overflow-x:auto' }, c: 'Loading...' }
              ]
            },
            // Installation
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-install' },
              c: [
                { t: 'h2', c: 'Installation' },
                codeSnippet('npm', 'npm install bitwrench', 'bash'),
                codeSnippet('Browser (script tag)', '<script src="dist/bitwrench.umd.min.js"><\/script>\n<link rel="stylesheet" href="dist/bitwrench.css">', 'html'),
                codeSnippet('ES Module import', "import bw from 'bitwrench';", 'js'),
                codeSnippet('CommonJS require', "const bw = require('bitwrench');", 'js'),
                codeSnippet('GitHub', 'git clone https://github.com/deftio/bitwrench.git', 'bash'),
                codeSnippet('ES5 (legacy browsers)', '<script src="dist/bitwrench.es5.min.js"><\/script>', 'html'),
                codeSnippet('bwserve (server-driven UI)', "import { create } from 'bitwrench/bwserve';\nconst app = create({ port: 7902 });\napp.page('/', (client) => {\n  client.render('#app', { t: 'h1', c: 'Hello from the server!' });\n});\napp.listen();", 'js'),
                codeSnippet('bwcli (convert files)', 'npx bwcli README.md -o readme.html --theme ocean --standalone', 'bash'),
                codeSnippet('bwcli (dev server)', 'npx bwcli serve --port 8080', 'bash')
              ]
            },
            // CDN
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-cdn' },
              c: [
                { t: 'h2', c: 'CDN' },
                { t: 'p', c: 'Load bitwrench directly from a CDN \u2014 no install, no build step.' },
                codeSnippet('unpkg', '<script src="https://unpkg.com/bitwrench@2/dist/bitwrench.umd.min.js"><\/script>\n<link rel="stylesheet" href="https://unpkg.com/bitwrench@2/dist/bitwrench.css">', 'html'),
                codeSnippet('jsdelivr', '<script src="https://cdn.jsdelivr.net/npm/bitwrench@2/dist/bitwrench.umd.min.js"><\/script>\n<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bitwrench@2/dist/bitwrench.css">', 'html'),
                codeSnippet('ES Module via CDN', "import bw from 'https://unpkg.com/bitwrench@2/dist/bitwrench.esm.min.js';", 'js'),
                {
                  t: 'div', a: { class: 'callout callout-tip', style: 'margin-top: 1rem;' },
                  c: [
                    { t: 'h4', c: 'Version pinning' },
                    { t: 'p', c: [
                      { t: 'code', c: '@2' }, ' \u2014 latest 2.x release (recommended)', { t: 'br' },
                      { t: 'code', c: '@2.0.3' }, ' \u2014 exact version', { t: 'br' },
                      { t: 'code', c: '@latest' }, ' \u2014 latest release (may include breaking changes across major versions)'
                    ]}
                  ]
                }
              ]
            },
            // LLM Guide
            {
              t: 'div', a: { class: 'demo-section builds-section', id: 'section-llm' },
              c: [
                { t: 'h2', c: 'LLM Guide' },
                { t: 'p', c: 'A single-file reference for AI-assisted bitwrench development. Feed this to ChatGPT, Claude, or any LLM to enable code generation with bitwrench.' },
                { t: 'p', c: [
                  'The guide covers TACO format, core API, component library (BCCL), theming, pub/sub, CSS generation, bwserve, CLI usage, and common patterns.'
                ]},
                {
                  t: 'div', a: { style: 'display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1rem' },
                  c: [
                    { t: 'a', a: { href: '../docs/llm-bitwrench-guide.md', download: 'llm-bitwrench-guide.md', class: 'bw_btn bw_btn_primary' }, c: 'Download LLM Guide (.md)' },
                    { t: 'a', a: { href: '../docs/llm-bitwrench-guide.md', target: '_blank', class: 'bw_btn bw_btn_secondary' }, c: 'View Raw' }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    bw.DOM('#app', page);

    // CLI section — show usage, not internal files
    bw.DOM('#builds-cli', {
      t: 'div', c: [
        { t: 'p', a: { style: 'margin-bottom: 0.75rem' }, c: [
          'Installed as ', { t: 'code', c: 'bwcli' }, ' via ', { t: 'code', c: 'npm install bitwrench' }, '. Run with ', { t: 'code', c: 'npx bwcli' }, ' or install globally.'
        ]},
        codeSnippet('Convert a file', 'npx bwcli README.md -o readme.html --theme ocean --standalone', 'bash'),
        codeSnippet('Dev server', 'npx bwcli serve --port 8080', 'bash'),
        codeSnippet('Serve a directory', 'npx bwcli serve ./site --port 8080 --open', 'bash'),
        codeSnippet('Custom theme colors', 'npx bwcli doc.md --theme "#336699,#cc6633" -o doc.html', 'bash'),
        {
          t: 'div', a: { class: 'table-card', style: 'margin-top: 1rem' },
          c: {
            t: 'table', a: { class: 'bw_table' },
            c: [
              { t: 'thead', c: { t: 'tr', c: [
                { t: 'th', c: 'Flag' },
                { t: 'th', c: 'Description' }
              ]}},
              { t: 'tbody', c: [
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-o, --output' } }, { t: 'td', c: 'Output file path' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-t, --theme' } }, { t: 'td', c: 'Theme preset (ocean, sunset, forest, slate, monochrome) or hex pair' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-s, --standalone' } }, { t: 'td', c: 'Inline bitwrench UMD into output HTML' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '--cdn' } }, { t: 'td', c: 'Use jsdelivr CDN with SRI hashes' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '--highlight' } }, { t: 'td', c: 'Enable syntax highlighting for code blocks' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-c, --css' } }, { t: 'td', c: 'Custom CSS file to include' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '--title' } }, { t: 'td', c: 'Page title override' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '--open' } }, { t: 'td', c: 'Open browser on start (serve mode)' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-p, --port' } }, { t: 'td', c: 'Port number (serve mode, default: 7902)' }] },
                { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: '-v, --verbose' } }, { t: 'td', c: 'Verbose output' }] }
              ]}
            ]
          }
        }
      ]
    });

    // =========================================================================
    // Load build manifest and populate tables
    // =========================================================================
    bw.loadClientFile('../dist/builds.json', function(raw, err) {
      if (err) {
        bw.DOM('#builds-core', { t: 'p', a: { style: 'color:#b91c1c' }, c: 'Failed to load build manifest. Run: npm run build:builds' });
        return;
      }
      var manifest = JSON.parse(raw);

      // Categorize files
      var coreJS = [], leanJS = [], addonJS = [], bcclJS = [], bwserveJS = [], css = [];
      manifest.files.forEach(function(f) {
        if (f.ver === '1.x') return;
        if (f.format === 'CSS') { css.push(f); }
        else if (f.component === 'code-edit') { addonJS.push(f); }
        else if (f.component === 'lean') { leanJS.push(f); }
        else if (f.component === 'bccl') { bcclJS.push(f); }
        else if (f.component === 'bwserve') { bwserveJS.push(f); }
        else { coreJS.push(f); }
      });

      // Core library table (Format | Raw | Minified | Min+Gzip)
      renderGroupedTable('#builds-core', coreJS);

      // Lean build table
      if (leanJS.length > 0) {
        renderGroupedTable('#builds-lean', leanJS);
      } else {
        bw.DOM('#builds-lean', { t: 'p', c: 'No lean builds found. Run: npm run build' });
      }

      // Addons — separate cards per addon with file details
      function renderAddonCard(targetId, label, desc, files, importSnippet) {
        var headers = [
          { label: 'File', sz: false },
          { label: 'Format', sz: false },
          { label: 'Size', sz: true },
          { label: 'Gzipped', sz: true }
        ];
        var data = files.filter(function(f) { return f.minified; }).map(function(f) {
          return {
            cells: [
              { t: 'a', a: { href: '../dist/' + f.file }, c: f.file },
              f.format,
              fmtSize(f.raw),
              fmtSize(f.gzipped)
            ],
            sortValues: [f.file, f.format, f.raw, f.gzipped]
          };
        });
        // If no minified, show all
        if (data.length === 0) {
          data = files.map(function(f) {
            return {
              cells: [
                { t: 'a', a: { href: '../dist/' + f.file }, c: f.file },
                f.format,
                fmtSize(f.raw),
                fmtSize(f.gzipped)
              ],
              sortValues: [f.file, f.format, f.raw, f.gzipped]
            };
          });
        }
        var content = [
          { t: 'h3', c: label },
          { t: 'p', a: { style: 'margin:0 0 0.75rem' }, c: desc },
        ];
        if (importSnippet) {
          content.push(codeSnippet(null, importSnippet, 'js'));
        }
        content.push({ t: 'div', a: { id: targetId, style: 'overflow-x:auto' }, c: '' });
        return { content: content, headers: headers, data: data, targetId: targetId };
      }

      var addonContent = [];
      var addonTables = [];
      if (bcclJS.length > 0) {
        var bccl = renderAddonCard('builds-addon-bccl',
          'bitwrench-bccl \u2014 Component Library',
          [
            '40+ component factories: ',
            { t: 'code', c: 'makeButton' }, ', ',
            { t: 'code', c: 'makeCard' }, ', ',
            { t: 'code', c: 'makeHero' }, ', ',
            { t: 'code', c: 'makeNavbar' }, ', ',
            { t: 'code', c: 'makeAccordion' },
            ', and more. Use with the lean build for a smaller total footprint, or it\u2019s already included in the full core build.'
          ],
          bcclJS,
          "// Use with lean build (tree-shake what you don't need)\nimport bw from 'bitwrench/lean';\nimport 'bitwrench/bccl';\n\n// Or use script tag\n// <script src=\"dist/bitwrench-bccl.umd.min.js\"><\/script>"
        );
        addonContent = addonContent.concat(bccl.content);
        addonTables.push(bccl);
      }
      if (addonJS.length > 0) {
        var ce = renderAddonCard('builds-addon-codeedit',
          'bitwrench-code-edit \u2014 Code Editor',
          [
            'Syntax-highlighted code editor with line numbers, read-only mode, and copy-to-clipboard. Supports JavaScript, HTML, CSS, Bash, JSON, Markdown, and more.'
          ],
          addonJS,
          "import bw from 'bitwrench';\nimport 'bitwrench/code-edit';\n\n// Then use:\nbw.codeEditor({ code: 'var x = 1;', lang: 'js', readOnly: true })"
        );
        if (addonContent.length > 0) {
          addonContent.push({ t: 'hr', a: { style: 'margin:1.5rem 0;border:0;border-top:1px solid #e0e0e0' } });
        }
        addonContent = addonContent.concat(ce.content);
        addonTables.push(ce);
      }
      if (addonContent.length > 0) {
        bw.DOM('#builds-addons', { t: 'div', c: addonContent });
        addonTables.forEach(function(tbl) {
          sortableTable('#' + tbl.targetId, tbl.headers, tbl.data);
        });
      } else {
        bw.DOM('#builds-addons', { t: 'p', c: 'No addon builds found.' });
      }

      // bwserve table (server-side, CJS + ESM only — no min variants)
      if (bwserveJS.length > 0) {
        var bwsHeaders = [
          { label: 'File', sz: false },
          { label: 'Format', sz: false },
          { label: 'Raw', sz: true },
          { label: 'Gzipped', sz: true }
        ];
        var bwsData = bwserveJS.map(function(f) {
          return {
            cells: [
              { t: 'a', a: { href: '../dist/' + f.file }, c: f.file },
              f.format,
              fmtSize(f.raw),
              fmtSize(f.gzipped)
            ],
            sortValues: [f.file, f.format, f.raw, f.gzipped]
          };
        });
        sortableTable('#builds-bwserve', bwsHeaders, bwsData);
      } else {
        bw.DOM('#builds-bwserve', { t: 'p', c: 'No bwserve builds found.' });
      }

      // CSS table (same grouped format as other sections)
      if (css.length > 0) {
        renderGroupedTable('#builds-css', css);
      } else {
        bw.DOM('#builds-css', { t: 'p', c: 'No CSS builds found.' });
      }

      // All files
      var allFiles = coreJS.concat(leanJS).concat(addonJS).concat(bcclJS).concat(bwserveJS).concat(css);
      if (allFiles.length > 0) {
        var allHeaders = [
          { label: 'File', sz: false },
          { label: 'Description', sz: false },
          { label: 'Size', sz: true }
        ];
        var allData = allFiles.map(function(f) {
          return {
            cells: [
              { t: 'a', a: { href: '../dist/' + f.file }, c: f.file },
              descriptions[f.file] || f.format,
              fmtSize(f.raw)
            ],
            sortValues: [f.file, descriptions[f.file] || f.format, f.raw]
          };
        });
        sortableTable('#builds-all', allHeaders, allData);
      }

      // SRI hashes
      var sriFiles = manifest.files.filter(function(f) { return f.integrity; });
      if (sriFiles.length > 0) {
        var sriHeaders = [
          { label: 'File', sz: false },
          { label: 'Integrity Hash', sz: false },
          { label: 'Script Tag', sz: false }
        ];
        var sriData = sriFiles.map(function(f) {
          var isCSS = f.file.endsWith('.css');
          var tag = isCSS
            ? '<link rel="stylesheet" href="dist/' + f.file + '"\n      integrity="' + f.integrity + '"\n      crossorigin="anonymous">'
            : '<script src="dist/' + f.file + '"\n        integrity="' + f.integrity + '"\n        crossorigin="anonymous"><\/script>';
          return {
            cells: [
              f.file,
              { t: 'span', a: { class: 'sri-hash' }, c: f.integrity },
              {
                t: 'div', a: { class: 'snippet-wrap' }, c: [
                  {
                    t: 'button', a: { class: 'snippet-copy' },
                    c: 'Copy',
                    o: {
                      mounted: function(el) {
                        el.addEventListener('click', function() {
                          navigator.clipboard.writeText(tag).then(function() {
                            el.textContent = 'Copied!';
                            el.classList.add('copied');
                            setTimeout(function() {
                              el.textContent = 'Copy';
                              el.classList.remove('copied');
                            }, 1500);
                          });
                        });
                      }
                    }
                  },
                  { t: 'div', a: { class: 'sri-tag-block' }, c: tag }
                ]
              }
            ],
            sortValues: [f.file, f.integrity, '']
          };
        });
        sortableTable('#builds-sri', sriHeaders, sriData);
      } else {
        bw.DOM('#builds-sri', {
          t: 'p',
          c: 'No SRI hashes found. Run: npm run generate-sri'
        });
      }

    });
  </script>
</body>
</html>
