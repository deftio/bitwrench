<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Component Gallery</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-theme.js"></script>
  <script src="shared-nav.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    mountExampleNav('#example-nav', 'component-gallery.html');
    bw.loadStyles();

    // =========================================================================
    // Theme controls
    // =========================================================================
    var themes = [
      { label: 'Default (Teal)', config: null },
      { label: 'Indigo-Amber', config: { primary: '#4f46e5', secondary: '#d97706' } },
      { label: 'Ocean', config: { primary: '#0077b6', secondary: '#90e0ef', tertiary: '#00b4d8' } },
      { label: 'Rose', config: { primary: '#e11d48', secondary: '#fda4af' } }
    ];

    function applyTheme(config) {
      if (config) {
        bw.loadStyles({ palette: config });
      } else {
        bw.loadStyles();
      }
    }

    var themeControls = {
      t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;' },
      c: [
        { t: 'strong', c: 'Theme: ' }
      ].concat(themes.map(function(th) {
        return bw.makeButton({
          label: th.label,
          variant: 'primary',
          size: 'sm',
          onClick: function() { applyTheme(th.config); }
        });
      })).concat([
        bw.makeButton({
          label: 'Toggle Dark',
          variant: 'dark',
          size: 'sm',
          onClick: function() { bw.toggleStyles(); }
        })
      ])
    };

    // =========================================================================
    // Section helper
    // =========================================================================
    function section(title, content) {
      return {
        t: 'div', a: { class: 'demo-section', style: 'margin-bottom:1.5rem;' },
        c: [
          { t: 'h2', a: { class: 'demo-section-title' }, c: title },
          { t: 'div', a: { class: 'demo-section-body' }, c: content }
        ]
      };
    }

    // =========================================================================
    // Component demos
    // =========================================================================

    // Buttons
    var buttonDemo = section('Buttons', [
      { t: 'h3', c: 'Solid Variants' },
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;' },
        c: ['primary','secondary','success','danger','warning','info','dark','light'].map(function(v) {
          return bw.makeButton({ label: v, variant: v });
        })
      },
      { t: 'h3', c: 'Outline Variants' },
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;' },
        c: ['primary','secondary','success','danger'].map(function(v) {
          return bw.makeButton({ label: 'outline-' + v, variant: 'outline_' + v });
        })
      },
      { t: 'h3', c: 'Sizes' },
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;' },
        c: [
          bw.makeButton({ label: 'Small', variant: 'primary', size: 'sm' }),
          bw.makeButton({ label: 'Default', variant: 'primary' }),
          bw.makeButton({ label: 'Large', variant: 'primary', size: 'lg' }),
          bw.makeButton({ label: 'Disabled', variant: 'primary', disabled: true })
        ]
      }
    ]);

    // Cards
    var cardDemo = section('Cards', [
      { t: 'div', a: { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;' },
        c: [
          bw.makeCard({ title: 'Basic Card', content: 'A simple card with just a title and content.' }),
          bw.makeCard({ title: 'With Header', header: 'Featured', content: 'Card with header section.', footer: 'Footer text' }),
          bw.makeCard({ title: 'Primary Accent', content: 'Card with variant accent border.', variant: 'primary' }),
          bw.makeCard({ title: 'Hoverable', content: 'Hover to see lift effect.', hoverable: true })
        ]
      }
    ]);

    // Alerts
    var alertDemo = section('Alerts', [
      { t: 'div', a: { style: 'display:flex;flex-direction:column;gap:0.5rem;' },
        c: ['primary','secondary','success','danger','warning','info'].map(function(v) {
          return bw.makeAlert({ content: 'This is a ' + v + ' alert.', variant: v });
        })
      }
    ]);

    // Badges
    var badgeDemo = section('Badges', [
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;' },
        c: ['primary','secondary','success','danger','warning','info','dark','light'].map(function(v) {
          return bw.makeBadge({ text: v, variant: v });
        })
      },
      { t: 'h3', c: 'Pill Badges' },
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;' },
        c: ['primary','success','danger'].map(function(v) {
          return bw.makeBadge({ text: v + ' pill', variant: v, pill: true });
        })
      }
    ]);

    // Form controls
    var formDemo = section('Form Controls', [
      bw.makeFormGroup({
        label: 'Text Input',
        input: bw.makeInput({ placeholder: 'Enter text...', name: 'demo-text' }),
        helpText: 'Helper text for the input.'
      }),
      bw.makeFormGroup({
        label: 'Email Input',
        input: bw.makeInput({ type: 'email', placeholder: 'user@example.com', name: 'demo-email' })
      }),
      bw.makeFormGroup({
        label: 'Textarea',
        input: bw.makeTextarea({ placeholder: 'Write something...', name: 'demo-textarea', rows: 3 })
      }),
      bw.makeFormGroup({
        label: 'Select',
        input: bw.makeSelect({
          options: [
            { value: '', label: 'Choose an option...' },
            { value: '1', label: 'Option 1' },
            { value: '2', label: 'Option 2' },
            { value: '3', label: 'Option 3' }
          ],
          name: 'demo-select'
        })
      }),
      { t: 'div', a: { style: 'display:flex;gap:2rem;flex-wrap:wrap;' },
        c: [
          { t: 'div', c: [
            { t: 'h4', c: 'Checkboxes' },
            bw.makeCheckbox({ label: 'Option A', name: 'chk-a', checked: true }),
            bw.makeCheckbox({ label: 'Option B', name: 'chk-b' }),
            bw.makeCheckbox({ label: 'Disabled', name: 'chk-c', disabled: true })
          ]},
          { t: 'div', c: [
            { t: 'h4', c: 'Radio Buttons' },
            bw.makeRadio({ label: 'Choice 1', name: 'radio-demo', value: '1', checked: true }),
            bw.makeRadio({ label: 'Choice 2', name: 'radio-demo', value: '2' }),
            bw.makeRadio({ label: 'Choice 3', name: 'radio-demo', value: '3' })
          ]},
          { t: 'div', c: [
            { t: 'h4', c: 'Switch' },
            bw.makeSwitch({ label: 'Dark mode', name: 'switch-demo' }),
            bw.makeSwitch({ label: 'Notifications', name: 'switch-demo2', checked: true })
          ]}
        ]
      }
    ]);

    // Progress
    var progressDemo = section('Progress', [
      { t: 'div', a: { style: 'display:flex;flex-direction:column;gap:0.75rem;' },
        c: [
          bw.makeProgress({ value: 25, label: '25%' }),
          bw.makeProgress({ value: 50, variant: 'success', label: '50%' }),
          bw.makeProgress({ value: 75, variant: 'warning', striped: true, label: '75%' }),
          bw.makeProgress({ value: 90, variant: 'danger', striped: true, animated: true, label: '90%' })
        ]
      }
    ]);

    // Spinner
    var spinnerDemo = section('Spinner', [
      { t: 'div', a: { style: 'display:flex;gap:1rem;align-items:center;flex-wrap:wrap;' },
        c: [
          bw.makeSpinner({ variant: 'primary' }),
          bw.makeSpinner({ variant: 'secondary' }),
          bw.makeSpinner({ variant: 'success' }),
          bw.makeSpinner({ type: 'grow', variant: 'danger' }),
          bw.makeSpinner({ variant: 'primary', size: 'sm' }),
          bw.makeSpinner({ variant: 'primary', size: 'lg' })
        ]
      }
    ]);

    // Table
    var tableDemo = section('Table', [
      bw.makeTable({
        headers: ['Name', 'Role', 'Status', 'Score'],
        rows: [
          ['Alice', 'Engineer', 'Active', '95'],
          ['Bob', 'Designer', 'Active', '88'],
          ['Charlie', 'Manager', 'Away', '72'],
          ['Diana', 'Analyst', 'Active', '91']
        ],
        striped: true,
        hover: true,
        sortable: true
      })
    ]);

    // List Group
    var listGroupDemo = section('List Group', [
      bw.makeListGroup({
        items: [
          { content: 'First item', active: true },
          { content: 'Second item' },
          { content: 'Third item' },
          { content: 'Disabled item', disabled: true }
        ]
      })
    ]);

    // Nav
    var navDemo = section('Nav', [
      bw.makeNav({
        items: [
          { label: 'Home', active: true },
          { label: 'Profile' },
          { label: 'Messages' },
          { label: 'Settings' }
        ]
      })
    ]);

    // Breadcrumb
    var breadcrumbDemo = section('Breadcrumb', [
      bw.makeBreadcrumb({
        items: [
          { label: 'Home', href: '#' },
          { label: 'Library', href: '#' },
          { label: 'Data', active: true }
        ]
      })
    ]);

    // Pagination
    var paginationDemo = section('Pagination', [
      bw.makePagination({
        currentPage: 3,
        totalPages: 10
      })
    ]);

    // Button Group
    var buttonGroupDemo = section('Button Group', [
      { t: 'div', a: { style: 'display:flex;gap:1rem;flex-wrap:wrap;' },
        c: [
          bw.makeButtonGroup({
            buttons: [
              { label: 'Left', variant: 'primary' },
              { label: 'Middle', variant: 'primary' },
              { label: 'Right', variant: 'primary' }
            ]
          }),
          bw.makeButtonGroup({
            buttons: [
              { label: 'A', variant: 'outline_secondary' },
              { label: 'B', variant: 'outline_secondary' },
              { label: 'C', variant: 'outline_secondary' }
            ]
          })
        ]
      }
    ]);

    // Tabs
    var tabsDemo = section('Tabs', [
      bw.makeTabs({
        tabs: [
          { label: 'Overview', content: { t: 'p', c: 'This is the overview tab content.' }, active: true },
          { label: 'Details', content: { t: 'p', c: 'Detailed information goes here.' } },
          { label: 'Settings', content: { t: 'p', c: 'Settings panel content.' } }
        ]
      })
    ]);

    // Accordion
    var accordionDemo = section('Accordion', [
      bw.makeAccordion({
        items: [
          { header: 'Section 1', body: 'Content for the first section.', open: true },
          { header: 'Section 2', body: 'Content for the second section.' },
          { header: 'Section 3', body: 'Content for the third section.' }
        ]
      })
    ]);

    // Modal
    var modalDemo = section('Modal', [
      bw.makeButton({
        label: 'Open Modal',
        variant: 'primary',
        onClick: function() {
          var modal = bw.makeModal({
            title: 'Example Modal',
            body: { t: 'p', c: 'This is a modal dialog. It demonstrates the modal component with header, body, and footer.' },
            footer: [
              bw.makeButton({ label: 'Close', variant: 'secondary', onClick: function() { bw.$('.bw_modal')[0].classList.remove('bw_modal_show'); } }),
              bw.makeButton({ label: 'Save Changes', variant: 'primary' })
            ],
            show: true
          });
          bw.DOM('body', modal, { mode: 'append' });
        }
      })
    ]);

    // Toast
    var toastDemo = section('Toast', [
      { t: 'div', a: { style: 'display:flex;gap:0.5rem;flex-wrap:wrap;' },
        c: ['primary','success','danger','warning'].map(function(v) {
          return bw.makeButton({
            label: 'Show ' + v + ' toast',
            variant: v,
            size: 'sm',
            onClick: function() {
              var toast = bw.makeToast({
                title: v.charAt(0).toUpperCase() + v.slice(1) + ' Toast',
                body: 'This is a ' + v + ' notification message.',
                variant: v,
                autohide: 3000
              });
              bw.DOM('body', toast, { mode: 'append' });
            }
          });
        })
      }
    ]);

    // Dropdown
    var dropdownDemo = section('Dropdown', [
      bw.makeDropdown({
        label: 'Dropdown Menu',
        variant: 'primary',
        items: [
          { label: 'Action' },
          { label: 'Another action' },
          { divider: true },
          { label: 'Something else' }
        ]
      })
    ]);

    // Tooltip
    var tooltipDemo = section('Tooltip', [
      { t: 'div', a: { style: 'display:flex;gap:1.5rem;flex-wrap:wrap;' },
        c: ['top','bottom','left','right'].map(function(pos) {
          return bw.makeTooltip({
            content: bw.makeButton({ label: 'Tooltip ' + pos, variant: 'secondary', size: 'sm' }),
            text: 'Tooltip on ' + pos,
            position: pos
          });
        })
      }
    ]);

    // Popover
    var popoverDemo = section('Popover', [
      bw.makePopover({
        trigger: bw.makeButton({ label: 'Toggle Popover', variant: 'primary' }),
        title: 'Popover Title',
        content: 'This is the popover body content. Click the button to toggle.',
        position: 'bottom'
      })
    ]);

    // Carousel
    var carouselDemo = section('Carousel', [
      bw.makeCarousel({
        items: [
          { content: { t: 'div', a: { style: 'background:#006666;color:#fff;padding:3rem;text-align:center;' }, c: { t: 'h3', c: 'Slide 1' } }, caption: 'First slide' },
          { content: { t: 'div', a: { style: 'background:#0077b6;color:#fff;padding:3rem;text-align:center;' }, c: { t: 'h3', c: 'Slide 2' } }, caption: 'Second slide' },
          { content: { t: 'div', a: { style: 'background:#e76f51;color:#fff;padding:3rem;text-align:center;' }, c: { t: 'h3', c: 'Slide 3' } }, caption: 'Third slide' }
        ],
        height: '200px'
      })
    ]);

    // File Upload
    var fileUploadDemo = section('File Upload', [
      bw.makeFileUpload({ accept: '.jpg,.png,.pdf', multiple: true })
    ]);

    // Range
    var rangeDemo = section('Range', [
      bw.makeRange({ label: 'Volume', min: 0, max: 100, value: 65, name: 'volume' }),
      bw.makeRange({ label: 'Brightness', min: 0, max: 100, value: 30, name: 'brightness' })
    ]);

    // Timeline
    var timelineDemo = section('Timeline', [
      bw.makeTimeline({
        items: [
          { date: 'Jan 2024', title: 'Project Started', text: 'Initial commit and setup.', variant: 'primary' },
          { date: 'Mar 2024', title: 'Beta Release', text: 'First public beta.', variant: 'success' },
          { date: 'Jun 2024', title: 'v1.0 Launch', text: 'Production release.', variant: 'info' }
        ]
      })
    ]);

    // Stepper
    var stepperDemo = section('Stepper', [
      bw.makeStepper({
        steps: [
          { label: 'Account', description: 'Create account', completed: true },
          { label: 'Profile', description: 'Set up profile', active: true },
          { label: 'Review', description: 'Review details' },
          { label: 'Complete', description: 'All done' }
        ]
      })
    ]);

    // Stat Cards
    var statCardDemo = section('Stat Cards', [
      { t: 'div', a: { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;' },
        c: [
          bw.makeStatCard({ label: 'Revenue', value: '$12,450', change: '+12.5%', changeDirection: 'up', variant: 'primary', icon: '$' }),
          bw.makeStatCard({ label: 'Users', value: '1,284', change: '+8.2%', changeDirection: 'up', variant: 'success', icon: '#' }),
          bw.makeStatCard({ label: 'Bounce Rate', value: '32.1%', change: '-2.4%', changeDirection: 'down', variant: 'warning', icon: '%' }),
          bw.makeStatCard({ label: 'Errors', value: '23', change: '+5', changeDirection: 'up', variant: 'danger', icon: '!' })
        ]
      }
    ]);

    // Hero
    var heroDemo = section('Hero', [
      bw.makeHero({
        title: 'Welcome to Bitwrench',
        subtitle: 'Build beautiful UIs with pure JavaScript.',
        variant: 'primary',
        actions: [
          bw.makeButton({ label: 'Get Started', variant: 'light', size: 'lg' }),
          bw.makeButton({ label: 'Documentation', variant: 'outline_light', size: 'lg' })
        ]
      })
    ]);

    // Feature Grid
    var featureGridDemo = section('Feature Grid', [
      bw.makeFeatureGrid({
        features: [
          { icon: '{}', title: 'TACO Format', description: 'Pure JS objects for UI.' },
          { icon: '#', title: 'CSS-in-JS', description: 'Generate styles from code.' },
          { icon: '~', title: 'Themes', description: 'Full design system from seed colors.' },
          { icon: '>', title: 'No Build Step', description: 'Zero compilation required.' }
        ]
      })
    ]);

    // Skeleton
    var skeletonDemo = section('Skeleton', [
      { t: 'div', a: { style: 'max-width:400px;' },
        c: [
          bw.makeSkeleton({ variant: 'text', count: 3 }),
          { t: 'div', a: { style: 'margin-top:1rem;display:flex;gap:1rem;align-items:center;' },
            c: [
              bw.makeSkeleton({ variant: 'circle', width: '3rem', height: '3rem' }),
              { t: 'div', a: { style: 'flex:1;' }, c: [
                bw.makeSkeleton({ variant: 'text', count: 2 })
              ]}
            ]
          }
        ]
      }
    ]);

    // Avatar
    var avatarDemo = section('Avatar', [
      { t: 'div', a: { style: 'display:flex;gap:1rem;align-items:center;' },
        c: [
          bw.makeAvatar({ initials: 'AB', size: 'sm', variant: 'primary' }),
          bw.makeAvatar({ initials: 'CD', size: 'md', variant: 'success' }),
          bw.makeAvatar({ initials: 'EF', size: 'lg', variant: 'danger' }),
          bw.makeAvatar({ initials: 'GH', size: 'xl', variant: 'info' })
        ]
      }
    ]);

    // Search Input
    var searchDemo = section('Search Input', [
      bw.makeSearchInput({ placeholder: 'Search components...', name: 'search-demo' })
    ]);

    // Chip Input
    var chipInputDemo = section('Chip Input', [
      bw.makeChipInput({
        chips: ['JavaScript', 'CSS', 'HTML'],
        placeholder: 'Add a tag...',
        name: 'chip-demo'
      })
    ]);

    // Code Demo
    var codeDemoSection = section('Code Demo', [
      bw.makeCodeDemo({
        code: 'var greeting = "Hello, Bitwrench!";\nconsole.log(greeting);',
        language: 'javascript'
      })
    ]);

    // Media Object
    var mediaObjectDemo = section('Media Object', [
      bw.makeMediaObject({
        image: { src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect fill="#006666" width="64" height="64" rx="32"/><text x="32" y="36" text-anchor="middle" fill="#fff" font-size="20">BW</text></svg>'), size: 64 },
        title: 'Media Object',
        content: 'This is a media object component with an image and text content side by side.'
      })
    ]);

    // Section component
    var sectionDemo = section('Section', [
      bw.makeSection({
        title: 'Section Title',
        subtitle: 'Optional subtitle for the section.',
        content: { t: 'p', c: 'Section body content goes here.' }
      })
    ]);

    // CTA
    var ctaDemo = section('CTA (Call to Action)', [
      bw.makeCTA({
        title: 'Ready to get started?',
        description: 'Join thousands of developers building with Bitwrench.',
        actions: [
          bw.makeButton({ label: 'Sign Up Free', variant: 'primary', size: 'lg' }),
          bw.makeButton({ label: 'Learn More', variant: 'outline_primary' })
        ]
      })
    ]);

    // =========================================================================
    // Mount everything
    // =========================================================================
    bw.DOM('#app', {
      t: 'div', c: [
        // Page header
        {
          t: 'div', a: { class: 'page-header' },
          c: { t: 'div', a: { class: 'content-container' }, c: [
            { t: 'h1', c: 'Component Gallery' },
            { t: 'p', a: { class: 'subtitle' }, c: 'Every BCCL component rendered with bw.loadStyles() and zero custom CSS. Visual proof that defaults work.' }
          ]}
        },
        // Content
        {
          t: 'div', a: { class: 'content-container' },
          c: [
            themeControls,
            buttonDemo,
            cardDemo,
            alertDemo,
            badgeDemo,
            formDemo,
            progressDemo,
            spinnerDemo,
            tableDemo,
            listGroupDemo,
            navDemo,
            breadcrumbDemo,
            paginationDemo,
            buttonGroupDemo,
            tabsDemo,
            accordionDemo,
            modalDemo,
            toastDemo,
            dropdownDemo,
            tooltipDemo,
            popoverDemo,
            carouselDemo,
            fileUploadDemo,
            rangeDemo,
            timelineDemo,
            stepperDemo,
            statCardDemo,
            heroDemo,
            featureGridDemo,
            skeletonDemo,
            avatarDemo,
            searchDemo,
            chipInputDemo,
            codeDemoSection,
            mediaObjectDemo,
            sectionDemo,
            ctaDemo
          ]
        }
      ]
    });
  </script>
</body>
</html>
