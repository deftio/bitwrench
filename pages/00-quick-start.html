<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Quick Start</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="shared-theme.css">
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.js"></script>
  <script src="shared-tryit.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    mountExampleNav('#example-nav', '00-quick-start.html');

    // =========================================================================
    // Helper: callout box
    // =========================================================================
    function callout(type, title, content) {
      return {
        t: 'div', a: { class: 'callout callout-' + type, style: 'margin-top: 1rem;' },
        c: [
          { t: 'h4', c: title },
          content
        ]
      };
    }

    // =========================================================================
    // Section 1: Your First Bitwrench Page
    // =========================================================================
    var helloCode = '<!DOCTYPE html>\n<html>\n<head>\n  <script src="https://unpkg.com/bitwrench@2/dist/bitwrench.umd.js"><\/script>\n  <link rel="stylesheet" href="https://unpkg.com/bitwrench@2/dist/bitwrench.css">\n</head>\n<body>\n  <div id="app"></div>\n  <script>\n    bw.DOM(\'#app\', { t: \'h1\', c: \'Hello bitwrench!\' });\n  <\/script>\n</body>\n</html>';

    var livePageId = 'live-page-' + (bw._idCounter++);

    var section1 = {
      t: 'div', a: { class: 'demo-section', id: 'section-first-page' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-first-page' }, c: 'Your First Bitwrench Page' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' },
            c: 'This is the complete code for a bitwrench page. Edit the code and click Run to see the result:' },
          {
            t: 'div', a: { class: 'tryit-container', id: livePageId },
            o: {
              mounted: function(el) {
                var iframe = el.querySelector('.live-page-iframe');
                var errorEl = el.querySelector('.tryit-error');
                var runBtn = el.querySelector('.tryit-run');
                var ceEl = el.querySelector('.bw_ce');
                var textarea = el.querySelector('.tryit-textarea');

                function getCode() {
                  if (ceEl && ceEl._bwCodeEdit) return ceEl._bwCodeEdit.getValue();
                  if (textarea) return textarea.value;
                  return '';
                }

                function runPage() {
                  errorEl.textContent = '';
                  errorEl.style.display = 'none';
                  iframe.srcdoc = getCode();
                }

                runBtn.addEventListener('click', runPage);
                // Auto-run on mount
                runPage();
              }
            },
            c: [{
              t: 'div', a: { class: 'tryit-grid' },
              c: [
                {
                  t: 'div', a: { class: 'tryit-editor-col' },
                  c: [
                    { t: 'div', a: { class: 'tryit-label' }, c: 'HTML' },
                    bw.codeEditor
                      ? bw.codeEditor({ code: helloCode, lang: 'html', height: '280px' })
                      : { t: 'textarea', a: { class: 'tryit-textarea', spellcheck: 'false', style: 'height:280px' }, c: helloCode },
                    {
                      t: 'div', a: { class: 'tryit-controls' },
                      c: [bw.makeButton({ text: 'Run', variant: 'primary', size: 'sm', className: 'tryit-run' })]
                    },
                    { t: 'div', a: { class: 'tryit-error' }, c: '' }
                  ]
                },
                {
                  t: 'div', a: { class: 'tryit-output-col' },
                  c: [
                    { t: 'div', a: { class: 'tryit-label tryit-label-result' }, c: 'Preview' },
                    { t: 'iframe', a: {
                      class: 'live-page-iframe',
                      sandbox: 'allow-scripts',
                      style: 'width: 100%; min-height: 280px; border: 2px dashed var(--bw_card_border, #d8d8d8); border-radius: var(--bw_radius, 8px); background: #fff;'
                    }}
                  ]
                }
              ]
            }]
          },
          callout('concept', 'What just happened?', {
            t: 'p', c: [
              { t: 'code', c: 'bw.DOM(\'#app\', taco)' },
              ' mounts a TACO object into any CSS selector. The TACO ',
              { t: 'code', c: '{ t: \'h1\', c: \'Hello bitwrench!\' }' },
              ' becomes an ',
              { t: 'code', c: '<h1>' },
              ' element. Try changing the text, tag, or adding attributes like ',
              { t: 'code', c: "a: { style: 'color: teal;' }" },
              '.'
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 2: Building Blocks
    // =========================================================================
    var section2 = {
      t: 'div', a: { class: 'demo-section', id: 'section-building-blocks' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-building-blocks' }, c: 'Building Blocks' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' },
            c: 'Every HTML element is a JavaScript object with a tag, attributes, and content. Build up progressively:' },
          makeTryIt({
            code: [
              '// Start simple: just a tag and content',
              'bw.DOM(target, {',
              '  t: \'div\',',
              '  c: [',
              '    // Plain text',
              '    { t: \'p\', c: \'Just text.\' },',
              '',
              '    // Add attributes: style, class, etc.',
              '    { t: \'p\', a: { style: \'color: teal; font-weight: bold;\' }, c: \'Styled!\' },',
              '',
              '    // Nest elements inside each other',
              '    { t: \'div\', a: { style: \'border: 1px solid #ccc; padding: 0.75rem; border-radius: 6px;\' },',
              '      c: [',
              '        { t: \'h3\', a: { style: \'margin: 0 0 0.5rem;\' }, c: \'Nested Card\' },',
              '        { t: \'p\', a: { style: \'margin: 0;\' }, c: \'Content inside a nested div.\' }',
              '      ]',
              '    }',
              '  ]',
              '});'
            ].join('\n'),
            height: '320px'
          }),
          callout('concept', 'This is called TACO', {
            t: 'p', c: [
              { t: 'strong', c: 'T' }, 'ag, ',
              { t: 'strong', c: 'A' }, 'ttributes, ',
              { t: 'strong', c: 'C' }, 'ontent, ',
              { t: 'strong', c: 'O' }, 'ptions. ',
              'You\'ve just used it. The name comes after you\'ve seen the idea \u2014 it\'s just ',
              'a plain JavaScript object that maps directly to HTML. Only ',
              { t: 'code', c: 't' }, ' is required; everything else is optional.'
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 3: Where Do Styles Come From?
    // =========================================================================
    var btnTaco = bw.makeButton({ text: 'Click Me', variant: 'primary' });

    var section3 = {
      t: 'div', a: { class: 'demo-section', id: 'section-styles' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-styles' }, c: 'Where Do Styles Come From?' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' }, c: [
            'Bitwrench includes built-in CSS classes (',
            { t: 'code', c: 'bw_btn' }, ', ', { t: 'code', c: 'bw_card' },
            ', etc.) that give you Bootstrap-like styling. You get them by including ',
            { t: 'code', c: '<link href="bitwrench.css">' }, ' in your page.'
          ]},
          makeTryIt({
            code: [
              '// bitwrench includes Bootstrap-like CSS classes',
              'bw.DOM(target, {',
              '  t: \'div\', c: [',
              '    bw.makeButton({ text: \'Primary\', variant: \'primary\' }),',
              '    \' \',',
              '    bw.makeButton({ text: \'Success\', variant: \'success\' }),',
              '    \' \',',
              '    bw.makeButton({ text: \'Danger\', variant: \'danger\' }),',
              '    { t: \'div\', a: { style: \'margin-top: 1rem;\' },',
              '      c: bw.makeAlert({ content: \'This is a bitwrench alert.\', variant: \'info\' })',
              '    },',
              '    bw.makeCard({ title: \'Card\', content: \'Built-in card component.\' })',
              '  ]',
              '});'
            ].join('\n'),
            height: '240px'
          }),
          showPipeline({
            label: 'What does bw.makeButton() actually return?',
            helperCode: 'bw.makeButton({\n  text: \'Click Me\',\n  variant: \'primary\'\n})',
            taco: btnTaco
          }),
          callout('concept', 'Helpers return JavaScript objects, not HTML', {
            t: 'p', c: [
              { t: 'code', c: 'bw.makeButton()' }, ' returns a TACO object. ',
              { t: 'code', c: 'bw.DOM()' }, ' renders it. ',
              'The helper is just a shortcut for writing the object yourself. See the ',
              { t: 'a', a: { href: '03-styling.html' }, c: 'Styling' },
              ' page for the full CSS story.'
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 4: Making It Interactive
    // =========================================================================
    var section4 = {
      t: 'div', a: { class: 'demo-section', id: 'section-interactive' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-interactive' }, c: 'Making It Interactive' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' },
            c: 'When state changes, call render again. Bitwrench replaces the old content with the new. That\'s the entire update model.' },
          makeTryIt({
            code: [
              'var count = 0;',
              '',
              'function render() {',
              '  bw.DOM(target, {',
              '    t: \'div\', c: [',
              '      { t: \'h3\', c: \'Count: \' + count },',
              '      bw.makeButton({',
              '        text: \'+\', variant: \'primary\',',
              '        onclick: function() { count++; render(); }',
              '      }),',
              '      \' \',',
              '      bw.makeButton({',
              '        text: \'\\u2013\', variant: \'secondary\',',
              '        onclick: function() { count--; render(); }',
              '      }),',
              '      \' \',',
              '      bw.makeButton({',
              '        text: \'Reset\', variant: \'secondary\',',
              '        onclick: function() { count = 0; render(); }',
              '      })',
              '    ]',
              '  });',
              '}',
              'render();'
            ].join('\n'),
            height: '360px'
          }),
          callout('tip', 'This is the simplest pattern', {
            t: 'p', c: [
              'A closure variable and a render function is all you need for simple components. ',
              'You decide when to re-render by calling the function \u2014 every update is an ',
              'explicit call you can see and step through.'
            ]
          }),
          callout('concept', 'This works, but there\'s a better way', {
            t: 'p', c: [
              'The closure pattern is great for simple cases. For anything with state you want to read or update from outside, use ',
              { t: 'code', c: 'bw.component()' },
              ' \u2014 shown in the next section.'
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 4b: The Recommended Pattern — bw.component()
    // =========================================================================
    var section4b = {
      t: 'div', a: { class: 'demo-section', id: 'section-component' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-component' }, c: 'The Recommended Pattern: bw.component()' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' }, c: [
            'The closure pattern above works, but for most components, ',
            { t: 'code', c: 'bw.component()' },
            ' is the better approach. It wraps a TACO in a reactive handle with ',
            { t: 'code', c: '.get()' }, ' / ', { t: 'code', c: '.set()' },
            ' and auto-renders template bindings like ',
            { t: 'code', c: '${count}' }, '.'
          ]},
          makeTryIt({
            code: [
              '// bw.component() = reactive state + auto-render',
              'var counter = bw.component({',
              '  t: \'div\', c: [',
              '    { t: \'h3\', c: \'Count: ${count}\' },',
              '    bw.makeButton({',
              '      text: \'+\', variant: \'primary\',',
              '      onclick: function() {',
              '        counter.set(\'count\',',
              '          counter.get(\'count\') + 1);',
              '      }',
              '    }),',
              '    \' \',',
              '    bw.makeButton({',
              '      text: \'Reset\', variant: \'secondary\',',
              '      onclick: function() {',
              '        counter.reset();',
              '      }',
              '    })',
              '  ],',
              '  o: {',
              '    state: { count: 0 },',
              '    methods: {',
              '      reset: function(comp) {',
              '        comp.set(\'count\', 0);',
              '      }',
              '    }',
              '  }',
              '});',
              '',
              'bw.DOM(target, counter);'
            ].join('\n'),
            height: '420px'
          }),
          callout('tip', 'When to use which pattern', {
            t: 'div', c: [
              { t: 'p', c: [
                { t: 'strong', c: 'Closure + render()' }, ' \u2014 simple widgets, one-off interactivity.'
              ]},
              { t: 'p', c: [
                { t: 'strong', c: 'bw.component()' }, ' \u2014 anything with state you want to read/write from outside. Template bindings, methods, pub/sub integration.'
              ]},
              { t: 'p', a: { style: 'margin-top: 0.5rem;' }, c: [
                'See the ',
                { t: 'a', a: { href: '05-state.html' }, c: 'State & Interactivity' },
                ' page for the full comparison.'
              ]}
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 5: Data-Driven UI
    // =========================================================================
    var section5 = {
      t: 'div', a: { class: 'demo-section', id: 'section-data-driven' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-data-driven' }, c: 'Data-Driven UI' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' }, c: [
            'In bitwrench, your data is the UI. As a result, template constructs such as ',
            { t: 'code', c: 'v-for' }, ' and ', { t: 'code', c: '{#each}' },
            ' are achieved with JavaScript\'s built-in ', { t: 'code', c: '.map()' }, ' function.'
          ]},
          makeTryIt({
            code: [
              'var fruits = [\'Apple\', \'Banana\', \'Cherry\', \'Date\', \'Elderberry\'];',
              '',
              'bw.DOM(target, {',
              '  t: \'ul\', a: { class: \'bw_list_group\' },',
              '  c: fruits.map(function(f) {',
              '    return {',
              '      t: \'li\',',
              '      a: { class: \'bw_list_group_item\' },',
              '      c: f',
              '    };',
              '  })',
              '});',
              '',
              '// Try: add more fruits, or change to .filter()',
              '// to show only fruits starting with a letter.'
            ].join('\n'),
            height: '260px'
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 5b: Theming
    // =========================================================================
    var section5b = {
      t: 'div', a: { class: 'demo-section', id: 'section-theming' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-theming' }, c: 'Theming in One Call' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'p', a: { class: 'demo-description' }, c: [
            { t: 'code', c: 'bw.generateTheme()' },
            ' creates a complete design system from 2\u20133 seed colors. Every ',
            { t: 'code', c: 'bw_*' },
            ' component picks up the new palette automatically.'
          ]},
          makeTryIt({
            code: [
              '// Generate a theme from seed colors',
              'bw.generateTheme(\'demo\', {',
              '  primary: \'#336699\',',
              '  secondary: \'#cc6633\',',
              '  tertiary: \'#2e8b57\'',
              '});',
              '',
              '// Wrap output in the theme class',
              'bw.DOM(target, {',
              '  t: \'div\', a: { class: \'demo\' }, c: [',
              '    bw.makeCard({',
              '      title: \'Themed Card\',',
              '      content: [',
              '        { t: \'p\', c: \'All colors derived \' +',
              '          \'from three seed hex values.\' },',
              '        bw.makeProgress({',
              '          value: 72,',
              '          variant: \'primary\',',
              '          label: \'72% done\' }),',
              '        { t: \'div\',',
              '          a: { style: \'margin-top:0.5rem;\' +',
              '            \' display:flex; gap:0.5rem;\' +',
              '            \' flex-wrap:wrap\' },',
              '          c: [',
              '            bw.makeButton({',
              '              text: \'Primary\',',
              '              variant: \'primary\',',
              '              size: \'sm\' }),',
              '            bw.makeButton({',
              '              text: \'Secondary\',',
              '              variant: \'secondary\',',
              '              size: \'sm\' }),',
              '            bw.makeButton({',
              '              text: \'Tertiary\',',
              '              variant: \'tertiary\',',
              '              size: \'sm\' })',
              '          ]}',
              '      ]',
              '    }),',
              '    bw.makeAlert({',
              '      content: \'Try changing the hex \' +',
              '        \'colors above and click Run!\',',
              '      variant: \'info\' })',
              '  ]',
              '});'
            ].join('\n'),
            height: '500px'
          }),
          callout('concept', 'Built-in presets', {
            t: 'p', c: [
              'Try replacing the hex colors with a preset name: ',
              { t: 'code', c: "'ocean'" }, ', ',
              { t: 'code', c: "'sunset'" }, ', ',
              { t: 'code', c: "'forest'" }, ', ',
              { t: 'code', c: "'slate'" }, ', or ',
              { t: 'code', c: "'monochrome'" }, '. ',
              'See the ',
              { t: 'a', a: { href: '10-themes.html' }, c: 'Themes' },
              ' page for the full generator.'
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 6: Next Steps
    // =========================================================================
    var nextSteps = [
      { href: '03-styling.html', title: 'Styling',
        desc: 'Where bw-* classes come from, CSS generation from JavaScript objects, utility system.' },
      { href: '01-components.html', title: 'Components',
        desc: 'Cards, buttons, alerts, badges, grids \u2014 all built-in components with live demos.' },
      { href: '02-tables.html', title: 'Tables & Data',
        desc: 'Sortable tables from data in one function call, pagination, search.' },
      { href: '02-forms.html', title: 'Forms',
        desc: 'Inputs, selects, checkboxes, tabbed forms, validation patterns.' },
      { href: '05-state.html', title: 'State Management',
        desc: 'Component factories, state on elements, pub/sub for cross-component communication.' },
      { href: '06-tic-tac-toe-tutorial.html', title: 'Tic Tac Toe Tutorial',
        desc: 'Build a complete game step by step. The best hands-on way to learn bitwrench.' },
      { href: '07-framework-comparison.html', title: 'Framework Comparison',
        desc: 'The same tasks in HTML/JS, React, Vue, Svelte, and bitwrench side by side.' },
      { href: 'thinking-in-bitwrench.html', title: 'Thinking in Bitwrench',
        desc: 'The full design philosophy \u2014 TACO as component spec, composition patterns, three levels of commitment.' }
    ];

    var section6 = {
      t: 'div', a: { class: 'demo-section', id: 'section-next-steps' },
      c: [
        { t: 'h2', c: { t: 'a', a: { href: '#section-next-steps' }, c: 'Next Steps' } },
        { t: 'div', a: { class: 'demo-content' }, c: [
          { t: 'div', a: { class: 'bw_feature_grid' },
            c: nextSteps.map(function(item) {
              return {
                t: 'div', a: { class: 'bw_feature_card' },
                c: [
                  { t: 'h4', c: { t: 'a', a: { href: item.href, style: 'text-decoration: none;' }, c: item.title } },
                  { t: 'p', c: item.desc }
                ]
              };
            })
          }
        ]}
      ]
    };

    // =========================================================================
    // Assemble and mount the full page
    // =========================================================================
    var page = {
      t: 'div', c: [
        // Hero header
        {
          t: 'div', a: { class: 'page-header' },
          c: {
            t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
            c: [
              { t: 'h1', c: 'Quick Start' },
              { t: 'p', a: { class: 'subtitle' }, c: 'From zero to a styled, interactive app in 5 minutes. Every example is editable.' }
            ]
          }
        },
        // Content sections
        {
          t: 'div', a: { class: 'content-container wide' },
          c: [
            { t: 'div', a: { class: 'callout callout-concept' }, c: [
                { t: 'h4', c: 'Levels 0 \u2192 1 \u2192 2' },
                { t: 'p', c: ['This page walks through all three learning levels: data as TACO objects (Level 0), mounting to the DOM (Level 1), and managing state (Level 2). ', { t: 'a', a: { href: 'thinking-in-bitwrench.html' }, c: 'Thinking in Bitwrench' }] }
            ]},
            section1, section2, section3, section4, section4b, section5, section5b, section6
          ]
        }
      ]
    };

    bw.DOM('#app', page);
  </script>
</body>
</html>
