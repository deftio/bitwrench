<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Styling</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-nav.js"></script>
  <script src="site.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.min.js"></script>
  <script src="shared-tryit.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    var styles = initBitwrenchPage('03-styling.html');
    var p = styles.palette;

    // ── Inject the media query CSS that was previously in <style> ──
    bw.injectCSS(bw.css({
      '@media (max-width: 768px)': {
        '.demo-grid': { 'grid-template-columns': '1fr !important' }
      }
    }));

    // =========================================================================
    // Section 1: Three Ways to Style Bitwrench Elements
    // =========================================================================
    var section1 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Three Ways to Style Bitwrench Elements' },
        { t: 'p', a: { style: 'padding: 0 0.25rem;' },
          c: bw.raw('Bitwrench generates DOM elements with <code>class</code> and <code>style</code> attributes. Whatever CSS you use &mdash; your own stylesheet, Bootstrap, Tailwind, <code>bitwrench.css</code>, or no CSS file at all &mdash; it just works. You can mix all three approaches on the same element:') },
        { t: 'div', a: { class: 'demo-grid', style: 'display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; margin: 1.5rem 0;' },
          c: [
            site.makeCallout('concept', [
              { t: 'h4', c: '1. Inline Styles' },
              { t: 'p', c: bw.raw('No CSS file needed. Use <code>bw.s()</code> to compose style objects directly on elements. JavaScript IS your style system.') },
              { t: 'pre', c: { t: 'code', c: "a: { style: bw.s({ display: 'flex' }, { padding: '1rem' }) }" } }
            ]),
            site.makeCallout('concept', [
              { t: 'h4', c: '2. Generated Classes' },
              { t: 'p', c: bw.raw('Use <code>bw.css()</code> to create CSS rules from JS objects when you need <code>:hover</code>, <code>:focus</code>, or media queries.') },
              { t: 'pre', c: { t: 'code', c: 'bw.injectCSS(bw.css({\n  \'.card:hover\': { ... }\n}))' } }
            ]),
            site.makeCallout('concept', [
              { t: 'h4', c: '3. Any CSS File' },
              { t: 'p', c: bw.raw('Bring your own classes. <code>bitwrench.css</code> is a convenience starter kit &mdash; or use Bootstrap, Tailwind, your own stylesheet, or nothing.') },
              { t: 'pre', c: { t: 'code', c: 'a: { class: \'my-class\' }' } }
            ])
          ]
        },
        site.makeCallout('tip', [
          { t: 'strong', c: 'History note:' },
          bw.raw(' In bitwrench 1.x, the library auto-generated its CSS at runtime if it detected no stylesheet was loaded. In 2.x, this is more &agrave; la carte &mdash; you choose what to load and when. The DNA has always been "CSS from JS."')
        ])
      ]
    };

    // =========================================================================
    // Section 2: Inline Styles — No CSS File Needed
    // =========================================================================
    var section2 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: bw.raw('Inline Styles &mdash; No CSS File Needed') },
        { t: 'p', a: { style: 'padding: 0 0.25rem;' },
          c: bw.raw('<code>bw.s()</code> merges style objects (like <code>Object.assign</code>). Pass any number of plain objects and they get merged left-to-right. This replaces CSS variables, preprocessors, and utility class frameworks &mdash; because <strong>JavaScript variables ARE your variables</strong>.') },
        { t: 'div', a: { id: 'tryit-style-objects' } },
        { t: 'div', a: { style: 'margin-top: 1.5rem;' }, c: site.makeCallout('concept', [
          { t: 'h4', c: 'Why CSS variables aren\'t needed' },
          { t: 'p', c: bw.raw('CSS variables (<code>:root { --accent: teal }</code>) exist to share values between rules. But in bitwrench, JS variables already do that &mdash; <code>var accent = \'#006666\'</code> and you use it in inline styles, generated classes, or both. The <code>? :</code> ternary operator replaces <code>@media</code> and conditional class toggling. No <code>:root</code> declarations needed.') }
        ]) }
      ]
    };

    // =========================================================================
    // Section 3: Computed Classes — Classes Are Just Strings
    // =========================================================================
    var section3 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: bw.raw('Computed Classes &mdash; Classes Are Just Strings') },
        { t: 'p', c: bw.raw('Class names in bitwrench are just strings in the <code>a: { class: ... }</code> attribute. You can compute them with JavaScript &mdash; concatenation, ternary operators, <code>.map()</code> &mdash; no special directive syntax needed. The classes can come from bitwrench.css, your own stylesheet, Bootstrap, Tailwind, or anything.') },
        { t: 'div', a: { id: 'tryit-computed-classes' } },
        { t: 'div', a: { style: 'margin-top: 1rem;' }, c: site.makeCallout('concept', [
          { t: 'h4', c: 'Bring any CSS framework' },
          { t: 'p', c: bw.raw('Since bitwrench just sets the <code>class</code> attribute, you can use <strong>any</strong> CSS classes: <code>\'btn btn-primary\'</code> (Bootstrap), <code>\'flex gap-4 p-4\'</code> (Tailwind), or your own. You could even use bitwrench\'s <code>bw.css()</code> to generate Tailwind-equivalent styles at runtime &mdash; turning class name strings into real CSS without Tailwind\'s build pipeline.') }
        ]) }
      ]
    };

    // =========================================================================
    // Section 4: Generated Classes — :hover, :focus, Media Queries
    // =========================================================================
    var section4 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: bw.raw('Generated Classes &mdash; When You Need :hover or Media Queries') },
        { t: 'p', c: bw.raw('Inline styles can\'t express <code>:hover</code>, <code>:focus</code>, or <code>@media</code>. For those, generate CSS at runtime with <code>bw.css()</code> + <code>bw.injectCSS()</code>:') },
        { t: 'div', a: { id: 'tryit-css-classes' } },
        { t: 'div', a: { style: 'margin-top: 1rem;' }, c: site.makeCallout('tip', [
          { t: 'strong', c: 'Key insight:' },
          bw.raw(' <code>bw.css()</code> turns <code>{ \'.my-btn\': { background: \'teal\' } }</code> into the CSS string <code>.my-btn { background: teal; }</code>. You write styles as data, bitwrench handles the syntax.')
        ]) }
      ]
    };

    // =========================================================================
    // Section 5: Responsive Styles
    // =========================================================================
    var section5 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Responsive Styles' },
        { t: 'p', c: bw.raw('<code>bw.responsive()</code> generates mobile-first <code>@media (min-width)</code> CSS from a single object. These breakpoints match the grid system (<code>.bw_col_sm_*</code>, etc.) and <code>theme.breakpoints</code>.') },
        bw.makeTable({
          headers: ['Key', 'Min-Width', 'Target'],
          rows: [
            ['base', '(none)', 'All devices (no media query)'],
            ['sm', '576px', 'Small devices (landscape phones)'],
            ['md', '768px', 'Medium devices (tablets)'],
            ['lg', '992px', 'Large devices (desktops)'],
            ['xl', '1200px', 'Extra large devices (wide desktops)']
          ],
          className: 'bw_table_sm',
          style: 'margin-bottom: 1rem;'
        }),
        { t: 'div', a: { id: 'tryit-responsive' } }
      ]
    };

    // =========================================================================
    // Section 6: Mixing All Three on One Element
    // =========================================================================
    var section6 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Mixing All Three on One Element' },
        { t: 'p', c: 'The real power: use a global class for base layout, a generated class for hover behavior, and an inline style for the dynamic part. All on the same element.' },
        { t: 'div', a: { id: 'tryit-mixing' } }
      ]
    };

    // =========================================================================
    // Section 7: Global Styles — The Convenience Option
    // =========================================================================
    var section7 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: bw.raw('Global Styles &mdash; The Convenience Option') },
        { t: 'p', c: bw.raw('Bitwrench ships with <code>bitwrench.css</code> &mdash; ~22 component styles (buttons, cards, tables, forms, alerts, badges, tabs). It\'s a convenience starter kit, not a requirement. You get them two ways:') },
        { t: 'div', a: { class: 'demo-grid', style: 'display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 1rem 0;' },
          c: [
            site.makeCallout('concept', [
              { t: 'h4', c: 'Static CSS file' },
              { t: 'pre', c: { t: 'code', c: bw.raw('&lt;link href="bitwrench.css" rel="stylesheet"&gt;') } },
              { t: 'p', c: 'Include it like any stylesheet. These example pages use this approach.' }
            ]),
            site.makeCallout('concept', [
              { t: 'h4', c: 'Runtime generation' },
              { t: 'pre', c: { t: 'code', c: 'bw.loadStyles();' } },
              { t: 'p', c: 'Generate the same styles from JS at runtime. Useful for embedded widgets or single-file deployments.' }
            ])
          ]
        },
        { t: 'p', c: bw.raw('Both produce the same <code>bw_btn</code>, <code>bw_card</code>, <code>bw_table</code> classes. Or skip them entirely and use your own CSS, Bootstrap, Tailwind, or pure inline styles.') },
        { t: 'div', a: { style: 'margin-top: 1rem;' }, c: site.makeCallout('tip', [
          { t: 'strong', c: 'Custom palettes:' },
          bw.raw(' Need different colors? <code>bw.makeStyles()</code> derives a complete palette from just 2-3 seed colors &mdash; buttons, alerts, badges, hover states, and contrast text. Call <code>bw.applyStyles()</code> to inject them. See the <a href="10-themes.html">Themes page</a> for an interactive generator, presets, multi-theme demos, and code export.')
        ]) }
      ]
    };

    // =========================================================================
    // Separator
    // =========================================================================
    var separator1 = { t: 'hr', a: { style: 'margin: 2rem 0; border: none; border-top: 1px solid ' + p.light.border + ';' } };

    // =========================================================================
    // Section 8: Theming — Generate Complete Palettes
    // =========================================================================
    var section8 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: bw.raw('Theming &mdash; Generate Complete Palettes') },
        { t: 'p', c: bw.raw('<code>bw.makeStyles(config)</code> replaces manual color wrangling. Give it 2-3 seed colors and it derives hover states, active states, light backgrounds, border colors, focus rings, and contrast text for every component. Call <code>bw.applyStyles(result)</code> to inject.') },
        { t: 'div', a: { id: 'tryit-theme' } },
        { t: 'div', a: { id: 'theme-preview-area', style: 'margin-top: 1rem;' } },
        { t: 'div', a: { style: 'margin-top: 1rem;' }, c: site.makeCallout('concept', [
          { t: 'h4', c: 'Full theme studio' },
          { t: 'p', c: bw.raw('The <a href="10-themes.html">Themes page</a> has a full interactive generator with preset gallery, multi-theme switching, dark mode, and copy-to-clipboard CSS export. This section shows just the basics.') }
        ]) }
      ]
    };

    // =========================================================================
    // Separator
    // =========================================================================
    var separator2 = { t: 'hr', a: { style: 'margin: 2rem 0; border: none; border-top: 1px solid ' + p.light.border + ';' } };

    // =========================================================================
    // Section 9: Structural vs Cosmetic CSS Architecture
    // =========================================================================
    var section9 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Under the Hood: Structural vs Cosmetic CSS' },
        { t: 'p', c: 'Bitwrench\'s built-in styles are split into two layers. Understanding the split helps you theme effectively.' },
        { t: 'div', a: { class: 'demo-grid', style: 'display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 1rem 0;' },
          c: [
            site.makeCallout('concept', [
              { t: 'h4', c: 'Structural (layout)' },
              { t: 'p', c: bw.raw('Display, flex, sizing, spacing, cursor, font metrics. These <strong>never change</strong> with themes. A button is always <code>display: inline-block</code> and <code>cursor: pointer</code> regardless of color.') },
              { t: 'pre', c: { t: 'code', c: '// Loaded once, never changes\nbw.loadStyles();\n// injects structural CSS (id="bw_structural")' } }
            ]),
            site.makeCallout('concept', [
              { t: 'h4', c: 'Cosmetic (theme)' },
              { t: 'p', c: bw.raw('Colors, backgrounds, shadows, border-colors, border-radius. These are <strong>derived from your palette</strong> by <code>bw.makeStyles()</code>. Swap palettes without touching layout.') },
              { t: 'pre', c: { t: 'code', c: '// Theme generates only cosmetic CSS\nvar styles = bw.makeStyles({\n  primary: \'#0077b6\',\n  secondary: \'#90e0ef\'\n});\nbw.applyStyles(styles);\n// injects a <style id="bw_style_global"> tag' } }
            ])
          ]
        },
        { t: 'p', c: bw.raw('When you call <code>bw.loadStyles()</code>, both layers are injected automatically &mdash; structural CSS plus the default palette. Call <code>bw.makeStyles()</code> + <code>bw.applyStyles()</code> to swap just the cosmetic layer while keeping the same structural foundation.') }
      ]
    };

    // =========================================================================
    // Section 10: Class Naming Convention
    // =========================================================================
    var section10 = {
      t: 'div', a: { class: 'bw_site_pages_demo' },
      c: [
        { t: 'h2', a: { class: 'bw_site_pages_demo_title' }, c: 'Class Naming Convention' },
        { t: 'p', c: bw.raw('All bitwrench CSS classes use the <code>bw-</code> prefix. Both <strong>hyphens</strong> and <strong>underscores</strong> work interchangeably:') },
        bw.makeTable({
          headers: ['Form', 'Example', 'Notes'],
          rows: [
            ['Hyphen (canonical)', 'bw_btn, bw_card, bw_table_hover', 'Used in docs, generated CSS, component output'],
            ['Underscore (alias)', 'bw_btn, bw_card, bw_table_hover', 'Convenient in JS objects (no quoting needed)']
          ],
          className: 'bw_table_sm',
          style: 'margin-bottom: 1rem;'
        }),
        { t: 'p', c: bw.raw('TACO attribute keys like <code>bw_id</code> and <code>bw_meta</code> use underscores because they\'re plain JS identifiers. CSS classes support both forms — the generated stylesheet includes both selectors automatically.') },
        { t: 'div', a: { style: 'margin-top: 0.5rem;' }, c: site.makeCallout('tip', [
          { t: 'strong', c: 'bw.normalizeClass():' },
          bw.raw(' Converts underscore classes to canonical hyphen form at runtime. Useful when comparing or concatenating class strings.')
        ]) }
      ]
    };

    // =========================================================================
    // Assemble and mount the full page
    // =========================================================================
    var page = {
      t: 'div', c: [
        // Hero header
        {
          t: 'div', a: { class: 'bw_site_pages_header' },
          c: {
            t: 'div', a: { class: 'content-container wide', style: 'padding-top: 0; padding-bottom: 0;' },
            c: [
              { t: 'h1', c: 'Styling' },
              { t: 'p', a: { class: 'subtitle' }, c: 'Where bitwrench styles come from, utility CSS as JavaScript objects, and dynamic theming.' }
            ]
          }
        },
        // Content sections
        {
          t: 'div', a: { class: 'content-container wide' },
          c: [
            { t: 'div', a: { class: 'bw_site_pages_callout bw_site_pages_callout_concept' }, c: [
                { t: 'h4', a: { class: 'bw_site_pages_callout_title' }, c: 'CSS Is Just Strings' },
                { t: 'p', c: ['Bitwrench doesn\'t own your CSS. Use inline styles, bw.css() generation, any CSS file, or all three. CSS values are JS variables \u2014 compose them with Object.assign, generate them with functions. ', { t: 'a', a: { href: '../docs/thinking-in-bitwrench.md' }, c: 'Thinking in Bitwrench' }] }
            ]},
            section1, section2, section3, section4, section5, section6, section7, separator1, section8, separator2, section9, section10
          ]
        }
      ]
    };

    bw.DOM('#app', page);

    // ── Section 2: Inline Styles — JS variables replace CSS variables ──
    bw.DOM('#tryit-style-objects', makeTryIt({
      code: '// JS variables replace CSS variables. No :root needed.\n' +
        'var accent = \'#006666\';\n' +
        'var isDark = false;\n' +
        '\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\', a: { style: bw.s({ display: "flex" }, { gap: "1rem" }, { padding: "1rem" }) },\n' +
        '  c: [\n' +
        '    { t: \'div\',\n' +
        '      a: { style: bw.s({ padding: "1rem" }, { borderRadius: "0.375rem" },\n' +
        '        { textAlign: "center" }, { background: accent, color: \'#fff\' }) },\n' +
        '      c: \'Uses accent var\' },\n' +
        '    { t: \'div\',\n' +
        '      a: { style: bw.s({ padding: "1rem" }, { borderRadius: "0.375rem" },\n' +
        '        { textAlign: "center" }, { border: "1px solid #d8d8d8" },\n' +
        '        { background: isDark ? \'#333\' : \'#fff\',\n' +
        '          color: isDark ? \'#fff\' : \'#333\' }) },\n' +
        '      c: \'Ternary = conditional style\' },\n' +
        '    { t: \'div\',\n' +
        '      a: { style: bw.s({ background: "#006666", color: "#fff" },\n' +
        '        { padding: "1rem" }, { borderRadius: "0.375rem" },\n' +
        '        { textAlign: "center" }, { opacity: \'0.7\' }) },\n' +
        '      c: \'Inline style objects\'}\n' +
        '  ]\n' +
        '});',
      height: '300px'
    }));

    // ── Section 3: Computed Classes ──
    bw.DOM('#tryit-computed-classes', makeTryIt({
      code: '// Classes are just strings — compute them with JS\n' +
        'var items = [\n' +
        '  { text: \'All good\', status: \'success\' },\n' +
        '  { text: \'Watch out\', status: \'warning\' },\n' +
        '  { text: \'Problem!\', status: \'danger\' }\n' +
        '];\n' +
        '\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\', a: { style: bw.s({ display: "flex", flexDirection: "column" }, { gap: "0.5rem" }) },\n' +
        '  c: items.map(function(item) {\n' +
        '    // String concatenation builds the class name\n' +
        '    return {\n' +
        '      t: \'div\',\n' +
        '      a: { class: \'bw_alert bw_alert_\' + item.status },\n' +
        '      c: item.text + \' (class: bw_alert_\' + item.status + \')\'\n' +
        '    };\n' +
        '  })\n' +
        '});',
      height: '280px'
    }));

    // ── Section 4: Generated Classes — :hover, :focus, media queries ──
    bw.DOM('#tryit-css-classes', makeTryIt({
      code: '// Generate a CSS class with :hover\n' +
        'bw.injectCSS(bw.css({\n' +
        '  \'.my-btn\': bw.s({ background: "#006666", color: "#fff" },\n' +
        '    { padding: "0.75rem" }, { borderRadius: "0.375rem" },\n' +
        '    { cursor: \'pointer\', border: \'none\', fontSize: \'1rem\' }),\n' +
        '  \'.my-btn:hover\': { background: \'#004d4d\', transform: \'translateY(-1px)\' }\n' +
        '}));\n' +
        '\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\', a: { style: bw.s({ display: "flex" }, { gap: "0.75rem" }) },\n' +
        '  c: [\n' +
        '    { t: \'button\', a: { class: \'my-btn\' }, c: \'Hover me\' },\n' +
        '    { t: \'button\', a: { class: \'my-btn\', style: bw.s({ background: \'#28a745\' }) }, c: \'Green\' }\n' +
        '  ]\n' +
        '});',
      height: '260px'
    }));

    // ── Section 5: Responsive Styles ──
    bw.DOM('#tryit-responsive', makeTryIt({
      code: '// Responsive box — resize your browser to see it change\n' +
        'bw.injectCSS(bw.responsive(\'.responsive-demo\', {\n' +
        '  base: bw.s({ padding: "0.75rem" }, { borderRadius: "0.375rem" },\n' +
        '    { textAlign: "center" }, { fontWeight: "700" },\n' +
        '    { background: \'#e8e8e8\', border: \'2px solid #ccc\' }),\n' +
        '  md: { background: \'#c8e6c9\', borderColor: \'#4caf50\' },\n' +
        '  lg: { background: \'#bbdefb\', borderColor: \'#2196f3\', padding: \'2rem\' }\n' +
        '}));\n' +
        '\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\', a: { class: \'responsive-demo\' },\n' +
        '  c: \'Resize your browser! base=gray, md(768px)=green, lg(992px)=blue\'\n' +
        '});',
      height: '220px'
    }));

    // ── Section 6: Mixing all three strategies ──
    bw.DOM('#tryit-mixing', makeTryIt({
      code: '// Mix global class + generated class + inline style\n' +
        'var isOnline = true;\n' +
        '\n' +
        '// Generated class for :hover (can\\\'t do this inline)\n' +
        'bw.injectCSS(bw.css({\n' +
        '  \'.status-card:hover\': {\n' +
        '    transform: \'translateY(-2px)\',\n' +
        '    boxShadow: \'0 4px 12px rgba(0,0,0,0.15)\'\n' +
        '  }\n' +
        '}));\n' +
        '\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\',\n' +
        '  a: {\n' +
        '    // Global class (from bitwrench.css) for base card styling\n' +
        '    // + generated class for :hover\n' +
        '    class: \'bw_card status-card\',\n' +
        '    // Inline style for the dynamic part (computed from JS)\n' +
        '    style: bw.s({ padding: "1rem" }, { transition: "all 0.2s ease" }, {\n' +
        '      borderLeft: \'4px solid \' + (isOnline ? \'#28a745\' : \'#dc3545\'),\n' +
        '      cursor: \'pointer\'\n' +
        '    })\n' +
        '  },\n' +
        '  c: [\n' +
        '    { t: \'h4\', c: \'Server Status\' },\n' +
        '    { t: \'p\', c: isOnline ? \'Online\' : \'Offline\' }\n' +
        '  ]\n' +
        '});',
      height: '380px'
    }));

    // ── Section 8: Theming — Generate Complete Palettes ──
    bw.DOM('#tryit-theme', makeTryIt({
      code: '// Generate a complete theme from 2 seed colors\n' +
        'var result = bw.makeStyles({\n' +
        '  primary:   \'#2196f3\',\n' +
        '  secondary: \'#607d8b\'\n' +
        '});\n' +
        '\n' +
        '// Show the derived palette as color swatches\n' +
        'var keys = [\'primary\', \'secondary\', \'success\', \'danger\', \'warning\', \'info\'];\n' +
        'bw.DOM(target, {\n' +
        '  t: \'div\', a: { style: bw.s({ display: "flex" }, { flexWrap: \'wrap\', gap: \'0.5rem\' }) },\n' +
        '  c: keys.map(function(k) {\n' +
        '    var color = result.palette[k].base;\n' +
        '    return {\n' +
        '      t: \'div\',\n' +
        '      a: { style: bw.s({ padding: "0.75rem" }, { borderRadius: "0.375rem" },\n' +
        '        { textAlign: "center" }, { fontWeight: "700" },\n' +
        '        { background: color, color: bw.textOnColor(color),\n' +
        '          minWidth: \'100px\', fontSize: \'0.85rem\' }) },\n' +
        '      c: k + \'\\n\' + color\n' +
        '    };\n' +
        '  })\n' +
        '});',
      height: '340px'
    }));

    // Live mini-demo: 3 color pickers + Generate -> preview
    (function() {
      var colors = { primary: '#006666', secondary: '#6c757d', tertiary: '#17a2b8' };

      function renderPreview() {
        var result = bw.makeStyles({
          primary: colors.primary,
          secondary: colors.secondary,
          tertiary: colors.tertiary
        });
        var pal = result.palette;

        bw.DOM('#theme-preview-area', {
          t: 'div', a: { class: 'bw_card' },
          c: [
            { t: 'div', a: { class: 'bw_card_header' }, c: 'Live Preview' },
            { t: 'div', a: { class: 'bw_card_body' },
              c: [
                // Color pickers row
                {
                  t: 'div', a: { style: bw.s({ display: 'flex' }, { gap: '1rem' }, { marginBottom: '0.75rem' }, { alignItems: 'center' }) },
                  c: ['primary', 'secondary', 'tertiary'].map(function(key) {
                    return {
                      t: 'label', a: { style: bw.s({ display: 'flex' }, { alignItems: 'center', gap: '0.5rem' }) },
                      c: [
                        { t: 'span', c: key.charAt(0).toUpperCase() + key.slice(1) },
                        { t: 'input', a: {
                          type: 'color', value: colors[key], style: 'width:40px;height:32px;border:none;cursor:pointer;',
                          onchange: function(e) { colors[key] = e.target.value; renderPreview(); }
                        }}
                      ]
                    };
                  })
                },
                // Buttons preview
                {
                  t: 'div', a: { style: bw.s({ display: 'flex' }, { gap: '0.5rem' }, { marginBottom: '0.75rem' }, { flexWrap: 'wrap' }) },
                  c: ['primary', 'secondary', 'success', 'danger', 'warning', 'info'].map(function(v) {
                    var base = pal[v].base;
                    return {
                      t: 'button',
                      a: { style: bw.s({ padding: '0.5rem' }, { borderRadius: '0.375rem' }, { fontWeight: '700' }, {
                        background: base, color: bw.textOnColor(base),
                        border: 'none', cursor: 'pointer', fontSize: '0.85rem', padding: '0.4rem 0.9rem'
                      }) },
                      c: v
                    };
                  })
                },
                // Alerts preview
                {
                  t: 'div', a: { style: bw.s({ display: 'flex', flexDirection: 'column' }, { gap: '0.5rem' }) },
                  c: ['success', 'danger', 'warning'].map(function(v) {
                    return {
                      t: 'div',
                      a: { style: bw.s({ padding: '0.75rem' }, { borderRadius: '0.375rem' }, {
                        background: pal[v].light,
                        border: '1px solid ' + pal[v].border,
                        color: pal[v].darkText
                      }) },
                      c: v.charAt(0).toUpperCase() + v.slice(1) + ' alert using derived palette colors'
                    };
                  })
                }
              ]
            }
          ]
        });
      }
      renderPreview();
    })();
  </script>
</body>
</html>
