    // ── Form with Validation ────────────────────────────────────────
    function createValidationDemo() {
      const state = { name: '', email: '', message: '', errors: {} };

      function validate() {
        state.errors = {};
        if (!state.name.trim()) state.errors.name = 'Name is required';
        if (!state.email.trim()) state.errors.email = 'Email is required';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.email)) state.errors.email = 'Invalid email format';
        if (!state.message.trim()) state.errors.message = 'Message is required';
        else if (state.message.trim().length < 10) state.errors.message = 'Message must be at least 10 characters';
        return Object.keys(state.errors).length === 0;
      }

      function fieldClass(field) {
        if (state.errors[field]) return 'bw_form_control bw_is_invalid';
        if (state[field].trim()) return 'bw_form_control bw_is_valid';
        return 'bw_form_control';
      }

      function renderForm() {
        bw.DOM('#validation-form', {
          t: 'div',
          a: { class: 'form-showcase' },
          c: [
            bw.makeFormGroup({
              label: 'Name',
              input: bw.makeInput({
                type: 'text',
                placeholder: 'Your name',
                value: state.name,
                className: fieldClass('name'),
                oninput: (e) => { state.name = e.target.value; }
              }),
              help: state.errors.name ? state.errors.name : ''
            }),
            bw.makeFormGroup({
              label: 'Email',
              input: bw.makeInput({
                type: 'email',
                placeholder: 'you@example.com',
                value: state.email,
                className: fieldClass('email'),
                oninput: (e) => { state.email = e.target.value; }
              }),
              help: state.errors.email ? state.errors.email : ''
            }),
            bw.makeFormGroup({
              label: 'Message',
              input: bw.makeTextarea({
                placeholder: 'Tell us something (at least 10 characters)...',
                rows: 3,
                value: state.message,
                className: fieldClass('message'),
                oninput: (e) => { state.message = e.target.value; }
              }),
              help: state.errors.message ? state.errors.message : ''
            }),
            {
              t: 'div',
              a: { style: 'display: flex; gap: 0.5rem; align-items: center;' },
              c: [
                bw.makeButton({
                  text: 'Submit',
                  variant: 'primary',
                  onclick: () => {
                    if (validate()) {
                      bw.DOM('#validation-result', {
                        t: 'div',
                        a: { class: 'bw_alert bw_alert_success', style: 'margin-top: 1rem;' },
                        c: 'Form submitted successfully!'
                      });
                    }
                    renderForm();
                  }
                }),
                bw.makeButton({
                  text: 'Reset',
                  variant: 'secondary',
                  onclick: () => {
                    state.name = '';
                    state.email = '';
                    state.message = '';
                    state.errors = {};
                    bw.DOM('#validation-result', { t: 'span', c: '' });
                    renderForm();
                  }
                })
              ]
            },
            { t: 'div', a: { id: 'validation-result' }, c: '' }
          ]
        });
      }

      setTimeout(renderForm, 0);
      return { t: 'div', a: { id: 'validation-form' }, c: '' };
    }

    const validationCode = `// Form with inline validation
const state = { name: '', email: '', message: '', errors: {} };

function validate() {
  state.errors = {};
  if (!state.name.trim()) state.errors.name = 'Name is required';
  if (!state.email.trim()) state.errors.email = 'Email is required';
  else if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(state.email))
    state.errors.email = 'Invalid email format';
  if (!state.message.trim()) state.errors.message = 'Message is required';
  else if (state.message.trim().length < 10)
    state.errors.message = 'At least 10 characters';
  return Object.keys(state.errors).length === 0;
}

function fieldClass(field) {
  if (state.errors[field]) return 'bw_form_control bw_is_invalid';
  if (state[field].trim()) return 'bw_form_control bw_is_valid';
  return 'bw_form_control';
}

function renderForm() {
  bw.DOM('#form', {
    t: 'div',
    c: [
      bw.makeFormGroup({
        label: 'Name',
        input: bw.makeInput({
          type: 'text',
          placeholder: 'Your name',
          value: state.name,
          className: fieldClass('name'),
          oninput: (e) => { state.name = e.target.value; }
        }),
        help: state.errors.name || ''
      }),
      bw.makeFormGroup({
        label: 'Email',
        input: bw.makeInput({
          type: 'email',
          placeholder: 'you@example.com',
          value: state.email,
          className: fieldClass('email'),
          oninput: (e) => { state.email = e.target.value; }
        }),
        help: state.errors.email || ''
      }),
      bw.makeFormGroup({
        label: 'Message',
        input: bw.makeTextarea({
          placeholder: 'Tell us something...',
          rows: 3,
          value: state.message,
          className: fieldClass('message'),
          oninput: (e) => { state.message = e.target.value; }
        }),
        help: state.errors.message || ''
      }),
      bw.makeButton({
        text: 'Submit',
        variant: 'primary',
        onclick: () => {
          if (validate()) {
            alert('Form submitted!');
          }
          renderForm();
        }
      })
    ]
  });
}

renderForm();`;
