<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench - Debugging &amp; Inspection</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="shared-theme.js"></script>
  <script src="shared-nav.js"></script>
  <script src="../dist/bitwrench-code-edit.umd.min.js"></script>
  <script src="shared-tryit.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    initBitwrenchPage('11-debugging.html');

    // =========================================================================
    // Page-specific CSS via bw.css() + bw.injectCSS()
    // =========================================================================
    bw.injectCSS(bw.css({
      '.console-block': {
        background: '#1e1e1e',
        color: '#d4d4d4',
        'font-family': 'var(--bw_font_mono)',
        'font-size': '0.8125rem',
        'line-height': '1.6',
        padding: '1rem 1.25rem',
        'border-radius': 'var(--bw_radius)',
        'overflow-x': 'auto',
        margin: '0.75rem 0',
        'white-space': 'pre'
      },
      '.console-prompt': { color: '#569cd6' },
      '.console-output': { color: '#9cdcfe' },
      '.console-comment': { color: '#6a9955' },
      '.console-string': { color: '#ce9178' },
      '.console-group-header': { color: '#dcdcaa', 'font-weight': '600' },
      '.debug-step': {
        display: 'flex',
        gap: '1rem',
        'align-items': 'flex-start',
        padding: '1rem 0',
        'border-bottom': '1px solid var(--bw_card_border)'
      },
      '.debug-step:last-child': { 'border-bottom': 'none' },
      '.debug-step-num': {
        background: 'var(--bw_teal)',
        color: '#fff',
        width: '28px',
        height: '28px',
        'border-radius': '50%',
        display: 'flex',
        'align-items': 'center',
        'justify-content': 'center',
        'font-weight': '700',
        'font-size': '0.8125rem',
        'flex-shrink': '0'
      },
      '.debug-step-body': { flex: '1' },
      '.debug-step-body h4': { margin: '0 0 0.35rem', 'font-size': '0.9375rem' },
      '.debug-step-body p': { margin: '0', 'font-size': '0.875rem', color: 'var(--bw_text_secondary)' },
      '.api-table': {
        width: '100%',
        'border-collapse': 'collapse',
        'font-size': '0.8125rem',
        'margin-top': '0.75rem'
      },
      '.api-table th': {
        'text-align': 'left',
        padding: '0.4rem 0.75rem',
        'border-bottom': '2px solid var(--bw_teal)',
        'font-weight': '600'
      },
      '.api-table td': {
        padding: '0.4rem 0.75rem',
        'border-bottom': '1px solid var(--bw_card_border)',
        'vertical-align': 'top'
      },
      '.api-table tr:last-child td': { 'border-bottom': 'none' },
      '.api-table code': {
        padding: '0.1rem 0.3rem',
        'border-radius': '3px',
        'font-size': '0.75rem',
        background: 'var(--bw_teal_light, #e0f2f1)',
        color: 'var(--bw_teal_dark, #004d40)'
      },
      '.live-demo-area': {
        background: 'var(--bw_card_bg)',
        border: '1px solid var(--bw_card_border)',
        'border-radius': 'var(--bw_radius)',
        padding: '1.25rem',
        margin: '1rem 0'
      }
    }));

    // =========================================================================
    // Helper: callout box
    // =========================================================================
    function callout(type, title, content) {
      return {
        t: 'div', a: { class: 'callout callout-' + type },
        c: [
          { t: 'h4', c: title },
          content
        ]
      };
    }

    // =========================================================================
    // Helper: console-style code block
    // =========================================================================
    function consoleBlock(lines) {
      return {
        t: 'div', a: { class: 'console-block' },
        c: bw.raw(lines.join('\n'))
      };
    }

    // =========================================================================
    // Section 0: Philosophy — The Browser IS Your DevTools
    // =========================================================================
    var section0 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'The Browser IS Your DevTools' },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('Frameworks like React need dedicated browser extensions because their state lives in a separate virtual layer. Bitwrench is different: <strong>state lives on the DOM element itself</strong>. The browser\'s built-in Elements panel and Console are your component inspector.') },
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('Select any bitwrench component in the Elements panel. Everything you need is right there on the element &mdash; no extension, no source maps, no build tools.') },

          callout('concept', 'No special tools needed', {
            t: 'div', c: [
              { t: 'div', a: { class: 'debug-step' }, c: [
                { t: 'div', a: { class: 'debug-step-num' }, c: '1' },
                { t: 'div', a: { class: 'debug-step-body' }, c: [
                  { t: 'h4', c: 'Select an element' },
                  { t: 'p', c: bw.raw('<strong>Right-click</strong> any component on the page and choose <strong>Inspect</strong>. This opens DevTools with that element highlighted in the Elements panel. (You can also press F12 first, then click the element-picker icon <span style="font-family: var(--bw_font_mono);">\u{1F8B0}</span> in the top-left of DevTools and click any element on the page.)') }
                ]}
              ]},
              { t: 'div', a: { class: 'debug-step' }, c: [
                { t: 'div', a: { class: 'debug-step-num' }, c: '2' },
                { t: 'div', a: { class: 'debug-step-body' }, c: [
                  { t: 'h4', c: 'Read state in the Console' },
                  { t: 'p', c: bw.raw('Click the <strong>Console</strong> tab in DevTools. Type <code>$0._bw_state</code> and press Enter. <code>$0</code> is a built-in browser shortcut that always refers to the element you last selected in the Elements panel. Because bitwrench stores state directly on the DOM element, this is all you need to inspect it.') }
                ]}
              ]},
              { t: 'div', a: { class: 'debug-step' }, c: [
                { t: 'div', a: { class: 'debug-step-num' }, c: '3' },
                { t: 'div', a: { class: 'debug-step-body' }, c: [
                  { t: 'h4', c: 'Mutate live' },
                  { t: 'p', c: bw.raw('Change state directly: <code>$0._bw_state.count = 99; bw.update($0);</code> &mdash; the component re-renders immediately.') }
                ]}
              ]},
              { t: 'div', a: { class: 'debug-step' }, c: [
                { t: 'div', a: { class: 'debug-step-num' }, c: '4' },
                { t: 'div', a: { class: 'debug-step-body' }, c: [
                  { t: 'h4', c: 'Targeted updates' },
                  { t: 'p', c: bw.raw('Use <code>bw.patch(id, content)</code> to update a specific element by its id or UUID. Or call <code>bw.update($0)</code> to re-run the element\'s <code>o.render</code> function.') }
                ]}
              ]}
            ]
          }),

          callout('tip', 'Compare with React DevTools', {
            t: 'table', a: { class: 'api-table' },
            c: [
              { t: 'thead', c: { t: 'tr', c: [
                { t: 'th', c: 'React DevTools' },
                { t: 'th', c: 'Bitwrench (built-in console)' }
              ]}},
              { t: 'tbody', c: [
                { t: 'tr', c: [
                  { t: 'td', c: 'Install React DevTools extension' },
                  { t: 'td', c: 'Nothing to install' }
                ]},
                { t: 'tr', c: [
                  { t: 'td', c: bw.raw('Components panel &rarr; select &rarr; Props/State') },
                  { t: 'td', c: bw.raw('Elements panel &rarr; select &rarr; <code>$0._bw_state</code>') }
                ]},
                { t: 'tr', c: [
                  { t: 'td', c: 'Edit state in DevTools sidebar' },
                  { t: 'td', c: bw.raw('Edit in Console: <code>$0._bw_state.x = 42; bw.update($0)</code>') }
                ]},
                { t: 'tr', c: [
                  { t: 'td', c: bw.raw('<code>$r</code> &mdash; reference to selected component') },
                  { t: 'td', c: bw.raw('<code>$0._bw_state</code> &mdash; direct state access') }
                ]},
                { t: 'tr', c: [
                  { t: 'td', c: 'Profiler for re-render tracking' },
                  { t: 'td', c: bw.raw('<code>bw.update($0)</code> re-renders; <code>bw_uuid_*</code> class identifies elements') }
                ]}
              ]}
            ]
          })
        ]}
      ]
    };

    // =========================================================================
    // Section 1: Console Debugging Walkthrough
    // =========================================================================

    var section1 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Console Debugging Walkthrough' },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('Try these commands in your browser console. Click the counter below a few times, then follow the steps to inspect it.') },

          { t: 'div', a: { class: 'live-demo-area', id: 'console-demo' } },

          { t: 'h3', c: 'Reading state' },
          { t: 'p', c: bw.raw('To select an element for inspection: <strong>right-click</strong> the counter above and choose <strong>Inspect</strong> (or press F12 to open DevTools, then click the element-picker icon in the top-left corner and click the counter). The element highlights in the Elements panel. In the Console tab, <code>$0</code> now refers to that element.') },
          consoleBlock([
            '<span class="console-comment">// After right-click > Inspect on the counter:</span>',
            '<span class="console-comment">// $0 is the element you selected in the Elements panel</span>',
            '<span class="console-prompt">&gt;</span> $0._bw_state',
            '<span class="console-output">{ count: 5 }</span>',
            '',
            '<span class="console-comment">// Or find it by selector (no manual selection needed):</span>',
            '<span class="console-prompt">&gt;</span> bw.$(\'#console-demo .bw_lc\')[0]._bw_state',
            '<span class="console-output">{ count: 5 }</span>'
          ]),

          { t: 'h3', c: 'Modifying state live' },
          consoleBlock([
            '<span class="console-comment">// Modify _bw_state directly, then trigger re-render</span>',
            '<span class="console-prompt">&gt;</span> $0._bw_state.count = 99; bw.update($0);',
            '<span class="console-output">// Counter immediately shows 99</span>',
            '',
            '<span class="console-comment">// Targeted update by id or UUID</span>',
            '<span class="console-prompt">&gt;</span> bw.patch(\'my-counter\', \'Count: 42\');',
            '<span class="console-output">// Updates the element with id="my-counter"</span>'
          ]),

          { t: 'h3', c: 'Using bw.update() and bw.patch()' },
          consoleBlock([
            '<span class="console-comment">// Force re-render: calls o.render(el) again</span>',
            '<span class="console-prompt">&gt;</span> bw.update($0)',
            '<span class="console-output">// o.render runs, DOM updates, bw:statechange event fires</span>',
            '',
            '<span class="console-comment">// Targeted content update by id</span>',
            '<span class="console-prompt">&gt;</span> bw.patch(\'status-label\', \'Ready\')',
            '<span class="console-output">// Element with id="status-label" now shows "Ready"</span>',
            '',
            '<span class="console-comment">// Or patch with a TACO for richer updates</span>',
            '<span class="console-prompt">&gt;</span> bw.patch(\'status-label\', { t: \'span\', a: { style: \'color: green;\' }, c: \'OK\' })',
            '<span class="console-output">// Element now contains styled content</span>'
          ]),

          callout('tip', 'Pro tip: finding stateful elements', {
            t: 'div', c: [
              consoleBlock([
                '<span class="console-comment">// Find all stateful elements on the page</span>',
                '<span class="console-prompt">&gt;</span> bw.$(\'.bw_lc\').forEach(function(el) {',
                '    console.log(bw.getUUID(el), el._bw_state);',
                '  })',
                '',
                '<span class="console-comment">// Find a specific element by id</span>',
                '<span class="console-prompt">&gt;</span> bw.$(\'#my-counter\')[0]._bw_state',
                '<span class="console-output">{ count: 5 }</span>',
                '',
                '<span class="console-comment">// Change state and re-render from console</span>',
                '<span class="console-prompt">&gt;</span> var el = bw.$(\'#my-counter\')[0];',
                '<span class="console-prompt">&gt;</span> el._bw_state.count = 42; bw.update(el);',
                '<span class="console-output">// Counter now shows 42</span>'
              ])
            ]
          })
        ]}
      ]
    };


    // =========================================================================
    // Section 2: Three Levels of TACO Materialization
    // =========================================================================

    var section2 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Three Levels of Materialization' },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('A TACO object exists at one of three levels. Understanding this model is key to debugging effectively.') },

          { t: 'table', a: { class: 'api-table' }, c: [
            { t: 'thead', c: { t: 'tr', c: [
              { t: 'th', c: 'Level' },
              { t: 'th', c: 'What it is' },
              { t: 'th', c: 'How you get it' },
              { t: 'th', c: 'Use case' }
            ]}},
            { t: 'tbody', c: [
              { t: 'tr', c: [
                { t: 'td', c: { t: 'strong', c: 'Level 0: TACO' } },
                { t: 'td', c: 'Plain JS object (data/intent)' },
                { t: 'td', c: bw.raw('<code>bw.makeCard({...})</code>') },
                { t: 'td', c: 'Serialize, transform, send over wire, SSR' }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'strong', c: 'Level 1: DOM/HTML' } },
                { t: 'td', c: 'Live DOM nodes (fire-and-forget)' },
                { t: 'td', c: bw.raw('<code>bw.DOM(sel, taco)</code> or <code>bw.html(taco)</code>') },
                { t: 'td', c: 'Render once, static pages' }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'strong', c: 'Level 2: Stateful' } },
                { t: 'td', c: 'Element with state + render' },
                { t: 'td', c: bw.raw('<code>o: { state: {...}, render: fn }</code>') },
                { t: 'td', c: 'Reactive state, bw.update(el), bw.patch(id, content)' }
              ]}
            ]}
          ]},

          { t: 'h3', c: 'When to use each level' },
          consoleBlock([
            '<span class="console-comment">// Level 0 — I just need a description</span>',
            'var card = bw.makeCard({ title: \'Users\', content: \'1,234\' });',
            'typeof card;  <span class="console-comment">// "object" — plain TACO</span>',
            '',
            '<span class="console-comment">// Level 1 — mount it and forget</span>',
            'bw.DOM(\'#app\', card);',
            '<span class="console-comment">// or: var html = bw.html(card); // for SSR</span>',
            '',
            '<span class="console-comment">// Level 2 — I need reactive state + render</span>',
            'var counter = {',
            '  t: \'div\',',
            '  o: {',
            '    state: { count: 0 },',
            '    render: function(el) {',
            '      var s = el._bw_state;',
            '      bw.DOM(el, {',
            '        t: \'div\', c: [',
            '          { t: \'h3\', c: \'Count: \' + s.count },',
            '          bw.makeButton({ text: \'+1\', onclick: function() {',
            '            s.count++;',
            '            bw.update(el);',
            '          }})',
            '        ]',
            '      });',
            '    }',
            '  }',
            '};',
            'bw.DOM(\'#app\', counter);',
            '<span class="console-comment">// State lives at el._bw_state, re-render via bw.update(el)</span>'
          ]),

          callout('concept', 'The key insight', {
            t: 'p',
            c: bw.raw('Level 0 is bitwrench\'s <strong>moat</strong>. No other framework has a pure-data layer that\'s serializable, transformable, and sendable over a WebSocket. Level 2 adds reactivity <em>on top</em> of Level 0 &mdash; it doesn\'t replace it. You choose which level you need per-component.')
          })
        ]}
      ]
    };


    // =========================================================================
    // Section 3: Stateful Elements API
    // =========================================================================

    var section3 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Stateful Elements API' },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('When you need reactive state, add <code>o.state</code> and <code>o.render</code> to any TACO. State lives directly on the DOM element at <code>el._bw_state</code>. Re-render by calling <code>bw.update(el)</code>.') },

          { t: 'table', a: { class: 'api-table' }, c: [
            { t: 'thead', c: { t: 'tr', c: [
              { t: 'th', c: 'API' },
              { t: 'th', c: 'Description' }
            ]}},
            { t: 'tbody', c: [
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'o.state' } },
                { t: 'td', c: bw.raw('Initial state object. Becomes <code>el._bw_state</code> after mount.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'o.render(el)' } },
                { t: 'td', c: bw.raw('Called on mount and on every <code>bw.update(el)</code>. Reads <code>el._bw_state</code>, writes DOM.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'o.mounted(el)' } },
                { t: 'td', c: 'Called once after the element is mounted to the DOM.' }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'o.unmount(el)' } },
                { t: 'td', c: bw.raw('Cleanup hook. Called by <code>bw.cleanup(el)</code>.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'el._bw_state' } },
                { t: 'td', c: 'Direct access to the state object on the DOM element.' }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.update(el)' } },
                { t: 'td', c: bw.raw('Re-runs <code>o.render(el)</code> and emits a <code>bw:statechange</code> event.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.patch(id, content)' } },
                { t: 'td', c: bw.raw('Update content of element by its id or UUID. Content can be a string or TACO.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.cleanup(el)' } },
                { t: 'td', c: 'Run unmount hooks and clean up lifecycle references.' }
              ]}
            ]}
          ]},

          { t: 'div', a: { id: 'tryit-component-handle' } }
        ]}
      ]
    };


    // =========================================================================
    // Section 4: Component Behavior with Closures
    // =========================================================================

    var section4 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: 'Component Behavior with Closures' },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('Component behavior is defined as closures inside <code>o.render</code>. There is no separate methods API &mdash; event handlers and helper functions are just regular JavaScript closures that capture <code>el</code> and <code>el._bw_state</code>. This is simpler and more transparent than a separate method dispatch system.') },

          consoleBlock([
            'var dashboard = {',
            '  t: \'div\',',
            '  o: {',
            '    state: { alerts: [] },',
            '    render: function(el) {',
            '      var s = el._bw_state;',
            '',
            '      <span class="console-comment">// Behavior as closures — simple functions that close over el</span>',
            '      function addAlert(data) {',
            '        s.alerts = s.alerts.concat(data);',
            '        bw.update(el);',
            '      }',
            '      function clearAlerts() {',
            '        s.alerts = [];',
            '        bw.update(el);',
            '      }',
            '',
            '      var alertList = s.alerts.length',
            '        ? s.alerts.map(function(a) {',
            '            return { t: \'div\', c: a.severity + \': \' + a.text };',
            '          })',
            '        : \'No alerts\';',
            '',
            '      bw.DOM(el, {',
            '        t: \'div\', c: [',
            '          { t: \'h3\', c: \'Alerts: \' + s.alerts.length },',
            '          { t: \'div\', a: { class: \'alert-list\' }, c: alertList },',
            '          bw.makeButton({ text: \'Add Warning\', onclick: function() {',
            '            addAlert({ severity: \'warning\', text: \'CPU spike\' });',
            '          }}),',
            '          \' \',',
            '          bw.makeButton({ text: \'Clear\', variant: \'secondary\', onclick: clearAlerts })',
            '        ]',
            '      });',
            '    }',
            '  }',
            '};',
            'bw.DOM(\'#app\', dashboard);'
          ]),

          callout('concept', 'Why closures instead of a methods API', {
            t: 'p',
            c: bw.raw('Closures are native JavaScript. They don\'t require a framework API to wire up, they\'re visible in the debugger call stack, and they capture exactly the variables they need. The <code>o.render</code> function is the component\'s single entry point &mdash; all behavior flows from there.')
          }),

          { t: 'div', a: { id: 'tryit-methods' } }
        ]}
      ]
    };


    // =========================================================================
    // Section 5: Targeted Updates — bw.patch() and bw.update()
    // =========================================================================

    var section5 = {
      t: 'div', a: { class: 'demo-section' },
      c: [
        { t: 'h2', c: bw.raw('Targeted Updates &mdash; bw.patch() and bw.update()') },
        { t: 'div', a: { class: 'demo-section-body' }, c: [
          { t: 'p', a: { class: 'intro-text' },
            c: bw.raw('Use <code>bw.patch(id, content)</code> to update a specific element by its id or UUID. Use <code>bw.update(el)</code> to re-run an element\'s <code>o.render</code> function. Both work from the console, from event handlers, or from server-driven updates via SSE.') },

          { t: 'table', a: { class: 'api-table' }, c: [
            { t: 'thead', c: { t: 'tr', c: [
              { t: 'th', c: 'API' },
              { t: 'th', c: 'Description' }
            ]}},
            { t: 'tbody', c: [
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.patch(id, content)' } },
                { t: 'td', c: bw.raw('Update element by id or UUID. Content can be string or TACO.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.update(el)' } },
                { t: 'td', c: bw.raw('Re-run <code>o.render(el)</code> and emit <code>bw:statechange</code>.') }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.pub(topic, data)' } },
                { t: 'td', c: 'Publish a message to all subscribers of the topic.' }
              ]},
              { t: 'tr', c: [
                { t: 'td', c: { t: 'code', c: 'bw.sub(topic, fn)' } },

      pres.forEach(function(pre) {
        var code = pre.querySelector('code');
        if (!code) return;
        var text = code.textContent;
        var lines = text.split('\n').length;
        var h = Math.max(180, Math.min(lines * 19, 700)) + 'px';
        var div = bw.createDOM({ t: 'div' });
        pre.parentNode.replaceChild(div, pre);
        bw.DOM(div, bw.codeEditor({
          code: text,
          lang: 'js',
          readOnly: true,
          height: h
        }));
      });
    })();

  </script>
</body>
</html>
