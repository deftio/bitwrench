    // =========================================================================
    // Protocol log
    // =========================================================================
    var logEntries = [];

    function logMessage(msg) {
      var entry = JSON.stringify(msg, null, 2);
      logEntries.push(entry);
      var logEl = bw.$('#protocol-log')[0];
      if (logEl) {
        logEl.textContent = logEntries.join('\n---\n');
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    function clearLog() {
      logEntries = [];
      var logEl = bw.$('#protocol-log')[0];
      if (logEl) logEl.textContent = '// Protocol messages will appear here...';
    }

    // =========================================================================
    // Mock client — mirrors bwserve client API
    // =========================================================================
    function createMockClient(iframe) {
      var client = {};
      var iframeWindow = iframe.contentWindow;

      function send(msg) {
        logMessage(msg);
        try {
          iframeWindow.bw.clientApply(msg);
        } catch (e) {
          // clientApply may not exist yet — fall back to manual DOM ops
          applyFallback(iframeWindow, msg);
        }
      }

      client.render = function(target, taco) {
        send({ type: 'replace', target: target, node: taco });
      };
      client.patch = function(id, content, attr) {
        send({ type: 'patch', target: id, content: content, attr: attr || null });
      };
      client.append = function(target, taco) {
        send({ type: 'append', target: target, node: taco });
      };
      client.remove = function(target) {
        send({ type: 'remove', target: target });
      };
      client.batch = function(ops) {
        send({ type: 'batch', ops: ops });
      };
      client.message = function(target, action, data) {
        send({ type: 'message', target: target, action: action, data: data });
      };

      // Also expose raw send for the "Raw Protocol" preset
      client._send = send;

      return client;
    }

    // Fallback: apply protocol messages without bw.clientApply
    // (handles the case before clientApply is implemented)
    function applyFallback(win, msg) {
      var doc = win.document;
      if (!doc) return;

      if (msg.type === 'replace') {
        var target = doc.querySelector(msg.target);
        if (target && win.bw) {
          var el = win.bw.createDOM(msg.node);
          target.innerHTML = '';
          target.appendChild(el);
        }
      } else if (msg.type === 'patch') {
        var el2 = doc.getElementById(msg.target) || doc.querySelector(msg.target);
        if (el2) {
          if (msg.content !== undefined && msg.content !== null) el2.textContent = msg.content;
          if (msg.attr) {
            for (var k in msg.attr) {
              if (msg.attr[k] === null) el2.removeAttribute(k);
              else el2.setAttribute(k, msg.attr[k]);
            }
          }
        }
      } else if (msg.type === 'append') {
        var parent = doc.querySelector(msg.target);
        if (parent && win.bw) {
          var child = win.bw.createDOM(msg.node);
          parent.appendChild(child);
        }
      } else if (msg.type === 'remove') {
        var toRemove = doc.querySelector(msg.target);
        if (toRemove) toRemove.remove();
      } else if (msg.type === 'batch' && msg.ops) {
        msg.ops.forEach(function(op) { applyFallback(win, op); });
      }
    }

    // =========================================================================
    // iframe bootstrap
    // =========================================================================

    // Build the srcdoc HTML string once — used for both init and reset.
    // srcdoc iframes have origin about:srcdoc, so relative paths won't resolve.
    // We compute absolute URLs from the parent page's location.
    var pageDir = location.href.replace(/[^/]*$/, '');
    var bwScriptUrl = new URL('../dist/bitwrench.umd.js', pageDir).href;
    var bwCssUrl = new URL('../dist/bitwrench.css', pageDir).href;

    var IFRAME_SRCDOC = [
      '<!DOCTYPE html>',
      '<html><head>',
      '<script src="' + bwScriptUrl + '"></' + 'script>',
      '<link rel="stylesheet" href="' + bwCssUrl + '">',
      '</head><body style="margin:0">',
      '<div id="app" style="padding:16px;color:#888;font-family:system-ui,sans-serif">Waiting for server code...</div>',
      '<script>',
      'bw.loadDefaultStyles();',
      'window._bwReady = true;',
      // Wire up data-bw-action click delegation
      'document.addEventListener("click", function(e) {',
      '  var el = e.target.closest("[data-bw-action]");',
      '  if (!el) return;',
      '  e.preventDefault();',
      '  var actionData = { action: el.getAttribute("data-bw-action") };',
      '  if (el.getAttribute("data-bw-id")) actionData.bwId = el.getAttribute("data-bw-id");',
      '  var form = el.closest("div") || document;',
      '  var inp = form.querySelector("input[type=text],input:not([type])");',
      '  if (inp) { actionData.inputValue = inp.value; inp.value = ""; }',
      '  window.parent.postMessage(actionData, "*");',
      '});',
      'document.addEventListener("keydown", function(e) {',
      '  if (e.key === "Enter" && e.target.tagName === "INPUT") {',
      '    var form = e.target.closest("div") || document;',
      '    var actionBtn = form.querySelector("[data-bw-action]");',
      '    if (actionBtn) {',
      '      var actionData = { action: actionBtn.getAttribute("data-bw-action"), inputValue: e.target.value };',
      '      e.target.value = "";',
      '      window.parent.postMessage(actionData, "*");',
      '    }',
      '  }',
      '});',
      '</' + 'script>',
      '</body></html>'
    ].join('\n');

    function initClientFrame(iframe, callback) {
      // Use srcdoc — the browser handles loading natively.
      // We listen for the load event to know when scripts have executed.
      iframe.onload = function() {
        // Poll briefly for _bwReady (script execution may lag behind load)
        var attempts = 0;
        var poll = setInterval(function() {
          attempts++;
          try {
            if (iframe.contentWindow && iframe.contentWindow._bwReady) {
              clearInterval(poll);
              if (callback) callback();
            } else if (attempts > 50) {
              clearInterval(poll);
              if (callback) callback();
            }
          } catch (e) {
            clearInterval(poll);
            if (callback) callback();
          }
        }, 100);
      };
      iframe.srcdoc = IFRAME_SRCDOC;
    }

    // =========================================================================
    // Run user code
    // =========================================================================
    var actionHandlers = {};

    function runCode() {
      var editorEl = bw.$('#sandbox-editor')[0];
      if (!editorEl || !editorEl._bwCodeEdit) return;
      var code = editorEl._bwCodeEdit.getValue();
      var iframe = bw.$('#client-frame')[0];
      if (!iframe) return;

      actionHandlers = {};

      initClientFrame(iframe, function() {
        var client = createMockClient(iframe);
        clearLog();

        // Set up action listener from iframe
        window.removeEventListener('message', window._bwSandboxMsgHandler);
        window._bwSandboxMsgHandler = function(e) {
          if (e.data && e.data.action) {
            var handler = actionHandlers[e.data.action];
            if (handler) handler(e.data);
          }
        };
        window.addEventListener('message', window._bwSandboxMsgHandler);

        try {
          // Provide helpers: client, onAction, send
          var fn = new Function('client', 'bw', 'onAction', 'send',
            '"use strict";\n' + code
          );
          fn(
            client,
            bw,
            function(action, handler) { actionHandlers[action] = handler; },
            function(msg) { logMessage(msg); applyFallback(iframe.contentWindow, msg); }
          );

          var statusEl = bw.$('#sandbox-status')[0];
          if (statusEl) {
            statusEl.textContent = 'Running';
            statusEl.style.color = '#4CAF50';
          }
        } catch (e) {
          var statusEl2 = bw.$('#sandbox-status')[0];
          if (statusEl2) {
            statusEl2.textContent = 'Error: ' + e.message;
            statusEl2.style.color = '#f44336';
          }
          logMessage({ error: e.message, stack: e.stack });
        }
      });
    }

    function loadPreset(name) {
      var preset = PRESETS[name];
      if (!preset) return;
      var editorEl = bw.$('#sandbox-editor')[0];
      if (editorEl && editorEl._bwCodeEdit) {
        editorEl._bwCodeEdit.setValue(preset.code);
      }
      // Update active state on preset buttons
      bw.$('.preset-btn').forEach(function(btn) {
        btn.classList.toggle('bw_btn_primary', btn.getAttribute('data-preset') === name);
        btn.classList.toggle('bw_btn_outline_secondary', btn.getAttribute('data-preset') !== name);
      });
    }

    // =========================================================================
    // Build page
    // =========================================================================

    var presetButtons = Object.keys(PRESETS).map(function(key) {
      var p = PRESETS[key];
      return {
        t: 'button',
        a: {
          class: 'preset-btn bw_btn bw_btn_sm ' + (key === 'counter' ? 'bw_btn_primary' : 'bw_btn_outline_secondary'),
          title: p.desc,
          'data-preset': key,
          onclick: function() { loadPreset(key); }
        },
        c: p.label
      };
    });

    // Page header — same pattern as all other pages
    var pageHeader = {
      t: 'div', a: { class: 'page-header' },
      c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top:0;padding-bottom:0' },
        c: [
          { t: 'h1', c: 'bwserve Sandbox' },
          { t: 'p', a: { class: 'subtitle' },
            c: 'Write server-side bwserve code on the left. Click Run to see the client render on the right.' }
        ]
      }
    };

    var contentWrapper = {
      t: 'div', a: { class: 'content-container wide' }, c: [
        // Preset bar
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            {
              t: 'div', a: { class: 'demo-section-body' }, c: [
                {
                  t: 'div', a: { style: 'display:flex;gap:6px;flex-wrap:wrap;align-items:center' },
                  c: [
                    { t: 'span', a: { style: 'font-weight:600;margin-right:4px;color:var(--bw_text_secondary)' }, c: 'Presets:' }
                  ].concat(presetButtons)
                }
              ]
            }
          ]
        },

        // Main layout: editor + client viewport
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            {
              t: 'div', a: { class: 'demo-section-body', style: 'padding:0' }, c: [
                {
                  t: 'div', a: { id: 'sandbox-main', style: 'display:flex;gap:0;height:60vh;min-height:400px' }, c: [
                    // Left: code editor
                    {
                      t: 'div', a: { style: 'flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--bw_card_border)' }, c: [
                        {
                          t: 'div', a: { style: 'display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bw_teal_light);border-bottom:1px solid var(--bw_card_border)' }, c: [
                            { t: 'span', a: { style: 'font-weight:600;font-size:0.85rem;color:var(--bw_teal_dark)' }, c: 'Server Code' },
                            { t: 'div', a: { style: 'display:flex;gap:4px' }, c: [
                              {
                                t: 'button',
                                a: { class: 'bw_btn bw_btn_sm bw_btn_primary', onclick: function() { runCode(); } },
                                c: '\u25B6 Run'
                              },
                              {
                                t: 'button',
                                a: {
                                  class: 'bw_btn bw_btn_sm bw_btn_outline_secondary',
                                  onclick: function() { loadPreset('counter'); runCode(); }
                                },
                                c: 'Reset'
                              }
                            ]}
                          ]
                        },
                        {
                          t: 'div', a: { id: 'sandbox-editor', style: 'flex:1;min-height:0' },
                          c: 'Loading editor...',
                          o: {
                            mounted: function(el) {
                              var editor = bw.codeEditor({
                                code: PRESETS.counter.code,
                                lang: 'js',
                                lineNumbers: true,
                                height: '100%',
                                onChange: function() {}
                              });
                              var dom = bw.createDOM(editor);
                              el.innerHTML = '';
                              el.appendChild(dom);
                              // The inner .bw_ce mounted hook sets _bwCodeEdit via rAF.
                              // Poll until it's available (typically 1-2 frames).
                              var editorPoll = setInterval(function() {
                                var inner = el.querySelector('.bw_ce');
                                if (inner && inner._bwCodeEdit) {
                                  clearInterval(editorPoll);
                                  el._bwCodeEdit = inner._bwCodeEdit;
                                }
                              }, 50);
                            }
                          }
                        }
                      ]
                    },

                    // Right: client viewport (iframe)
                    {
                      t: 'div', a: { style: 'flex:1;display:flex;flex-direction:column;min-width:0' }, c: [
                        {
                          t: 'div', a: { style: 'display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bw_teal_light);border-bottom:1px solid var(--bw_card_border)' }, c: [
                            { t: 'span', a: { style: 'font-weight:600;font-size:0.85rem;color:var(--bw_teal_dark)' }, c: 'Client View' },
                            { t: 'span', a: { id: 'sandbox-status', style: 'font-size:0.8rem;color:var(--bw_text_muted)' }, c: 'Ready' }
                          ]
                        },
                        {
                          t: 'iframe', a: {
                            id: 'client-frame',
                            // No sandbox attr — we need contentDocument access for doc.write().
                            // This is a dev tool, not a security boundary.
                            style: 'flex:1;border:none;background:#fff;min-height:0'
                          }
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        },

        // Protocol log
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'Protocol Messages' },
            {
              t: 'div', a: { class: 'demo-section-body' }, c: [
                {
                  t: 'pre', a: {
                    id: 'protocol-log',
                    style: 'max-height:200px;overflow-y:auto;font-size:0.8rem;background:var(--bw_code_bg);color:var(--bw_code_text);padding:12px;border-radius:var(--bw_radius);margin:0'
                  },
                  c: '// Protocol messages will appear here after you click Run...'
                }
              ]
            }
          ]
        },

        // How it works
        {
          t: 'div', a: { class: 'demo-section' }, c: [
            { t: 'h2', c: 'How It Works' },
            {
              t: 'div', a: { class: 'demo-section-body' }, c: [
                {
                  t: 'div', a: { class: 'callout callout-concept' }, c: [
                    { t: 'h4', c: 'Client-side simulation' },
                    { t: 'p', c: [
                      'No real server is running. Your code executes in the browser with a mock ',
                      { t: 'code', c: 'client' },
                      ' object that mirrors the bwserve API. The iframe on the right acts as the "browser client", receiving protocol messages just like a real bwserve connection.'
                    ]}
                  ]
                },
                {
                  t: 'div', a: { style: 'margin-top:16px' }, c: [
                    { t: 'h4', a: { style: 'margin-bottom:8px' }, c: 'Available API' },
                    {
                      t: 'table', a: { class: 'bw_table bw_table_striped' }, c: [
                        { t: 'thead', c: { t: 'tr', c: [
                          { t: 'th', c: 'Function' },
                          { t: 'th', c: 'Description' }
                        ]}},
                        { t: 'tbody', c: [
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'client.render(target, taco)' } }, { t: 'td', c: 'Replace target contents with TACO' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'client.patch(id, content, attr)' } }, { t: 'td', c: 'Update text/attributes of element by id' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'client.append(target, taco)' } }, { t: 'td', c: 'Append a TACO child to target' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'client.remove(target)' } }, { t: 'td', c: 'Remove element from DOM' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'client.batch(ops)' } }, { t: 'td', c: 'Send multiple operations at once' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'onAction(name, handler)' } }, { t: 'td', c: 'Handle actions from client (button clicks etc.)' }] },
                          { t: 'tr', c: [{ t: 'td', c: { t: 'code', c: 'send(msg)' } }, { t: 'td', c: 'Send raw protocol JSON message' }] }
                        ]}
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    bw.DOM('#app', [pageHeader, contentWrapper]);

    // Initialize the iframe on page load so it shows "Waiting for server code..."
    // and bitwrench is pre-loaded for when the user clicks Run
    var initFrame = bw.$('#client-frame')[0];
    if (initFrame) {
      initClientFrame(initFrame, function() {
        var statusEl = bw.$('#sandbox-status')[0];
        if (statusEl) statusEl.textContent = 'Ready';
      });
    }

    // =========================================================================
    // Responsive: stack editor/iframe vertically on narrow screens
    // =========================================================================
    bw.injectCSS(bw.css({
      '@media (max-width: 768px)': {
        '#sandbox-main': {
          'flex-direction': 'column !important',
          'height': 'auto !important',
          'min-height': '0 !important'
        },
        '#sandbox-main > div': {
          'flex': '0 0 auto !important',
          'min-height': '300px',
          'border-right': 'none !important',
          'border-bottom': '1px solid var(--bw_card_border) !important'
        }
      }
    }), { id: 'sandbox-responsive' });
  </script>
</body>
</html>
