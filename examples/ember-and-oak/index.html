  //   bw.makeSearchInput()   — Coffee search box
  //   bw.makeTooltip()       — SCA score hover info

  //   bw.makeProgress()      — Roast progress demo

  //   bw.makeAlert()         — Wholesale info callout

  //   bw.makeInput()         — Name, email inputs
  //   bw.makeSelect()        — Subject dropdown

  // Architecture:
  //   - Cart state managed via bw.pub('cart:updated') — navbar subscribes
  //   - Coffee filter uses o.mounted + manual re-render
  //   - Contact form uses o.state + o.render with status display
  //   - Counter uses o.state + o.render with closures for methods
  //   - Toast notification system uses bw.createDOM() for append pattern
  //   - Theme: bw.loadStyles({ '#8B4513', '#D2691E', '#2F4F2F' })

  // Key Patterns to Study:
  //   1. Pub/sub cart: cartAdd() -> bw.pub('cart:updated') -> bw.sub()
  //   2. o.state + o.render: el._bw_state access + bw.update(el)
  //   3. Filter pattern: renderCoffeeSection() re-renders on filter change

  //
  // No build step. No framework. Just bitwrench.
  // =====================================================================
