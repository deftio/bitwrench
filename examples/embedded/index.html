<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Examples - Bitwrench</title>
  <link rel="icon" type="image/x-icon" href="../../images/favicon.ico">
  <script src="../../dist/bitwrench.umd.min.js"></script>
  <script src="../../pages/shared-theme.js"></script>
  <script src="../../pages/shared-nav.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    mountExampleNav('#example-nav', '', '../../pages/');
    bw.loadStyles();
    applySiteStyles();

    bw.injectCSS(bw.css({
      '.emb-wrap': { maxWidth: '800px', margin: '2rem auto', padding: '0 1rem' },
      '.emb-hero': {
        background: 'linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)',
        color: '#e2e8f0', padding: '2rem', borderRadius: '12px', marginBottom: '2rem'
      },
      '.emb-hero h1': { margin: '0 0 0.5rem', fontSize: '1.75rem', color: '#10b981' },
      '.emb-hero p': { margin: '0', opacity: '0.85', lineHeight: '1.6' },
      '.emb-card': {
        background: '#fff', border: '1px solid #e2e8f0', borderRadius: '8px',
        padding: '1.5rem', marginBottom: '1rem', transition: 'box-shadow 0.2s'
      },
      '.emb-card:hover': { boxShadow: '0 4px 12px rgba(0,0,0,0.08)' },
      '.emb-card h3': { margin: '0 0 0.5rem', fontSize: '1.1rem' },
      '.emb-card p': { margin: '0 0 0.75rem', color: '#64748b', fontSize: '0.9rem', lineHeight: '1.5' },
      '.emb-card .tag': {
        display: 'inline-block', padding: '0.15rem 0.5rem', borderRadius: '4px',
        fontSize: '0.75rem', fontWeight: '600', marginRight: '0.5rem'
      },
      '.tag-html': { background: '#dbeafe', color: '#1e40af' },
      '.tag-c': { background: '#fef3c7', color: '#92400e' },
      '.tag-ino': { background: '#d1fae5', color: '#065f46' },
      '.emb-link': { display: 'inline-block', marginTop: '0.5rem', fontWeight: '600', color: '#059669' },
      '.emb-section h2': { fontSize: '1.25rem', marginTop: '2rem', marginBottom: '0.75rem', color: '#1e293b' },
      '.emb-proto': {
        background: '#1e293b', color: '#e2e8f0', padding: '1rem', borderRadius: '8px',
        fontFamily: 'monospace', fontSize: '0.8rem', lineHeight: '1.6', overflowX: 'auto'
      }
    }));

    // -- Page content --------------------------------------------------------
    var hero = {
      t: 'div', a: { class: 'emb-hero' }, c: [
        { t: 'h1', c: 'Embedded Systems Examples' },
        { t: 'p', c: [
          'These examples show bitwrench rendering UI for embedded devices. ',
          'The device (ESP32, Raspberry Pi, or any microcontroller) sends JSON data ',
          'over SSE -- the browser renders everything using bitwrench. ',
          'The device never generates HTML.'
        ]}
      ]
    };

    var cards = [
      {
        t: 'div', a: { class: 'emb-card' }, c: [
          { t: 'h3', c: 'ESP32 Sensor Dashboard' },
          { t: 'p', c: [
            'A real-time IoT dashboard with 7 sensor cards, event log, and device controls. ',
            'Includes mock data so you can try it without hardware. ',
            'In production, the ESP32 serves this page from SPIFFS and pushes sensor readings via SSE.'
          ]},
          { t: 'div', c: [
            { t: 'span', a: { class: 'tag tag-html' }, c: 'HTML' },
            { t: 'span', a: { class: 'tag tag-ino' }, c: 'Arduino' },
            'Mock data included -- runs in browser'
          ]},
          { t: 'a', a: { class: 'emb-link', href: 'esp32-dashboard.html' }, c: 'Open Dashboard Demo \u2192' }
        ]
      },
      {
        t: 'div', a: { class: 'emb-card' }, c: [
          { t: 'h3', c: 'Arduino Sketch (sketch.ino)' },
          { t: 'p', c: [
            'Complete ESP32 Arduino sketch with WiFi, DHT22 sensor reading, SSE streaming, ',
            'SPIFFS file serving, and command API. Upload to an ESP32 DevKit with a DHT22 on GPIO 4.'
          ]},
          { t: 'div', c: [
            { t: 'span', a: { class: 'tag tag-ino' }, c: 'Arduino' },
            'Requires ESP32 hardware + DHT22'
          ]},
          { t: 'a', a: { class: 'emb-link', href: 'sketch.ino' }, c: 'View sketch.ino \u2192' }
        ]
      },
      {
        t: 'div', a: { class: 'emb-card' }, c: [
          { t: 'h3', c: 'CMake Demo (No Hardware)' },
          { t: 'p', c: [
            'A complete bwserve server in C that compiles on Linux/macOS with regular gcc. ',
            'Uses bitwrench.h and bwserve.h macros -- same protocol as the ESP32, but with POSIX sockets. ',
            'Build with cmake, open http://localhost:8080.'
          ]},
          { t: 'div', c: [
            { t: 'span', a: { class: 'tag tag-c' }, c: 'C' },
            'Compiles on Linux/macOS -- no hardware needed'
          ]},
          { t: 'a', a: { class: 'emb-link', href: 'cmake-demo/' }, c: 'View cmake-demo/ \u2192' }
        ]
      }
    ];

    var protocol = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'How It Works' },
        { t: 'p', c: [
          'The protocol is the same across all platforms. The device sends JSON messages ',
          'over Server-Sent Events. The browser has bitwrench loaded and renders each update.'
        ]},
        { t: 'pre', a: { class: 'emb-proto' }, c:
          'ESP32                           Browser\n' +
          '  |                                |\n' +
          '  |  GET /                         |\n' +
          '  |  <-- index.html (SPIFFS)       |\n' +
          '  |  GET /bitwrench.umd.min.js    |\n' +
          '  |  <-- JS (SPIFFS)               |\n' +
          '  |                                |\n' +
          '  |  GET /events (SSE)             |\n' +
          '  |  <-- {"temperature":23.5,...}  |  (every 2s)\n' +
          '  |  <-- {"temperature":23.7,...}  |\n' +
          '  |                                |\n' +
          '  |  POST /api/command             |\n' +
          '  |  {"cmd":"led","val":"on"}      |\n' +
          '  |  --> 200 {"ok":true}           |'
        }
      ]
    };

    var crossLang = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'Cross-Language Support' },
        bw.makeTable({
          headers: ['Platform', 'Language', 'Library'],
          rows: [
            ['ESP32/STM32 (Arduino)', 'C/C++', 'embedded_c/bitwrench.h + bwserve.h'],
            ['ESP32 (esp-idf)', 'Rust', 'embedded_rust/'],
            ['MicroPython, Raspberry Pi', 'Python', 'embedded_python/bwserve.py'],
            ['Linux/macOS/Node.js', 'JavaScript', "bitwrench/bwserve"],
            ['Any language', 'CLI pipe', 'bwcli serve --stdin']
          ]
        })
      ]
    };

    bw.DOM('#app', {
      t: 'div', a: { class: 'emb-wrap' },
      c: [hero].concat(cards, [protocol, crossLang])
    });
  </script>
</body>
</html>
