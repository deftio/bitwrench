<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Examples - Bitwrench</title>
  <link rel="icon" type="image/x-icon" href="../../images/favicon.ico">
  <script src="../../dist/bitwrench.umd.min.js"></script>
  <script src="../../pages/shared-nav.js"></script>
  <script src="../../pages/site.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    initBitwrenchPage('', '../../pages/');

    bw.injectCSS(bw.css({
      '.emb-wrap': { maxWidth: '800px', margin: '2rem auto', padding: '0 1rem' },
      '.emb-hero': {
        background: 'linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)',
        color: '#e2e8f0', padding: '2rem', borderRadius: '12px', marginBottom: '2rem'
      },
      '.emb-hero h1': { margin: '0 0 0.5rem', fontSize: '1.75rem', color: '#10b981' },
      '.emb-hero p': { margin: '0', opacity: '0.85', lineHeight: '1.6' },
      '.emb-card': {
        background: '#fff', border: '1px solid #e2e8f0', borderRadius: '8px',
        padding: '1.5rem', marginBottom: '1rem', transition: 'box-shadow 0.2s'
      },
      '.emb-card:hover': { boxShadow: '0 4px 12px rgba(0,0,0,0.08)' },
      '.emb-card h3': { margin: '0 0 0.5rem', fontSize: '1.1rem' },
      '.emb-card p': { margin: '0 0 0.75rem', color: '#64748b', fontSize: '0.9rem', lineHeight: '1.5' },
      '.emb-card .tag': {
        display: 'inline-block', padding: '0.15rem 0.5rem', borderRadius: '4px',
        fontSize: '0.75rem', fontWeight: '600', marginRight: '0.5rem'
      },
      '.tag-html': { background: '#dbeafe', color: '#1e40af' },
      '.tag-c': { background: '#fef3c7', color: '#92400e' },
      '.tag-ino': { background: '#d1fae5', color: '#065f46' },
      '.tag-py': { background: '#e0e7ff', color: '#3730a3' },
      '.tag-js': { background: '#fef9c3', color: '#854d0e' },
      '.tag-level': { background: '#f1f5f9', color: '#475569', border: '1px solid #cbd5e1' },
      '.emb-link': { display: 'inline-block', marginTop: '0.5rem', fontWeight: '600', color: '#059669' },
      '.emb-link + .emb-link': { marginLeft: '1.5rem' },
      '.emb-section h2': { fontSize: '1.25rem', marginTop: '2rem', marginBottom: '0.75rem', color: '#1e293b' },
      '.emb-proto': {
        background: '#1e293b', color: '#e2e8f0', padding: '1rem', borderRadius: '8px',
        fontFamily: 'monospace', fontSize: '0.8rem', lineHeight: '1.6', overflowX: 'auto'
      }
    }));

    // -- Page content --------------------------------------------------------
    var hero = {
      t: 'div', a: { class: 'emb-hero' }, c: [
        { t: 'h1', c: 'Embedded Systems Examples' },
        { t: 'p', c: [
          'These examples show bitwrench rendering UI for embedded devices. ',
          'The device (ESP32, Raspberry Pi, or any microcontroller) sends JSON data ',
          'over SSE -- the browser renders everything using bitwrench. ',
          'The device never generates HTML.'
        ]}
      ]
    };

    function card(title, desc, tags, links) {
      return {
        t: 'div', a: { class: 'emb-card' }, c: [
          { t: 'h3', c: title },
          { t: 'p', c: desc },
          { t: 'div', c: tags.map(function(tag) {
            return { t: 'span', a: { class: 'tag tag-' + tag[1] }, c: tag[0] };
          })},
          { t: 'div', c: links.map(function(link) {
            return { t: 'a', a: { class: 'emb-link', href: link[1] }, c: link[0] + ' \u2192' };
          })}
        ]
      };
    }

    // -- ESP32 section -------------------------------------------------------
    var esp32Section = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'ESP32 / Microcontroller' },
        card(
          'ESP32 Sensor Dashboard',
          'Step-by-step tutorial for building an IoT sensor dashboard on an ESP32 with DHT22, ' +
          'LDR, and LED control. Arduino C++ with ESPAsyncWebServer. ' +
          'SSE pushes sensor data every 2 seconds.',
          [['HTML', 'html'], ['Arduino', 'ino'], ['Beginner', 'level']],
          [['Open Tutorial', 'esp32-tutorial.html'], ['View sketch.ino', 'sketch.ino'], ['Open Dashboard Demo', 'esp32-dashboard.html']]
        ),
        card(
          'Pico W / Pico 2W Dashboard',
          'Step-by-step tutorial for Raspberry Pi Pico W (RP2040) and Pico 2W (RP2350). ' +
          'Three server options: MicroPython, CircuitPython, Arduino C++. ' +
          'Onboard temperature, 3 ADC channels, 4 PWM outputs, 8 digital outputs, digital inputs, WiFi RSSI. ' +
          'Optional: Freenove Breakout Board (FNK0081) for visible GPIO LEDs.',
          [['HTML', 'html'], ['MicroPython', 'py'], ['C++', 'ino'], ['Intermediate', 'level']],
          [['Open Tutorial', '../embedded-pico-w/'], ['View server.py', '../embedded-pico-w/server.py'], ['View server.ino', '../embedded-pico-w/server.ino']]
        ),
        card(
          'NFC Tag Scanner (ESP32 + ST25DV16)',
          'Step-by-step tutorial for an NFC tag scanner using Adafruit QT Py ESP32 with ST25DV16K. ' +
          '5-tab dashboard: NDEF records, tag info, live status, scan history, raw memory hex dump. ' +
          'CircuitPython with adafruit_httpserver.',
          [['HTML', 'html'], ['CircuitPython', 'py'], ['Advanced', 'level']],
          [['Open Tutorial', '../esp32-adafruitST25DV16/'], ['View code.py', '../esp32-adafruitST25DV16/code.py']]
        ),
        card(
          'CMake Demo (No Hardware)',
          'A bwserve server in C that compiles on Linux/macOS with regular gcc. ' +
          'Uses bitwrench.h and bwserve.h macros -- same protocol as the ESP32, but with POSIX sockets.',
          [['C', 'c'], ['Beginner', 'level']],
          [['View cmake-demo/', 'cmake-demo/']]
        )
      ]
    };

    // -- Raspberry Pi section ------------------------------------------------
    var rpiSection = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'Raspberry Pi' },
        card(
          'RPi System Monitor',
          'Full Linux system dashboard: CPU temp/usage per core, memory, disk, network I/O, ' +
          'top processes, and GPIO controls. Includes both a Node.js bwserve server and a Python Flask server.',
          [['HTML', 'html'], ['Node.js', 'js'], ['Python', 'py'], ['Intermediate', 'level']],
          [['Open Demo', '../embedded-rpi/'], ['View server.js', '../embedded-rpi/server.js'], ['View server.py', '../embedded-rpi/server.py']]
        )
      ]
    };

    var protocol = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'How It Works' },
        { t: 'p', c: [
          'The protocol is the same across all platforms. The device sends JSON messages ',
          'over Server-Sent Events. The browser has bitwrench loaded and renders each update.'
        ]},
        { t: 'pre', a: { class: 'emb-proto' }, c:
          'ESP32                           Browser\n' +
          '  |                                |\n' +
          '  |  GET /                         |\n' +
          '  |  <-- index.html (SPIFFS)       |\n' +
          '  |  GET /bitwrench.umd.min.js    |\n' +
          '  |  <-- JS (SPIFFS)               |\n' +
          '  |                                |\n' +
          '  |  GET /events (SSE)             |\n' +
          '  |  <-- {"temperature":23.5,...}  |  (every 2s)\n' +
          '  |  <-- {"temperature":23.7,...}  |\n' +
          '  |                                |\n' +
          '  |  POST /api/command             |\n' +
          '  |  {"cmd":"led","val":"on"}      |\n' +
          '  |  --> 200 {"ok":true}           |'
        }
      ]
    };

    var crossLang = {
      t: 'div', a: { class: 'emb-section' }, c: [
        { t: 'h2', c: 'Cross-Language Support' },
        bw.makeTable({
          headers: ['Platform', 'Language', 'Example'],
          rows: [
            ['ESP32 (Arduino)', 'C/C++', 'embedded/sketch.ino + cmake-demo/'],
            ['ESP32 (CircuitPython)', 'Python', 'esp32-adafruitST25DV16/code.py'],
            ['Raspberry Pi Pico W', 'MicroPython', 'embedded-pico-w/server.py'],
            ['Raspberry Pi Pico W', 'CircuitPython', 'embedded-pico-w/server_circuitpython.py'],
            ['Raspberry Pi Pico W', 'Arduino C++', 'embedded-pico-w/server.ino'],
            ['Raspberry Pi (Linux)', 'Python', 'embedded-rpi/server.py'],
            ['Raspberry Pi (Linux)', 'Node.js', 'embedded-rpi/server.js (bwserve)'],
            ['Any language', 'CLI pipe', 'bwcli serve --stdin']
          ]
        })
      ]
    };

    bw.DOM('#app', {
      t: 'div', a: { class: 'emb-wrap' },
      c: [hero, esp32Section, rpiSection, protocol, crossLang]
    });
  </script>
</body>
</html>
