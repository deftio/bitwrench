<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial HMI Panel</title>
  <script src="../../dist/bitwrench.umd.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    // =====================================================================
    // Industrial HMI Panel — Embedded Device UI
    //
    // Simulated HMI (Human-Machine Interface) for industrial process control.
    // In production, a PLC or industrial PC serves this page and exposes:
    //   GET  /api/process       — read process variables
    //   POST /api/control       — send control commands (pump on/off, e-stop)
    //   GET  /events            — SSE stream of process updates and alarms
    //
    // SIMULATION: Process variables drift via random walk. Replace mock
    // functions with fetch()/EventSource for real PLC communication.
    // =====================================================================

    bw.loadDefaultStyles();
    bw.generateTheme('hmi', {
      primary: '#dc2626',
      secondary: '#f59e0b',
      tertiary: '#3b82f6',
      spacing: 'compact',
      radius: 'sm'
    });

    bw.injectCSS(bw.css({
      'body': { background: '#111827', color: '#e5e7eb', margin: '0' }
    }));

    // -- Mock process variables -------------------------------------------
    var process = {
      pressure: { value: 42.5, unit: 'PSI', min: 0, max: 100, warnHigh: 75, critHigh: 90 },
      flowRate: { value: 125.0, unit: 'L/min', min: 0, max: 200, warnHigh: 160, critHigh: 185 },
      temperature: { value: 68.2, unit: '\u00B0C', min: 0, max: 150, warnHigh: 110, critHigh: 130 },
      pH: { value: 7.1, unit: 'pH', min: 0, max: 14, warnHigh: 9, critHigh: 11 }
    };

    var controls = { pump1: true, pump2: false, mixer: true, eStop: false };
    var alarms = [];

    function checkAlarms() {
      alarms = [];
      var vars = Object.keys(process);
      for (var i = 0; i < vars.length; i++) {
        var k = vars[i];
        var pv = process[k];
        if (pv.value >= pv.critHigh) alarms.push({ var: k, level: 'critical', msg: k + ' CRITICAL: ' + pv.value.toFixed(1) + ' ' + pv.unit });
        else if (pv.value >= pv.warnHigh) alarms.push({ var: k, level: 'warning', msg: k + ' WARNING: ' + pv.value.toFixed(1) + ' ' + pv.unit });
      }
    }

    function driftValue(pv) {
      pv.value += (Math.random() - 0.48) * (pv.max - pv.min) * 0.02;
      pv.value = Math.max(pv.min, Math.min(pv.max * 0.95, pv.value));
    }

    function toggleControl(key) {
      if (key === 'eStop') {
        controls.eStop = true;
        controls.pump1 = false;
        controls.pump2 = false;
        controls.mixer = false;
      } else {
        controls[key] = !controls[key];
      }
      render();
    }

    function resetEStop() {
      controls.eStop = false;
      render();
    }

    // -- Render -----------------------------------------------------------
    function render() {
      checkAlarms();

      var pvNames = Object.keys(process);
      var gauges = pvNames.map(function(k) {
        var pv = process[k];
        var pct = ((pv.value - pv.min) / (pv.max - pv.min)) * 100;
        var variant = pv.value >= pv.critHigh ? 'danger' : pv.value >= pv.warnHigh ? 'warning' : 'success';
        return bw.makeCol({
          size: { xs: 6, md: 3 },
          content: bw.makeCard({
            title: k.charAt(0).toUpperCase() + k.slice(1),
            className: 'bw_mb_2',
            content: [
              bw.makeStatCard({ value: pv.value.toFixed(1), label: pv.unit, icon: variant === 'danger' ? '\u26A0\uFE0F' : variant === 'warning' ? '\u26A0' : '\u2705' }),
              bw.makeProgress({ value: pct, max: 100, variant: variant, height: '8px' })
            ]
          })
        });
      });

      var alarmSection = alarms.length > 0
        ? alarms.map(function(a) {
            return bw.makeAlert({ content: a.msg, variant: a.level === 'critical' ? 'danger' : 'warning' });
          })
        : [bw.makeAlert({ content: 'All process variables nominal.', variant: 'success' })];

      var controlPanel = bw.makeRow({
        children: [
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeCard({
            title: 'Pump 1', className: 'bw_mb_2',
            content: [
              bw.makeBadge({ text: controls.pump1 ? 'RUNNING' : 'STOPPED', variant: controls.pump1 ? 'success' : 'secondary', pill: true }),
              { t: 'div', a: { class: 'bw_mt_2' }, c: bw.makeButton({
                text: controls.pump1 ? 'Stop' : 'Start', variant: controls.pump1 ? 'danger' : 'success', size: 'sm',
                disabled: controls.eStop, onclick: function() { toggleControl('pump1'); }
              })}
            ]
          })}),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeCard({
            title: 'Pump 2', className: 'bw_mb_2',
            content: [
              bw.makeBadge({ text: controls.pump2 ? 'RUNNING' : 'STOPPED', variant: controls.pump2 ? 'success' : 'secondary', pill: true }),
              { t: 'div', a: { class: 'bw_mt_2' }, c: bw.makeButton({
                text: controls.pump2 ? 'Stop' : 'Start', variant: controls.pump2 ? 'danger' : 'success', size: 'sm',
                disabled: controls.eStop, onclick: function() { toggleControl('pump2'); }
              })}
            ]
          })}),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeCard({
            title: 'Mixer', className: 'bw_mb_2',
            content: [
              bw.makeBadge({ text: controls.mixer ? 'RUNNING' : 'STOPPED', variant: controls.mixer ? 'success' : 'secondary', pill: true }),
              { t: 'div', a: { class: 'bw_mt_2' }, c: bw.makeButton({
                text: controls.mixer ? 'Stop' : 'Start', variant: controls.mixer ? 'danger' : 'success', size: 'sm',
                disabled: controls.eStop, onclick: function() { toggleControl('mixer'); }
              })}
            ]
          })}),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeCard({
            title: 'Emergency Stop', className: 'bw_mb_2',
            content: [
              bw.makeBadge({ text: controls.eStop ? 'ACTIVATED' : 'READY', variant: controls.eStop ? 'danger' : 'success', pill: true }),
              { t: 'div', a: { class: 'bw_mt_2' }, c: controls.eStop
                ? bw.makeButton({ text: 'Reset E-Stop', variant: 'warning', size: 'sm', onclick: resetEStop })
                : bw.makeButton({ text: 'E-STOP', variant: 'danger', size: 'sm', onclick: function() { toggleControl('eStop'); } })
              }
            ]
          })})
        ]
      });

      bw.DOM('#app', bw.makeContainer({
        className: 'bw_py_3',
        children: [
          bw.makeAlert({
            content: 'Running in simulation mode \u2014 on real hardware, replace mock functions with PLC/SCADA endpoints.',
            variant: 'warning', dismissible: true
          }),

          { t: 'h1', a: { class: 'bw_h4 bw_mb_3' }, c: '\uD83C\uDFED Industrial HMI Panel' },

          // Alarms
          bw.makeSection({ title: 'Alarms', children: alarmSection }),

          // Process variables
          bw.makeSection({ title: 'Process Variables', children: [bw.makeRow({ children: gauges })] }),

          // Controls
          bw.makeSection({ title: 'Equipment Controls', children: [controlPanel] })
        ]
      }));
    }

    render();

    // Simulate process variable drift every 2 seconds
    setInterval(function() {
      if (controls.eStop) return;
      var keys = Object.keys(process);
      for (var i = 0; i < keys.length; i++) driftValue(process[keys[i]]);
      render();
    }, 2000);

    // =====================================================================
    // Production notes:
    //
    //   // Read process variables:
    //   // fetch('/api/process').then(r => r.json()).then(data => { process = data; render(); });
    //
    //   // Send control command:
    //   // fetch('/api/control', { method: 'POST', body: JSON.stringify({ cmd: 'pump1', state: 'on' }) });
    //
    //   // SSE for real-time updates:
    //   // var es = new EventSource('/events');
    //   // es.onmessage = function(e) { var data = JSON.parse(e.data); updateProcess(data); };
    // =====================================================================
  </script>
</body>
</html>
