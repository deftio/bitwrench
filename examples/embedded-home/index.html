<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Automation Panel</title>
  <script src="../../dist/bitwrench.umd.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    // =====================================================================
    // Home Automation Panel — Embedded Device UI
    //
    // Simulated smart home control panel. In production, a hub (Raspberry Pi,
    // ESP32, etc.) serves this page and exposes:
    //   GET  /api/rooms          — read room sensor data
    //   POST /api/devices/:id    — control device (light, thermostat, lock)
    //   GET  /events             — SSE stream of sensor updates
    //
    // SIMULATION: Sensor values drift, controls update local state.
    // Replace mock functions with device endpoints.
    // =====================================================================

    bw.loadDefaultStyles();
    bw.generateTheme('home', {
      primary: '#8b5cf6',
      secondary: '#f59e0b',
      tertiary: '#10b981',
      spacing: 'compact',
      radius: 'md'
    });

    bw.injectCSS(bw.css({
      'body': { background: '#111827', color: '#e5e7eb', margin: '0' }
    }));

    // -- Mock room data ---------------------------------------------------
    var rooms = [
      { name: 'Living Room', temp: 22.5, humidity: 45, light: true, brightness: 80, locked: true },
      { name: 'Kitchen', temp: 23.1, humidity: 52, light: true, brightness: 100, locked: false },
      { name: 'Bedroom', temp: 20.8, humidity: 40, light: false, brightness: 30, locked: true },
      { name: 'Office', temp: 21.5, humidity: 38, light: true, brightness: 65, locked: true }
    ];

    var thermostat = { setpoint: 22.0, mode: 'auto' };

    function driftSensors() {
      rooms.forEach(function(room) {
        room.temp += (Math.random() - 0.5) * 0.3;
        room.temp = Math.round(room.temp * 10) / 10;
        room.humidity += (Math.random() - 0.5) * 2;
        room.humidity = Math.max(20, Math.min(80, Math.round(room.humidity)));
      });
    }

    function toggleLight(idx) {
      rooms[idx].light = !rooms[idx].light;
      if (!rooms[idx].light) rooms[idx].brightness = 0;
      else rooms[idx].brightness = 80;
      render();
    }

    function setBrightness(idx, val) {
      rooms[idx].brightness = parseInt(val, 10);
      rooms[idx].light = rooms[idx].brightness > 0;
      render();
    }

    function toggleLock(idx) {
      rooms[idx].locked = !rooms[idx].locked;
      render();
    }

    function adjustSetpoint(delta) {
      thermostat.setpoint = Math.round((thermostat.setpoint + delta) * 10) / 10;
      thermostat.setpoint = Math.max(15, Math.min(30, thermostat.setpoint));
      render();
    }

    function setMode(mode) {
      thermostat.mode = mode;
      render();
    }

    // -- Render -----------------------------------------------------------
    function render() {
      var roomCards = rooms.map(function(room, idx) {
        return bw.makeCol({
          size: { xs: 12, md: 6 },
          content: bw.makeCard({
            title: room.name,
            className: 'bw_mb_3',
            content: [
              // Sensor readings
              { t: 'div', a: { class: 'bw_mb_2' }, c: [
                bw.makeBadge({ text: room.temp + '\u00B0C', variant: 'info', pill: true }),
                ' ',
                bw.makeBadge({ text: room.humidity + '% RH', variant: 'secondary', pill: true })
              ]},

              // Light controls
              { t: 'div', a: { class: 'bw_mb_2' }, c: [
                { t: 'div', a: { class: 'bw_mb_1' }, c: [
                  { t: 'small', c: 'Light: ' },
                  bw.makeButton({
                    text: room.light ? 'On' : 'Off',
                    variant: room.light ? 'warning' : 'secondary',
                    size: 'sm',
                    onclick: function() { toggleLight(idx); }
                  })
                ]},
                room.light ? bw.makeRange({
                  min: 0, max: 100, value: room.brightness, step: 5,
                  onchange: function(e) { setBrightness(idx, e.target.value); }
                }) : null,
                room.light ? { t: 'small', a: { class: 'bw_text_muted' }, c: 'Brightness: ' + room.brightness + '%' } : null
              ]},

              // Door lock
              { t: 'div', c: [
                { t: 'small', c: 'Door: ' },
                bw.makeBadge({ text: room.locked ? 'Locked' : 'Unlocked', variant: room.locked ? 'success' : 'danger', pill: true }),
                ' ',
                bw.makeButton({
                  text: room.locked ? 'Unlock' : 'Lock',
                  variant: room.locked ? 'outline_danger' : 'outline_success',
                  size: 'sm',
                  onclick: function() { toggleLock(idx); }
                })
              ]}
            ]
          })
        });
      });

      // Thermostat control
      var thermostatCard = bw.makeCard({
        title: 'Thermostat',
        className: 'bw_mb_3',
        content: [
          bw.makeStatCard({ value: thermostat.setpoint + '\u00B0C', label: 'Setpoint', icon: '\uD83C\uDF21\uFE0F' }),
          { t: 'div', a: { class: 'bw_mt_2 bw_mb_2' }, c: bw.makeButtonGroup({
            buttons: [
              { text: '\u2212', variant: 'primary', size: 'sm', onclick: function() { adjustSetpoint(-0.5); } },
              { text: '+', variant: 'primary', size: 'sm', onclick: function() { adjustSetpoint(0.5); } }
            ]
          })},
          { t: 'div', c: [
            { t: 'small', c: 'Mode: ' },
            bw.makeButtonGroup({
              buttons: [
                { text: 'Heat', variant: thermostat.mode === 'heat' ? 'danger' : 'outline_secondary', size: 'sm', onclick: function() { setMode('heat'); } },
                { text: 'Cool', variant: thermostat.mode === 'cool' ? 'primary' : 'outline_secondary', size: 'sm', onclick: function() { setMode('cool'); } },
                { text: 'Auto', variant: thermostat.mode === 'auto' ? 'success' : 'outline_secondary', size: 'sm', onclick: function() { setMode('auto'); } },
                { text: 'Off', variant: thermostat.mode === 'off' ? 'secondary' : 'outline_secondary', size: 'sm', onclick: function() { setMode('off'); } }
              ]
            })
          ]}
        ]
      });

      // Summary table
      var summaryTable = bw.makeTable({
        data: rooms.map(function(r) {
          return {
            Room: r.name,
            Temp: r.temp + '\u00B0C',
            Humidity: r.humidity + '%',
            Light: r.light ? 'On (' + r.brightness + '%)' : 'Off',
            Door: r.locked ? 'Locked' : 'Unlocked'
          };
        }),
        striped: true,
        hover: true
      });

      bw.DOM('#app', bw.makeContainer({
        className: 'bw_py_3',
        children: [
          bw.makeAlert({
            content: 'Running in simulation mode \u2014 on real hardware, replace mock functions with smart home hub endpoints.',
            variant: 'warning', dismissible: true
          }),

          { t: 'h1', a: { class: 'bw_h4 bw_mb_3' }, c: '\uD83C\uDFE0 Home Automation Panel' },

          // Rooms
          bw.makeRow({ children: roomCards }),

          // Thermostat
          bw.makeSection({ title: 'Climate Control', children: [thermostatCard] }),

          // Summary
          bw.makeSection({ title: 'Room Summary', children: [summaryTable] })
        ]
      }));
    }

    render();

    // Drift sensor values every 3 seconds
    setInterval(function() {
      driftSensors();
      render();
    }, 3000);

    // =====================================================================
    // Production notes:
    //
    //   // Read room data:
    //   // fetch('/api/rooms').then(r => r.json()).then(data => { rooms = data; render(); });
    //
    //   // Control device:
    //   // fetch('/api/devices/' + id, { method: 'POST', body: JSON.stringify({ light: true, brightness: 80 }) });
    //
    //   // SSE for sensor updates:
    //   // var es = new EventSource('/events');
    //   // es.onmessage = function(e) { var data = JSON.parse(e.data); updateRooms(data); };
    // =====================================================================
  </script>
</body>
</html>
