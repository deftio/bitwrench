<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Device Monitor</title>
  <script src="../../dist/bitwrench.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    // =====================================================================
    // Network Device Monitor — Embedded Device UI
    //
    // Simulated network switch/router monitoring panel. In production,
    // the device serves this page and exposes:
    //   GET  /api/interfaces     — read interface states
    //   POST /api/interfaces/:id — enable/disable interface
    //   GET  /events             — SSE stream of traffic stats
    //
    // SIMULATION: Traffic stats update via interval with realistic patterns.
    // Replace mock functions with device SNMP/API endpoints.
    // =====================================================================

    bw.loadDefaultStyles();
    bw.generateTheme('netmon', {
      primary: '#0891b2',
      secondary: '#6366f1',
      spacing: 'compact',
      radius: 'sm'
    });

    bw.injectCSS(bw.css({
      'body': { background: '#0f172a', color: '#e2e8f0', margin: '0' }
    }));

    // -- Mock interface data -----------------------------------------------
    var startTime = Date.now();
    var interfaces = [
      { id: 'eth0', name: 'Ethernet 0', speed: '1 Gbps', enabled: true, txBytes: 0, rxBytes: 0, txPkts: 0, rxPkts: 0, errors: 0 },
      { id: 'eth1', name: 'Ethernet 1', speed: '1 Gbps', enabled: true, txBytes: 0, rxBytes: 0, txPkts: 0, rxPkts: 0, errors: 0 },
      { id: 'eth2', name: 'Ethernet 2', speed: '10 Gbps', enabled: true, txBytes: 0, rxBytes: 0, txPkts: 0, rxPkts: 0, errors: 0 },
      { id: 'eth3', name: 'Ethernet 3', speed: '10 Gbps', enabled: false, txBytes: 0, rxBytes: 0, txPkts: 0, rxPkts: 0, errors: 0 }
    ];

    function updateTraffic() {
      interfaces.forEach(function(iface) {
        if (!iface.enabled) return;
        var burst = Math.random() > 0.9 ? 5 : 1;
        iface.txBytes += Math.floor(Math.random() * 500000 * burst);
        iface.rxBytes += Math.floor(Math.random() * 800000 * burst);
        iface.txPkts += Math.floor(Math.random() * 400 * burst);
        iface.rxPkts += Math.floor(Math.random() * 600 * burst);
        if (Math.random() > 0.95) iface.errors += Math.floor(Math.random() * 3);
      });
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
      return (bytes / 1073741824).toFixed(2) + ' GB';
    }

    function formatUptime() {
      var sec = Math.floor((Date.now() - startTime) / 1000);
      var h = Math.floor(sec / 3600);
      var m = Math.floor((sec % 3600) / 60);
      var s = sec % 60;
      return h + 'h ' + m + 'm ' + s + 's';
    }

    function toggleInterface(idx) {
      interfaces[idx].enabled = !interfaces[idx].enabled;
      render();
    }

    // -- Render -----------------------------------------------------------
    function render() {
      var totalTx = 0, totalRx = 0, totalPkts = 0, totalErrors = 0;
      interfaces.forEach(function(iface) {
        totalTx += iface.txBytes;
        totalRx += iface.rxBytes;
        totalPkts += iface.txPkts + iface.rxPkts;
        totalErrors += iface.errors;
      });

      var overviewStats = bw.makeRow({
        children: [
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeStatCard({ value: formatUptime(), label: 'Uptime', icon: '\u23F1\uFE0F' }) }),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeStatCard({ value: formatBytes(totalTx + totalRx), label: 'Total Traffic', icon: '\uD83D\uDCE1' }) }),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeStatCard({ value: totalPkts.toLocaleString(), label: 'Total Packets', icon: '\uD83D\uDCE6' }) }),
          bw.makeCol({ size: { xs: 6, md: 3 }, content: bw.makeStatCard({ value: totalErrors.toString(), label: 'Errors', icon: totalErrors > 0 ? '\u26A0\uFE0F' : '\u2705' }) })
        ]
      });

      var ifaceCards = interfaces.map(function(iface, idx) {
        var txRate = iface.enabled ? Math.floor(Math.random() * 100) : 0;
        var rxRate = iface.enabled ? Math.floor(Math.random() * 100) : 0;

        return bw.makeCol({
          size: { xs: 12, md: 6 },
          content: bw.makeCard({
            title: iface.name + ' (' + iface.id + ')',
            className: 'bw_mb_3',
            content: [
              { t: 'div', a: { class: 'bw_mb_2' }, c: [
                bw.makeBadge({ text: iface.enabled ? 'UP' : 'DOWN', variant: iface.enabled ? 'success' : 'danger', pill: true }),
                ' ',
                bw.makeBadge({ text: iface.speed, variant: 'info', pill: true }),
                iface.errors > 0 ? [' ', bw.makeBadge({ text: iface.errors + ' errors', variant: 'warning', pill: true })] : null
              ]},
              bw.makeListGroup({
                items: [
                  'TX: ' + formatBytes(iface.txBytes) + ' (' + iface.txPkts.toLocaleString() + ' pkts)',
                  'RX: ' + formatBytes(iface.rxBytes) + ' (' + iface.rxPkts.toLocaleString() + ' pkts)'
                ]
              }),
              { t: 'div', a: { class: 'bw_mt_2 bw_mb_1' }, c: [
                { t: 'small', c: 'TX Load' },
                bw.makeProgress({ value: txRate, max: 100, variant: txRate > 80 ? 'danger' : txRate > 50 ? 'warning' : 'primary', height: '6px' })
              ]},
              { t: 'div', a: { class: 'bw_mb_2' }, c: [
                { t: 'small', c: 'RX Load' },
                bw.makeProgress({ value: rxRate, max: 100, variant: rxRate > 80 ? 'danger' : rxRate > 50 ? 'warning' : 'info', height: '6px' })
              ]},
              bw.makeButton({
                text: iface.enabled ? 'Disable Port' : 'Enable Port',
                variant: iface.enabled ? 'outline_danger' : 'success',
                size: 'sm',
                onclick: function() { toggleInterface(idx); }
              })
            ]
          })
        });
      });

      bw.DOM('#app', bw.makeContainer({
        className: 'bw_py_3',
        children: [
          bw.makeAlert({
            content: 'Running in simulation mode \u2014 on real hardware, replace mock functions with SNMP/device API endpoints.',
            variant: 'warning', dismissible: true
          }),

          { t: 'h1', a: { class: 'bw_h4 bw_mb_3' }, c: '\uD83D\uDD0C Network Device Monitor' },

          // Overview stats
          overviewStats,

          // Interface cards
          bw.makeSection({
            title: 'Interfaces',
            children: [bw.makeRow({ children: ifaceCards })]
          })
        ]
      }));
    }

    render();

    // Update traffic every 2 seconds
    setInterval(function() {
      updateTraffic();
      render();
    }, 2000);

    // =====================================================================
    // Production notes:
    //
    //   // Read interface states:
    //   // fetch('/api/interfaces').then(r => r.json()).then(data => { interfaces = data; render(); });
    //
    //   // Toggle interface:
    //   // fetch('/api/interfaces/' + id, { method: 'POST', body: JSON.stringify({ enabled: state }) });
    //
    //   // SSE for traffic stats:
    //   // var es = new EventSource('/events');
    //   // es.onmessage = function(e) { var data = JSON.parse(e.data); updateTraffic(data); };
    // =====================================================================
  </script>
</body>
</html>
