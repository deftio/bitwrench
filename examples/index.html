<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench Examples - App Gallery</title>
  <meta name="description" content="Full application examples built with bitwrench: coffee shop, dashboard, todo app, IoT, server-driven apps, and more.">
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
  <link rel="stylesheet" href="../pages/shared-theme.css">
  <script src="../pages/shared-nav.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    // Mount site nav
    mountExampleNav('#example-nav', '', '../pages/');

    // ---- Page CSS ----
    bw.injectCSS(bw.css({
      '.gal_hero': {
        background: 'linear-gradient(135deg, var(--bw_header_bg) 0%, #004d4d 100%)',
        color: '#fff',
        padding: '2.5rem 0 2rem'
      },
      '.gal_hero h1': { margin: '0 0 0.4rem', fontSize: '1.85rem', fontWeight: '700' },
      '.gal_hero p': { opacity: '0.8', fontSize: '1.05rem', margin: '0', lineHeight: '1.55' },
      '.gal_category': {
        fontSize: '0.75rem',
        textTransform: 'uppercase',
        letterSpacing: '0.1em',
        fontWeight: '700',
        color: 'var(--bw_teal)',
        marginBottom: '0.75rem',
        marginTop: '2rem'
      },
      '.gal_item': {
        background: 'var(--bw_card_bg)',
        border: '1px solid var(--bw_card_border)',
        borderRadius: 'var(--bw_radius)',
        marginBottom: '0.75rem',
        overflow: 'hidden',
        transition: 'box-shadow 0.15s'
      },
      '.gal_item:hover': {
        boxShadow: '0 4px 16px rgba(0,0,0,0.08)'
      },
      '.bw_theme_alt .gal_item:hover': {
        boxShadow: '0 4px 16px rgba(0,0,0,0.3)'
      },
      '.gal_header': {
        display: 'flex',
        alignItems: 'center',
        gap: '0.75rem',
        padding: '1rem 1.25rem',
        cursor: 'pointer',
        userSelect: 'none'
      },
      '.gal_header:hover': { background: 'rgba(0,102,102,0.03)' },
      '.bw_theme_alt .gal_header:hover': { background: 'rgba(255,255,255,0.03)' },
      '.gal_icon': { fontSize: '1.5rem', flexShrink: '0', width: '2rem', textAlign: 'center' },
      '.gal_info': { flex: '1', minWidth: '0' },
      '.gal_title': { fontWeight: '600', fontSize: '1rem', color: 'var(--bw_text)' },
      '.gal_oneliner': { fontSize: '0.85rem', color: 'var(--bw_text_secondary)', marginTop: '0.15rem' },
      '.gal_meta': { display: 'flex', gap: '0.5rem', alignItems: 'center', flexShrink: '0' },
      '.gal_badge': {
        fontSize: '0.65rem',
        padding: '0.15rem 0.5rem',
        borderRadius: '50px',
        fontWeight: '600',
        textTransform: 'uppercase',
        letterSpacing: '0.04em'
      },
      '.gal_badge_beginner': { background: '#dcfce7', color: '#166534' },
      '.gal_badge_intermediate': { background: '#fef3c7', color: '#92400e' },
      '.gal_badge_advanced': { background: '#fce7f3', color: '#9d174d' },
      '.bw_theme_alt .gal_badge_beginner': { background: '#052e16', color: '#4ade80' },
      '.bw_theme_alt .gal_badge_intermediate': { background: '#422006', color: '#fbbf24' },
      '.bw_theme_alt .gal_badge_advanced': { background: '#500724', color: '#f472b6' },
      '.gal_swatch': {
        width: '14px',
        height: '14px',
        borderRadius: '50%',
        border: '2px solid rgba(0,0,0,0.1)',
        flexShrink: '0'
      },
      '.gal_arrow': {
        fontSize: '0.75rem',
        color: 'var(--bw_text_muted)',
        transition: 'transform 0.2s',
        flexShrink: '0'
      },
      '.gal_arrow.open': { transform: 'rotate(90deg)' },
      '.gal_detail': {
        display: 'none',
        padding: '0 1.25rem 1.25rem',
        borderTop: '1px solid var(--bw_card_border)'
      },
      '.gal_detail.open': { display: 'block' },
      '.gal_detail h4': {
        fontSize: '0.8rem',
        fontWeight: '600',
        color: 'var(--bw_text)',
        margin: '1rem 0 0.35rem',
        textTransform: 'uppercase',
        letterSpacing: '0.05em'
      },
      '.gal_detail p': {
        fontSize: '0.88rem',
        color: 'var(--bw_text_secondary)',
        lineHeight: '1.6',
        margin: '0 0 0.75rem'
      },
      '.gal_detail ul': {
        margin: '0 0 0.75rem',
        paddingLeft: '1.25rem'
      },
      '.gal_detail li': {
        fontSize: '0.85rem',
        color: 'var(--bw_text_secondary)',
        lineHeight: '1.5',
        marginBottom: '0.25rem'
      },
      '.gal_detail li code': {
        background: 'rgba(0,102,102,0.08)',
        padding: '0.1em 0.3em',
        borderRadius: '3px',
        fontSize: '0.82em',
        fontFamily: '"SF Mono", Monaco, Consolas, monospace'
      },
      '.gal_actions': {
        display: 'flex',
        gap: '0.5rem',
        marginTop: '1rem'
      },
      '.gal_prereq': {
        fontSize: '0.78rem',
        color: 'var(--bw_text_muted)',
        fontStyle: 'italic',
        marginTop: '0.5rem'
      },
      '@media (max-width: 640px)': {
        '.gal_hero': { padding: '1.5rem 0 1.25rem' },
        '.gal_hero h1': { fontSize: '1.35rem' },
        '.gal_meta': { display: 'none' }
      }
    }), { id: 'gal-styles' });

    // ---- Example Data ----
    var examples = [
      {
        category: 'Full Applications',
        items: [
          {
            title: 'Ember & Oak Coffee Co.',
            href: 'ember-and-oak/',
            icon: '\u2615',
            oneliner: 'Complete e-commerce landing with reactive cart and 27 BCCL components',
            audience: 'Advanced',
            themeColor: '#8B4513',
            desc: 'A full-page coffee shop with navbar, hero, product grid with search + filter, shopping cart (pub/sub), timeline, charts, FAQ accordion, contact form, and newsletter signup. The most comprehensive bitwrench example.',
            teaches: [
              '<code>bw.component()</code> with template bindings and <code>o.methods</code>',
              '<code>bw.pub()</code> / <code>bw.sub()</code> for cart state broadcast',
              '<code>bw.generateTheme()</code> with warm brown/chocolate palette',
              '<code>bw.makeBarChart()</code>, <code>bw.makeTimeline()</code>, <code>bw.makeAccordion()</code>',
              '<code>bw.makeSearchInput()</code> with live filter pattern',
              '<code>bw.createDOM()</code> for toast append pattern',
              'Level 1 + Level 2 components side by side'
            ],
            prereq: null
          },
          {
            title: 'Metrics Dashboard',
            href: 'dashboard/',
            icon: '\uD83D\uDCCA',
            oneliner: 'Live-updating admin dashboard with charts and theme tokens',
            audience: 'Intermediate',
            themeColor: '#1e40af',
            desc: 'Real-time dashboard with stat cards, bar chart, progress bars, and activity feed. Demonstrates theme palette tokens, bw.s()/bw.u utility styles, responsive layouts, and pub/sub for cross-widget communication.',
            teaches: [
              '<code>bw.s()</code> / <code>bw.u</code> for inline style composition',
              '<code>bw.responsive()</code> for layout breakpoints',
              'Theme palette tokens (<code>P.primary.base</code>, <code>P.muted.border</code>)',
              '<code>bw.css({ \'@keyframes\': {...} })</code> for animations',
              '<code>bw.pub()</code> / <code>bw.sub()</code> for metrics broadcast',
              '<code>bw.makeStatCard()</code>, <code>bw.makeBarChart()</code>, <code>bw.makeProgress()</code>'
            ],
            prereq: null
          },
          {
            title: 'Todo App',
            href: 'todo-app/',
            icon: '\u2705',
            oneliner: 'Reactive todo with pub/sub and component composition',
            audience: 'Beginner',
            themeColor: '#6366f1',
            desc: 'Classic todo app using bw.component() with .set()/.get(), pub/sub for cross-component communication, and filter bar. A great starting point for understanding reactive patterns.',
            teaches: [
              '<code>bw.component()</code> Level 2 pattern',
              '<code>bw.pub()</code> / <code>bw.sub()</code> for state change events',
              '<code>bw.makeButton()</code> with dynamic variant switching',
              '<code>bw.makeCheckbox()</code>, <code>bw.makeInput()</code>',
              'Filter pattern (all/active/completed)'
            ],
            prereq: null
          },
          {
            title: 'Landing Page',
            href: 'landing-page/',
            icon: '\uD83C\uDF05',
            oneliner: 'Marketing page using pure BCCL composition \u2014 no state',
            audience: 'Beginner',
            themeColor: '#ea580c',
            desc: 'A polished marketing site built entirely with BCCL factories. Hero, feature grid, pricing table, testimonials, FAQ accordion, contact form, and CTA. Proves that component composition alone can produce professional pages.',
            teaches: [
              '<code>bw.makeNavbar()</code>, <code>bw.makeHero()</code>, <code>bw.makeSection()</code>',
              '<code>bw.makeFeatureGrid()</code>, <code>bw.makeStatCard()</code>',
              '<code>bw.makeAccordion()</code> for FAQ',
              '<code>bw.makeForm()</code> / <code>bw.makeFormGroup()</code>',
              'Level 0 \u2014 zero reactive state, pure composition'
            ],
            prereq: null
          },
          {
            title: 'Signup Wizard',
            href: 'wizard/',
            icon: '\uD83E\uDDD9',
            oneliner: 'Multi-step form with state transitions and validation',
            audience: 'Intermediate',
            themeColor: '#6366f1',
            desc: 'Multi-step wizard with form validation, step navigation, and bw.raw() for formatted summaries. Demonstrates that onclick handlers in TACO attributes survive re-renders.',
            teaches: [
              '<code>bw.raw()</code> for pre-escaped HTML content',
              '<code>bw.makeStepper()</code> for step indicators',
              '<code>bw.makeInput()</code>, <code>bw.makeSelect()</code>, <code>bw.makeCheckbox()</code>',
              'State transitions (step 1 \u2192 2 \u2192 3 \u2192 4)',
              'Level 1 manual render pattern'
            ],
            prereq: null
          },
          {
            title: 'Live Feed',
            href: 'live-feed/',
            icon: '\uD83D\uDCE1',
            oneliner: 'Real-time event stream with filters, animations, and auto-expiry',
            audience: 'Intermediate',
            themeColor: '#0f766e',
            desc: 'Simulated real-time event feed with filter bar, slide-in animations via @keyframes, counter badges updated by bw.patchAll(), and auto-expiring items cleaned up by bw.cleanup().',
            teaches: [
              '<code>bw.patch()</code> / <code>bw.patchAll()</code> for targeted DOM updates',
              '<code>bw.createDOM()</code> + insertBefore for append pattern',
              '<code>bw.cleanup()</code> for element lifecycle management',
              '<code>bw.css({ \'@keyframes slideIn\': {...} })</code>',
              '<code>bw.uuid()</code> for counter badge addressing'
            ],
            prereq: null
          }
        ]
      },
      {
        category: 'Server-Driven',
        items: [
          {
            title: 'Counter (bwserve)',
            href: 'client-server/',
            icon: '\uD83D\uDD04',
            oneliner: 'Server-driven counter using SSE protocol',
            audience: 'Intermediate',
            themeColor: '#006666',
            desc: 'Server-driven counter using the bwserve SSE protocol. State lives on the server; UI updates push to the browser in real-time. The simplest bwserve example.',
            teaches: [
              'bwserve SSE protocol (replace, patch)',
              '<code>data-bw-action</code> attributes for server events',
              'Server-side state management with Node.js'
            ],
            prereq: 'Run: node server.js'
          },
          {
            title: 'LLM Chat Interface',
            href: 'llm-chat/',
            icon: '\uD83E\uDD16',
            oneliner: 'Chat UI driven by Ollama or OpenAI via bwserve',
            audience: 'Advanced',
            themeColor: '#7c3aed',
            desc: 'Full chat application with streaming LLM responses, auto-scroll, and server-side state management via bwserve. Works with Ollama (local) or OpenAI API.',
            teaches: [
              'bwserve streaming responses',
              'Server-driven append pattern',
              'LLM API integration (Ollama / OpenAI)'
            ],
            prereq: 'Run: node server.js (requires Ollama or OpenAI key)'
          },
          {
            title: 'Pipe Demo',
            href: 'pipe-demo/',
            icon: '\uD83D\uDD27',
            oneliner: 'Unix pipe to bwserve \u2014 stream any CLI output to a dashboard',
            audience: 'Intermediate',
            themeColor: '#059669',
            desc: 'Shows how to pipe shell command output through bwserve to create live dashboards from any CLI tool. A bash script streams sensor data to the browser.',
            teaches: [
              'Unix pipe integration with bwserve',
              'Shell scripting with bwserve protocol',
              'Real-time CLI visualization'
            ],
            prereq: 'Run: bash sensor.sh | node ../client-server/server.js'
          }
        ]
      },
      {
        category: 'Embedded / IoT',
        items: [
          {
            title: 'IoT Sensor Dashboard',
            href: 'embedded/',
            icon: '\uD83D\uDCE1',
            oneliner: 'ESP32-style dashboard with mock sensor data and SSE updates',
            audience: 'Intermediate',
            themeColor: '#059669',
            desc: 'Dark-themed IoT dashboard designed for ESP32 microcontrollers. Sensor cards with live-updating values, progress bars, device control buttons, and an event log. Works standalone with simulated data.',
            teaches: [
              '<code>bw.generateTheme()</code> with compact spacing for small screens',
              '<code>bw.makeButton()</code> for device control commands',
              'Custom <code>bw.css()</code> for dark embedded UI',
              'Mock data pattern (replace with real <code>fetch()</code> / <code>EventSource</code>)'
            ],
            prereq: null
          }
        ]
      },
      {
        category: 'AI-Powered',
        items: [
          {
            title: 'On-The-Fly UI',
            href: 'OnTheFlyUI/',
            icon: '\uD83E\uDDE0',
            oneliner: 'AI-generated bitwrench UIs via Python + LLM',
            audience: 'Advanced',
            themeColor: '#7c3aed',
            desc: 'Python application that uses LLMs to generate bitwrench TACO code on the fly. Demonstrates that TACO format is LLM-friendly \u2014 models can generate valid UI without JSX compilation.',
            teaches: [
              'LLM-driven UI generation',
              'Python + bitwrench integration',
              'TACO as an LLM-friendly format'
            ],
            prereq: 'Run: python otfui.py (requires Python 3 + LLM API key)'
          }
        ]
      }
    ];

    // ---- Toggle logic ----
    function toggleItem(itemId) {
      var details = bw.$('#detail-' + itemId);
      var arrows = bw.$('#arrow-' + itemId);
      if (details.length) details[0].classList.toggle('open');
      if (arrows.length) arrows[0].classList.toggle('open');
    }

    // ---- Build accordion items ----
    function makeExampleItem(ex, idx) {
      var itemId = 'ex-' + idx;
      var audienceClass = 'gal_badge gal_badge_' + ex.audience.toLowerCase();

      var teachItems = (ex.teaches || []).map(function(t) {
        return { t: 'li', c: bw.raw(t) };
      });

      var header = {
        t: 'div', a: { class: 'gal_header', onclick: function() { toggleItem(itemId); } },
        c: [
          { t: 'span', a: { class: 'gal_icon' }, c: ex.icon },
          { t: 'div', a: { class: 'gal_info' }, c: [
            { t: 'div', a: { class: 'gal_title' }, c: ex.title },
            { t: 'div', a: { class: 'gal_oneliner' }, c: ex.oneliner }
          ]},
          { t: 'div', a: { class: 'gal_meta' }, c: [
            { t: 'span', a: { class: audienceClass }, c: ex.audience },
            { t: 'span', a: { class: 'gal_swatch', style: 'background:' + ex.themeColor } }
          ]},
          { t: 'span', a: { class: 'gal_arrow', id: 'arrow-' + itemId }, c: '\u25B6' }
        ]
      };

      var detailContent = [
        { t: 'p', c: ex.desc },
        { t: 'h4', c: 'What It Teaches' },
        { t: 'ul', c: teachItems }
      ];

      if (ex.prereq) {
        detailContent.push({ t: 'div', a: { class: 'gal_prereq' }, c: ex.prereq });
      }

      detailContent.push({
        t: 'div', a: { class: 'gal_actions' },
        c: [
          bw.makeButton({ text: 'Open Example', variant: 'primary', size: 'sm', onclick: function() { window.location.href = ex.href; } }),
          bw.makeButton({ text: 'View Source on GitHub', variant: 'outline_secondary', size: 'sm', onclick: function() { window.open('https://github.com/deftio/bitwrench/tree/master/examples/' + ex.href, '_blank'); } })
        ]
      });

      var detail = {
        t: 'div', a: { class: 'gal_detail', id: 'detail-' + itemId },
        c: detailContent
      };

      return { t: 'div', a: { class: 'gal_item' }, c: [header, detail] };
    }

    // ---- Build page ----
    var hero = {
      t: 'div', a: { class: 'gal_hero' },
      c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top:0;padding-bottom:0' },
        c: [
          { t: 'h1', c: 'App Gallery' },
          { t: 'p', c: 'Complete applications and demos built with bitwrench. Click any entry to see what it teaches and how to run it.' }
        ]
      }
    };

    var itemIdx = 0;
    var sections = examples.map(function(section) {
      var items = section.items.map(function(ex) {
        return makeExampleItem(ex, itemIdx++);
      });
      return {
        t: 'div',
        c: [
          { t: 'div', a: { class: 'gal_category' }, c: section.category },
          { t: 'div', c: items }
        ]
      };
    });

    // Source code callout
    var sourceCallout = {
      t: 'div', a: { style: 'margin-top:2rem;padding:1.25rem;background:var(--bw_card_bg);border:1px solid var(--bw_card_border);border-radius:var(--bw_radius)' },
      c: [
        { t: 'p', a: { style: 'margin:0 0 0.5rem;color:var(--bw_text_secondary);font-size:0.9rem;line-height:1.6' },
          c: [
            'Every example is a single HTML file with no build step. View the source on ',
            { t: 'a', a: { href: 'https://github.com/deftio/bitwrench/tree/master/examples' }, c: 'GitHub' },
            ', or open any example and hit View Source in your browser.'
          ]
        },
        { t: 'p', a: { style: 'margin:0;color:var(--bw_text_secondary);font-size:0.9rem;line-height:1.6' },
          c: [
            'For guided tutorials and the full component library, visit the ',
            { t: 'a', a: { href: '../pages/' }, c: 'documentation site' },
            '.'
          ]
        }
      ]
    };

    var contentWrapper = {
      t: 'div', a: { class: 'content-container wide' },
      c: sections.concat([sourceCallout])
    };

    bw.DOM('#app', [hero, contentWrapper]);
  </script>
</body>
</html>
