<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench Examples</title>
  <script src="../dist/bitwrench.umd.js"></script>
  <link rel="stylesheet" href="../dist/bitwrench.css">
</head>
<body>
  <div id="app"></div>
  <script>
    bw.loadDefaultStyles();

    var modernExamples = [
      { title: 'Coffee Shop Landing', href: 'ember_and_oak.html', desc: 'Full landing page with bw.generateTheme(), BCCL components, and custom CSS.' },
      { title: 'Reactive UI (Todo)', href: 'reactive-ui/index.html', desc: 'Todo app using bw.component() with .set()/.get() and pub/sub.' },
      { title: 'Static Page', href: 'static-page/index.html', desc: 'Marketing landing page built entirely with BCCL factories.' },
      { title: 'Client-Server (bwserve)', href: 'client-server/', desc: 'Server-driven counter demo using SSE protocol. Run: node server.js' },
      { title: 'LLM Chat (bwserve)', href: 'llm-chat/', desc: 'Chat UI driven by Ollama/OpenAI via bwserve. Run: node server.js' },
      { title: 'Embedded IoT Dashboard', href: 'embedded/index.html', desc: 'ESP32-style sensor dashboard with SSE data push.' }
    ];

    var legacyExamples = [
      { title: 'Basic Demo (v1)', href: 'example1.html', desc: 'Headings, paragraphs, sortable tables using v1 array syntax.' },
      { title: 'Grid + Tables (v1)', href: 'example5.html', desc: 'Grid layout, multi-array, htmlTable() demo.' },
      { title: 'Live Clock (v1)', href: 'example8.html', desc: 'Full-page clock with setInterval.' },
      { title: 'Image Grid (v1)', href: 'example9.html', desc: 'Card grid generator.' }
    ];

    function makeExampleCard(ex) {
      return {
        t: 'a', a: { href: ex.href, style: 'text-decoration:none; color:inherit; display:block' },
        c: bw.makeCard({
          title: ex.title,
          content: ex.desc,
          hoverable: true,
          style: 'height:100%'
        })
      };
    }

    bw.DOM('#app', { t: 'div', a: { class: 'bw-container' }, c: [
      { t: 'div', a: { style: 'text-align:center; padding:2rem 0 1rem' }, c: [
        { t: 'h1', c: 'Bitwrench Examples' },
        { t: 'p', a: { style: 'color:#666; margin-top:0.5rem' }, c: [
          'For the full documentation site, visit ',
          { t: 'a', a: { href: '../pages/' }, c: 'bitwrench pages' },
          '.'
        ]}
      ]},

      { t: 'h2', a: { style: 'margin:1.5rem 0 1rem' }, c: 'Modern Examples (v2)' },
      { t: 'div', a: { style: 'display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1rem' },
        c: modernExamples.map(makeExampleCard)
      },

      { t: 'h2', a: { style: 'margin:2rem 0 1rem' }, c: 'Legacy Demos (v1)' },
      { t: 'p', a: { style: 'color:#666; margin-bottom:1rem' }, c: 'These use bitwrench v1.x syntax (array notation, deprecated APIs). Kept for reference.' },
      { t: 'div', a: { style: 'display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1rem' },
        c: legacyExamples.map(makeExampleCard)
      },

      { t: 'footer', a: { style: 'text-align:center; padding:2rem 0 1rem; color:#999; font-size:0.8rem' },
        c: 'bitwrench \u00A9 deftio / M. Chatterjee \u00B7 BSD-2-Clause'
      }
    ]});
  </script>
</body>
</html>
