<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwrench Examples - App Gallery</title>
  <meta name="description" content="Full application examples built with bitwrench: landing pages, dashboards, embedded IoT, server-driven apps, and more.">
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <script src="../dist/bitwrench.umd.min.js"></script>
  <script src="../pages/shared-nav.js"></script>
  <script src="../pages/site.js"></script>
</head>
<body>
  <div id="example-nav"></div>
  <div id="app"></div>

  <script>
    var styles = initBitwrenchPage('', '../pages/');
    var p = styles.palette;
    var ap = styles.alternatePalette;

    // ---- Page CSS (palette-driven, no var(--bw_*) custom properties) ----
    // Structural rules: layout only, no colors
    var galStructural = {
      '.gal_hero h1': { margin: '0 0 0.4rem', fontSize: '1.85rem', fontWeight: '700' },
      '.gal_hero p': { opacity: '0.8', fontSize: '1.05rem', margin: '0', lineHeight: '1.55' },
      '.gal_header': {
        display: 'flex', alignItems: 'center', gap: '0.75rem',
        padding: '1rem 1.25rem', cursor: 'pointer', userSelect: 'none'
      },
      '.gal_icon': { fontSize: '1.5rem', flexShrink: '0', width: '2rem', textAlign: 'center' },
      '.gal_info': { flex: '1', minWidth: '0' },
      '.gal_meta': { display: 'flex', gap: '0.5rem', alignItems: 'center', flexShrink: '0' },
      '.gal_badge': {
        fontSize: '0.65rem', padding: '0.15rem 0.5rem', borderRadius: '50px',
        fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.04em'
      },
      '.gal_swatch': {
        width: '14px', height: '14px', borderRadius: '50%',
        border: '2px solid rgba(0,0,0,0.1)', flexShrink: '0'
      },
      '.gal_arrow.open': { transform: 'rotate(90deg)' },
      '.gal_detail': { display: 'none', padding: '0 1.25rem 1.25rem' },
      '.gal_detail.open': { display: 'block' },
      '.gal_detail ul': { margin: '0 0 0.75rem', paddingLeft: '1.25rem' },
      '.gal_actions': { display: 'flex', gap: '0.5rem', marginTop: '1rem' },
      '.gal_orient p:last-child': { margin: '0' },
      '.gal_orient_modes': {
        display: 'grid', gridTemplateColumns: '1fr', gap: '0.5rem', margin: '0.75rem 0'
      },
      '@media (max-width: 640px)': {
        '.gal_hero': { padding: '1.5rem 0 1.25rem' },
        '.gal_hero h1': { fontSize: '1.35rem' },
        '.gal_meta': { display: 'none' }
      }
    };

    // Themed rules: all palette-dependent properties
    function galThemedRules(pal) {
      return {
        '.gal_hero': {
          background: 'linear-gradient(135deg, ' + pal.primary.base + ' 0%, ' + pal.primary.active + ' 100%)',
          color: pal.primary.textOn, padding: '2.5rem 0 2rem'
        },
        '.gal_category': {
          fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.1em',
          fontWeight: '700', color: pal.primary.base, marginBottom: '0.75rem', marginTop: '2rem'
        },
        '.gal_item': {
          background: pal.surface, border: '1px solid ' + pal.light.border,
          borderRadius: '8px', marginBottom: '0.75rem', overflow: 'hidden',
          transition: 'box-shadow 0.15s'
        },
        '.gal_item:hover': { boxShadow: '0 4px 16px rgba(0,0,0,0.08)' },
        '.gal_header:hover': { background: pal.primary.light },
        '.gal_title': { fontWeight: '600', fontSize: '1rem', color: pal.dark.base },
        '.gal_oneliner': { fontSize: '0.85rem', color: pal.dark.hover, marginTop: '0.15rem' },
        '.gal_badge_beginner': { background: '#dcfce7', color: '#166534' },
        '.gal_badge_intermediate': { background: '#fef3c7', color: '#92400e' },
        '.gal_badge_advanced': { background: '#fce7f3', color: '#9d174d' },
        '.gal_arrow': {
          fontSize: '0.75rem', color: pal.secondary.hover,
          transition: 'transform 0.2s', flexShrink: '0'
        },
        '.gal_detail': { borderTop: '1px solid ' + pal.light.border },
        '.gal_detail h4': {
          fontSize: '0.8rem', fontWeight: '600', color: pal.dark.base,
          margin: '1rem 0 0.35rem', textTransform: 'uppercase', letterSpacing: '0.05em'
        },
        '.gal_detail p': {
          fontSize: '0.88rem', color: pal.dark.hover, lineHeight: '1.6', margin: '0 0 0.75rem'
        },
        '.gal_detail li': {
          fontSize: '0.85rem', color: pal.dark.hover, lineHeight: '1.5', marginBottom: '0.25rem'
        },
        '.gal_detail li code': {
          background: pal.primary.light, padding: '0.1em 0.3em', borderRadius: '3px',
          fontSize: '0.82em', fontFamily: '"SF Mono", Monaco, Consolas, monospace'
        },
        '.gal_prereq': {
          fontSize: '0.78rem', color: pal.secondary.hover, fontStyle: 'italic', marginTop: '0.5rem'
        },
        '.gal_orient': {
          background: pal.surface, border: '1px solid ' + pal.light.border,
          borderRadius: '8px', padding: '1.25rem 1.5rem', marginBottom: '1.5rem', lineHeight: '1.6'
        },
        '.gal_orient p': { margin: '0 0 0.75rem', fontSize: '0.9rem', color: pal.dark.hover },
        '.gal_orient_mode': {
          display: 'flex', alignItems: 'baseline', gap: '0.5rem',
          fontSize: '0.88rem', color: pal.dark.hover
        },
        '.gal_orient_mode strong': { color: pal.dark.base, whiteSpace: 'nowrap' },
        '.gal_orient_clone': {
          display: 'inline-block', background: pal.primary.light,
          padding: '0.3rem 0.6rem', borderRadius: '4px',
          fontFamily: '"SF Mono", Monaco, Consolas, monospace',
          fontSize: '0.82rem', color: pal.dark.base, marginTop: '0.25rem', userSelect: 'all'
        },
        '.gal_embedded_intro': {
          background: pal.surface, border: '1px solid ' + pal.light.border,
          borderRadius: '8px', padding: '1rem 1.25rem', marginBottom: '1rem',
          fontSize: '0.88rem', color: pal.dark.hover, lineHeight: '1.6'
        },
        '.gal_source_callout': {
          marginTop: '2rem', padding: '1.25rem', background: pal.surface,
          border: '1px solid ' + pal.light.border, borderRadius: '8px'
        },
        '.gal_source_callout p': {
          margin: '0', color: pal.dark.hover, fontSize: '0.9rem', lineHeight: '1.6'
        }
      };
    }

    var primaryCSS = bw.css(galStructural) + '\n' + bw.css(galThemedRules(p));
    var altCSS = bw.css(bw.scopeRulesUnder(galThemedRules(ap), '.bw_theme_alt'));
    bw.injectCSS(primaryCSS + '\n' + altCSS, { id: 'gal-styles' });

    // ---- Example Data ----
    var examples = [
      {
        category: 'Browser Examples',
        intro: null,
        items: [
          {
            title: 'Basic Landing Page',
            href: 'showcase/',
            icon: '\u2728',
            oneliner: 'Marketing page in ~110 lines, no CSS needed. Start here.',
            audience: 'Beginner',
            themeColor: '#4f46e5',
            desc: 'A fictional analytics product page with navbar, hero, stats, feature grid, testimonials, pricing cards, FAQ, and footer. Built entirely from built-in components and a generated color theme \u2014 no CSS to write. Good first example to see what bitwrench gives you out of the box.',
            teaches: [
              'Setting up a color theme with <code>bw.loadStyles()</code>',
              '18 built-in components (Navbar, Hero, Card, Button, Accordion, etc.)',
              'Utility classes for spacing and alignment',
              'Composing a full page from component building blocks'
            ],
            prereq: null
          },
          {
            title: 'Styled Landing Page',
            href: 'landing-page/',
            icon: '\uD83C\uDF05',
            oneliner: 'Same idea, but with custom CSS on top. Compare the two.',
            audience: 'Beginner',
            themeColor: '#ea580c',
            desc: 'Same page structure as the Basic Landing Page but adds custom CSS for gradient backgrounds, pricing card polish, and responsive tweaks. Compare the two side-by-side to see how much the defaults handle and where custom styling helps.',
            teaches: [
              'Writing custom CSS with <code>bw.css()</code> and <code>bw.injectCSS()</code>',
              'Layering custom styles on top of built-in component styles',
              'Responsive design adjustments'
            ],
            prereq: null
          },
          {
            title: 'Todo App',
            href: 'todo-app/',
            icon: '\u2705',
            oneliner: 'Classic todo list with add, complete, filter, and delete.',
            audience: 'Beginner',
            themeColor: '#6366f1',
            desc: 'A working todo application with an input field, checkboxes, a filter bar (all/active/completed), and delete. Shows how components communicate \u2014 checking a todo in one part of the page updates the count badge elsewhere.',
            teaches: [
              'Reactive components with <code>o.state</code> + <code>o.render</code>',
              'Cross-component communication with <code>bw.pub()</code> / <code>bw.sub()</code>',
              'Buttons, checkboxes, inputs, and filter patterns'
            ],
            prereq: null
          },
          {
            title: 'Signup Wizard',
            href: 'wizard/',
            icon: '\uD83E\uDDD9',
            oneliner: 'Multi-step form: account \u2192 profile \u2192 preferences \u2192 confirm.',
            audience: 'Intermediate',
            themeColor: '#6366f1',
            desc: 'A 4-step signup flow with form inputs, validation, a step indicator, and a confirmation summary. Demonstrates how to manage multi-page form state and navigate between steps without a router.',
            teaches: [
              'Step indicator with <code>bw.makeStepper()</code>',
              'Form inputs, selects, and checkboxes',
              'State transitions and validation logic',
              'Rendering a summary from collected form data'
            ],
            prereq: null
          },
          {
            title: 'Metrics Dashboard',
            href: 'dashboard/',
            icon: '\uD83D\uDCCA',
            oneliner: 'Live stat cards, bar chart, and activity feed.',
            audience: 'Intermediate',
            themeColor: '#1e40af',
            desc: 'A simulated analytics dashboard with KPI cards, a bar chart, progress indicators, and an activity feed that updates in real time. Multiple widgets react to the same data stream independently.',
            teaches: [
              'Real-time updates with pub/sub messaging',
              'Stat cards, bar charts, and progress bars',
              'Using theme palette colors in custom layouts',
              'Responsive grid layout'
            ],
            prereq: null
          },
          {
            title: 'Live Feed',
            href: 'live-feed/',
            icon: '\uD83D\uDCE1',
            oneliner: 'Streaming events with filters, animations, and auto-cleanup.',
            audience: 'Intermediate',
            themeColor: '#0f766e',
            desc: 'A simulated event stream (like a log viewer or notification feed). New items slide in at the top, old items expire automatically, and a filter bar lets you show only certain event types. Counter badges update in real time.',
            teaches: [
              'Targeted DOM updates with <code>bw.patch()</code>',
              'CSS animations via <code>bw.css()</code> keyframes',
              'Element lifecycle cleanup',
              'UUID-based addressing for live counters'
            ],
            prereq: null
          },
          {
            title: 'Ember & Oak Coffee Co.',
            href: 'ember-and-oak/',
            icon: '\u2615',
            oneliner: 'Full e-commerce site with cart, search, charts. The biggest example.',
            audience: 'Advanced',
            themeColor: '#8B4513',
            desc: 'A complete fictional coffee shop website: product catalog with search and filters, shopping cart with add/remove, order history chart, company timeline, FAQ, contact form, and newsletter signup. Shows how all the pieces come together in a real-world-sized app.',
            teaches: [
              'Reactive components with <code>o.state</code> + <code>o.render</code> for the shopping cart',
              'Pub/sub for cart updates across the page',
              'Custom theme with brand colors',
              'Search/filter pattern for product grid',
              'Combining many component types in one app'
            ],
            prereq: null
          }
        ]
      },
      {
        category: 'Embedded / IoT',
        intro: 'Tutorials and dashboards for real embedded hardware. Each includes server code, a device dashboard, and step-by-step setup instructions. bitwrench handles all rendering -- the device sends JSON, the browser renders the UI.',
        items: [
          {
            title: 'ESP32 Sensor Dashboard',
            href: 'embedded/esp32-tutorial.html',
            icon: '\uD83D\uDCE1',
            oneliner: 'DHT22, LDR, LED control. Arduino C++ tutorial.',
            audience: 'Beginner',
            themeColor: '#059669',
            desc: 'Step-by-step tutorial for building an IoT sensor dashboard on an ESP32 DevKit. DHT22 temperature/humidity, LDR light sensor, built-in LED control. Arduino C++ with ESPAsyncWebServer, SPIFFS filesystem, SSE data push.',
            teaches: [
              'ESP32 Arduino setup and SPIFFS filesystem',
              'SSE (Server-Sent Events) for real-time sensor data',
              'Device control via POST /api/command',
              'Compact dark theme for embedded screens'
            ],
            prereq: 'Hardware: ESP32 DevKit + DHT22 sensor + LDR'
          },
          {
            title: 'Pico W / Pico 2W Tutorial',
            href: 'embedded-pico-w/',
            icon: '\uD83E\uDE84',
            oneliner: 'Step-by-step: MicroPython, CircuitPython, or Arduino C++.',
            audience: 'Intermediate',
            themeColor: '#e11d48',
            desc: 'Step-by-step tutorial for Raspberry Pi Pico W (RP2040) and Pico 2W (RP2350). Three server options: MicroPython (microdot), CircuitPython (adafruit_httpserver), Arduino C++ (WebServer + LittleFS). Onboard temperature, 3 ADC channels, 4 PWM outputs, 8 digital outputs, digital inputs, WiFi RSSI. Optional Freenove Breakout Board (FNK0081) for visible GPIO LEDs.',
            teaches: [
              'Hardware setup and firmware installation',
              'Three server language options with the same REST + SSE API',
              'Real-time dashboard with <code>EventSource</code> and <code>fetch()</code>',
              'Board detection (auto-detects Pico W vs Pico 2W)'
            ],
            prereq: 'Hardware: Raspberry Pi Pico W or Pico 2W + USB cable + WiFi'
          },
          {
            title: 'RPi System Monitor',
            href: 'embedded-rpi/',
            icon: '\uD83E\uDD67',
            oneliner: 'Full Linux SBC: CPU, memory, disk, GPIO. Node.js or Python.',
            audience: 'Intermediate',
            themeColor: '#c51a4a',
            desc: 'Step-by-step tutorial for a Raspberry Pi 3/4/5 system monitor. Per-core CPU usage, temperature, RAM/swap, disk, network throughput, sortable process table, 6 GPIO pins (3 output toggles, 3 input). Two server options: Node.js (bwserve) or Python (Flask + psutil).',
            teaches: [
              'Two server deployment options (bwserve vs Flask)',
              'System metrics from /proc and /sys',
              'GPIO control via libgpiod',
              'Real-time SSE updates to the browser'
            ],
            prereq: 'Hardware: Raspberry Pi 3, 4, or 5 with Raspberry Pi OS'
          }
        ]
      },
      {
        category: 'Server-Driven',
        intro: null,
        items: [
          {
            title: 'Counter (bwserve)',
            href: 'client-server/',
            icon: '\uD83D\uDD04',
            oneliner: 'A simple counter where the server controls the UI.',
            audience: 'Intermediate',
            themeColor: '#006666',
            desc: 'The simplest server-driven example. A counter lives on the server, and clicking buttons in the browser sends requests that update it. The server pushes UI changes back in real time via SSE (Server-Sent Events).',
            teaches: [
              'bwserve protocol basics (replace, patch)',
              'Server-side state with Node.js',
              'Real-time UI updates without page reload'
            ],
            prereq: 'Run: <code>node server.js</code>'
          },
          {
            title: 'Screenshot Capture',
            href: 'client-server/',
            icon: '\uD83D\uDCF7',
            oneliner: 'Server captures what the browser is displaying as an image.',
            audience: 'Intermediate',
            themeColor: '#0891b2',
            desc: 'The server calls client.screenshot() to capture the browser\'s rendered page and receives it as a Node.js Buffer. Uses html2canvas under the hood (lazy-loaded, vendored). Shows how to capture specific elements or the full page.',
            teaches: [
              '<code>client.screenshot()</code> API with selector and options',
              'register + call protocol (three-tier execution model)',
              'Sending image data back from client to server',
              '<code>allowScreenshot: true</code> opt-in security'
            ],
            prereq: 'Run: <code>node screenshot-server.js</code>'
          },
          {
            title: 'Pipe Demo',
            href: 'pipe-demo/',
            icon: '\uD83D\uDD27',
            oneliner: 'Pipe any shell command into a live browser dashboard.',
            audience: 'Intermediate',
            themeColor: '#059669',
            desc: 'Connects a Unix shell pipe to a browser dashboard. Any command-line tool that prints output (sensor readings, log tails, system stats) becomes a live-updating web page.',
            teaches: [
              'Unix pipe integration with bwserve',
              'Turning CLI output into a web dashboard',
              'Real-time visualization of streaming data'
            ],
            prereq: 'Run: <code>bash sensor.sh | node ../client-server/server.js</code>'
          },
          {
            title: 'LLM Chat Interface',
            href: 'llm-chat/',
            icon: '\uD83E\uDD16',
            oneliner: 'Chat with an AI model. Responses stream in token by token.',
            audience: 'Advanced',
            themeColor: '#7c3aed',
            desc: 'A chat interface that connects to a local or cloud LLM. Messages stream in token by token with auto-scroll, just like ChatGPT. Works with Ollama (free, runs on your machine), LM Studio, or any OpenAI-compatible API.',
            teaches: [
              'Streaming server-driven UI updates',
              'Append pattern for token-by-token rendering',
              'LLM API integration'
            ],
            prereq: 'Run: <code>node server.js</code> (connect to Ollama, LM Studio, or any OpenAI-compatible API)'
          }
        ]
      },
      {
        category: 'AI-Powered',
        intro: null,
        items: [
          {
            title: 'On-The-Fly UI',
            href: 'OnTheFlyUI/',
            icon: '\uD83E\uDDE0',
            oneliner: 'Ask an AI to build a UI, and it appears in your browser.',
            audience: 'Advanced',
            themeColor: '#7c3aed',
            desc: 'Describe a UI in plain English and an LLM generates the page for you. Works because bitwrench\'s format (plain JSON objects) is easy for AI models to produce \u2014 no compilation step needed. The generated UI appears instantly in your browser.',
            teaches: [
              'LLM-driven UI generation',
              'Python + bitwrench integration',
              'Why JSON-based UI is LLM-friendly'
            ],
            prereq: 'Run: <code>python otfui.py</code> (requires Python 3 and an LLM API \u2014 local or cloud)'
          }
        ]
      }
    ];

    // ---- Toggle logic ----
    function toggleItem(itemId) {
      var details = bw.$('#detail-' + itemId);
      var arrows = bw.$('#arrow-' + itemId);
      if (details.length) details[0].classList.toggle('open');
      if (arrows.length) arrows[0].classList.toggle('open');
    }

    // ---- Build accordion items ----
    function makeExampleItem(ex, idx) {
      var itemId = 'ex-' + idx;
      var audienceClass = 'gal_badge gal_badge_' + ex.audience.toLowerCase();

      var teachItems = (ex.teaches || []).map(function(t) {
        return { t: 'li', c: bw.raw(t) };
      });

      var header = {
        t: 'div', a: { class: 'gal_header', onclick: function() { toggleItem(itemId); } },
        c: [
          { t: 'span', a: { class: 'gal_icon' }, c: ex.icon },
          { t: 'div', a: { class: 'gal_info' }, c: [
            { t: 'div', a: { class: 'gal_title' }, c: ex.title },
            { t: 'div', a: { class: 'gal_oneliner' }, c: ex.oneliner }
          ]},
          { t: 'div', a: { class: 'gal_meta' }, c: [
            { t: 'span', a: { class: audienceClass }, c: ex.audience },
            { t: 'span', a: { class: 'gal_swatch', style: 'background:' + ex.themeColor } }
          ]},
          { t: 'span', a: { class: 'gal_arrow', id: 'arrow-' + itemId }, c: '\u25B6' }
        ]
      };

      var detailContent = [
        { t: 'p', c: ex.desc },
        { t: 'h4', c: 'Topics Covered' },
        { t: 'ul', c: teachItems }
      ];

      if (ex.prereq) {
        detailContent.push({ t: 'div', a: { class: 'gal_prereq' }, c: ex.prereq });
      }

      detailContent.push({
        t: 'div', a: { class: 'gal_actions' },
        c: [
          bw.makeButton({ text: 'Open Example', variant: 'primary', size: 'sm', onclick: function() { window.location.href = ex.href; } }),
          bw.makeButton({ text: 'View Source on GitHub', variant: 'outline_secondary', size: 'sm', onclick: function() { window.open('https://github.com/deftio/bitwrench/tree/master/examples/' + ex.href, '_blank'); } })
        ]
      });

      var detail = {
        t: 'div', a: { class: 'gal_detail', id: 'detail-' + itemId },
        c: detailContent
      };

      return { t: 'div', a: { class: 'gal_item' }, c: [header, detail] };
    }

    // ---- Build page ----
    var hero = {
      t: 'div', a: { class: 'gal_hero' },
      c: {
        t: 'div', a: { class: 'content-container wide', style: 'padding-top:0;padding-bottom:0' },
        c: [
          { t: 'h1', c: 'App Gallery' },
          { t: 'p', c: 'Complete applications and demos built with bitwrench. Each example lives in its own subdirectory with source code and a README.' }
        ]
      }
    };

    var orientBox = {
      t: 'div', a: { class: 'gal_orient' },
      c: [
        { t: 'p', c: [
          'This gallery is separate from the ',
          { t: 'a', a: { href: '../pages/' }, c: 'tutorial and reference pages' },
          '. Those are interactive docs hosted on the live site. The examples below are full applications you can study, modify, and run.'
        ]},
        { t: 'div', a: { class: 'gal_orient_modes' }, c: [
          { t: 'div', a: { class: 'gal_orient_mode' }, c: [
            { t: 'span', c: '\uD83C\uDF10' },
            { t: 'span', c: [
              { t: 'strong', c: 'Browser examples' },
              ' \u2014 open directly in any browser. No build step, no server. They also work on the ',
              { t: 'a', a: { href: 'https://deftio.github.io/bitwrench/examples/' }, c: 'live site' },
              '.'
            ]}
          ]},
          { t: 'div', a: { class: 'gal_orient_mode' }, c: [
            { t: 'span', c: '\uD83D\uDCBB' },
            { t: 'span', c: [
              { t: 'strong', c: 'Embedded / IoT examples' },
              ' \u2014 tutorials and dashboards for real hardware (ESP32, Pico W, Raspberry Pi). Step-by-step setup with server code included.'
            ]}
          ]},
          { t: 'div', a: { class: 'gal_orient_mode' }, c: [
            { t: 'span', c: '\uD83D\uDDA5' },
            { t: 'span', c: [
              { t: 'strong', c: 'Server-driven examples' },
              ' \u2014 require cloning the repo and running ',
              { t: 'code', c: 'node server.js' },
              '. See each README for setup.'
            ]}
          ]},
          { t: 'div', a: { class: 'gal_orient_mode' }, c: [
            { t: 'span', c: '\uD83E\uDDE0' },
            { t: 'span', c: [
              { t: 'strong', c: 'AI-powered examples' },
              ' \u2014 require Python 3 and an LLM API (local or cloud).'
            ]}
          ]}
        ]},
        { t: 'p', c: [
          'To run any example locally: ',
          { t: 'code', a: { class: 'gal_orient_clone' }, c: 'git clone https://github.com/deftio/bitwrench.git' },
          { t: 'br' },
          'The ',
          { t: 'code', c: 'dist/' },
          ' directory ships in the repo \u2014 no build step is needed to open the browser examples.'
        ]}
      ]
    };

    var itemIdx = 0;
    var sections = examples.map(function(section) {
      var items = section.items.map(function(ex) {
        return makeExampleItem(ex, itemIdx++);
      });

      var sectionContent = [];

      // Category heading
      sectionContent.push({ t: 'div', a: { class: 'gal_category' }, c: section.category });

      // Optional intro paragraph for the section
      if (section.intro) {
        sectionContent.push({ t: 'div', a: { class: 'gal_embedded_intro' }, c: section.intro });
      }

      sectionContent.push({ t: 'div', c: items });

      return { t: 'div', c: sectionContent };
    });

    // Source code callout (styled via gal_source_callout class, no inline var())
    var sourceCallout = {
      t: 'div', a: { class: 'gal_source_callout' },
      c: [
        { t: 'p',
          c: [
