<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspberry Pi GPIO Controller</title>
  <script src="../../dist/bitwrench.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    // =====================================================================
    // Raspberry Pi GPIO Controller — Embedded Device UI
    //
    // Simulated GPIO pin control for Raspberry Pi. In production, the Pi
    // serves this HTML page and exposes endpoints:
    //   GET  /api/gpio         — read all pin states
    //   POST /api/gpio/:pin    — set pin state { value: 0|1, direction: "in"|"out" }
    //   GET  /events           — SSE stream of pin change events
    //
    // SIMULATION: All pin state is local. Replace mock functions with
    // fetch()/EventSource to connect to real hardware.
    // =====================================================================

    bw.loadStyles({
      primary: '#10b981',
      secondary: '#3b82f6',
      spacing: 'compact',
      radius: 'sm'
    });

    bw.injectCSS(bw.css({
      'body': { background: '#0f172a', color: '#e2e8f0', margin: '0' }
    }));

    // -- Mock GPIO state ---------------------------------------------------
    var pins = [];
    for (var i = 0; i < 8; i++) {
      pins.push({ pin: i + 2, label: 'GPIO ' + (i + 2), value: 0, direction: 'out' });
    }
    var logEntries = [];

    function addLog(msg) {
      var ts = new Date().toLocaleTimeString();
      logEntries.unshift(ts + ' — ' + msg);
      if (logEntries.length > 30) logEntries.pop();
    }

    function togglePin(idx) {
      pins[idx].value = pins[idx].value ? 0 : 1;
      addLog('GPIO ' + pins[idx].pin + ' set to ' + (pins[idx].value ? 'HIGH' : 'LOW'));
      render();
    }

    function toggleDirection(idx) {
      pins[idx].direction = pins[idx].direction === 'out' ? 'in' : 'out';
      if (pins[idx].direction === 'in') pins[idx].value = Math.round(Math.random());
      addLog('GPIO ' + pins[idx].pin + ' direction set to ' + pins[idx].direction.toUpperCase());
      render();
    }

    addLog('GPIO controller initialized');
    addLog('Running in simulation mode');

    // -- Render ------------------------------------------------------------
    function render() {
      var pinCards = pins.map(function(p, i) {
        return bw.makeCard({
          title: p.label,
          className: 'bw_mb_2',
          content: [
            { t: 'div', a: { class: 'bw_mb_2' }, c: [
              bw.makeBadge({ text: p.value ? 'HIGH' : 'LOW', variant: p.value ? 'success' : 'secondary', pill: true }),
              ' ',
              bw.makeBadge({ text: p.direction.toUpperCase(), variant: p.direction === 'out' ? 'primary' : 'warning', pill: true })
            ]},
            bw.makeButtonGroup({
              children: [
                bw.makeButton({ text: p.value ? 'Turn Off' : 'Turn On', variant: p.value ? 'danger' : 'success', size: 'sm', onclick: function() { togglePin(i); }, disabled: p.direction === 'in' }),
                bw.makeButton({ text: p.direction === 'out' ? 'Set Input' : 'Set Output', variant: 'outline_primary', size: 'sm', onclick: function() { toggleDirection(i); } })
              ]
            })
          ]
        });
      });

      var pinTable = bw.makeTable({
        data: pins.map(function(p) {
          return { Pin: 'GPIO ' + p.pin, Direction: p.direction.toUpperCase(), Value: p.value ? 'HIGH' : 'LOW' };
        }),
        striped: true,
        hover: true,
        className: 'bw_mb_3'
      });

      var logList = bw.makeListGroup({
        items: logEntries.length ? logEntries.map(function(e) { return e; }) : ['Waiting for events...']
      });

      bw.DOM('#app', bw.makeContainer({
        className: 'bw_py_3',
        children: [
          // Simulation banner
          bw.makeAlert({
            content: 'Running in simulation mode \u2014 on real hardware, replace mock functions with device endpoints (fetch, EventSource).',
            variant: 'warning',
            dismissible: true
          }),

          // Header
          { t: 'h1', a: { class: 'bw_h4 bw_mb_3' }, c: '\uD83E\uDD6B Raspberry Pi GPIO Controller' },

          // Pin cards grid
          bw.makeRow({
            children: pinCards.map(function(card) {
              return bw.makeCol({ size: { xs: 6, md: 3 }, content: card });
            })
          }),

          // Pin state table
          bw.makeSection({
            title: 'Pin State Table',
            content: [pinTable]
          }),

          // Activity log
          bw.makeSection({
            title: 'Activity Log',
            content: [logList]
          })
        ]
      }));
    }

    render();

    // Simulate input pin changes every 3 seconds
    setInterval(function() {
      pins.forEach(function(p, i) {
        if (p.direction === 'in') {
          var newVal = Math.round(Math.random());
          if (newVal !== p.value) {
            p.value = newVal;
            addLog('GPIO ' + p.pin + ' input changed to ' + (newVal ? 'HIGH' : 'LOW'));
          }
        }
      });
      render();
    }, 3000);

    // =====================================================================
    // Production notes:
    //
    //   // Read pin states from device:
    //   // fetch('/api/gpio').then(r => r.json()).then(data => { pins = data; render(); });
    //
    //   // Toggle pin:
    //   // fetch('/api/gpio/' + pin, { method: 'POST', body: JSON.stringify({ value: newVal }) });
    //
    //   // SSE for pin change events:
    //   // var es = new EventSource('/events');
    //   // es.onmessage = function(e) { var data = JSON.parse(e.data); updatePin(data); };
    // =====================================================================
  </script>
</body>
</html>
